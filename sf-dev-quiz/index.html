ドは存在しない。\n❌ B（canEdit()）→ DescribeSObjectResultにcanEdit()メソッドは存在しない。\n❌ D（isEditable()）→ DescribeSObjectResultにisEditable()メソッドは存在しない。\n\n🎯 試験のコツ：Describeメソッド = isCreateable(), isUpdateable(), isDeletable(), isAccessible()。\"can\"や\"is〜able\"のスペルに注意。", "a": "canUpdate()", "b": "canEdit()", "c": "isUpdateable()", "d": "isEditable()"}, {"n": "5773", "p": "開発者がサンドボックスの全体的なコードカバレッジを判断できるのはどこですか。2つ選びなさい。", "r": "テスト、デバッグ、リリース", "ans": "C;D", "exp": "ざっくり言うと：サンドボックスの全体的なコードカバレッジを確認できるのは？2つ選ぶ問題。\n\n✅ 正解 C：「Apexクラス」ページ\n設定画面の[Apexクラス]ページに「組織のコードカバー率を見積る」リンクがあり、全体のカバレッジを確認できる。\n\n✅ 正解 D：開発者コンソールの[Tests]タブ\n開発者コンソールのTestsタブでテスト実行後、Overall Code Coverageパネルで全体のカバレッジを確認できる。\n\n❌ A（Apexテスト実行ページ）→ テストの実行はできるが、組織全体のカバレッジ表示機能はない。\n❌ B（Test Suite Runパネル）→ Test Suite Runパネルという名称の機能は開発者コンソールに存在しない。\n\n🎯 試験のコツ：全体カバレッジ確認 = ApexクラスページのリンクorDev ConsoleのTestsタブ。", "a": "「Apex テスト実行」ページ", "b": "開発者コンソール の [Test Suite Run] パネル", "c": "「Apex クラス」ページ", "d": "開発者コンソールの [Tests] タブ"}, {"n": "5774", "p": "開発者は、CustomObject__cレコードが現在のユーザーと手動で共有されているかどうかを、Apexにおいてどのように判断しますか。", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：カスタムオブジェクトのレコードが手動共有されているかをApexで確認するには？\n\n✅ 正解 C：CustomObject__shareをクエリする\nカスタムオブジェクトの共有レコードは__Shareオブジェクトに保存される。SOQL でCustomObject__Shareをクエリし、RowCauseが'Manual'のレコードを探せば手動共有を確認できる。\n\n❌ A（プロファイル設定を呼び出す）→ プロファイルはオブジェクトや項目のアクセス権を管理するが、個別レコードの共有状態は管理しない。\n❌ B（isShared()メソッド）→ ApexにisShared()というメソッドは存在しない。\n❌ D（ロール階層をクエリ）→ ロール階層はレコードの可視性に影響するが、手動共有の確認には使えない。\n\n🎯 試験のコツ：手動共有の確認 = __Shareオブジェクトをクエリ（RowCause='Manual'）。", "a": "現在のユーザーのプロファイル設定を呼び出す", "b": "レコードのisShared()メソッドを呼び出す", "c": "CustomObject__shareをクエリする", "d": "ロール階層をクエリする"}, {"n": "5775", "p": "開発者がコントローラ拡張よりもカスタムコントローラを使用することを検討する理由は何ですか。", "r": "ユーザインターフェース", "ans": "B", "exp": "ざっくり言うと：カスタムコントローラを使う理由は？（コントローラ拡張ではなく）\n\n✅ 正解 B：ページのすべてのロジックを実装し、デフォルトのSalesforce機能を回避するため\nカスタムコントローラは標準コントローラから完全に独立して動作する。save/edit/deleteなどの標準機能を使わず、すべてのロジックを自分で制御したい場合に使用する。\n\n❌ A（SOQLガバナ制限を引き上げる）→ カスタムコントローラを使ってもガバナ制限は変わらない。\n❌ C（標準コントローラの機能を活用する）→ 標準機能を活用したい場合はコントローラ拡張を使う。カスタムコントローラでは標準機能にアクセスできない。\n❌ D（共有設定と権限を強制する）→ カスタムコントローラ自体には共有設定を強制する仕組みはない。with sharingキーワードで別途制御が必要。\n\n🎯 試験のコツ：標準機能を使いたい → コントローラ拡張。完全カスタム → カスタムコントローラ。", "a": "SOQLクエリのガバナ制限を引き上げるため", "b": "ページのすべてのロジックを実装し、デフォルトのSalesforce機能を回避するため", "c": "標準コントローラの組み込み機能を活用するため", "d": "ユーザーの共有設定と権限を強制するため"}, {"n": "5776", "p": "開発者は金融システムのApexクラスを実装しています。このクラスでは、変数creditAmountとdebtAmountは、一度値が代入されると変更できないようにする必要があります。値が1回しか代入されないようにするために、開発者が変数を宣言する方法はどれですか。2つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "B;D", "exp": "ざっくり言うと：変数に一度だけ値を代入し、その後変更不可にする方法は？2つ選ぶ問題。\n\n✅ 正解 B：finalキーワードを使用し、コンストラクタで値を割り当てる\nfinalで宣言した変数は、コンストラクタ内で1回だけ値を設定できる。以降は変更不可。\n\n✅ 正解 D：finalキーワードを使用し、変数宣言時に値を割り当てる\n宣言と同時にfinal変数に値を設定。以降は変更不可。\n\n❌ A（staticキーワード＋コンストラクタ）→ staticは変数をクラスレベルにするが、値の変更を防がない。\n❌ C（staticキーワード＋静的イニシャライザ）→ 同上。staticだけでは値の不変性は保証されない。\n\n🎯 試験のコツ：値を変更不可にする = finalキーワード。staticは共有レベル（クラスvsインスタンス）の話で、不変性とは別。", "a": "staticキーワードを使用し、クラスのコンストラクタでその値を割り当てます。", "b": "finalキーワードを使用し、クラスのコンストラクタでその値を割り当てます。", "c": "staticキーワードを使用し、その値をstaticイニシャライザに割り当てます。", "d": "finalキーワードを使用し、変数を宣言するときにその値を割り当てます。"}, {"n": "5777", "p": "Apexで@InvocableMethodアノテーションを使用する場合の考慮事項は何ですか。3つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "A;B;E", "exp": "ざっくり言うと：@InvocableMethodの制約事項は？3つ選ぶ問題。\n\n✅ 正解 A：@InvocableMethodを使用するメソッドはstaticとして宣言する必要がある\nフローやプロセスビルダーから呼び出されるため、インスタンス化せずに使えるstaticが必須。\n\n✅ 正解 B：PublicまたはGlobalとして宣言できる\n外部から呼び出されるため、publicまたはglobalのアクセス修飾子が必要。\n\n✅ 正解 E：Apexクラスごとに1つだけ定義できる\n1つのクラスに@InvocableMethodは1メソッドのみ。複数は不可。\n\n❌ C（複数の入力パラメータを持つことができる）→ @InvocableMethodのメソッドは単一のList型パラメータのみ受け取れる。\n❌ D（戻り値を定義する必要がある）→ 戻り値はオプション。void（戻り値なし）も可能。\n\n🎯 試験のコツ：@InvocableMethod = static必須、1クラス1メソッド、入力はList型1つのみ。", "a": "@InvocableMethodアノテーションを使用するメソッドはstaticとして宣言する必要があります。", "b": "@InvocableMethodアノテーションを使用するメソッドはPublicまたはGlobalとして宣言できます。", "c": "@InvocableMethodアノテーションを使用するメソッドは複数の入力パラメータを持つことができます。", "d": "@InvocableMethodアノテーションを使用するメソッドは戻り値を定義する必要があります。", "e": "@InvocableMethodアノテーションを使用するメソッドは、Apexクラスごとに1つだけ定義できます。"}, {"n": "5778", "p": "ApexPages.currentPage().getParameters()を使用してVisualforceコントローラからURLパラメータを取得する場合の戻り値のデータ型は何ですか。", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：ApexPages.currentPage().getParameters()の戻り値のデータ型は？\n\n✅ 正解 B：Map\ngetParameters()はMap<String, String>を返す。キー=パラメータ名、値=パラメータ値。たとえばURL末尾に?id=001xxxがあれば、Mapのキー'id'で値'001xxx'を取得できる。\n\n❌ A（List）→ Listではなく、キーと値のペアを持つMap。\n❌ C（String[]）→ 配列でもない。Map型。\n❌ D（Enum）→ 列挙型でもない。Map型。\n\n🎯 試験のコツ：URLパラメータ取得 = getParameters()でMap<String,String>。特定パラメータ取得 = getParameters().get('パラメータ名')。", "a": "List", "b": "Map", "c": "String[]", "d": "Enum"}, {"n": "5779", "p": "開発者がVisualforceページでカスタムスタイルを使用する際に用いるものはどれですか。3つ選びなさい。", "r": "ユーザインターフェース", "ans": "A;B;E", "exp": "ざっくり言うと：VFページでカスタムスタイルを使う方法は？3つ選ぶ問題。\n\n✅ 正解 A：<apex:stylesheet>タグ\n外部CSSファイルへのリンクを生成するVFタグ。静的リソースのCSSを読み込める。\n\n✅ 正解 B：インラインCSS\nHTML要素に直接style属性でCSSを記述する方法。簡単なスタイル適用に便利。\n\n✅ 正解 E：静的リソース\nCSSファイルを静的リソースとしてアップロードし、apex:stylesheetで参照する。再利用可能。\n\n❌ C（<apex:style>タグ）→ Visualforceにapex:styleタグは存在しない。\n❌ D（<apex:stylesheets>タグ）→ 複数形のapex:stylesheetsタグは存在しない。正しくはapex:stylesheet（単数形）。\n\n🎯 試験のコツ：VFのCSS適用 = apex:stylesheet（タグ）+ 静的リソース + インラインCSS。apex:styleは存在しない。", "a": "<p><span style=\"font-size: 14px;\"> ＜apex:stylesheet＞</span>タグ</p>", "b": "インラインCSS", "c": "<p>＜apex:style＞タグ</p>", "d": "<p>＜apex:stylesheets＞タグ</p>", "e": "静的リソース"}, {"n": "5780", "p": "@isTestアノテーションに関して正しい説明はどれですか。 3つ選びなさい。", "r": "テスト、デバッグ、リリース", "ans": "A;B;E", "exp": "ざっくり言うと：@isTestアノテーションのSeeAllDataについて正しいのは？3つ選ぶ問題。\n\n✅ 正解 A：クラスがSeeAllData=falseでも、メソッドにSeeAllData=trueがあればそのメソッドは全データにアクセスできる\nメソッドレベルのtrueはクラスレベルのfalseを上書きする。\n\n✅ 正解 B：クラスがSeeAllData=trueの場合、メソッドにSeeAllData=falseをつけてもそのメソッドは全データにアクセスできる\nクラスレベルのtrue設定は、メソッドレベルのfalseでは上書きできない。\n\n✅ 正解 E：SeeAllData=falseでもプロファイルは表示される\nUser、Profileなどの一部のオブジェクトはSeeAllData=falseでもアクセス可能。テスト用にユーザーを作成するために必要。\n\n❌ C（@isTestのクラスはApexコード制限にカウントされる）→ @isTestクラスは制限にカウントされない。テスト専用コード。\n❌ D（SeeAllData=falseでも製品と価格表は表示される）→ 製品と価格表は例外ではない。Test.getStandardPricebookId()で対応する。\n\n🎯 試験のコツ：SeeAllData=trueはクラスレベルが優先（メソッドのfalseで上書き不可）。ProfileやUserはfalseでもアクセス可能。", "a": "@isTest(SeeAllData=false)が付けられたクラス内の@isTest(SeeAllData=true)が付けられたメソッドは、すべての組織データにアクセスできます。", "b": "@isTest(SeeAllData=true)が付けられたクラス内の@isTest(SeeAllData=false)が付けられたメソッドは、すべての組織データにアクセスできます。", "c": "テストメソッドを含むクラスは、@isTestアノテーションの有無に関係なく、Apexコードの制限にカウントされます。", "d": "クラスが@isTest(SeeAllData=false)で付けられている場合でも、テスト内で製品と価格表は表示されます。", "e": "クラスが@isTest(SeeAllData=false)で付けられている場合でも、テスト内でプロファイルは表示されます。"}, {"n": "5781", "p": "開発者は新しいカスタム例外クラスをどのように作成する必要がありますか。", "r": "プロセスの自動化とロジック", "ans": "A", "exp": "ざっくり言うと：カスタム例外クラスの正しい作り方は？\n\n✅ 正解 A：public class CustomException extends Exception{}\nカスタム例外はExceptionクラスをextendsして作成する。クラス名は必ず「Exception」で終わる必要がある。\n\n❌ B（new (CustomException)Exception()）→ キャストの構文が不正。例外のインスタンス化はnew CustomException()が正しい。\n❌ C（implements Exception）→ Exceptionはインターフェースではなくクラス。implementsではなくextendsを使う。\n❌ D（(Exception)CustomException ex = new Exception()）→ キャストの方向が逆。Exceptionをカスタム例外にキャストすることはできない。\n\n🎯 試験のコツ：カスタム例外 = extends Exception + クラス名は\"Exception\"で終了。implementsではなくextends。", "a": "public class CustomException extends Exception{}", "b": "CustomException ex = new (CustomException)Exception();", "c": "public class CustomException implements Exception{}", "d": "(Exception)CustomException ex = new Exception();"}, {"n": "5782", "p": "Universal Containers社は、サードパーティのJavaScriptフレームワークを使用して作成され、Visualforceページを使用して公開された多数のカスタムアプリケーションを持っています。\n同社は、これらのアプリケーションを更新して、Lightning Experienceの外観に似たスタイルを適用したいと考えています。ビジネス要求を最も迅速かつ効果的に満たすために、開発者は何をすべきですか。", "r": "ユーザインターフェース", "ans": "A", "exp": "ざっくり言うと：VFページをLightning Experienceの外観に合わせる最も簡単な方法は？\n\n✅ 正解 A：<apex:page>にlightningStylesheets=\"true\"を設定する\nこの属性をtrueにするだけで、VFページの標準コンポーネントにLightning Experienceのスタイルが自動適用される。コードの書き換えは不要。\n\n❌ B（Lightning Experience、コミュニティ、モバイルで利用可能にする）→ これはVFページをLightning内で使えるようにする設定であり、スタイルの変更ではない。\n❌ C（SLDSのCSSをJSアプリに組み込む）→ 可能だが、lightningStylesheetsをtrueにする方がはるかに簡単。\n❌ D（すべてのVFページをLightningコンポーネントに書き換え）→ 最も時間がかかる方法。「最も迅速かつ効果的」ではない。\n\n🎯 試験のコツ：VFをLightning風にする最速方法 = lightningStylesheets=\"true\"。書き換えは最終手段。", "a": "定義で属性LightningStyleSheetsをtrueに設定します。", "b": "カスタムアプリケーションで使用されるVisualforceページで、Lightning Experience、Lightning Communities、およびモバイルアプリで利用可能にするオプションを有効にします。", "c": "Salesforce Lightning Design SystemのCSSスタイルシートをJavaScriptアプリケーションに組み込みます。", "d": "すべてのVisualforceページをLightningコンポーネントとして書き直します。"}, {"n": "5783", "p": "開発者は、ごみ箱に送られたレコードの監査証跡を作成する必要があります。 どのタイプのトリガーを作成するのが最も適切ですか。", "r": "プロセスの自動化とロジック", "ans": "A", "exp": "ざっくり言うと：ごみ箱に送られたレコードの監査証跡を作るトリガーは？\n\n✅ 正解 A：after delete\nレコードが削除された（ごみ箱に送られた）後に監査証跡を作成する。afterなので削除が確定した後に実行され、元レコードの情報を参照できる。\n\n❌ B（after undelete）→ ごみ箱から「復元」された時に実行される。削除時ではない。\n❌ C（before undelete）→ 復元前に実行される。削除とは逆の操作。\n❌ D（before delete）→ 削除前に実行。監査証跡は「削除が確定した後（after）」に作るのが適切。\n\n🎯 試験のコツ：削除の監査 = after delete。復元の監査 = after undelete。「after」は確定後のアクション向け。", "a": "after delete", "b": "after undelete", "c": "before undelete", "d": "before delete"}, {"n": "5784", "p": "開発者は、ごみ箱から復元されるレコードの監査証跡を作成する必要があります。どのタイプのトリガーを作成するのが最も適切ですか。", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：ごみ箱から復元されるレコードの監査証跡を作るトリガーは？\n\n✅ 正解 D：after undelete\nレコードがごみ箱から復元された後に監査証跡を作成する。afterなので復元が完了した後に実行される。\n\n❌ A（before delete）→ 削除前のトリガー。復元とは逆の操作。\n❌ B（after delete）→ 削除後のトリガー。復元ではない。\n❌ C（before undelete）→ 復元前のトリガー。監査証跡は復元が完了した「後（after）」に作るのが適切。\n\n🎯 試験のコツ：5783と対になる問題。削除の監査=after delete、復元の監査=after undelete。", "a": "before delete", "b": "after delete", "c": "before undelete", "d": "after undelete"}, {"n": "5785", "p": "SalesforceのISVパートナーであるCloudKicks Fitnessは、管理パッケージアプリケーションを開発しています。ユーザーはアプリケーションモジュールの1つであるBodyfatというApexクラスとcalculateBodyfat()メソッドを使用して体脂肪を計算できます。製品の所有者は、ISVのパッケージ名前空間の外部でカスタマイザーを開発するときに、アプリケーション利用者がこのメソッドにアクセスできるようにしたいと考えています。パッケージ名前空間の外部でcalculateBodyFatメソッドにアクセスできるようにするには、開発者はどの手段を取る必要がありますか。", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：管理パッケージのメソッドを名前空間外からアクセス可能にするには？\n\n✅ 正解 B：globalアクセス修飾子を使用してクラスとメソッドを宣言する\nglobalを使うと、名前空間の外部からもアクセス可能になる。管理パッケージのAPIとして公開するメソッドにはglobalが必須。クラスもメソッドも両方globalにする必要がある。\n\n❌ A（publicでクラスとメソッドを宣言）→ publicは同じ名前空間内でのみアクセス可能。名前空間外からはアクセスできない。\n❌ C（クラスpublic + メソッドglobal）→ クラスがpublicだとメソッドがglobalでも外部からアクセスできない。\n❌ D（クラスpublic + メソッドpublic）→ 両方publicでは名前空間外からアクセス不可。\n\n🎯 試験のコツ：名前空間外部からのアクセス = クラスもメソッドもglobal。片方だけglobalではダメ。", "a": "publicアクセス修飾子を使用してクラスとメソッドを宣言します。", "b": "globalアクセス修飾子を使用してクラスとメソッドを宣言します。", "c": "クラスをpublicとして宣言し、メソッドでglobalアクセス修飾子を使用します。", "d": "クラスをpublicとして宣言し、メソッドでpublicアクセス修飾子を使用します。"}, {"n": "5786", "p": "開発者が組織内でテストを実行するための方法は何ですか。3つ選びなさい。", "r": "テスト、デバッグ、リリース", "ans": "B;C;D", "exp": "ざっくり言うと：組織内でテストを実行する方法は？3つ選ぶ問題。\n\n✅ 正解 B：Tooling API\nTooling APIを使えばプログラムからテストクラスの実行・結果取得が可能。CI/CDパイプラインで使用。\n\n✅ 正解 C：設定メニュー\n設定画面の「Apexテスト実行」ページからテストを実行できる。\n\n✅ 正解 D：Salesforce DX\nSFDX CLIのsf apex run testコマンドでテストを実行できる。\n\n❌ A（Bulk API）→ Bulk APIは大量データのインポート/エクスポート用。テスト実行機能はない。\n❌ E（メタデータAPI）→ メタデータAPIはメタデータの取得・デプロイ用。テスト実行はデプロイ時の検証として間接的に実行されるが、テスト実行専用ツールではない。\n\n🎯 試験のコツ：テスト実行方法 = Tooling API + 設定メニュー + SFDX CLI + 開発者コンソール。Bulk APIはデータ操作用。", "a": "Bulk API", "b": "Tooling API", "c": "設定メニュー", "d": "Salesforce DX", "e": "メタデータ API"}, {"n": "5787", "p": "開発者は、新しいApexクラスをテストするために、特定の項目値を持つレコードを用意する必要があります。開発者は、データがテストで利用可能であることを確認するために何をすべきですか。", "r": "テスト、デバッグ、リリース", "ans": "C", "exp": "ざっくり言うと：テストで特定の項目値を持つレコードを用意するには？\n\n✅ 正解 C：Test.loadData()を使用し、静的リソースでCSVファイルを参照する\nCSVファイルを静的リソースとしてアップロードし、Test.loadData(sObjectType, 'リソース名')でテストデータを一括読み込みできる。\n\n❌ A（匿名Apexで作成）→ 匿名Apexで作成したデータはテストメソッドとは別のトランザクション。テストデータとして利用するにはテストメソッド内で作成する必要がある。\n❌ B（SOQLで組織データをクエリ）→ テストはデフォルトで組織データにアクセスできない（seeAllData=false）。テストデータは独自に作成すべき。\n❌ D（ドキュメント内のJSONファイルを参照）→ Test.loadDataはCSVのみサポート。JSONファイルは読み込めない。\n\n🎯 試験のコツ：テストデータ読み込み = Test.loadData + 静的リソース + CSV。JSONは不可。", "a": "匿名Apexを使用して、必要なデータを作成する。", "b": "SOQLを使用して、必要なデータを組織にクエリする。", "c": "Test.loadData()を使用し、静的リソースでCSVファイルを参照する。", "d": "Test.loadData()を使用し、ドキュメント内のJSONファイルを参照する。"}, {"n": "5788", "p": "有効なApexの代入はどれですか。", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：有効なApexの代入はどれ？\n\n✅ 正解 C：Double x = 5;\n整数値（5）をDouble型に代入可能。Apexでは整数→浮動小数点型への暗黙的な型変換が許可されている。\n\n❌ A（Integer x = 5*1.0）→ 5*1.0の結果は5.0（浮動小数点）。浮動小数点をIntegerに代入するとコンパイルエラー。\n❌ B（Integer x = 5.0）→ 5.0は浮動小数点。Integerに直接代入不可。\n❌ D（Float x = 5.0）→ ApexにFloat型は存在しない。浮動小数点にはDoubleを使用する。\n\n🎯 試験のコツ：整数→Double/Decimal = OK（暗黙変換）。小数→Integer/Long = NG（精度損失）。Float型はApexに存在しない。", "a": "Integer x = 5*1.0;", "b": "Integer x = 5.0;", "c": "Double x = 5;", "d": "Float x = 5.0;"}, {"n": "5789", "p": "ApexとVisualforceページを使用する場合、MVCアーキテクチャのモデルを表すコードのタイプはどれですか。", "r": "ユーザインターフェース", "ans": "C", "exp": "ざっくり言うと：MVCアーキテクチャで「モデル」にあたるのは？\n\n✅ 正解 C：コントローラ拡張メソッドから返された取引先レコードのリスト\nモデル＝データそのもの。取引先レコードのリストはアプリケーションが扱うデータであり、MVCの「Model」に該当する。\n\n❌ A（SOQLでクエリするメソッド）→ データを「取得する処理」はコントローラの役割。\n❌ B（レコードを保存するメソッド）→ データを「保存する処理」もコントローラの役割。\n❌ D（レコードを処理するJavaScript）→ クライアント側のロジックはコントローラまたはビューの役割。\n\n🎯 試験のコツ：MVC → Model=データ（レコード/sObject）、View=画面（VF/HTML）、Controller=処理（Apex/JS）。", "a": "SOQLを使用して取引先レコードのリストをクエリするコントローラ拡張メソッド", "b": "取引先レコードのリストを保存するコントローラ拡張メソッド", "c": "コントローラ拡張メソッドから返された取引先レコードのリスト", "d": "取引先レコードのリストを処理するカスタムJavaScript"}, {"n": "5790", "p": "開発者がトリガーでApexヒープ制限のエラーに遭遇した場合、このエラーを回避する方法はどれですか。 2つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "C;D", "exp": "ざっくり言うと：トリガーでApexヒープ制限エラーを回避する方法は？2つ選ぶ問題。\n\n【前提知識：ヒープとは？】\nヒープ＝プログラム実行中に使う作業メモリ。たとえ話：机の上の作業スペース。変数やリストを作るたびに机の上にモノが増える。同期処理で6MB、非同期で12MBが上限。\n\n✅ 正解 C：使用後にコレクションを削除するかnullに設定する\n使い終わったリストやマップを= nullにすれば、ガベージコレクション（自動お掃除）がメモリを回収してくれる。机の上を片付けるイメージ。\n\n✅ 正解 D：SOQLのforループを使用する\n通常：全件をリストに一気に格納 → 大量データで机が溢れる。SOQLのforループ：200件ずつ取得して処理 → 机の上は常に200件分だけ。\n\n❌ A（transientキーワード）→ transientはVisualforceのビューステートサイズ削減用。トリガーのヒープとは無関係。\n❌ B（関連オブジェクトをクエリしてコレクションに保存）→ コレクションに追加するとヒープが増える。減らす方法を聞いてるので逆効果。\n\n🎯 試験のコツ：ヒープ削減 = 「使い終わったら捨てる(C)」か「そもそも一気に持たない(D)」。", "a": "変数を宣言するときにtransientキーワードを使用する。", "b": "関連するオブジェクトを更新するときに、関連するオブジェクトの項目をクエリしてコレクションに保存する。", "c": "使用後にコレクションを削除するか、nullに設定する。", "d": "大きなクエリ結果を単一のコレクションに割り当ててコレクションをループする代わりに、SOQLのループを使用する。"}, {"n": "5791", "p": "プラットフォーム開発者は、レコードが特定のレコードタイプに割り当てられている場合にのみ実行するApexメソッドを作成する必要があります。開発者が必要なレコードタイプIDをレコードタイプ名で動的に決定できる方法はどれですか。2つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "B;D", "exp": "ざっくり言うと：レコードタイプ名からIDを動的に取得する方法は？2つ選ぶ問題。\n\n✅ 正解 B：DescribeSObjectResultのgetRecordTypeInfosByDeveloperNameメソッドを使用する\nDescribeメソッドで開発者名（API名）からレコードタイプ情報を動的に取得できる。SOQLクエリ不要でガバナ制限に優しい。\n\n✅ 正解 D：RecordTypeオブジェクトでSOQLクエリを実行する\nSELECT Id FROM RecordType WHERE DeveloperName = '名前' AND SObjectType = 'オブジェクト名' で直接取得も可能。\n\n❌ A（SOAP APIへのコールアウト）→ 外部との通信は不要。Salesforce内部で完結する操作。\n❌ C（IDをハードコード）→ レコードタイプIDは環境ごとに異なるため、ハードコードは厳禁。サンドボックスと本番で値が変わる。\n\n🎯 試験のコツ：レコードタイプID取得 = Describeメソッド or SOQLクエリ。ハードコードは環境依存でNG。", "a": "SOAP APIへのアウトバウンドWebサービス呼び出しを行う", "b": "DescribeSObjectResultクラスでgetRecordTypeInfosByDeveloperNameメソッドを使用する", "c": "Apexクラスの定数としてIDをハードコードする", "d": "RecordTypeオブジェクトでSOQLクエリを実行する"}, {"n": "5792", "p": "Visualforceページで外部CSSからのスタイリングが必要な場合、開発者はどのタグを含める必要がありますか。", "r": "テスト、デバッグ、リリース", "ans": "D", "exp": "ざっくり言うと：VFで外部CSSを読み込むタグは？\n\n✅ 正解 D：apex:stylesheet\n<apex:stylesheet>タグのvalue属性に外部CSSファイルのURLまたは静的リソースのパスを指定して、スタイルシートをページに読み込む。\n\n❌ A（apex:includeStyles）→ そんなタグはVisualforceに存在しない。\n❌ B（apex:includeScript）→ JavaScriptライブラリを読み込むためのタグ。CSSには使わない。\n❌ C（apex:require）→ そんなタグはVisualforceに存在しない。Auraコンポーネントではltng:requireが存在する。\n\n🎯 試験のコツ：VFのCSS = apex:stylesheet。VFのJS = apex:includeScript。Aura = ltng:require。", "a": "apex:includeStyles", "b": "apex:includeScript", "c": "apex:require", "d": "apex:stylesheet"}, {"n": "5793", "p": "Apexクラスのプライベートメソッドの単体テストをどのように作成する必要がありますか。", "r": "テスト、デバッグ、リリース", "ans": "C", "exp": "ざっくり言うと：privateメソッドの単体テストをどう作成する？\n\n✅ 正解 C：TestVisibleアノテーションを使用する\n@TestVisibleをprivateメソッドに付けると、テストクラスからアクセス可能になる。本番コードからはprivateのまま。\n\n❌ A（SeeAllDataアノテーション）→ 組織の実データへのアクセス設定。privateメソッドへのアクセスとは無関係。\n❌ B（テストメソッドをApexクラスに追加）→ ビジネスロジックのクラスにテストメソッドを混在させるのは推奨されない。\n❌ D（Apexクラスをグローバルにする）→ globalにするとprivateメソッドがprivateではなくなり、設計が崩れる。\n\n🎯 試験のコツ：privateメソッドのテスト = @TestVisible。5733と同じテーマの頻出問題。", "a": "SeeAllDataアノテーションを使用します", "b": "Apexクラスにテストメソッドを追加します", "c": "TestVisibleアノテーションを使用します", "d": "Apexクラスをグローバルにします"}, {"n": "5794", "p": "次のクラスとトリガーのコードがあります。\n\npublic class InsuranceRates{\n    public static final Decimal smokerCharge = 0.01;\n}\n\ntrigger ContactTrigger on Contact(before insert){\n    InsuranceRates rates = new InsuranceRates();\n    Decimal baseCost = XXX;\n}\n\nbaseCost変数にクラス変数smokerChargeの値を設定するために、開発者はXXXにどのコードを挿入する必要がありますか。", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：トリガーから外部クラスの静的変数を参照する正しい構文は？（5711と同テーマ）\n\n✅ 正解 B：InsuranceRates.smokerCharge\n静的変数はクラス名.変数名でアクセス。インスタンスを作成する必要はない。\n\n❌ A（rates.smokerCharge）→ ratesはインスタンス変数名。静的変数はインスタンスからアクセスしない。\n❌ C（ContactTrigger.InsuranceRates.smokerCharge）→ トリガー名からクラスの変数を参照する構文はない。\n❌ D（rates.getSmokerCharge()）→ getSmokerCharge()メソッドは存在しない。変数への直接参照が正しい。\n\n🎯 試験のコツ：静的変数 = クラス名.変数名。インスタンス名やトリガー名では参照不可。", "a": "rates.smokerCharge", "b": "InsuranceRates.smokerCharge", "c": "ContactTrigger.InsuranceRates.smokerCharge", "d": "rates.getSmokerCharge()"}, {"n": "5795", "p": "Universal Containers社には、特定のアカウントによってレンタルされているすべてのContainer__cのテーブルを表示するVisualforceページがあります。一部の顧客が100,000を超えるコンテナをレンタルしているため、ビューステートの最大制限エラーとなります。ページの読み込みエラーを解決するために、開発者はVisualforceページについて何を変更する必要がありますか。", "r": "ユーザインターフェース", "ans": "B", "exp": "ざっくり言うと：10万件超のレコードでVFのビューステートエラーが発生。どう解決する？\n\n✅ 正解 B：StandardSetControllerを使用してページネーションを実装する\nStandardSetControllerでページ送りを実装すれば、1ページに表示するレコード数を制限でき、ビューステートのサイズを抑えられる。\n\n❌ A（SOQLのOFFSETでJavaScript Remoting）→ OFFSETには2000件の制限があり、10万件超のデータには対応不可。\n❌ C（遅延読み込みとtransient変数）→ 部分的な改善にはなるが、根本的な解決にはならない。\n❌ D（OffsetController）→ そんなクラスはSalesforceに存在しない。\n\n🎯 試験のコツ：大量レコード + ビューステートエラー → StandardSetControllerでページネーション。", "a": "SOQLのOFFSETでJavaScript Remotingを使用します", "b": "StandardSetControllerを使用してページネーションを実装します", "c": "遅延読み込みと一時的なリスト変数を使用します", "d": "OffsetControllerを使用してページネーションを実装します"}, {"n": "5796", "p": "Universal Containers社は、新しいSalesforceアプリケーションを構築するために、宣言型開発のみを使用することを決定しました。アプリケーションのデータベースレイヤーを構築するために使用すべきオプションはどれですか。3つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "B;D;E", "exp": "ざっくり言うと：宣言型（ノーコード）開発でDBレイヤーを構築するオプションは？3つ選ぶ問題。\n\n✅ 正解 B：積み上げ集計項目\n主従関係の子データを集計して親に表示。設定だけで実現、コード不要。\n\n✅ 正解 D：リレーションシップ\n主従関係や参照関係でオブジェクト間の関連を定義。宣言型の基本機能。\n\n✅ 正解 E：カスタムオブジェクトとカスタム項目\nデータ構造の定義そのもの。画面操作で作成でき、コード不要。\n\n❌ A（フロー）→ フローはビジネスロジック層（プロセスの自動化）であり、DBレイヤー（データ構造）ではない。\n❌ C（トリガー）→ Apexコードを使用するプログラム的開発。宣言型ではない。\n\n🎯 試験のコツ：DBレイヤー = オブジェクト + 項目 + リレーション + 積み上げ集計。フローはビジネスロジック層。", "a": "フロー", "b": "積み上げ集計項目", "c": "トリガー", "d": "リレーションシップ", "e": "カスタムオブジェクトとカスタム項目"}, {"n": "5797", "p": "開発者は、Lightningコンポーネントが取引先責任者のレコードを検索するために使用できるApexクラス「ContactController」を作成する必要があります。Lightningコンポーネントのユーザーは、自分がアクセス権を持つ取引先責任者のレコードのみを検索できるようにするべきです。正しくレコードを制限するための方法は何ですか。2つ選びなさい。", "r": "ユーザインターフェース", "ans": "B;D", "exp": "ざっくり言うと：ユーザーがアクセス権を持つレコードのみ検索できるApexクラスの宣言は？2つ選ぶ問題。\n\n✅ 正解 B：public with sharing class ContactController\nwith sharingで実行ユーザーの共有設定を強制。アクセスできないレコードは検索結果に含まれない。\n\n✅ 正解 D：public inherited sharing class ContactController\ninherited sharingで呼び出し元の共有設定を継承。呼び出し元がwith sharingなら、このクラスもwith sharingで動作する。\n\n❌ A（public class ContactController）→ sharing指定なし。呼び出し元に依存し、確実な共有設定の適用が保証されない。\n❌ C（public without sharing class ContactController）→ 共有設定を無視。全レコードにアクセスできてしまい、要件に反する。\n\n🎯 試験のコツ：共有設定を確実に適用 = with sharing or inherited sharing。without sharingは全アクセス許可。", "a": "public class ContactController", "b": "public with sharing class ContactController", "c": "public without sharing class ContactController", "d": "public inherited sharing class ContactController"}, {"n": "5798", "p": "匿名ブロックで実行されるApexコードに関して正しい答えはどれですか。2つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "B;E", "exp": "ざっくり言うと：匿名ブロックで実行されるApexコードについて正しいのは？2つ選ぶ問題。\n\n✅ 正解 B：コードはログインしているユーザーの権限で実行される\n匿名ブロックは、開発者コンソールで現在ログインしているユーザーの権限とアクセスレベルで実行される。\n\n✅ 正解 E：成功したDML操作は自動的にコミットされる\n匿名ブロック内でDML操作が成功すると、その変更は自動的にデータベースにコミット（確定）される。テストクラスのように自動ロールバックはない。\n\n❌ A（runAs()で指定されたユーザー）→ runAs()はテストメソッド専用。匿名ブロックでは使えない。\n❌ C（システムモードで実行）→ 匿名ブロックはユーザーモード。すべてのオブジェクトにアクセスできるわけではない。\n❌ D（すべてのDMLが自動ロールバック）→ テストクラスとは違い、匿名ブロックの変更は永続化される。\n\n🎯 試験のコツ：匿名ブロック = ユーザー権限で実行 + DMLはコミットされる。テストクラスとの違いに注意。", "a": "コードは、runAs()ステートメントで指定されたユーザーの権限で実行されます", "b": "コードは、ログインしているユーザーの権限で実行されます", "c": "コードは、すべてのオブジェクトとフィールドにアクセスできるシステムモードで実行されます", "d": "すべてのDML操作は自動的にロールバックされます", "e": "成功したDML操作は自動的にコミットされます"}, {"n": "5799", "p": "開発者は、maxAttempts と呼ばれる整数変数を持っています。開発者は、一度maxAttemptsが初期化されると、トリガー実行の間で変数の状態を共有しながら、Apex処理の間、その値を確実に保持する必要があります。これらの要求を満たすために、開発者はどのようにmaxAttemptsを宣言する必要がありますか。", "r": "プロセスの自動化とロジック", "ans": "A", "exp": "ざっくり言うと：一度初期化されたら変更不可で、トリガー間で共有される変数の宣言は？\n\n✅ 正解 A：staticキーワードとfinalキーワードを使用して定数として宣言する\nstatic = クラスレベルで共有（トリガー実行間で状態を維持）。final = 一度初期化したら変更不可。この組み合わせで「定数」を作れる。\n\n❌ B（ヘルパークラスの変数として宣言）→ staticでないと各インスタンスで別の値を持つ可能性がある。finalもないと変更可能。\n❌ C（private static変数）→ staticはあるが、finalがないので変更可能。\n❌ D（トリガー定義のメンバ変数）→ トリガー内の変数はトリガーの実行ごとにリセットされ、値が保持されない。\n\n🎯 試験のコツ：変更不可の共有変数 = static final。staticだけでは変更可能、finalだけではインスタンスレベル。", "a": "staticキーワードとfinalキーワードを使用して、maxattemptsを定数として宣言する。", "b": "maxattempts をヘルパークラスの変数として宣言する。", "c": "maxattempts をヘルパークラスの private static 変数として宣言する。", "d": "maxattempts をトリガー定義のメンバ変数として宣言する。"}, {"n": "5800", "p": "SOSL検索によって返されるデータ型は何ですか。", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：SOSL検索の戻り値のデータ型は？\n\n✅ 正解 C：List<List<sObject>>\nSOSLは複数のオブジェクトを横断して検索できる。戻り値は「リストのリスト」。外側のリスト=各オブジェクトの結果、内側のリスト=そのオブジェクトの該当レコード。\n\n❌ A（List<List<Account>, List<Opportunity>>）→ 正確な型表記ではない。List<List<sObject>>が正しい。\n❌ B（Map<sObject, sObject>）→ SOSLの結果はMap型では返されない。\n❌ D（Map<Id, sObject>）→ Map型ではない。\n\n🎯 試験のコツ：SOSL戻り値 = List<List<sObject>>。SOQL戻り値 = List<sObject> or 単一sObject or Integer(COUNT)。", "a": "<p>List＜List＜Account＞, List＜Opportunity＞＞</p>", "b": "<p>Map＜sObject, sObject＞</p>", "c": "<p>List＜List＜sObject＞＞</p>", "d": "<p>Map＜Id, sObject＞</p>"}, {"n": "5801", "p": "ApexクラスをRESTfulWebサービスとして公開するアノテーションはどれですか。", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：ApexクラスをRESTful Webサービスとして公開するアノテーションは？\n\n✅ 正解 D：@RestResource\n@RestResource(urlMapping='/myService/*')をクラスに付けると、そのクラスがREST APIのエンドポイントとして外部からアクセス可能になる。\n\n❌ A（@RemoteAction）→ VFページのJSからApexを呼ぶためのもの。REST API公開ではない。\n❌ B（@HttpInvocable）→ そんなアノテーションは存在しない。\n❌ C（@AuraEnabled）→ LightningコンポーネントからApexを呼ぶためのもの。外部REST API公開ではない。\n\n🎯 試験のコツ：REST API公開 = @RestResource。LWC連携 = @AuraEnabled。VF連携 = @RemoteAction。", "a": "@RemoteAction", "b": "@HttpInvocable", "c": "@AuraEnabled", "d": "@RestResource"}, {"n": "5802", "p": "クロスオブジェクト数式項目に関する記述のうち、正しいものは どれですか。3つ選びなさい。", "r": "デベロッパーの基本", "ans": "A;B;D", "exp": "ざっくり言うと：クロスオブジェクト数式項目について正しいのは？3つ選ぶ問題。\n\n✅ 正解 A：最大10リレーション離れたオブジェクトの項目を参照できる\n参照チェーンは最大10レベルまで遡れる。Account.Parent.Parent...のように連鎖可能。\n\n✅ 正解 B：主従関係または参照関係の項目を参照できる\nどちらのリレーション経由でも親オブジェクトの項目を参照可能。\n\n✅ 正解 D：ユーザーがアクセスできないデータをレコードに公開する可能性がある\n数式項目は参照先レコードのFLS（項目レベルセキュリティ）を無視して値を表示する。セキュリティ上の注意点。\n\n❌ C（子項目を参照して平均を実行できる）→ クロスオブジェクト数式は親方向の参照のみ。子レコードの集計はできない。\n❌ E（積み上げ集計項目を参照できる）→ クロスオブジェクト数式から積み上げ集計項目の参照はサポートされていない。\n\n🎯 試験のコツ：クロスオブジェクト数式 = 親方向のみ（最大10レベル）。子の集計は不可。FLSバイパスに注意。", "a": "クロスオブジェクト数式項目は、最大10リレーション離れているオブジェクトの項目を参照できます", "b": "クロスオブジェクト数式項目は、主従関係または参照関係の項目を参照できます", "c": "クロスオブジェクト数式項目は、子項目を参照して平均を実行できます", "d": "クロスオブジェクト数式項目は、ユーザーがアクセスできないデータをレコードに公開する可能性があります", "e": "クロスオブジェクト数式項目は積み上げ集計項目を参照できます"}, {"n": "5803", "p": "開発者はループ処理で、リスト内の各取引先責任者をチェックします。”Boss”というタイトルの取引先責任者が見つかった場合、Apexのメソッドはforループの外側のコードの最初の行にジャンプする必要があります。要件を実装するためのコーディングはどれですか。", "r": "プロセスの自動化とロジック", "ans": "A", "exp": "ざっくり言うと：forループで特定の条件を満たしたらループの外に出るには？\n\n✅ 正解 A：break;\nbreak文はループを即座に終了し、ループの直後のコードに移動する。「Bossが見つかったらもう探さなくていい」→ ループ脱出。\n\n❌ B（continue;）→ 現在のループの残りをスキップして次のイテレーションに進む。ループ自体は終了しない。\n❌ C（next;）→ Apexにnextというキーワードは存在しない。\n❌ D（exit;）→ Apexにexitというキーワードは存在しない。\n\n🎯 試験のコツ：ループ脱出 = break。現在のイテレーションスキップ = continue。next/exitは存在しない。", "a": "break;", "b": "continue;", "c": "next;", "d": "exit;"}, {"n": "5804", "p": "次のApexステートメントがあります。\n\nAccount myAccount = [SELECT Id, Name FROM Account];\n\nSOQLクエリによって複数のAccountが返された場合、何が発生しますか。", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：SOQLで複数レコードが返る結果を単一sObject変数に代入するとどうなる？\n\n✅ 正解 D：未処理の例外がスローされ、コードが終了する\nSOQLの結果が2件以上の場合、単一sObject変数に代入しようとするとSystem.QueryException（List has more than 1 row for assignment to SObject）がスローされる。\n\n❌ A（自動的にList型にキャスト）→ 自動キャストはされない。例外が発生する。\n❌ B（最初のレコードが代入される）→ 最初の1件だけ取る動作はしない。例外。\n❌ C（エラーがデバッグログに書き込まれる）→ デバッグログへの書き込みではなく、未処理例外としてコードが停止する。\n\n🎯 試験のコツ：SOQL→単一変数：0件=例外、1件=OK、2件以上=例外。安全にはList型で受け取る。", "a": "変数myAccountは自動的にListデータ型にキャストされます。", "b": "最初に返された Account が myAccount に代入されます。", "c": "クエリは失敗し、エラーがデバッグログに書き込まれます。", "d": "未処理の例外がスローされ、コードが終了します。"}, {"n": "5805", "p": "開発者は、Apexテストメソッドがサンドボックスで失敗することに気づきました。問題を特定するために、開発者はテストメソッド内のコードをコピーし、開発者コンソールの匿名実行ツールを使用してコードを実行したところ、コードは例外やエラーなしで実行されます。テストメソッドがサンドボックスで失敗し、開発者コンソールで合格したのはなぜですか。", "r": "テスト、デバッグ、リリース", "ans": "D", "exp": "ざっくり言うと：テストメソッドはサンドボックスで失敗するが、匿名実行では成功する理由は？\n\n✅ 正解 D：テストメソッドはサンドボックス内の既存のデータに依存している\nテストメソッドはデフォルトでseeAllData=falseのため、組織の実データにアクセスできない。一方、匿名実行は実データにアクセスできるため成功する。\n\n❌ A（@futureメソッドを呼び出している）→ @futureの呼び出しはこの問題の直接的な原因ではない。\n❌ B（構文エラーがある）→ 構文エラーがあれば匿名実行でも失敗するはず。\n❌ C（System.runAsを使用していない）→ 権限の問題はありうるが、最も一般的な原因はデータ依存。\n\n🎯 試験のコツ：テスト失敗 + 匿名実行成功 = 既存データへの依存が原因。テストは独自のデータを作成すべき。", "a": "テストメソッドは @future メソッドを呼び出しているため", "b": "テストメソッドのコードに構文エラーがあるため", "c": "テストメソッドは、特定のユーザーとして実行するためにSystem.runAsを使用しないため", "d": "テストメソッドはサンドボックス内の既存のデータに依存しているため"}, {"n": "5806", "p": "ある開発者は、自分の組織でカスタムページがロードされたときにパフォーマンスの問題の原因を突き止めるためにトラブルシューティングを行う必要があります。開発者がトラブルシューティングに使用すべきツールはどれか。", "r": "ユーザインターフェース", "ans": "C", "exp": "ざっくり言うと：カスタムページのパフォーマンス問題の原因調査に使うツールは？\n\n✅ 正解 C：開発者コンソール\n開発者コンソールのログインスペクタで、実行ログ・タイムライン・パフォーマンスツリーを使ってボトルネックを特定できる。SOQL実行時間、DML回数、CPU時間などを詳細に分析可能。\n\n❌ A（Salesforce CLI）→ CLIはメタデータ操作やデプロイ用。パフォーマンス分析機能はない。\n❌ B（AppExchange）→ アプリのマーケットプレイス。トラブルシューティングツールではない。\n❌ D（Visual Studio Code IDE）→ コード編集用IDE。パフォーマンス分析はデバッグログの確認に限られる。\n\n🎯 試験のコツ：パフォーマンス調査 = 開発者コンソール（ログインスペクタ・タイムライン）。", "a": "Salesforce CLI", "b": "AppExchange", "c": "開発者コンソール", "d": "Visual Studio Code IDE"}, {"n": "5807", "p": "スキーマビルダーを使用して開発者が実行できるアクションはどれですか。2つ選びなさい。", "r": "デベロッパーの基本", "ans": "A;B", "exp": "ざっくり言うと：スキーマビルダーでできるアクションは？2つ選ぶ問題。\n\n✅ 正解 A：カスタムオブジェクトを作成し、参照関係を定義する\nスキーマビルダーでオブジェクトの作成とリレーションの定義が視覚的にできる。\n\n✅ 正解 B：標準オブジェクトとシステムオブジェクトのみを含むビューを表示する\nスキーマビルダーではオブジェクトのフィルタリングが可能で、標準・システムオブジェクトのみの表示もできる。\n\n❌ C（カスタム項目を作成し、既存のページレイアウトに自動追加）→ 項目の作成は可能だが、ページレイアウトへの自動追加機能はない。\n❌ D（項目のないオブジェクトとリレーションのビュー）→ 項目のないオブジェクトは実際には存在しないため作成不可。\n\n🎯 試験のコツ：スキーマビルダー = オブジェクト・項目・リレーションの視覚的な作成・確認ツール。ページレイアウトは管理しない。", "a": "カスタムオブジェクトを作成し、そのオブジェクトに参照関係を定義する", "b": "標準オブジェクトとシステムオブジェクトのみを含むビューを表示する", "c": "カスタム項目を作成し、既存のページレイアウトに自動的に追加する", "d": "項目のないオブジェクトとリレーションのビューを作成する"}, {"n": "5808", "p": "開発者は、リードオブジェクトにbefore insertトリガーを使用して、Territory__c.PostalCode__cがLead.PostalCodeと一致するTerritory__cオブジェクトを取得します。しかし、開発者がデータローダーを使用して10,000のリードレコードを挿入すると、コードが失敗します。\n\nfor (Lead l : Trigger.new) {\n    if (l.PostalCode != null) {\n        List terrList = [SELECT Id FROM Territory__c WHERE PostalCode__c = :l.PostalCode];\n        if(terrList.size() ＞ 0) {\n            l.Territory__c = terrList[0].Id;\n        }\n    }\n}\n\nどのコード行がコードブロックの失敗の原因となっていますか。", "r": "プロセスの自動化とロジック", "ans": "A", "exp": "ざっくり言うと：データローダーで1万件のリードをinsertしたらトリガーが失敗。原因は？\n\n✅ 正解 A：3行目のSOQLクエリがforループ内に配置されている\nループ内でSOQLクエリを実行すると、レコード数分のクエリが発行される。1万件のリードだと1万回のSOQLクエリ→上限100回を大幅に超過→LimitException。\n\n❌ B（before insertでTrigger.newは無効）→ Trigger.newはbefore insertで有効。問題ない。\n❌ C（PostalCodeがnullの場合にNullPointer例外）→ nullチェックのif文があるため例外は発生しない。\n❌ D（before insertトリガー内でLeadを更新できない）→ before insertではTrigger.newのレコードを直接変更でき、追加のDMLなしで保存される。\n\n🎯 試験のコツ：ループ内SOQL = ガバナ制限違反の最頻出パターン。「SOQLはループの外で一括取得」がベストプラクティス。", "a": "3行目：SOQLクエリがforループコードの内部に配置されてるため", "b": "1行目：before insertトリガーではTrigger:newは無効なため", "c": "2行目：PostalCodeがnullの場合、NullPointer例外がスローされるため", "d": "5行目：before insertトリガー内のLeadは更新できないため"}, {"n": "5809", "p": "デバッグログフィルター設定はどこから設定できますか。2つ選びなさい。", "r": "テスト、デバッグ、リリース", "ans": "A;D", "exp": "ざっくり言うと：デバッグログフィルター設定ができる場所は？2つ選ぶ問題。\n\n✅ 正解 A：ウェブUI内の監視ユーザー名の[Filters]リンク\n設定→デバッグログ→ユーザー追跡フラグで、ユーザー名の隣のFiltersリンクからログレベルを細かく設定できる。\n\n✅ 正解 D：クラスまたはトリガーの詳細ページの[追跡フラグ]タブ\nApexクラスやトリガーの詳細ページにある追跡フラグタブからも、デバッグログのフィルター設定が可能。\n\n❌ B（監視対象ユーザーの名前）→ ユーザー名をクリックしてもフィルター設定にはアクセスできない。Filtersリンクが必要。\n❌ C（デバッグログの[詳細を表示]リンク）→ [詳細を表示]リンクはログの内容閲覧用であり、フィルター設定の場所ではない。\n\n🎯 試験のコツ：デバッグログフィルター = ①ユーザー追跡フラグのFiltersリンク ②クラス/トリガーの追跡フラグタブ。", "a": "ウェブUI内の監視ユーザー名の[Filters]リンク", "b": "監視対象ユーザーの名前", "c": "デバッグログのレコードの[詳細を表示]リンク", "d": "クラスまたはトリガーの詳細ページの[追跡フラグ]タブ"}, {"n": "5810", "p": "Opportunity opp = [select id, stagename from Opportunity Limit 1];\n\n上記のコードがある場合、開発者はどのようにstagename項目のラベルを取得できますか。", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：商談のStageName項目のラベルを動的に取得する方法は？\n\n✅ 正解 D：opportunity.stagename.getdescribe().getlabel()を呼び出す\nSchema.SObjectFieldのgetDescribe()メソッドで項目のメタデータにアクセスし、getLabel()でラベル名を取得する。\n\n❌ A（opp.stagename.label）→ opp.stagenameは項目の「値」を返す。.labelプロパティは存在しない。\n❌ B（opp.stagename.getdescribe().getlabel()）→ インスタンス変数の値からはDescribeを呼べない。Schema参照が必要。\n❌ C（opportunity.stagename.label）→ .labelプロパティはApexに存在しない。\n\n🎯 試験のコツ：項目ラベル取得 = Schema.SObjectField.getDescribe().getLabel()。インスタンスの値からは取れない。", "a": "“opp.stagename.label”を呼び出す", "b": "“opp.stagename.getdescribe().getlabel()”を呼び出す", "c": "“opportunity.stagename.label”を呼び出す", "d": "“opportunity.stagename.getdescribe().getlabel()”を呼び出す"}, {"n": "5811", "p": "テキストエリア (リッチ)項目が自動的に割り当てられるプリミティブデータ型はどれですか。", "r": "デベロッパーの基本", "ans": "D", "exp": "ざっくり言うと：テキストエリア(リッチ)項目のApexでのデータ型は？\n\n✅ 正解 D：String\nリッチテキストエリアの値はHTML形式の文字列としてString型に格納される。<b>太字</b>のようなHTMLタグを含む文字列になる。\n\n❌ A（Blob）→ Blobはバイナリデータ用。テキストデータには使わない。\n❌ B（Text）→ ApexにTextというプリミティブデータ型は存在しない。\n❌ C（Object）→ Objectは全型の親クラスだが、リッチテキストの具体的な型はString。\n\n🎯 試験のコツ：テキスト系項目（テキスト、テキストエリア、リッチテキスト、URL、メール等）→ すべてApexではString型。", "a": "Blob", "b": "Text", "c": "Object", "d": "String"}, {"n": "5812", "p": "開発者が、カスタムコントローラでカスタム例外が正しく機能することを確認するために単体テストを書きましたが、例外がスローされたためにテストが失敗しました。\nこの問題を解決し、例外を適切にテストするために、開発者が取るべき手順はどれでしょうか。", "r": "テスト、デバッグ、リリース", "ans": "A", "exp": "ざっくり言うと：テストでカスタム例外がスローされてテスト失敗。正しく例外をテストするには？\n\n✅ 正解 A：テスト内でtry/catchを使用して例外をキャッチする\ntry/catchで例外をキャッチし、catchブロック内でSystem.assertで例外の種類やメッセージを検証する。これにより例外がスローされてもテストが失敗しない。\n\n❌ B（finallyブロックで例外を投入）→ finallyはtry/catchの後始末用。例外のテスト手法ではない。\n❌ C（Database.insert(records, false)）→ allOrNone=falseは部分成功用。カスタム例外のテストとは別の話。\n❌ D（Test.isRunningTest()）→ テスト実行中かどうかの判定用。例外テストの方法ではない。\n\n🎯 試験のコツ：例外のテスト = try/catch + assertで例外メッセージを検証。", "a": "単体テスト内でtry/catchを使用して例外をキャッチする", "b": "単体テスト内でfinallyブロックを使用して、例外を投入する", "c": "データベースメソッドを、allまたはnoneをFALSEに設定して使用する", "d": "カスタムコントローラ内でTest.isRunningTest()を使用する"}, {"n": "5813", "p": "データの一意なキーと値のペアを提供するコレクション型はどれですか。", "r": "デベロッパーの基本", "ans": "D", "exp": "ざっくり言うと：一意なキーと値のペアを提供するコレクション型は？\n\n✅ 正解 D：Map\nMapはキーと値のペアを格納するコレクション。キーは一意（重複不可）。Map<String, Account>のように型を指定して使う。\n\n❌ A（List）→ Listは順序付きの要素のコレクション。キー・値のペアではなく、重複も許可される。\n❌ B（Set）→ Setは一意な要素のコレクション。キー・値のペアではなく、値のみを格納する。\n❌ C（sObject）→ sObjectはSalesforceのレコードを表すデータ型。コレクションではない。\n\n🎯 試験のコツ：キー＋値 = Map。一意な値のみ = Set。順序付きリスト = List。", "a": "List", "b": "Set", "c": "Array", "d": "Map"}, {"n": "5814", "p": "Apex処理が100件のAccountレコードと2,000件のContactレコードを挿入した後、500件のOpportunityレコードを挿入しようとしてDML例外が発生しました。Accountレコードは、allOrNone引数をfalseに設定してdatabase.insert()メソッドを呼び出すことで挿入されます。ContactおよびOpportunityレコードは、スタンドアロンinsert文(通常のInsert 変数名;)を使用して挿入されます。この処理でデータベースにコミットされるレコードの総数はいくつですか。", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：Database.insert(false)で一部成功後、通常のinsertで例外が発生。合計何件コミットされる？\n\n✅ 正解 D：100\n1. Database.insert(100件のAccount, false) → 100件成功。allOrNone=falseなので例外発生しても影響しない。\n2. 通常のinsert(2000件のContact) → 成功。\n3. 通常のinsert(500件のOpportunity) → DmlException発生。\n\nここがポイント：通常のinsert文（allOrNone=true）でエラーが発生すると、そのinsert文以降の処理はロールバックされるが、Database.insert(false)で成功した分は独立したDML操作として扱われる…と思いきや、実際には同一トランザクション内なので通常のinsertの例外でContactもOpportunityもロールバックされる。しかしDatabase.insert(false)の100件は既にコミット済みのため影響を受けない。\n\n❌ A（2000）→ Contactの2000件は例外によりロールバック。\n❌ B（2100）→ Account 100件 + Contact 2000件はコミットされない。\n❌ C（0）→ Database.insert(false)の100件は保持される。\n\n🎯 試験のコツ：Database.insert(records, false)の成功分は保持される。通常のinsertは例外で全ロールバック。", "a": "2,000", "b": "2,100", "c": "0", "d": "100"}, {"n": "5815", "p": "開発者は、従来のオンプレミスのSQLデータベースと統合しています。統合されるデータが Salesforce内の適切なレコードと一致するようにするには、開発者は何を使用すればよいでしょうか。", "r": "デベロッパーの基本", "ans": "B", "exp": "ざっくり言うと：従来のオンプレミスSQLデータベースとの統合で、データの一致を保証するには？\n\n✅ 正解 B：外部ID項目\n外部ID項目に外部システムの一意な識別子を保存することで、Upsert操作時にSalesforce内の適切なレコードと正確にマッチングできる。\n\n❌ A（外部オブジェクト）→ 外部オブジェクトはSalesforce Connectで外部データにリアルタイムアクセスする機能。データのマッチングではない。\n❌ C（数式項目）→ 数式項目は計算値を表示するもの。外部データとのマッチングには使えない。\n❌ D（参照項目）→ 参照項目はSalesforce内部のレコード間リレーション用。外部システムのIDとのマッチングには外部IDが必要。\n\n🎯 試験のコツ：外部システムとの統合でレコード一致 → 外部ID項目。Upsertのマッチングキーとして使う。", "a": "外部オブジェクト", "b": "外部ID項目", "c": "参照関係", "d": "数式項目"}, {"n": "5816", "p": "ある開発者が、WithSharingキーワードを使用するVisualforceページとApexコントローラを作成しました。このページは営業マネージャーが使用し、実行中の営業マネージャーに報告する営業担当者が所有する取引先のみを表示する必要があります。取引先に対する組織全体の共有は非公開に設定されています。開発者が取るべき追加の手順はどれですか。", "r": "ユーザインターフェース", "ans": "C", "exp": "ざっくり言うと：with sharing + プライベートOWDの環境で、直属部下の取引先だけ表示するために必要な設定は？\n\n✅ 正解 C：1つのプロファイル、1つの権限セット、2つのロールを作成する\n2つのロール（営業マネージャーロール > 営業担当者ロール）を階層構造で作成することで、営業マネージャーは直属の部下が所有する取引先データにアクセスできる。with sharingキーワードがロール階層に基づく共有設定を適用するため、この組み合わせが正解。\n\n❌ A（1つのロール）→ ロールが1つでは上下階層が作れない。マネージャーと担当者の区別ができない。\n❌ B（2つのプロファイル、1つのロール）→ プロファイルが2つあってもロール階層がなければデータの可視性を制御できない。\n❌ D（2つの権限セット、1つのロール）→ 権限セットは機能アクセスの追加用。ロール階層なしではデータの可視性は制御できない。\n\n🎯 試験のコツ：データの可視性制御 = ロール階層。機能アクセス制御 = プロファイル + 権限セット。", "a": "1つのプロファイル、1つの権限セット、1つのロールを作成する", "b": "2つのプロファイル、1つの権限セット、1つのロールを作成する", "c": "1つのプロファイル、1つの権限セット、2つのロールを作成する", "d": "1つのプロファイル、2つの権限セット、1つのロールを作成する"}, {"n": "5817", "p": "開発者は、システムに存在する ContactSearchApexクラスのセキュリティレビューを実行するよう命じられました。このクラスの中で、開発者は以下のメソッドがセキュリティ上の脅威であることを特定しました。\n\nList performSearch(String lastName) {\n    return Database.query(’Select Id, FirstName, LastName FROM Contact WHERE LastName Like%’ + lastName +’%’);\n}\n\nSOQL インジェクション攻撃を防ぐために、開発者がメソッドを改善できる方法は何ですか。2つ選びなさい。", "r": "ユーザインターフェース", "ans": "B;D", "exp": "ざっくり言うと：SOQLインジェクション脆弱性を修正する方法は？2つ選ぶ問題。（5760と同テーマ）\n\n✅ 正解 B：escapeSingleQuotesメソッドでパラメータをサニタイズする\nユーザー入力のシングルクォートをエスケープし、不正なSOQL文の構築を防止する。\n\n✅ 正解 D：変数バインディングを使用し、動的SOQLを静的SOQLに置き換える\n静的SOQLとバインド変数(:変数名)を使えば、入力値が安全に処理され、インジェクションのリスクがなくなる。\n\n❌ A（@ReadOnly + with sharing）→ @ReadOnlyはリソース制限の緩和用、with sharingは共有設定の適用用。SOQLインジェクション対策ではない。\n❌ C（正規表現で特殊文字を削除）→ 部分的には有効だが、完全な対策としては不十分。escapeSingleQuotesやバインド変数が推奨。\n\n🎯 試験のコツ：SOQLインジェクション対策 = ①escapeSingleQuotes ②バインド変数 ③静的SOQL。", "a": "クラスに@ReadOnlyアノテーションとwith sharingキーワードを使用する。", "b": "escapeSingleQuotes メソッドを使用して、使用前にパラメータをサニタイズする。", "c": "パラメータに正規表現式を使用して特殊文字を削除する。", "d": "変数バインディングを使用し、動的クエリを静的SOQLに置き換える。"}, {"n": "5818", "p": "Apex テストクラスで @testSetup アノテーションを使用することについて、正しい記述はどれですか。3つ選びなさい。", "r": "テスト、デバッグ、リリース", "ans": "A;B;D", "exp": "ざっくり言うと：@testSetupアノテーションについて正しいのは？3つ選ぶ問題。\n\n✅ 正解 A：SeeAllData=Trueが使われている場合、@testSetupは使えない\nSeeAllData=Trueは組織の実データにアクセスする設定。@testSetupはテストデータを独自に作成する仕組みなので、両立しない。\n\n✅ 正解 B：テストデータは1回だけ挿入され、クラス内の全テストメソッドで使用可能\n@testSetupメソッドはクラス全体で1回だけ実行される。効率的。\n\n✅ 正解 D：各テストメソッドが実行される前に@testSetupメソッドが自動実行される\n正確には、クラス内のテスト実行前に1回実行され、各テストメソッドはそのデータのコピーを使う。\n\n❌ C（testSetupで作成されたレコードは更新できない）→ 各テストメソッド内で更新は可能。ただし変更は他のテストメソッドには影響しない（各メソッドはデータの新しいコピーを受け取る）。\n\n🎯 試験のコツ：@testSetup = 1回実行、全メソッドで共有、SeeAllData=trueとは併用不可。", "a": "isTest(SeeAllData=True) アノテーションが使用されている場合、@testSetup アノテーションは使用できません。", "b": "テストデータは、クラス内のすべてのテストメソッドに対して 1 回挿入されます。", "c": "testSetup メソッドで作成されたレコードを、個々のテストメソッドで更新することはできません。", "d": "テストクラスの各テストメソッドが実行される前に、@testSetup メソッドが自動的に実行されます。"}, {"n": "5819", "p": "以下のブロックコードがあるとします。SOQLクエリの後、retrieveRecordsリストが空の場合、コードの実行が中断されるようにするために、開発者は何をする必要がありますか。\n\ntry {\n  List  retrieveRecords = [SELECT Id FROM Account WHERE Website = null];\n} catch(Exception e){\n  //例外ロジック\n}", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：SOQLクエリ結果が空のとき、コードの実行を中断させるには？\n\n✅ 正解 B：retrieveRecords変数が空の場合はSystem.assert(false)を使用する\nSystem.assert(false)は常に失敗するアサーションで、LimitExceptionとして扱われtry-catchではキャッチできない。そのためコードの実行が確実に中断される。\n\n❌ A（カスタム例外をスロー）→ catch(Exception e)ブロックでキャッチされてしまい、コードが中断されない。\n❌ C（リストの最初の要素にアクセス）→ NullPointerExceptionが発生するが、catch(Exception e)でキャッチされ中断されない。\n❌ D（リストをsObjectに置き換え）→ 変数の型を変えても、例外がcatchされてコード中断にはならない。\n\n🎯 試験のコツ：コード実行を確実に中断 = System.assert(false)。通常の例外はcatchブロックで捕捉されてしまう。", "a": "retrieveRecords変数の状態をチェックし、変数が空の場合はカスタム例外をスローする。", "b": "retrieveRecords変数の状態をチェックし、変数が空の場合はSystem.assert(false)を使用する。", "c": "retrieveRecords変数の状態をチェックし、変数が空の場合はリストの最初の要素にアクセスする。", "d": "retrieveRecords変数の宣言を、リストのAccountから単一のAccountに置き換える。"}, {"n": "5820", "p": "開発者は、取引先オブジェクトの’after update’トリガーを使用して、取引先に関連するすべての取引先責任者を更新します。以下に示すトリガーコードは、ランダムに失敗します。\n\nList theContacts = new List();\n\nfor (Account a : Trigger.new) {\n    for (Contact c : [SELECT Id, Account_Date__c FROM Contact WHERE AccountId = :a.Id]) {\n        c.Account_Date__c = Date.today();\n        theContacts.add(c);\n    }\n}\nupdate theContacts;\n\nこのコードブロックが失敗する原因は次のうちどれですか。", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：after updateトリガーで関連レコードを更新するコードがランダムに失敗する原因は？\n\n✅ 正解 D：SOQLクエリがforループ内にある\nループ内SOQLは、処理するレコード数が増えるとSOQLクエリの上限（100回）に達する。「ランダムに失敗」= 処理レコード数が少ないときは成功、多いときは失敗。\n\n❌ A（theContactsが空で例外）→ 空のリストにupdateを実行しても例外は発生しない。\n❌ B（Account_Date__cがnullで例外）→ Date.today()を代入しているのでnull例外は発生しない。\n❌ C（200件以上のレコードを処理）→ forループで200件以上処理すること自体は問題ない。問題はループ内のSOQL。\n\n🎯 試験のコツ：「ランダムに失敗」= データ量に依存するガバナ制限違反。ループ内SOQL/DMLを疑う。", "a": "theContactsが空の場合は例外がスローされます。", "b": "Account_Date__cがnullの場合、例外がスローされます。", "c": "トリガーは、forループで200 以上のレコードを処理します。", "d": "SOQLクエリがforループ内にあります。"}, {"n": "5821", "p": "ある開発者がVisualforceページと、ページ上で発生するさまざまなボタンやイベントを処理するメソッドを持つカスタムコントローラを作成しました。本番環境にデプロイするために、開発者は何をすべきですか。", "r": "ユーザインターフェース", "ans": "D", "exp": "ざっくり言うと：VFページとカスタムコントローラを本番にデプロイするには？\n\n✅ 正解 D：カスタムコントローラをカバーするテストクラスを作成する\nSalesforceの本番デプロイにはApexコードのテストカバレッジが必須。VFページ自体にはカバレッジ不要だが、カスタムコントローラ（Apexクラス）には75%以上のカバレッジが必要。\n\n❌ A（VFページをカバーするテストクラス）→ VFページのマークアップはテストカバレッジの対象外。\n❌ B（VFページをカバーするテストページ）→ 「テストページ」という概念はSalesforceに存在しない。\n❌ C（コントローラをカバーするテストページ）→ 同上。テストは「テストクラス」で行う。\n\n🎯 試験のコツ：デプロイに必要 = Apexクラス/トリガーのテストクラス。VFページ自体のテストは不要。", "a": "Visualforceページをカバーするテストクラスを作成する", "b": "Visualforceページをカバーするテストページを作成する", "c": "カスタムコントローラをカバーするテストページを作成する", "d": "カスタムコントローラをカバーするテストクラスを作成する"}, {"n": "5822", "p": "開発者はオブジェクトのVisualforceを使用してボタンをオーバーライドしたいと考えています。\nどんな要件を満たしている必要がありますか。", "r": "ユーザインターフェース", "ans": "B", "exp": "ざっくり言うと：VFでオブジェクトのボタンをオーバーライドするために必要な属性は？\n\n✅ 正解 B：standardController属性をオブジェクトに設定する\n標準ボタン（新規、編集、表示など）をオーバーライドするVFページは、対象オブジェクトのstandardControllerを指定する必要がある。\n\n❌ A（PageReferenceメソッドを設定）→ PageReferenceはページ遷移用。ボタンオーバーライドの必須条件ではない。\n❌ C（action属性をメソッドに設定）→ actionはページ読み込み時の実行メソッド指定。ボタンオーバーライドの要件ではない。\n❌ D（コントローラでオブジェクトをインスタンス化）→ インスタンス化はボタンオーバーライドの必須条件ではない。\n\n🎯 試験のコツ：標準ボタンのオーバーライド = standardController属性が必須。", "a": "コントローラまたは拡張機能にPageReferenceメソッドを設定する。", "b": "オブジェクトにstandardController属性を設定する。", "c": "action属性をコントローラのメソッドに設定する。", "d": "オブジェクトレコードは、コントローラまたは拡張機能でインスタンス化する必要があります。"}, {"n": "5823", "p": "すべての値が一意であることを保証するために使用されるApexコレクションはどれですか。", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：すべての値が一意であることを保証するApexコレクションは？\n\n✅ 正解 C：Set\nSetは一意な要素のみを格納するコレクション。重複する値を追加しようとすると自動的に無視される。\n\n❌ A（List）→ Listは重複を許可する順序付きコレクション。\n❌ B（Enum）→ Enumは列挙型の定義で、コレクションではない。\n❌ D（sObject）→ sObjectはSalesforceのレコード型。コレクションではない。\n\n🎯 試験のコツ：一意性保証 = Set。順序付き = List。キー＋値 = Map。", "a": "List", "b": "Enum", "c": "Set", "d": "sObject"}, {"n": "5824", "p": "MVCパラダイムの観点から、VisualforceよりもLightning Webコンポーネントベースの開発を使用してSalesforceアプリケーションのビューレイヤーを実装することの利点は何ですか。2つ選びなさい。", "r": "デベロッパーの基本", "ans": "A;B", "exp": "ざっくり言うと：VFよりLWCを使ったビューレイヤー実装の利点は？2つ選ぶ問題。\n\n✅ 正解 A：アプリケーションが自己完結型で再利用可能\nLWCはコンポーネントベースのアーキテクチャ。各コンポーネントは独立して動作し、異なるページやアプリで再利用できる。\n\n✅ 正解 B：豊富なコンポーネントエコシステム\nSalesforceが提供するベースコンポーネント群＋コミュニティのコンポーネントが豊富にあり、開発を加速できる。\n\n❌ C（サーバー側のランタイムデバッグ）→ LWCはクライアント側のフレームワーク。サーバー側のデバッグはApexの話で、LWC固有の利点ではない。\n❌ D（自動コード生成）→ LWCフレームワークに自動コード生成機能は含まれない。\n\n🎯 試験のコツ：LWCの利点 = コンポーネント再利用性 + 豊富なエコシステム + クライアント側パフォーマンス。", "a": "アプリケーションが自己完結型で再利用可能である", "b": "豊富なコンポーネントエコシステム", "c": "サーバー側のランタイムデバッグ", "d": "自動コード生成"}, {"n": "5825", "p": "ある開発者が、メールアドレス’dev@uc.com’を持つ取引先責任者とユーザーを取得したいと考えています。開発者が使用すべきSOSL文はどれですか。", "r": "プロセスの自動化とロジック", "ans": "A", "exp": "ざっくり言うと：特定のメールアドレスで連絡先とユーザーを横断検索するSOSLは？\n\n✅ 正解 A：FIND {dev@uc.com} IN Email Fields RETURNING Contact (Email), User (Email)\nSOSLはEmail Fieldsを検索スコープに指定して、複数オブジェクト（ContactとUser）を横断検索できる。\n\n❌ B（FIND {Email = 'dev@uc.com'}）→ SOSLのFIND句に等式は使えない。検索文字列のみ指定。\n❌ C（FIND {Email = 'dev@uc.com'} IN Contact, User）→ IN句にはオブジェクト名ではなく検索スコープ（Name Fields, Email Fieldsなど）を指定する。\n❌ D（FIND Email IN Contact, User FOR）→ SOSLの構文として完全に不正。\n\n🎯 試験のコツ：SOSL = FIND {検索文字列} IN 検索スコープ RETURNING オブジェクト(項目)。SOQLとは構文が全く違う。", "a": "FIND {dev@uc.com} IN Email Fields RETURNING Contact (Email), User (Email)", "b": "FIND {Email = ‘dev@uc.com’} RETURNING Contact (Email), User (Email)", "c": "FIND {Email = ‘dev@uc.com’} IN Contact, User", "d": "FIND Email IN Contact, User FOR {dev2uc.com}"}, {"n": "5826", "p": "ユーザーが取引先の「Postal Code」を更新する際、取引先のカスタムテキスト項目「Timezone」は、カスタムオブジェクト「PostalCodeToTimezone__c」の情報を基に自動的に更新される必要があります。この機能を実装するため、開発者はどの手法を採用すべきでしょうか", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：取引先の郵便番号を変更したとき、別のカスタムオブジェクトを参照してタイムゾーンを自動更新するには？\n\n✅ 正解 C：取引先のカスタムトリガーを作成する\n取引先の郵便番号が更新されたときにトリガーを起動し、PostalCodeToTimezone__cオブジェクトを検索してタイムゾーンを自動設定する。他のオブジェクトを参照する複雑なロジックにはトリガーが最適。\n\n❌ A（ワークフロールール）→ ワークフローは同一オブジェクト内の項目更新のみ。他のオブジェクトからデータを取得するロジックは実装できない。\n❌ B（割り当てルール）→ 割り当てルールはレコードの所有者を自動設定するもの。項目の自動更新には使えない。\n❌ D（承認プロセス）→ 承認フローの管理用。項目の自動更新やデータ取得には使えない。\n\n🎯 試験のコツ：「別オブジェクトを参照して項目更新」→ Apexトリガーorフロー。ワークフローは同一オブジェクト内のみ。", "a": "取引先オブジェクトのワークフロールールを作成する。", "b": "取引先オブジェクトの割り当てルールを作成する。", "c": "取引先オブジェクトのカスタムトリガーを作成する。", "d": "取引先オブジェクトの承認プロセスを作成する。"}, {"n": "5827", "p": "カスタムVisualforceコントローラとして使用するクラスの要件は何ですか。", "r": "ユーザインターフェース", "ans": "C", "exp": "ざっくり言うと：カスタムVFコントローラとして使えるクラスの要件は？\n\n✅ 正解 C：デフォルトの引数なしコンストラクタを持つ最上位のApexクラス\nVFのカスタムコントローラは、引数なしのデフォルトコンストラクタが必要。VFページがロードされるとき、このコンストラクタが自動的に呼ばれてクラスがインスタンス化される。\n\n❌ A（PageReferenceを返すコンストラクタ）→ コンストラクタの戻り値としてPageReferenceは不要。\n❌ B（PageReferenceを拡張する）→ PageReferenceはページ参照クラスであり、コントローラの親クラスにはならない。\n❌ D（コントローラインターフェースを実装）→ VFコントローラに特定のインターフェース実装は不要。\n\n🎯 試験のコツ：カスタムコントローラ = 引数なしコンストラクタ。コントローラ拡張 = StandardControllerを引数に取るコンストラクタ。", "a": "PageReferenceを返すコンストラクタを持つ最上位のApexクラス", "b": "PageReferenceを拡張する最上位のApexクラス", "c": "デフォルトの引数なしコンストラクタを持つ最上位のApexクラス", "d": "コントローラインターフェースを実装した最上位のApexクラス"}, {"n": "5828", "p": "ある企業は、顧客に教育ビデオを視聴してもらうための推進計画を実施しました。顧客は数日間にわたりビデオを視聴することができ、その進捗は記録されます。動画をすべて視聴完了すると、顧客に報奨ポイントが付与されます。動画がSalesforceで完了としてマークされた際、外部のWebサービスを呼び出して、ユーザーにポイントを付与する必要があります。\n開発者は、この要件をSalesforceのafter updateトリガー内で外部Webサービスへの呼び出しとして実装しました。しかし、実装後にSystem.CalloutExceptionが発生しています。このエラーを解消するために、開発者はどのような対応をすべきでしょうか。", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：トリガーのafter updateで外部コールアウトしたらCalloutExceptionが発生。どう修正する？\n\n✅ 正解 D：@future(callout=true)を使用してコールアウトを非同期メソッドに移動する\nSalesforceでは、トリガー内で直接HTTP/Webサービスコールアウトを行うことは禁止されている。コールアウトは@future(callout=true)で非同期メソッドに委譲する必要がある。\n\n❌ A（before insertトリガーに置き換え）→ beforeでもafterでも、トリガー内の直接コールアウトは禁止。\n❌ B（RESTサービスを作成）→ RESTサービスの作成は外部からの受信用であり、トリガーからのコールアウト問題は解決しない。\n❌ C（try-catchで例外処理）→ try-catchで囲んでも、そもそもコールアウト自体が禁止されているのでエラーは解消しない。\n\n🎯 試験のコツ：トリガーからのコールアウト = @future(callout=true)で非同期化。直接コールアウトは常にNG。", "a": "after update トリガーを before insert トリガーに置き換える。", "b": "外部 Web サービスと統合する REST サービスを作成する。", "c": "外部呼び出しを try-catch ブロックで囲み、例外を処理する。", "d": "@future(callout=true)を使用して、コールアウトを非同期メソッドに移動する。"}, {"n": "5829", "p": "Salesforceには、Developer Sandbox、Developer Pro Sandbox、Partial Copy Sandbox、Full Sandboxの4つのサンドボックスタイプが存在します。その中で、Partial Copy SandboxとFull Sandboxの特徴は何ですか。2つ選びなさい。", "r": "デベロッパーの基本", "ans": "B;D", "exp": "ざっくり言うと：Partial CopyとFull Sandboxの共通の特徴は？2つ選ぶ問題。\n\n✅ 正解 B：サンドボックスのテンプレートが利用できる\nPartial Copyではテンプレートが必須、Full Sandboxでもオプションで利用可能。Developer/Dev Proではテンプレートは使えない。\n\n✅ 正解 D：より多くのデータレコードを保存できる\nPartial Copy = 5GB、Full = 本番と同じストレージ。Developer(200MB)/Dev Pro(1GB)よりも格段に多い。\n\n❌ A（メタデータの一部分のみ）→ すべてのサンドボックスでメタデータは完全にコピーされる。\n❌ C（より頻繁に更新可能）→ Partial = 5日ごと、Full = 29日ごと。Developer(1日)の方が頻繁。\n\n🎯 試験のコツ：Partial Copy/Fullの共通点 = テンプレート利用可能 + 大容量データストレージ。", "a": "メタデータの一部分のみを含みます", "b": "サンドボックスのテンプレートが利用できます", "c": "より頻繁な更新をサポートします", "d": "より多くのデータレコードを保存できます"}, {"n": "5830", "p": "Before InsertトリガーのTrigger.oldコンテキスト変数の値は何ですか。", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：Before InsertトリガーでのTrigger.oldの値は？\n\n✅ 正解 B：null\nBefore Insertでは、新しいレコードがまだDBに保存されていないため、「古い」バージョンのレコードは存在しない。Trigger.oldはnullを返す。\n\n❌ A（空のリスト）→ 空リストではなくnull。リストオブジェクト自体が存在しない。\n❌ C（IDなしの新しいsObjectリスト）→ これはTrigger.newの説明。Trigger.oldではない。\n❌ D（Undefined）→ 「Undefined」という状態はApexに存在しない。\n\n🎯 試験のコツ：before insert → Trigger.old = null、Trigger.oldMap = null。新規レコードに「古い」バージョンはない。", "a": "sObjectの空のリスト", "b": "null", "c": "Idなしで新しく作成されたsObjectのリスト", "d": "Undefined"}, {"n": "5831", "p": "Visualforce ページで標準アクションをオーバーライドするには、タグでどの属性を定義する必要がありますか。", "r": "ユーザインターフェース", "ans": "D", "exp": "ざっくり言うと：VFで標準アクションをオーバーライドするために必要な属性は？\n\n✅ 正解 D：standardController\n<apex:page standardController=\"オブジェクト名\">を指定することで、そのオブジェクトの標準アクション（新規、編集、表示、削除）をVFページでオーバーライドできる。\n\n❌ A（pageReference）→ apex:pageにpageReference属性は存在しない。\n❌ B（override）→ apex:pageにoverride属性は存在しない。\n❌ C（controller）→ controllerはカスタムコントローラ用。標準アクションのオーバーライドにはstandardControllerが必要。\n\n🎯 試験のコツ：標準アクションのオーバーライド = standardController。カスタムコントローラ = controller。", "a": "pageReference", "b": "override", "c": "controller", "d": "standardController"}, {"n": "5832", "p": "本番環境にデプロイする際に必要なプロセスはどれですか。2つ選びなさい。", "r": "テスト、デバッグ、リリース", "ans": "B;C", "exp": "ざっくり言うと：本番デプロイの要件は？2つ選ぶ問題。\n\n✅ 正解 B：すべてのトリガーのテストカバレッジは少なくとも1%以上必要\n各トリガーは最低1行以上のテストカバレッジが必要。0%のトリガーがあるとデプロイ失敗。\n\n✅ 正解 C：すべてのApexコードのテストカバレッジは少なくとも75%以上必要\n組織全体のApexコード（クラス＋トリガー）の合計カバレッジが75%以上必要。\n\n❌ A（すべてのトリガーが75%以上）→ 各トリガー個別に75%は不要。最低1%あればOK（全体で75%が必要）。\n❌ D（テストとトリガーを合わせて75%）→ 表現が不正確。正しくは「クラスとトリガーを含む全Apexコード」で75%以上。\n\n🎯 試験のコツ：デプロイ要件 = 全体75%以上 + 各トリガー最低1%。", "a": "すべてのトリガーのテストカバレッジは75%以上である必要があります。", "b": "すべてのトリガーのテストカバレッジは少なくとも1%以上である必要があります。", "c": "すべてのApexコードのテストカバレッジは、少なくとも75%以上である必要があります。", "d": "すべてのテストとトリガーのテストカバレッジを合わせて75%以上である必要があります。"}, {"n": "5834", "p": "リードオブジェクトには、カスタム項目の優先メール(Prior_Email__c)があります。以下のトリガーは、メール項目(Email)が変更されるたびに、現在のメール(Email)を優先メール項目(Prior_Email__c)にコピーするものです。\n\ntrigger test on Lead (before update) {\n    List leadsToUpdate = new List();\n\n\n    for(Lead leadRecord : trigger.new){\n        if(leadRecord.Email != trigger.oldMap.get(leadRecord.Id).Email){\n            leadRecord.Prior_Email__c = trigger.oldMap.get(leadRecord.Id).Email;\n            leadsToUpdate.add(leadRecord);\n        }\n    }\n\n\n    if(leadsToUpdate.size() ＞ 0) {\n        update leadsToUpdate;\n    }\n}\n\nこのトリガーはどのタイプの組み込み例外を発生させますか。", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：before updateトリガーでTrigger.newのレコードをupdateしようとするとどうなる？\n\n✅ 正解 C：DmlException\nbefore updateトリガー内では、Trigger.newのレコードを直接変更できる（DML不要）。しかし、そのレコードに対してupdate DMLを実行しようとすると、再帰的なトリガー実行の原因となるためDmlExceptionがスローされる。\n\n❌ A（NullPointerException）→ trigger.oldMap.get()は有効なので例外は発生しない。\n❌ B（CompileTimeException）→ Apexにそんな例外型は存在しない。コード自体はコンパイルできる。\n❌ D（LimitException）→ DML回数の制限ではなく、before内でのupdate DMLが禁止されているためDmlException。\n\n🎯 試験のコツ：beforeトリガー内では直接変更OK（DML不要）。update DMLを実行するとDmlException。", "a": "NullPointerException", "b": "CompileTimeException", "c": "DmlException", "d": "LimitException"}, {"n": "5835", "p": "サポートされていない言語を使用できるプラットフォーム機能はどれですか。2つ選びなさい。", "r": "デベロッパーの基本", "ans": "B;C", "exp": "ざっくり言うと：サポートされていない言語を使えるHerokuの機能は？2つ選ぶ問題。\n\n✅ 正解 B：Docker\nDockerコンテナを使えば任意の言語やランタイムを実行可能。環境を完全にカスタマイズできる。\n\n✅ 正解 C：Buildpacks\nカスタムBuildpacksを使えば、Herokuが標準でサポートしていない言語やフレームワークも利用できる。\n\n❌ A（Heroku ACM）→ SSL/TLS証明書の自動管理機能。言語サポートとは無関係。\n❌ D（App.json）→ アプリの設定マニフェストファイル。言語サポートの追加機能ではない。\n\n🎯 試験のコツ：Herokuで非標準言語 = Docker or カスタムBuildpacks。", "a": "Heroku Acm", "b": "Docker", "c": "Buildpacks", "d": "App.json"}, {"n": "5836", "p": "開発者は、テストメソッドのガバナ制限をどのように回避すべきでしょうか。", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：テストメソッドのガバナ制限をどう回避する？\n\n✅ 正解 D：Test.startTest()を使用してガバナ制限をリセットする\nstartTest()を呼ぶと、それ以降のコードに対して新しいガバナ制限のセットが適用される。テストデータ準備で消費した制限と、テスト対象コードの制限を分離できる。\n\n❌ A（@TestVisibleでレコード作成メソッド）→ @TestVisibleはprivateメンバーへのアクセス用。ガバナ制限回避とは無関係。\n❌ B（Test.loadData()）→ テストデータ読み込みの効率化には有用だが、ガバナ制限のリセット機能はない。\n❌ C（SeeAllData=true）→ 既存データにアクセスする設定。ガバナ制限回避とは無関係で、むしろテストの品質を下げる。\n\n🎯 試験のコツ：ガバナ制限のリセット = Test.startTest() / Test.stopTest()。テストの「本番部分」をこの間に書く。", "a": "レコードを作成するメソッドで@TestVisibleを使用する。", "b": "Test.loadData()を使用して、静的リソースからデータをロードする。", "c": "既存のデータを使用するために、@IsTest(SeeAllData=true)を使用する。", "d": "Test.startTest()を使用して、ガバナ制限をリセットする。"}, {"n": "5837", "p": "searchTermを指定してAccountsのリストを返すApexメソッドgetAccountsは、Lightning Webコンポーネントで使用できます。getAccountsメソッドを使用するLightning Webコンポーネントのプロパティの正しい定義は何ですか。", "r": "ユーザインターフェース", "ans": "A", "exp": "ざっくり言うと：LWCのプロパティにApexメソッドを接続する正しい構文は？\n\n✅ 正解 A：@wire(getAccounts, {searchTerm: '$searchTerm'}) accountList;\n@wireデコレータでApexメソッドをプロパティにバインドする。パラメータはオブジェクト形式{パラメータ名: '$リアクティブプロパティ'}で指定。$はリアクティブ（値変更時に自動再実行）を意味する。\n\n❌ B（@wire(getAccounts, '$searchTerm')）→ パラメータはオブジェクト形式で渡す必要がある。文字列直接は不可。\n❌ C（@AuraEnabled(getAccounts, ...)）→ @AuraEnabledはApexメソッド側のアノテーション。LWCのJS内では使わない。\n❌ D（@AuraEnabled(getAccounts, '$searchTerm')）→ 同上。\n\n🎯 試験のコツ：LWCの@wire = @wire(メソッド名, {引数名: '$プロパティ名'})。$付き = リアクティブ。", "a": "<p>@wire(getAccounts, {searchTerm: ‘$searchTerm’})</p><p>accoutList;</p>", "b": "<p>@wire(getAccounts, ‘$searchTerm’)</p><p>accountList;</p>", "c": "<p>@AuraEnabled(getAccounts, {searchTerm: ‘$searchTerm’})</p><p>accountList;</p>", "d": "<p>@AuraEnabled(getAccounts, ‘$searchTerm’)</p><p>accountList;</p>"}, {"n": "5838", "p": "デバッグログに関する記述のうち、正しいものはどれですか。3つ選びなさい。", "r": "テスト、デバッグ、リリース", "ans": "A;D;E", "exp": "ざっくり言うと：デバッグログに関して正しいのは？3つ選ぶ問題。\n\n✅ 正解 A：ログレベルは累積される（FINEにはDEBUG/INFO/WARN/ERRORが含まれる）\n上位レベルを設定すると、それ以下のレベルもすべて記録される。\n\n✅ 正解 D：特定のユーザー、クラス、トリガーに設定できる\n追跡フラグで対象（ユーザー/クラス/トリガー）を指定してデバッグログを設定可能。\n\n✅ 正解 E：システムデバッグログは24時間保存される\nシステムデバッグログの保存期間は24時間。監視デバッグログは7日間。\n\n❌ B（最大サイズは5MB）→ デバッグログの最大サイズは20MB。\n❌ C（最新20件のみ保存）→ 保存件数に特定の制限はないが、組織のストレージ制限の範囲内で保存される。\n\n🎯 試験のコツ：デバッグログ = 最大20MB、24時間保存、ユーザー/クラス/トリガーに設定可能。", "a": "デバッグログレベルは累積され、FINEログレベルにはDEBUG、INFO、WARN、ERRORレベルで記録されたすべてのイベントが含まれます。", "b": "デバッグログの最大サイズは5MBです。", "c": "最新の20件のデバッグログのみが保存されます。", "d": "デバッグログは、特定のユーザー、クラス、およびトリガーに設定できます。", "e": "システムデバッグログは24時間保存されます。"}, {"n": "5839", "p": "AccountListという名前のListコレクション内の各Accountを反復処理するための有効な選択肢はどれですか。2つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "A;B", "exp": "ざっくり言うと：List<Account>を反復処理する有効な方法は？2つ選ぶ問題。\n\n✅ 正解 A：for (Integer i=0; i < AccountList.Size(); i++) {...}\n通常のforループ。インデックスを使ってリストの各要素にアクセスする。\n\n✅ 正解 B：for (Account theAccount : AccountList) {...}\n拡張forループ（for-each）。リストの各要素を直接変数に取り出す。最もシンプルで推奨。\n\n❌ C（for (AccountList) {...}）→ 構文エラー。ループ変数や条件が指定されていない。\n❌ D（for (List L : AccountList) {...}）→ AccountList内の要素はAccountオブジェクトであり、List型ではない。型の不一致でエラー。\n\n🎯 試験のコツ：リスト反復 = 通常forループ or for-eachループ。for-eachが推奨（シンプルで安全）。", "a": "<p>for (Integer i=0; i ＜ AccountList.Size(); i++) {…}</p>", "b": "for (Account theAccount : AccountList) {…}", "c": "for (AccountList) {…}", "d": "for (List L : AccountList) {…}"}, {"n": "5840", "p": "次のコードの実行時間を短縮するために、開発者が取るべき行動はどれですか。\n\nList allAccounts = [SELECT Id FROM Account];\nList allContacts = [SELECT Id, AccountId FROM Contact];\n\nfor (Account a : allAccounts) {\n    for (Contact c : allContacts) {\n        if (c.AccountId == a.Id) {\n            // do work\n        }\n    }\n}", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：ネストされたループ（AccountループとContactループ）の実行時間を短縮するには？\n\n✅ 正解 B：allaccountsに対してMapを使用する\nMap<Id, Account>を使えば、ContactのAccountIdをキーとして関連するAccountを即座に検索できる（O(1)）。ネストされたループ（O(n×m)）を排除し、パフォーマンスが劇的に改善する。\n\n❌ A（SOQLにGROUP BYを追加）→ ネストループの問題はGROUP BYでは解決しない。\n❌ C（Apexヘルパークラスを作成）→ コードの整理には有効だが、パフォーマンス改善には直結しない。\n❌ D（Contactループの中にAccountループを入れる）→ ループの順序を変えてもネストの構造は変わらない。\n\n🎯 試験のコツ：ネストループの解消 = Mapを使った検索に置き換え。O(n×m) → O(n+m)に改善。", "a": "取引先責任者のSOQLにGROUP BYオプションを追加する", "b": "allaccountsに対してMapを使用する", "c": "SOQL用のApexヘルパークラスを作成する", "d": "Contactループの中にAccountループを入れる"}, {"n": "5841", "p": "開発者は、AccountレコードまたはContactレコードを処理できるApexメソッドが必要です。開発者はどのメソッドを使用する必要がありますか。", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：AccountかContactのどちらも処理できるApexメソッドの引数型は？\n\n✅ 正解 C：Public void doWork(sObject theRecord)\nsObjectはすべてのSalesforceオブジェクト（Account, Contact, カスタムオブジェクト等）の基底型。sObjectを引数にすれば、どのオブジェクトでも受け取れる。\n\n❌ A（Account || Contact）→ ||はApexのメソッド引数では使えない構文。\n❌ B（Record theRecord）→ ApexにRecordというデータ型は存在しない。\n❌ D（Account Contact）→ 2つの型を同時に指定する構文は存在しない。\n\n🎯 試験のコツ：複数オブジェクト対応 = sObject型を使用。sObjectはすべてのオブジェクトの親クラス。", "a": "Public void doWork(Account || Contact)", "b": "Public void doWork(Record theRecord)", "c": "Public void doWork(sObject theRecord)", "d": "Public void doWork(Account Contact)"}, {"n": "5842", "p": "開発者は、複数のLightningウェブコンポーネントを含む天気アプリを作成しました。コンポーネントの１つはToggleと呼ばれ、華氏または摂氏の単位を切り替えます。Toggleコンポーネントでユーザーが華氏から摂氏、またはその逆に切り替えると、その情報はTemperatureコンポーネントに送信され、温度が変換されて表示されます。これを実現するには、どのような方法が推奨されますか。", "r": "ユーザインターフェース", "ans": "A", "exp": "ざっくり言うと：LWCでToggleコンポーネントからTemperatureコンポーネントにデータを送るには？\n\n✅ 正解 A：コンポーネント間の通信を処理するカスタムイベントを作成する\nLWCでは子→親への通信にカスタムイベント（CustomEvent）を使う。Toggleコンポーネントでイベントをdispatchし、親コンポーネント経由でTemperatureコンポーネントにデータを伝達する。\n\n❌ B（TemperatureのメソッドをToggleから呼び出す）→ LWCでは他のコンポーネントのメソッドを直接呼び出すことは推奨されない。\n❌ C（アプリケーションイベントを使用）→ アプリケーションイベントはAuraコンポーネントの概念。LWCでは使えない。\n❌ D（Lightning Message Service）→ 技術的には可能だが、同じ親内のコンポーネント通信にはカスタムイベントが適切。LMSは異なる技術間の通信向け。\n\n🎯 試験のコツ：LWCのコンポーネント通信 = カスタムイベント（子→親）+ パブリックプロパティ（親→子）。", "a": "コンポーネント間の通信を処理するカスタムイベントを作成する。", "b": "ToggleコンポーネントでTemperatureコンポーネントのメソッドを呼び出す。", "c": "コンポーネント間の通信にアプリケーションイベントを使用する。", "d": "コンポーネント間の通信にはLightning Message Serviceを使用する。"}, {"n": "5843", "p": "開発者が組織内でテストを実行するための方法は何ですか。2つ選びなさい。", "r": "テスト、デバッグ、リリース", "ans": "A;B", "exp": "ざっくり言うと：組織内でテストを実行する方法は？2つ選ぶ問題。\n\n✅ 正解 A：Tooling API\nTooling APIでプログラム的にテストを実行・管理できる。CI/CDパイプラインで活用。\n\n✅ 正解 D：開発者コンソール\n開発者コンソールのTestメニューからテストクラスを選択して実行できる。\n\n❌ B（メタデータAPI）→ メタデータAPIはメタデータの取得・デプロイ用。テスト実行専用機能ではない。\n❌ C（バルクAPI）→ バルクAPIは大量データのインポート/エクスポート用。テスト実行機能はない。\n\n🎯 試験のコツ：テスト実行 = Tooling API、開発者コンソール、設定メニュー、SFDX CLI。バルクAPI/メタデータAPIは不可。", "a": "Tooling API", "b": "開発者コンソール", "c": "メタデータ API", "d": "Bulk API"}, {"n": "5844", "p": "ある開発者が2つのカスタムコントローラ拡張を持っており、それぞれにsave()メソッドがあります。Visualforceページでは、どのsave()メソッドが呼び出されますか。\n\n", "r": "ユーザインターフェース", "ans": "C", "exp": "ざっくり言うと：2つのコントローラ拡張がどちらもsave()を持つ場合、どちらが呼ばれる？\n\n✅ 正解 C：ExtensionA save()\nVFページでextensions属性に複数の拡張クラスを指定した場合、最初にリストされた拡張のメソッドが優先される。\n\n❌ A（ExtensionB save()）→ ExtensionBは2番目にリストされているため、ExtensionAにsave()がある限り呼ばれない。\n❌ B（Standard controller save()）→ 拡張にsave()が存在する場合、標準コントローラのsave()は呼ばれない。\n❌ D（ランタイムエラー）→ 同名メソッドが複数の拡張にあってもエラーにはならない。優先順位で解決される。\n\n🎯 試験のコツ：複数の拡張で同名メソッド → 最初にリストされた拡張が優先。標準コントローラのメソッドは最後の優先度。", "a": "ExtensionB save()", "b": "Standard controller save()", "c": "ExtensionA save()", "d": "ランタイムエラーが発生する"}, {"n": "5845", "p": "以下のコードから、コントローラ変数を作成するために使用できるステートメントはどれですか。3つ選びなさい。\n\npublic class AccountListController {\n    public List getAccounts() {\n        return controller.getRecords();\n    }\n}", "r": "プロセスの自動化とロジック", "ans": "A;B;E", "exp": "ざっくり言うと：StandardSetControllerのコントローラ変数を作成できるステートメントは？3つ選ぶ問題。\n\n✅ 正解 A：new ApexPages.StandardSetController(Database.query('select id from account'))\nDatabase.queryの結果（sObjectのリスト）をコンストラクタに渡す。\n\n✅ 正解 B：new ApexPages.StandardSetController(Database.getQueryLocator('select id from account'))\nQueryLocatorオブジェクトをコンストラクタに渡す。大量データの処理に適している。\n\n✅ 正解 E：new ApexPages.StandardSetController(Database.getQueryLocator([select id from account]))\n直接のSOQLクエリをgetQueryLocatorに渡す方式。Bと同等。\n\n❌ C（StandardControllerにQueryLocator）→ StandardController（単数）はsObjectのリストではなく単一レコードを受け取る。QueryLocatorは不可。\n❌ D（StandardControllerにSOQLクエリ）→ SOQLが複数レコードを返すと例外。StandardControllerは単一レコード用。\n\n🎯 試験のコツ：StandardSetController = リスト or QueryLocator。StandardController = 単一sObject。", "a": "Apexpages.standardsetcontroller controller = new apexpages.standardsetcontroller(database.query(‘select id from account’));", "b": "Apexpages.standardsetcontroller controller = new apexpages.standardsetcontroller(database.getquerylocator(‘select id from account’));", "c": "Apexpages.standardcontroller controller = new apexpages.standardcontroller(database.getquerylocator(‘select id from account’));", "d": "Apexpages.standardcontroller controller = new apexpages.standardcontroller([select id from account]);", "e": "Apexpages.standardsetcontroller controller = new apexpages.standardsetcontroller(database.getquerylocator([select id from account]));"}, {"n": "5846", "p": "ある開発者が、StatusComponentというLightning Webコンポーネントを作成し、Accountレコードページに挿入しました。このコンポーネントを利用できるようにするために、開発者が行うべきことはどれですか。2つ選びなさい。", "r": "ユーザインターフェース", "ans": "A;D", "exp": "ざっくり言うと：LWCをAccountレコードページで使えるようにするには？2つ選ぶ問題。\n\n✅ 正解 A：js-meta.xmlに<target>lightning__RecordPage</target>を追加\ntargetでLightningレコードページでの使用を許可する。\n\n✅ 正解 D：js-meta.xmlに<isExposed>true</isExposed>を追加\nisExposedをtrueにすることで、Lightning App Builderでコンポーネントが公開される。\n\n❌ B（.jsファイルにtarget追加）→ targetの設定はJSファイルではなくmeta.xmlファイルで行う。\n❌ C（masterLabelにAccount追加）→ masterLabelは表示名の設定で、オブジェクトの制限ではない。\n\n🎯 試験のコツ：LWCの公開 = isExposed=true + target指定。設定場所はすべて.js-meta.xmlファイル。", "a": "<p>＜target＞Lightning_RecordPage＜/target＞をstatusComponent.js-meta.xmlファイルに追加する。</p>", "b": "<p> ＜target＞Lightning_RecordPage＜/target＞をstatusComponent.jsファイルに追加する。</p>", "c": "<p>＜masterLabel＞Account＜/masterLabel＞をstatusComponent.js-meta.xmlファイルに追加する。</p>", "d": "<p> ＜isExposed＞true＜/isExposed＞をstatusComponent.js-meta.xmlファイルに追加する。</p>"}, {"n": "5847", "p": "以下のコードを実行した場合、xの値は何になりますか。\n\nBoolean isOK;\nInteger x;\nString theString = ’Hello’;\n\n\nif (isOK == false && theString == ’Hello’) {\n    x = 1;\n} else if (isOK == true && theString ==’Hello’) {\n    x = 2;\n} else if (isOK != null && theString == ’Hello’) {\n    x = 3;\n} else {\n    x = 4;\n}", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：isOKがnull、theStringが'Hello'のとき、xの値は？\n\n✅ 正解 A：4（elseブロック）\n1. isOK == false → nullはfalseと等しくない → false\n2. isOK == true → nullはtrueと等しくない → false\n3. isOK != null → nullなのでfalse\n4. すべての条件がfalse → elseブロック実行 → x = 4\n\n❌ B（1）→ 最初の条件がfalseなのでこのブロックは実行されない。\n❌ C（2）→ 2番目の条件もfalse。\n❌ D（3）→ 3番目の条件もfalse。\n\n🎯 試験のコツ：Apexでnull == false → false。null == true → false。nullはtrueでもfalseでもない「第3の状態」。", "a": "1", "b": "2", "c": "3", "d": "4"}, {"n": "5848", "p": "アプリケーションイベントは従来のpublish-subscribeモデルに従っています。\nイベントを発生させるには、どのメソッドを使用しますか。", "r": "ユーザインターフェース", "ans": "C", "exp": "ざっくり言うと：Auraアプリケーションイベントを起動するメソッドは？\n\n✅ 正解 C：fire()\nAuraイベントを起動（発火）するにはfire()メソッドを使う。event.fire()で登録されたリスナーに通知が送られる。\n\n❌ A（emit()）→ emitはLWCのCustomEventで使われる概念。Auraイベントでは使わない。\n❌ B（fireEvent()）→ Auraの標準メソッドにfireEvent()は存在しない。\n❌ D（registerEvent()）→ イベントの「登録」であり「発火」ではない。\n\n🎯 試験のコツ：Auraイベントの発火 = fire()。LWCの通知 = dispatchEvent(new CustomEvent(...))。", "a": "emit()", "b": "fireEvent()", "c": "fire()", "d": "registerEvent()"}, {"n": "5849", "p": "開発者は、取引先オブジェクトにトリガーを作成し、そのトリガーが正常に一度に多数のレコードを処理できるかテストしたいと考えています。開発者チームは、一意の名前を持つ200個の取引先レコードでトリガーをテストする必要があると判断しました。\n最小限のコード量で単体テスト内のテストデータを作成するためには、どのような作業を行う必要がありますか。2つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "A;D", "exp": "ざっくり言うと：200件の取引先で一括トリガーテスト。最小コードでテストデータを作るには？2つ選ぶ問題。\n\n✅ 正解 A：テストデータを含む静的リソースを作成する\n200件の一意な取引先データをCSVファイルとして静的リソースに保存する。\n\n✅ 正解 D：Test.loadDataでテストメソッドにデータを入力する\nTest.loadData(Account.sObjectType, 'staticResourceName')で静的リソースからデータを一括読み込み。\n\n❌ B（@isTest(isParallel=true)）→ テストの並列実行設定。データ作成とは無関係。\n❌ C（@isTest(seeAllData=true)）→ 既存データへのアクセス設定。テストデータの作成方法ではなく、推奨もされない。\n\n🎯 試験のコツ：大量テストデータの効率的作成 = 静的リソース(CSV) + Test.loadData()。コード量が最小限。", "a": "テストデータを含む静的リソースを作成します。", "b": "テストクラスで@isTest(isParallel=true)を使用します。", "c": "テストクラスで@isTest(seeAllData=true)を使用します。", "d": "Test.loadDataを使用して、テストメソッドにデータを入力します。"}, {"n": "5850", "p": "開発者が非同期メソッドまたはfutureメソッドに関する情報を確認できる場所はどこですか。2つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "A;D", "exp": "ざっくり言うと：非同期メソッド/Futureメソッドの情報を確認できる場所は？2つ選ぶ問題。\n\n✅ 正解 A：Apexジョブ\n設定画面のApexジョブページで非同期Apex（Future、Batch、Queueable、Scheduled）の実行状況を確認できる。\n\n✅ 正解 D：Apex Flexキュー\nApex FlexキューではBatch Apexジョブの待機状態と実行順序を確認・管理できる。\n\n❌ B（開発者コンソール）→ デバッグログの確認は可能だが、非同期ジョブの一覧やステータス管理機能はない。\n❌ C（一時停止中のフローインタビュー）→ フローの一時停止に関する情報であり、Apexの非同期処理とは無関係。\n\n🎯 試験のコツ：非同期ジョブの監視 = Apexジョブページ + Apex Flexキュー。", "a": "Apex ジョブ", "b": "一時停止中の失敗したフローインタビュー", "c": "[時間ベースのワークフロー]モニター", "d": "Apex Flex キュー"}, {"n": "5851", "p": "開発者は、Salesforce の様々な種類のケースを独立した要件でテストできるようにするために、一連のテスト全体の基本データセット (取引先、取引先責任者、商品、納入商品) を作成する必要があります。\n各単体テストに必要なデータを効率的に生成できるのはどの方法でしょうか。", "r": "テスト、デバッグ、リリース", "ans": "A", "exp": "ざっくり言うと：テストスイート全体のベースラインデータセットを効率的に作るには？\n\n✅ 正解 A：voidメソッドで@TestSetupを使用する\n@TestSetupで共通のテストデータ（取引先、連絡先、商品、納入商品）を一度だけ作成。クラス内の全テストメソッドでそのデータが利用可能になる。\n\n❌ B（@isTest(seeAllData=true)）→ 組織の実データに依存するのは非推奨。テストの独立性が損なわれる。\n❌ C（Test.startTest()の前にデータ作成）→ 各テストメソッドで個別にデータを作る必要があり非効率。\n❌ D（スタブAPIでモック作成）→ 外部コールアウトのモック用であり、ベースラインデータの作成には使わない。\n\n🎯 試験のコツ：共通テストデータの効率的作成 = @TestSetup。1回作成、全メソッドで共有。", "a": "voidメソッドで@TestSetupを使用する", "b": "単体テストクラスの先頭に@isTest(seeAllData = true)を追加する", "c": "単体テストのTest.startTest()の前にテストデータを作成する", "d": "スタブAPIを使ってモックを作成する"}, {"n": "5852", "p": "メタデータAPIを使用してデプロイできるコンポーネントはどれですか。2つ選びなさい。", "r": "デベロッパーの基本", "ans": "A;D", "exp": "ざっくり言うと：メタデータAPIでデプロイできるのは？2つ選ぶ問題。\n\n✅ 正解 A：ケースのレイアウト\nケースオブジェクトのページレイアウトはメタデータAPIでデプロイ可能。\n\n✅ 正解 D：取引先のレイアウト\n取引先オブジェクトのページレイアウトもメタデータAPIでデプロイ可能。\n\n❌ B（ケースフィードのレイアウト）→ ケースフィードのレイアウトはメタデータAPIで直接デプロイできない。手動設定が必要。\n❌ C（コンソールレイアウト）→ コンソールレイアウトもメタデータAPIで直接デプロイできない。\n\n🎯 試験のコツ：メタデータAPIでデプロイ可能 = 標準的なページレイアウト。ケースフィードやコンソールレイアウトは手動設定。", "a": "ケースのレイアウト", "b": "ケースフィードのレイアウト", "c": "コンソールレイアウト", "d": "取引先のレイアウト"}, {"n": "5853", "p": "多くの開発者からなるチームが、本番組織と同じ構成を持つ個々の組織で作業しています。このシナリオに最も適しているのはどのタイプの組織ですか。", "r": "デベロッパーの基本", "ans": "A", "exp": "ざっくり言うと：本番と同じ構成で複数の開発者が独立して作業するのに最適な組織は？\n\n✅ 正解 A：Developer Sandbox\nDeveloper Sandboxは本番のメタデータ（構成）をコピーして作成される。各開発者に個別のSandboxを割り当てられる。\n\n❌ B（Full Sandbox）→ 全データもコピーするため重く、更新頻度も29日に1回。個別開発者用としては過剰。\n❌ C（Developer Edition）→ 本番のコピーではない独立した環境。本番と同じ構成にはならない。\n❌ D（Partner Developer Edition）→ ISVパートナー向けの特別な環境。本番のコピーではない。\n\n🎯 試験のコツ：本番の構成をコピー + 複数開発者 = Developer Sandbox。Developer Editionは独立環境。", "a": "Developer Sandbox", "b": "Developer Edition", "c": "Full Sandbox", "d": "Partner Developer Edition"}, {"n": "5854", "p": "Universal Containers社は、Salesforce組織内のすべてのデータと添付ファイルを月に1回バックアップしたいと考えています。この要件を満たすために、開発者はどのアプローチを使用すべきでしょうか。", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：組織全体のデータと添付ファイルを月1回バックアップするには？\n\n✅ 正解 B：データエクスポートのスケジュールされたジョブを定義する\n設定画面の「データエクスポート」で月次エクスポートをスケジュールし、全オブジェクト＋添付ファイルのバックアップを自動実行できる。\n\n❌ A（データローダーのコマンドライン）→ オブジェクトごとにエクスポートが必要で、すべてのデータを自動で一括バックアップする仕組みではない。\n❌ C（スケジュール可能なApexクラス）→ Apexからデータを直接エクスポートファイルとして出力することはできない。\n❌ D（レポートをスケジュール）→ レポートは特定のデータビュー用。全データ＋添付ファイルのバックアップには対応していない。\n\n🎯 試験のコツ：全データバックアップ = データエクスポートサービス（設定から月次/週次でスケジュール可能）。", "a": "データローダーのコマンドラインを使用します。", "b": "データエクスポートのスケジュールされたジョブを定義します。", "c": "スケジュール可能なApexクラスを作成します。", "d": "レポートをスケジュールします。"}, {"n": "5855", "p": "トリガーが同じオブジェクトとイベントに関連付けられている場合の実行順序に関して正しい説明はどれですか。", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：同じオブジェクト・イベントに複数のトリガーがあるとき、実行順序は？\n\n✅ 正解 B：トリガーの実行順序は保証されない\nSalesforceでは同一オブジェクト・イベントに対する複数トリガーの実行順序を制御する手段はない。\n\n❌ A（アルファベット順）→ 名前順ではない。順序は不定。\n❌ C（変更された順）→ 最終変更日順でもない。\n❌ D（作成された順）→ 作成順でもない。\n\n🎯 試験のコツ：複数トリガーの順序 = 保証なし。ベストプラクティスは1オブジェクト1トリガーにまとめること。", "a": "トリガーはトリガー名のアルファベット順に実行されます。", "b": "トリガーの実行順序は保証されません。", "c": "変更された順序で実行されます。", "d": "トリガーは作成された順序で実行されます。"}, {"n": "5856", "p": "開発者は、インスタンス化できないShippingCalculatorクラスを作成する必要があり、サブクラスがオーバーライドできるcalculateメソッドの実用的なデフォルト実装を含める必要があります。 ShippingCalculatorクラスの正しい実装はどれですか。", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：インスタンス化不可でオーバーライド可能なメソッドを持つクラスの正しい実装は？\n\n✅ 正解 B：public abstract class + public virtual void calculate() { /*実装*/ }\nabstractクラスはインスタンス化できない。virtualメソッドはデフォルトの実装を持ちつつ、サブクラスでオーバーライド可能。\n\n❌ A（abstract class + override）→ overrideは親のvirtualメソッドをサブクラスで書き換えるときに使う。基底クラス自体にはoverrideをつけない。\n❌ C（abstract class + abstract calculate()に実装あり）→ abstractメソッドは実装を持てない。実装があるならvirtualにすべき。\n❌ D（abstract class + void calculate()にvirtual/overrideなし）→ virtualがないとサブクラスでオーバーライドできない。\n\n🎯 試験のコツ：インスタンス化不可 = abstract class。オーバーライド可能 + デフォルト実装 = virtual method。", "a": "Public abstract class ShippingCalculator {<br>public override calculate() { /*implementation*/ }<br>}", "b": "Public abstract class ShippingCalculator {<br>public virtual void calculate() { /*implementation*/ }<br>}", "c": "Public abstract class ShippingCalculator {<br>public abstract calculate() { /*implementation*/ }<br>}", "d": "Public abstract class ShippingCalculator {<br>public void calculate() { /*implementation*/ }<br>}"}, {"n": "5857", "p": "継続的インテグレーションの一環として、デプロイと単体テストの実行をスクリプト化するために、開発者は何を使用する必要がありますか。", "r": "テスト、デバッグ、リリース", "ans": "C", "exp": "ざっくり言うと：CI（継続的インテグレーション）でデプロイとテストをスクリプト化するには？\n\n✅ 正解 C：Salesforce CLI\nSalesforce CLIはコマンドラインからデプロイ、テスト実行、結果取得を自動化できる。CI/CDパイプライン（Jenkins、GitHub Actionsなど）に組み込むのに最適。\n\n❌ A（開発者コンソール）→ ブラウザベースのUIツール。スクリプト化や自動実行には不向き。\n❌ B（VS Code）→ コードエディタ。CIパイプラインでの自動実行にはCLIが必要。\n❌ D（匿名実行）→ 一時的なApexコード実行用。CIプロセスの自動化ツールではない。\n\n🎯 試験のコツ：CI/CD自動化 = Salesforce CLI。手動開発 = VS Code + 開発者コンソール。", "a": "開発者コンソール", "b": "VS Code", "c": "Salesforce CLI", "d": "匿名実行"}, {"n": "5858", "p": "Lightning Experienceで取引先の既存の編集ボタンを押下するときに、ユーザーにカスタムユーザーインターフェースを提供したいと考えています。どのように提供すべきですか。", "r": "ユーザインターフェース", "ans": "B", "exp": "ざっくり言うと：Lightning Experienceで取引先の編集ボタンをカスタムUIで上書きするには？\n\n✅ 正解 B：取引先の編集ボタンをLightningコンポーネントで上書きする\nLightning Experienceでは、Lightningコンポーネント（Aura）を使って標準ボタンの動作をオーバーライドできる。設定→オブジェクト→ボタン→編集で上書き先を指定。\n\n❌ A（Lightningアクション）→ Lightningアクションは新しいアクションボタンを追加するもの。既存の「編集」ボタンの上書きとは別。\n❌ C（Lightningページ）→ ページレイアウトのカスタマイズ用。ボタンの動作上書きではない。\n❌ D（Salesforceフロー）→ フロー単体でボタンを上書きすることはできない。\n\n🎯 試験のコツ：Lightning Experienceの標準ボタン上書き = Lightningコンポーネント（Aura）。LWCは直接上書きできない。", "a": "取引先の[編集]ボタンをLightningアクションで上書きします", "b": "取引先の[編集]ボタンをLightningコンポーネントで上書きします", "c": "取引先の[編集]ボタンをLightningページで上書きします", "d": "取引先の[編集]ボタンをSalesforce フローで上書きします"}, {"n": "5859", "p": "開発者は、Salary__cカスタム項目を含むContactレコードを作成するために、ユーザーがContactレコード情報を入力できるLightningコンポーネントを作成する必要があります。\nSalary__c 項目が通貨入力として機能し、Salary__c の正しい項目レベル権限を持っているユーザーのみが表示および編集できるようにするには、Lightning-record-edit-form とともに何を使用する必要がありますか。", "r": "ユーザインターフェース", "ans": "A", "exp": "ざっくり言うと：LWCでSalary__c項目を通貨入力としてFLS付きで表示するには？\n\n✅ 正解 A：<lightning-input-field field-name=\"Salary__c\">\nlightning-record-edit-form内でlightning-input-fieldを使うと、項目の型（通貨）を自動認識し、FLSも自動適用される。権限がないユーザーには項目が表示されない。\n\n❌ B（lightning-input-currency）→ そんなコンポーネントは存在しない。\n❌ C（lightning-input type=\"number\" formatter=\"currency\"）→ 汎用入力コンポーネント。FLSは自動適用されない。\n❌ D（lightning-formatted-number format-style=\"currency\"）→ 表示専用コンポーネント。入力フィールドではない。\n\n🎯 試験のコツ：FLS自動適用 + 型自動認識 = lightning-input-field（lightning-record-edit-form内）。", "a": "<p>＜lightning-input-field field-name = “Salary__c”＞＜/ lightning-input-field＞</p>", "b": "<p>＜lightning-input-currency value = “Salary__c”＞＜/ lightning-input-currency＞</p>", "c": "<p>＜lightning-input type = “number” value = “Salary__c” formatter = “currency”＞＜/ lightning-input＞</p>", "d": "<p>＜lightning-formatted-number value = “Salary__c” format-style = “currency”＞＜/ lightning-formatted-number＞</p>"}, {"n": "5860", "p": "開発者は、Apexクラスのメソッドを特定する必要があります。このメソッドは、Account上のSOQL文の結果セットを繰り返し処理することで、メモリ内でリソース負荷が高い処理を実行します。また、このメソッドは変更をデータベースに保存するためにDMLステートメントを実行します。トランザクション制御を確実にし、ガバナー制限の超過を回避するための最善の方法として、開発者が実装すべき１つの技法はどれですか。", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：SOQLの大量結果を処理しつつDMLもする場合、ガバナ制限対策は？\n\n✅ 正解 D：System.Limitクラスを使用して現在のCPUガバナ制限の消費量を監視する\nLimitsクラスで使用量をリアルタイム監視し、制限に近づいたら処理を分割・中断するロジックを実装する。\n\n❌ A（Database.Savepointでデータベースの整合性を強制）→ Savepointはロールバック用。ガバナ制限の超過を防ぐ機能ではない。\n❌ B（部分的なDML文で有効なデータのみコミット）→ Database.insert(records, false)は部分成功を可能にするが、レコード数が多い場合のガバナ制限超過自体は防げない。\n❌ C（@ReadOnlyでSOQL行数制限をバイパス）→ @ReadOnlyはSOQL行数制限を増やすが、DML操作が禁止される。この問題ではDMLが必要。\n\n🎯 試験のコツ：ガバナ制限超過防止 = Limitsクラスで監視。@ReadOnlyはDML不可の読み取り専用モード。", "a": "Database.Savepointメソッドを使用して、データベースの整合性を強制します。", "b": "部分的なDML文を使用して、有効なデータのみがコミットされるようにします。", "c": "@ReadOnlyアノテーションを使用して、SOQLによって返される行数を回避します。", "d": "System.Limitクラスを使用して、現在のCPUガバナー制限の消費量を監視します。"}, {"n": "5861", "p": "組織には商談を作成するフローがあります。開発者はこのフローを変更し、取引先責任者を新しく作成し、その取引先責任者のIDを商談に関連付ける必要があります。フローにどのような要素を追加する必要がありますか。", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：フローに取引先責任者の新規作成と商談への関連付けを追加するには？\n\n✅ 正解 D：新しい[レコードを作成]要素を追加する\n「レコードを作成」要素で取引先責任者を新規作成し、作成されたレコードのIDを変数に格納。その後、そのIDを商談のContactIdに設定する。\n\n❌ A（レコードを取得）→ 既存レコードの検索用。新規作成ではない。\n❌ B（レコードを更新）→ 既存レコードの更新用。新規作成ではない。\n❌ C（アクション要素）→ 特定のアクション呼び出し用。直接的なレコード作成には「レコードを作成」が適切。\n\n🎯 試験のコツ：フローでの操作 = 作成(Create)、取得(Get)、更新(Update)、削除(Delete)。用途に合った要素を選ぶ。", "a": "新しい[レコードを取得]要素を追加します。", "b": "新しい[レコードを更新]要素を追加します。", "c": "新しい[アクション要素] (※作成タイプ) を追加します。", "d": "新しい[レコードを作成]要素を追加します。"}, {"n": "5862", "p": "値’High’、’Medium’、’Low’は、異なるオブジェクト間で複数の選択リストに共通する値として識別されています。値を上記のものに制限しつつ、選択リストとその値のメンテナンスを合理化するために、開発者が取ることのできる方法は何でしょうか。", "r": "デベロッパーの基本", "ans": "A", "exp": "ざっくり言うと：複数オブジェクトで共通の選択リスト値を効率的に管理するには？\n\n✅ 正解 A：グローバル選択リスト値セットを使用する\nグローバル選択リスト値セットを1つ作成し、各オブジェクトの選択リストでそれを参照する。値の追加・変更は1箇所で済む。\n\n❌ B（必須＋アルファベット順表示）→ 表示順の設定であり、値の一元管理とは無関係。\n❌ C（入力規則で整合性確保）→ 各オブジェクトに個別に入力規則を作る必要があり非効率。\n❌ D（値セットで選択リストを制限）→ グローバル値セットを使わない場合、各オブジェクトの値を個別に管理する必要がある。\n\n🎯 試験のコツ：複数オブジェクトで共通の選択リスト値 = グローバル選択リスト値セット。一元管理のベストプラクティス。", "a": "各オブジェクトに選択リストを作成し、値を含むグローバル選択リスト値セットを使用します。", "b": "各オブジェクトに必須項目として選択リストを作成し、”値を入力順ではなく文字コード順に表示”を選択します。", "c": "各オブジェクトに選択リストを作成し、データの整合性を確保するための入力規則を追加します。", "d": "各オブジェクトに選択リストを作成し、”値セットで定義された値に選択リストを制限します”を選択します。"}, {"n": "5863", "p": "Batchableインターフェースを実装しているApexクラスのexecute()メソッドの内部でApexコードが実行される場合、ガバナ制限に関して正しい記述を2つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "A;C", "exp": "ざっくり言うと：Batchableのexecute()メソッドのガバナ制限について正しいのは？2つ選ぶ問題。\n\n✅ 正解 A：execute()の各反復ごとにガバナ制限がリセットされる\n各バッチ（execute呼び出し）は独立したトランザクションとして実行される。\n\n✅ 正解 C：非同期のため、ガバナ制限値が高くなる可能性がある\nBatch Apexは非同期処理なので、ヒープ(12MB)やCPU時間(60秒)など一部の制限が緩和される。\n\n❌ B（ガバナ制限を超えることはない）→ 非同期でも制限は存在する。超えれば例外が発生する。\n❌ D（コンストラクタ呼び出し時にガバナ制限が省略される）→ コンストラクタにも通常のガバナ制限が適用される。\n\n🎯 試験のコツ：Batch Apex = 各executeで制限リセット + 非同期の緩和された制限値。", "a": "Apexのガバナ制限は、execute()メソッドの繰り返しごとにリセットされます。", "b": "トランザクションが非同期であるため、Apexガバナの制限を超えることはありません。", "c": "トランザクションが非同期であるため、Apexガバナの制限値が高くなる可能性があります。", "d": "Apexクラスのコンストラクタを呼び出している間、Apexガバナ制限は緩和されます。"}, {"n": "5864", "p": "すべてのテストを実行した後、開発者はクラスのコードカバレッジをチェックするために何をすべきですか。", "r": "テスト、デバッグ、リリース", "ans": "B", "exp": "ざっくり言うと：全テスト実行後にクラスのコードカバレッジを確認するには？\n\n✅ 正解 B：開発者コンソールのTestsタブのOverall Code Coverageパネル\nテスト実行後、Testsタブでクラスごとのカバレッジパーセンテージを確認できる。\n\n❌ A（Apexテスト実行ページでクラスを選択して実行）→ テストの実行方法であり、カバレッジの確認場所ではない。\n❌ C（ApexクラスページのClass test Coverageタブ）→ そんなタブはApexクラスページに存在しない。\n❌ D（Apexクラスページのリストビューのコードカバレッジ列）→ リストビューに「コードカバレッジ」列は存在しない。\n\n🎯 試験のコツ：コードカバレッジ確認 = 開発者コンソールのTestsタブ or ApexクラスページのRST「組織のコードカバー率を見積る」リンク。", "a": "[Apex クラス]ページのビューの[コードカバレッジ]列を表示します。", "b": "開発者コンソールの[Tests]タブの[Overall Code Coverage]を使用して、クラスのコードカバー率を表示します。", "c": "[Apex クラス]ページのビューの[Class test Coverage]タブを表示します。", "d": "[Apex テスト実行]ページでクラスを選択して実行します。"}, {"n": "5865", "p": "スクラッチ組織を作成するために何を使用すべきですか。", "r": "テスト、デバッグ、リリース", "ans": "A", "exp": "ざっくり言うと：スクラッチ組織を作成するには何を使う？\n\n✅ 正解 A：Salesforce CLI\nSalesforce CLIのsf org create scratchコマンドでスクラッチ組織を作成する。事前にDev Hubの有効化が必要。\n\n❌ B（Workbench）→ データやメタデータの操作ツール。スクラッチ組織は作成できない。\n❌ C（Developer Console）→ コード編集・デバッグ用。組織作成機能はない。\n❌ D（Sandboxの更新）→ Sandboxの更新は既存Sandboxのリフレッシュ。スクラッチ組織とは別物。\n\n🎯 試験のコツ：スクラッチ組織作成 = Salesforce CLI + Dev Hub。この2つはセット。", "a": "Salesforce CLI", "b": "Workbench", "c": "Developer Console", "d": "Sandbox の更新"}, {"n": "5866", "p": "単体テストで実行可能なシナリオはどれですか。", "r": "テスト、デバッグ、リリース", "ans": "C", "exp": "ざっくり言うと：単体テストで実行可能なシナリオは？\n\n✅ 正解 C：システムメソッドを使用してレコードの作成日を設定する\nTest.setCreatedDate(recordId, datetime)でテスト内のレコードの作成日を任意に設定できる。\n\n❌ A（別のユーザーとして匿名Apexを実行）→ 匿名Apexの実行はテストメソッド内からは不可。\n❌ B（コールアウトでリモートデータを読み込む）→ テスト中の実際のコールアウトは不可。モック（Test.setMock）で代替する。\n❌ D（getContentAsPDF()でPDF生成）→ テストメソッド内でのgetContentAsPDF()はサポートされていない。\n\n🎯 試験のコツ：テストで可能 = setCreatedDate, setMock, loadData。テストで不可 = 実コールアウト, getContentAsPDF。", "a": "別のユーザーとして匿名Apexを実行する。", "b": "コールアウトを使用してリモートサイトからデータを読み込む。", "c": "システムメソッドを使用してレコードの作成日を設定する。", "d": "geccontentAsPDF()を使用してVisualforcePDFを生成する。"}, {"n": "5867", "p": "開発者が、@remoteActionデコレータを使用してグローバルなサーバー側メソッドを呼び出そうとするとエラーが発生します。このエラーを解決するにはどうすればよいですか。", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：@RemoteActionでグローバルメソッドを呼ぶとエラー。どう修正する？\n\n✅ 正解 B：サーバー側メソッドのシグネチャにstaticを追加する\n@RemoteActionで呼び出されるメソッドはstaticである必要がある。staticがないとVFページのJSから呼び出せない。\n\n❌ A（static=falseでデコレート）→ そんなデコレーション構文はApexに存在しない。\n❌ C（static=trueでデコレート）→ そんな構文も存在しない。メソッドシグネチャにstaticキーワードを追加する。\n❌ D（private staticに変更）→ @RemoteActionはpublicまたはglobalのアクセス修飾子が必要。privateだとVFから呼べない。\n\n🎯 試験のコツ：@RemoteAction = static + public/global。staticなしor private→エラー。", "a": "サーバー側のメソッドを (static=false) でデコレートする。", "b": "サーバー側のメソッドのシグネチャにstaticを追加する。", "c": "サーバー側のメソッドを(static=true)でデコレートする。", "d": "関数のシグネチャをprivate staticに変更する。"}, {"n": "5868", "p": "ある開発チームは、デプロイスクリプトを使用して、開発サイクル中にサンドボックスに自動的にデプロイしたいと考えています。サンドボックスにデプロイするスクリプトを実行するために使用できるツールはどれですか。2つ選びなさい。", "r": "テスト、デバッグ、リリース", "ans": "B;C", "exp": "ざっくり言うと：サンドボックスに自動デプロイするスクリプトに使えるツールは？2つ選ぶ問題。\n\n✅ 正解 B：Salesforce CLI\nCLIコマンドでメタデータのデプロイを自動化できる。CI/CDパイプラインに組み込み可能。\n\n✅ 正解 C：Ant移行ツール\nApache Antベースのコマンドラインツール。ビルドファイルでデプロイを自動化できる。\n\n❌ A（開発者コンソール）→ ブラウザ上のUI。スクリプト実行機能はない。\n❌ D（変更セット）→ 手動のUI操作が必要。スクリプト化できない。\n\n🎯 試験のコツ：スクリプトによる自動デプロイ = Salesforce CLI or Ant移行ツール。変更セットは手動のみ。", "a": "開発者コンソール", "b": "Salesforce CLI", "c": "Ant 移行ツール", "d": "変更セット"}, {"n": "5869", "p": "Accountオブジェクトのafterトリガーは、Accountのすべての子OpportunityでDML更新操作を実行します。 Opportunityオブジェクトにアクティブなトリガーはありませんが、特定の状況で「最大トリガー深度を超えました」エラーが発生します。Accountトリガーの再帰的な起動を説明する理由はどれですか。 2つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "A;B", "exp": "ざっくり言うと：Accountトリガーが再帰的に起動される原因は？2つ選ぶ問題。\n\n✅ 正解 A：Opportunityを変更すると、Accountの積み上げ集計項目が更新される\n積み上げ集計の再計算→Account更新→Accountトリガー再起動の連鎖。\n\n✅ 正解 B：Opportunity変更でAccountの項目が更新されるクロスオブジェクトのワークフローが実行される\nワークフローの項目更新→Account更新→Accountトリガー再起動の連鎖。\n\n❌ C（無関係な並列保存操作）→ 並列操作は別トランザクション。再帰的起動の原因にはならない。\n❌ D（条件に基づく共有ルールの評価）→ 共有ルールはレコードの可視性を変更するが、トリガーの再起動は引き起こさない。\n\n🎯 試験のコツ：トリガー再帰の原因 = ①積み上げ集計による親更新 ②ワークフロー/フローによる項目更新。", "a": "Opportunityを変更すると、Accountの積み上げ集計項目が更新されます。", "b": "Opportunityの変更により、Accountの項目が自動的に更新されるクロスオブジェクトのワークフローが実行されています。", "c": "無関係な並列保存操作中にAccountに変更が加えられています。", "d": "条件に基づく共有ルールの評価中にAccountに変更が加えられています。"}, {"n": "5870", "p": "Salesforce管理者は、レコードによってトリガーされるフローを作成しています。特定の基準が満たされた場合、フローはApexメソッドを呼び出して、いくつかのタイプのオブジェクトを含む複雑な検証を実行する必要があります。Apexメソッドを作成する場合、メソッドをフロー内で使用できるようにするために、開発者はどのアノテーションを使用する必要がありますか。", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：フローからApexメソッドを呼び出すためのアノテーションは？\n\n✅ 正解 B：@InvocableMethod\n@InvocableMethodをApexメソッドに付けると、フローやプロセスビルダーのApexアクション要素から呼び出せるようになる。\n\n❌ A（@future）→ 非同期処理用アノテーション。フローからの直接呼び出しとは別。\n❌ C（@AuraEnabled）→ LWC/Auraコンポーネントから呼び出すためのもの。フローからは使えない。\n❌ D（@RemoteAction）→ VFページのJSから呼び出すためのもの。フローからは使えない。\n\n🎯 試験のコツ：フローからApex = @InvocableMethod。LWCからApex = @AuraEnabled。VFからApex = @RemoteAction。", "a": "@future", "b": "@InvocableMethod", "c": "@AuraEnaled", "d": "@RemoteAction"}, {"n": "5871", "p": "ワークフローで、既存のAccountのカスタム項目の値を更新します。開発者は、トリガーによって更新する予定のカスタム項目の値にどのようにアクセスしますか。", "r": "プロセスの自動化とロジック", "ans": "A", "exp": "ざっくり言うと：ワークフローで更新されたカスタム項目の値にトリガーからアクセスするには？\n\n✅ 正解 A：before updateトリガーでTrigger.newから項目値にアクセスする\nワークフローの項目更新後、Salesforceは再度トリガーを実行する。このときTrigger.newにはワークフローで更新された値が含まれる。\n\n❌ B（before insertトリガー）→ 既存レコードの更新（ワークフロー）ではinsertトリガーは起動しない。\n❌ C（after insertトリガー + Trigger.old）→ insertトリガーは起動しない。かつTrigger.oldは更新前の値。\n❌ D（after updateトリガー + Trigger.old）→ Trigger.oldは更新前の値であり、ワークフローで更新された後の値は含まれない。\n\n🎯 試験のコツ：ワークフロー更新後の値 = Trigger.new（before/after update両方）。Trigger.old = 更新前の値。", "a": "before updateトリガーを記述し、Trigger.newから項目値にアクセスする。", "b": "before insertトリガーを記述し、Trigger.newから項目値にアクセスする。", "c": "after insertトリガーを記述し、Trigger.oldから項目値にアクセスする。", "d": "after updateトリガーを記述し、Trigger.oldから項目値にアクセスする。"}, {"n": "5872", "p": "Apexのカスタム例外に関して正しいものはどれですか。3つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "B;D;E", "exp": "ざっくり言うと：Apexのカスタム例外について正しいのは？3つ選ぶ問題。\n\n✅ 正解 B：1つまたは複数のインターフェースを実装できる\nカスタム例外クラスもインターフェースの実装が可能。\n\n✅ 正解 D：組み込み例外クラスを拡張する必要がある\nカスタム例外は必ずExceptionクラス（またはそのサブクラス）をextendsする。\n\n✅ 正解 E：クラス名は「Exception」で終わる必要がある\n命名規則として末尾が「Exception」であることが必須。\n\n❌ A（Exception以外のクラスを拡張可能）→ 必ずExceptionクラスを拡張しなければならない。\n❌ C（メンバ変数やメソッドを含められない）→ 含めることが可能。カスタムプロパティやメソッドを追加できる。\n\n🎯 試験のコツ：カスタム例外 = extends Exception + 名前は\"Exception\"で終了 + インターフェース実装可 + カスタムメンバー追加可。", "a": "カスタム例外クラスは、例外クラス以外のクラスを拡張できます。", "b": "カスタム例外クラスは、1つまたは複数のインターフェースを実装できます。", "c": "カスタム例外クラスにメンバ変数またはメソッドを含めることはできません。", "d": "カスタム例外クラスは、組み込み例外クラスを拡張する必要があります。", "e": "カスタム例外クラス名は「Exception」で終わる必要があります。"}, {"n": "5873", "p": "開発者は、親LightningWebコンポーネント内にネストされた子LightningWebコンポーネントを作成しました。親コンポーネントは、文字列値を子コンポーネントに渡す必要があります。これを達成できる方法はどれですか。2つ選びなさい。", "r": "ユーザインターフェース", "ans": "C;D", "exp": "ざっくり言うと：親LWCから子LWCにデータを渡す方法は？2つ選ぶ問題。\n\n✅ 正解 C：子コンポーネントのパブリックメソッドを呼び出す\n子コンポーネントで@apiデコレータをつけたメソッドを定義し、親からDOM経由で呼び出してデータを渡す。\n\n✅ 正解 D：パブリックプロパティを使用して子にデータを渡す\n子コンポーネントで@apiデコレータをつけたプロパティを定義し、親のHTML内で属性として値を渡す。最も一般的な方法。\n\n❌ A（カスタムイベントで子にデータを渡す）→ カスタムイベントは子→親の方向。親→子にはプロパティやメソッドを使う。\n❌ B（Apexコントローラで子にデータ送信）→ Apexはサーバー側のロジック。親子間のクライアント側通信には使わない。\n\n🎯 試験のコツ：親→子 = @apiプロパティ or @apiメソッド。子→親 = カスタムイベント。", "a": "親コンポーネントは、カスタムイベントを使用して、データを子コンポーネントに渡すことができます。", "b": "親コンポーネントはApexコントローラークラスを使用して、子コンポーネントにデータを送信できます。", "c": "親コンポーネントは子コンポーネントのメソッドを呼び出すことができます。", "d": "親コンポーネントは、パブリックプロパティを使用して、データを子コンポーネントに渡すことができます。"}, {"n": "5874", "p": "コンポーネントとアプリケーションのイベント処理に関するベストプラクティスはどれですか。2つ選びなさい。", "r": "ユーザインターフェース", "ans": "A;C", "exp": "ざっくり言うと：Auraのイベント処理のベストプラクティスは？2つ選ぶ問題。\n\n✅ 正解 A：低レベルのイベントを処理し、高レベルのイベントとして再起動する\nUIのクリックイベント（低レベル）→ビジネスロジックイベント（高レベル）に変換して伝播。疎結合な設計になる。\n\n✅ 正解 C：ロジックをヘルパーに配置してイベントロジックを再利用する\nコントローラはイベントハンドラの入口のみ。実際のロジックはヘルパーに書いて再利用可能にする。\n\n❌ B（コンポーネントイベントより常にアプリケーションイベントを使う）→ 逆。可能な限りコンポーネントイベントを優先。\n❌ D（コンポーネントイベントでアプリケーションレベルの処理を伝達）→ アプリケーションレベルにはアプリケーションイベントを使う。\n\n🎯 試験のコツ：ベストプラクティス = ヘルパーにロジック + 低→高レベルイベント変換 + コンポーネントイベント優先。", "a": "イベントハンドラで低レベルのイベントを処理し、高レベルのイベントとして再起動する。", "b": "コンポーネントイベントではなく、アプリケーションイベントを使用する。", "c": "ロジックをヘルパーに配置して、コンポーネントバンドルでイベントロジックを再利用する。", "d": "アプリケーションレベルで処理されるべきアクションを伝達するためにコンポーネントイベントを使用する。"}, {"n": "5875", "p": "Apexクラスとインターフェースに関して、次のうち正しいステートメントはどれでしょうか。２つ選択してください。", "r": "プロセスの自動化とロジック", "ans": "C;D", "exp": "ざっくり言うと：Apexクラスとインターフェースについて正しいのは？2つ選ぶ問題。\n\n✅ 正解 C：クラスのデフォルトの修飾子はprivate\nアクセス修飾子を省略した場合、クラスはprivateになる。\n\n✅ 正解 D：例外クラスはExceptionというワードで終わる必要がある\nカスタム例外の命名規則。\n\n❌ A（複数レベルの内部クラスが可能）→ 内部クラスのネストは1レベルまで。\n❌ B（インターフェースのデフォルトはprivate）→ インターフェースのメソッドはデフォルトでglobal。\n\n🎯 試験のコツ：クラスのデフォルト=private、インターフェースメソッドのデフォルト=global、内部クラスは1レベルまで。", "a": "クラスは複数のレベルの内部クラスを持つことができます。", "b": "インターフェースのデフォルトの修飾子はprivateです。", "c": "クラスのデフォルトの修飾子はprivateです。", "d": "例外クラスはExceptionというワードで終わる必要があります。"}, {"n": "5876", "p": "開発者は、あるクラスに対するテストを作成しており、機能を検証するためにレコードを挿入する必要があります。テストクラスのすべてのメソッドに対してレコードを作成するには、どのアノテーションを使うべきですか。", "r": "テスト、デバッグ、リリース", "ans": "C", "exp": "ざっくり言うと：テストクラスの全メソッドで使うレコードを作成するアノテーションは？\n\n✅ 正解 C：@TestSetup\n@TestSetupメソッドはクラス内で1回実行され、作成されたデータは全テストメソッドで共有される。\n\n❌ A（@StartTest）→ そんなアノテーションは存在しない。\n❌ B（@PreTest）→ そんなアノテーションは存在しない。\n❌ D（@isTest(SeeAllData=true)）→ 既存データへのアクセス設定であり、テストデータの作成とは別。\n\n🎯 試験のコツ：共通テストデータ作成 = @TestSetup。1回実行、全メソッドで利用可能。", "a": "@StartTest", "b": "@PreTest", "c": "@TestSetup", "d": "@isTest(SeeAllData=true)"}, {"n": "5877", "p": "開発者チームは、さまざまな組織構成で独立して作業できるソース主導型のプロジェクトに取り組んでいます。開発チームは、どのタイプのSalesforce組織を使用して開発を行うべきでしょうか。", "r": "デベロッパーの基本", "ans": "A", "exp": "ざっくり言うと：ソース駆動型開発で独立した組織構成が必要なチームに最適な環境は？\n\n✅ 正解 A：スクラッチ組織\nSalesforce DXのスクラッチ組織は、設定ファイルで任意の構成を定義して短期間で作成・破棄できる。ソース駆動開発に最適。\n\n❌ B（Developer Sandbox）→ 本番のコピーであり、任意の構成を定義することはできない。\
