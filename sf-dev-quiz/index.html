n❌ C（Full Sandbox）→ 全データコピーの重い環境。ソース駆動開発の軽量な環境としては不向き。\n❌ D（開発者組織）→ 永続的な環境。使い捨て可能なスクラッチ組織の方がソース駆動開発に適している。\n\n🎯 試験のコツ：ソース駆動開発 = スクラッチ組織。本番コピー型開発 = サンドボックス。", "a": "スクラッチ組織", "b": "Developer Sandbox", "c": "Full Sandbox", "d": "開発者組織"}, {"n": "5878", "p": "Universal Containers社は、商談がClosed Wonのフェーズに達したときに、商談を編集できないようにロックしたいと考えています。これを達成するために開発者が使用すべき戦略はどれですか。2つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "B;D", "exp": "ざっくり言うと：Closed Wonの商談を編集不可にする戦略は？2つ選ぶ問題。\n\n✅ 正解 B：検証ルール（入力規則）を使用する\n「StageName = Closed Won」の商談に対して編集を試みたらエラーを出す入力規則を作成。\n\n✅ 正解 D：トリガーを使用する\nbefore updateトリガーでStageNameがClosed Wonの場合にaddError()でエラーメッセージを表示し、更新をブロック。\n\n❌ A（自動起動承認プロセス）→ 承認プロセスはレコードの承認フロー管理用。編集ロックの直接的な手段ではない。\n❌ C（プロセスの自動化設定）→ プロセスビルダーや自動化設定では編集のブロック自体はできない。\n\n🎯 試験のコツ：レコードの編集ブロック = 入力規則 or Apexトリガー。承認プロセスのロックとは別の仕組み。", "a": "フロービルダーを使用する。", "b": "入力規則を使用する。", "c": "プロセスの自動化設定を使用する。", "d": "トリガーを使用する。"}, {"n": "5879", "p": "開発者は、PaymentProcessorインタフェースで定義されている支払いに準拠した小切手処理支払機能を提供するCheckPaymentProcessorクラスを実装する必要があります。\n\npublic interface PaymentProcessor {\n    void pay(Decimal amount);\n}\n\nPaymentProcessorインタフェースクラスを使用する正しい実装はどれですか。", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：PaymentProcessorインターフェースを実装するCheckPaymentProcessorクラスの正しい書き方は？\n\n✅ 正解 C：public class CheckPaymentProcessor implements PaymentProcessor { public void pay(Decimal amount) { /*実装*/ } }\nimplementsでインターフェースを実装し、メソッドボディ（{/*実装*/}）を提供する。\n\n❌ A（extends + virtual）→ extendsはクラスの継承用。インターフェースにはimplementsを使う。\n❌ B（extends + メソッドボディなし）→ extends自体が不適切。かつメソッドボディがないと実装にならない。\n❌ D（implements + メソッドボディなし）→ implementsは正しいが、メソッドボディがないとコンパイルエラー。\n\n🎯 試験のコツ：インターフェース実装 = implements + 全メソッドのボディ提供。クラス継承 = extends。", "a": "Public class CheckPaymentProcessor extends PaymentProcessor {<br>    public void pay(Decimal amount)  {<br>        // 実装の詳細<br>    }<br>}", "b": "public class CheckPaymentProcessor extends PaymentProcessor {<br>    public void pay(Decimal amount);<br>}", "c": "public class CheckPaymentProcessor implements PaymentProcessor {<br>    public void pay(Decimal amount)  {<br>        // 実装の詳細<br>    }<br>}", "d": "public class CheckPaymentProcessor implements PaymentProcessor {<br>    public void pay(Decimal amount);<br>}"}, {"n": "5880", "p": "データクリーンアップ戦略の一環として、AW Computing社は、関連するアカウントが削除されたときに、関連する商談レコードを自動的に削除したいと考えています。このビジネス要件を満たすには、どの自動化ツールを使用する必要がありますか。", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：データクリーンアップで取引先削除時に関連商談も自動削除するツールは？\n\n✅ 正解 B：レコードトリガーフロー\nレコードトリガーフローは削除イベントに反応して自動処理を実行できる。取引先が削除されたときに関連する商談を削除するロジックを設定可能。\n\n❌ A（プロセスビルダー）→ プロセスビルダーは削除イベントをトリガーにできない。作成・更新のみ。\n❌ C（ワークフロールール）→ ワークフローも削除イベントをサポートしない。\n❌ D（スケジュールされたジョブ）→ 定期実行であり、特定レコードの削除に即時対応する仕組みではない。\n\n🎯 試験のコツ：削除イベントで自動処理 = レコードトリガーフロー or Apexトリガー。プロセスビルダー/ワークフローは削除非対応。", "a": "プロセスビルダー", "b": "レコードトリガーフロー", "c": "ワークフロールール", "d": "スケジュールされたジョブ"}, {"n": "5881", "p": "開発者が、「Universal Containers」という会社名を持つリード、取引先、および取引先責任者のIdと名前(Name)を取得するために使用すべきクエリはどれですか。", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：Universal Containersの全リード・取引先・取引先責任者をID＋名前で検索するクエリは？\n\n✅ 正解 B：FIND 'Universal Containers' IN Name Fields RETURNING lead(id,name), account(id,name), contact(id,name)\nSOSLは複数オブジェクトを横断してName項目を検索できる。IN Name Fieldsで名前系フィールドが対象。\n\n❌ A（SELECTで複数オブジェクト）→ SOQLのFROM句に複数オブジェクトは指定できない。\n❌ C（IN CompanyName Fields）→ SOSLにCompanyName Fieldsという検索スコープは存在しない。\n❌ D（SELECTで複数オブジェクト + WHERE）→ Aと同じ理由で不可。\n\n🎯 試験のコツ：複数オブジェクトの横断検索 = SOSL。SOQLは1オブジェクト（＋関連オブジェクト）のみ。", "a": "SELECT Lead.Id, Lead.Name, Account.Id, Account.Name, Contact.Id, Contact.Name <br>FROM Lead, Account, Contact <br>WHERE CompanyName = &#39;Universal Containers&#39;", "b": "FIND &#39;Universal Containers&#39; IN Name Fields RETURNING lead(id, name), account(id, name), contact(id, name)", "c": "FIND &#39;Universal Containers&#39; IN CompanyName Fields RETURNING lead(id, name), account(id, name), contact(id, name)", "d": "SELECT lead(id, name), account(id, name), contact(id, name) <br>FROM Lead, Account, Contact <br>WHERE Name = &#39;Universal Containers&#39;"}, {"n": "5882", "p": "Universal Containers社には、カスタムオブジェクトであるEngineering_Support__cを使用して、ユーザーがエンジニアリングチームにサポートを要求できるサポートプロセスがあります。ユーザーは、複数のEngineering_Support__cレコードを1つの商談レコードに関連付けることができる必要があります。さらに、Engineering_Support__c レコードに関する集計情報を商談レコードに表示する必要があります。これらの要件をサポートするために、開発者は何を実装する必要がありますか。", "r": "デベロッパーの基本", "ans": "B", "exp": "ざっくり言うと：Engineering_Support__cを複数の商談に関連付け、集計情報も表示するリレーションは？\n\n✅ 正解 B：Engineering_Support__cから商談への主従関係\n主従関係にすれば、商談（親）にEngineering_Support__c（子）の積み上げ集計項目を作成でき、集計情報を表示可能。\n\n❌ A（商談からEngineering_Support__cへの参照関係）→ 方向が逆。子側に主従フィールドを作る。\n❌ C（商談からEngineering_Support__cへの主従関係）→ 方向が逆。\n❌ D（Engineering_Support__cから商談への参照関係）→ 参照関係では積み上げ集計項目が使えない。\n\n🎯 試験のコツ：集計情報が必要 → 主従関係（積み上げ集計項目が使える）。方向は子→親。", "a": "商談からEngineering_Support__cへの主従関係", "b": "Engineering_Support__cから商談への主従関係", "c": "商談からEngineering_Support__cへの参照関係", "d": "Engineering_support__cから商談への参照関係"}, {"n": "5883", "p": "開発者は、既存のPaymentクラスの実装を提供するCreditCardPaymentクラスを作成する必要があります。\n\npublic virtual class Payment { \n    public virtual void makePayment(Decimal amount) { \n        /*implementation*/\n    } \n}\n\n正しい実装はどれですか。", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：既存のPaymentクラスを継承してオーバーライドする正しい書き方は？\n\n✅ 正解 D：public class CreditCardPayment extends Payment { public override void makePayment(Decimal amount) { /*実装*/ } }\nextendsでクラスを継承し、overrideで親クラスのvirtualメソッドを上書きする。\n\n❌ A（extends + virtual）→ virtualは親クラスで使うキーワード。子クラスでオーバーライドするときはoverride。\n❌ B（implements + override）→ implementsはインターフェース用。クラスの継承にはextendsを使う。\n❌ C（implements + virtual）→ implements自体が不適切。\n\n🎯 試験のコツ：クラス継承 = extends + override。インターフェース実装 = implements。", "a": "public class CreditCardPayment extends Payment {<br>    public virtual void makePayment(Decimal amount) { <br>        /*implementation*/ <br>    }<br>}", "b": "public class CreditCardPayment implements Payment {<br>    public override void makePayment(Decimal amount) { <br>        /*implementation*/ <br>    }<br>}", "c": "public class CreditCardPayment implements Payment {<br>    public virtual void makePayment(Decimal amount) { <br>        /*implementation*/ <br>    }<br>}", "d": "public class CreditCardPayment extends Payment {<br>    public override void makePayment(Decimal amount) { <br>        /*implementation*/ <br>    }<br>}"}, {"n": "8123", "p": "Developer Sandboxにテストデータを追加するために使用できる2つの「sfdxコマンド」はどれですか？（２つ選択）", "r": "テスト、デバッグ、リリース", "ans": "B;C", "exp": "ざっくり言うと：Developer SandboxにテストデータをSFDX CLIで追加するコマンドは？2つ選ぶ問題。\n\n✅ 正解 B：force:data:bulk:upsert\n大量のデータを非同期で一括アップサートするコマンド。\n\n✅ 正解 C：force:data:tree:upsert\n親子関係を持つレコードをツリー構造で一括アップサートするコマンド。\n\n❌ A（force:data:async:upsert）→ そんなコマンドは存在しない。\n❌ D（force:data:object:upsert）→ そんなコマンドは存在しない。\n\n🎯 試験のコツ：SFDXのデータインポート = bulk:upsert（大量データ）or tree:upsert（親子関係データ）。", "a": "forced:data:async:upsert", "b": "forced:data:bulk:upsert", "c": "forced:data:tree:upsert", "d": "forced:data:object:upsert"}, {"n": "8124", "p": "開発者は、Apexクラスのプライベートメソッドの単体テストをどのように記述すればよいでしょうか？", "r": "テスト、デバッグ、リリース", "ans": "C", "exp": "ざっくり言うと：Apexクラスのprivateメソッドの単体テストを書くには？\n\n✅ 正解 C：TestVisibleアノテーションを使用する\n@TestVisibleをprivateメソッドに付けるとテストクラスからアクセス可能になる。\n\n❌ A（globalとして実装）→ アクセスレベルを変えるのは設計上不適切。\n❌ B（テストメソッドをクラスに追加）→ ビジネスクラスにテストを混在させるのは非推奨。\n❌ D（SeeAllData）→ 実データへのアクセス設定であり、privateメソッドとは無関係。\n\n🎯 試験のコツ：privateメソッドのテスト = @TestVisible。頻出問題。", "a": "Apexクラスをglobalとして実装します。", "b": "Apexクラスにテストメソッドを追加します。", "c": "TestVisibleアノテーションを使用します。", "d": "SeeAllDataアノテーションを使用します。"}, {"n": "8125", "p": "2 人の開発者が同じ組織内でテストを実行する3つの方法は何ですか？（3つ選択）", "r": "テスト、デバッグ、リリース", "ans": "A;D;E", "exp": "ざっくり言うと：組織内でテストを実行する方法は？3つ選ぶ問題。\n\n✅ 正解 A：Tooling API\n✅ 正解 D：Salesforce DX\n✅ 正解 E：Setup Menu（設定メニュー）\n\n❌ B（Metadata API）→ メタデータの取得・デプロイ用。テスト実行専用ではない。\n❌ C（Bulk API）→ 大量データ操作用。テスト実行機能はない。\n\n🎯 試験のコツ：テスト実行 = Tooling API + SFDX CLI + 設定メニュー + 開発者コンソール。", "a": "Tooling API", "b": "Metadata APT", "c": "Bulk API", "d": "SalesforceDX", "e": "Setup Menu"}, {"n": "8126", "p": "変更セットリリースの特徴は何ですか？（3つ選択）", "r": "テスト、デバッグ、リリース", "ans": "A;D;E", "exp": "ざっくり言うと：変更セットリリースの特徴は？3つ選ぶ問題。\n\n✅ 正解 A：関連する組織間でのみリリース可能\n✅ 正解 D：デプロイは一方向の単一トランザクション\n✅ 正解 E：デプロイメント接続が必要\n\n❌ B（カスタム設定データをデプロイ可能）→ メタデータのみ。データは不可。\n❌ C（レコードをリリース可能）→ レコードは変更セットで転送不可。\n\n🎯 試験のコツ：変更セット = メタデータのみ、関連組織間のみ、一方向、接続必要。", "a": "変更セットは関連する組織間でのみリリースできます。", "b": "変更セットはカスタム設定データをリリースできます。", "c": "変更セットを使用してレコードをリリースできます。", "d": "デプロイメントは一方向の単一トランザクションで実行されます。", "e": "2つの組織間で変更セットを送信するには、デプロイメント接続が必要です。"}, {"n": "8127", "p": "開発者は、OpportunityLineItemトリガーをカバーするテストクラスを作成していて、組織内の標準価格表にアクセスしたいと考えています。どのメソッドで価格表にアクセスできますか？", "r": "テスト、デバッグ、リリース", "ans": "B", "exp": "ざっくり言うと：テストで標準価格表にアクセスするメソッドは？\n\n✅ 正解 B：Test.getStandardPricebookId()で標準価格表IDを取得\nテスト環境で標準価格表のIDを安全に取得するための専用メソッド。\n\n❌ A（@TestVisible）→ privateメンバーへのアクセス用。価格表とは無関係。\n❌ C（SeeAllData=True）→ 実データアクセス設定。推奨されない方法。\n❌ D（Test.loadData()で価格表をロード）→ 標準価格表はCSVからロードするものではない。\n\n🎯 試験のコツ：標準価格表テスト = Test.getStandardPricebookId()。", "a": "テストメソッドが標準価格表を表示できるようにするには、@TestVisibleを使用します。", "b": "Test.getStandardPricebookId()を使用して、標準価格表IDを取得します。", "c": "@IsTest (SeeAllData=True) を使用して、既存の標準価格表を削除します。", "d": "Test.loadData()と静的リソースを使用して標準価格表をロードします。"}, {"n": "8128", "p": "すべてのテストを実行した後、クラスのコード カバレッジを確認するには、開発者は何をする必要がありますか？", "r": "テスト、デバッグ、リリース", "ans": "B", "exp": "ざっくり言うと：全テスト実行後にクラスのコードカバレッジを確認するには？\n\n✅ 正解 B：開発者コンソールのTestsタブのOverall Code Coverageパネル\n\n❌ A（Apexテスト実行ページでクラスを選択）→ テスト実行方法であり、カバレッジ確認場所ではない。\n❌ C（Apexクラスページのテストパーセンテージタブ）→ そんなタブは存在しない。\n❌ D（Apexクラスページのコードカバレッジ列）→ そんな列は存在しない。\n\n🎯 試験のコツ：カバレッジ確認 = 開発者コンソールのTestsタブ。", "a": "開発者コンソールのApexテスト実行ページでクラスを選択して実行します。", "b": "開発者コンソールのテストタブの全体的なコードカバレッジパネルを使用して、クラスのカバレッジパーセンテージを表示します。", "c": "SalesforceセットアップのApexクラスの最初の画面で、クラスのテストのパーセンテージタブを表示します。", "d": "Apexクラスページのリストビューでコードカバレッジ列を表示します。"}, {"n": "8129", "p": "開発者は、更新前トリガーでAccountオブジェクトのCount項目を増分します。ワークフロールールも、Accountが作成または更新されるたびにCount項目を増分します。ワークフロールールの項目更新は、ワークフロールールを再評価しないように構成されています。\nAccountに他の自動化ロジックが実装されていないと仮定すると、Accountが初期値0で挿入された場合、Count項目の値は何になりますか？", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：before updateトリガーとワークフローが同じ項目を増分。初期値0で挿入後の値は？\n\n✅ 正解 D：2\n1. before insertトリガー実行（Count: 0→1）\n2. レコード保存\n3. ワークフローの項目更新でCount増分（1→2）\n4. ワークフローの再評価はオフなので追加実行なし\n→ 最終値: 2\n\n❌ A（4）→ トリガーとワークフローの実行回数を過大に見積もっている。\n❌ B（3）→ ワークフロー再実行を想定しているが、再評価はオフ。\n❌ C（1）→ ワークフローの増分を見落としている。\n\n🎯 試験のコツ：実行順序 = before trigger → 保存 → ワークフロー項目更新。再評価オフなら追加実行なし。", "a": "4", "b": "3", "c": "1", "d": "2"}, {"n": "8130", "p": "開発者が親Lightning Web Component内にネストされた子Lightning Web Componentを作成しました。親Componentは子Componentに文字列値を渡す必要があります。これを実現するにはどのような方法がありますか？（2つ選択）", "r": "ユーザインターフェース", "ans": "B;D", "exp": "ざっくり言うと：親LWCから子LWCにデータを渡す方法は？2つ選ぶ問題。\n\n✅ 正解 B：子コンポーネントのメソッドを呼び出す\n✅ 正解 D：publicプロパティ（@api）でデータを渡す\n\n❌ A（カスタムイベント）→ 子→親の方向。親→子にはプロパティ/メソッドを使う。\n❌ C（Apexコントローラ）→ サーバー側ロジック。親子間のクライアント通信には不適。\n\n🎯 試験のコツ：親→子 = @apiプロパティ or @apiメソッド。子→親 = カスタムイベント。", "a": "親Componentはカスタムイベントを使用して子Componentにデータを渡すことができます。", "b": "親Componentは子Componentのメソッドを呼び出すことができます。", "c": "親Componentは、Apexコントローラクラスを使用して子Componentにデータを送信できます。", "d": "親Componentはpublicプロパティを使用して子Componentにデータを渡すことができます。"}, {"n": "8131", "p": "開発者は、Accountが作成されない理由を特定するために、次のコードをデバッグしています。\n\nAccount a = new Account(Name = ‘A’);\nDatabase.insert(a, false);\n\n問題をデバッグするには、コードをどのように変更すればよいでしょうか？（２つ選択）", "r": "テスト、デバッグ、リリース", "ans": "A;C", "exp": "ざっくり言うと：Database.insert(records, false)でAccountが作成されない原因のデバッグ方法は？\n\n✅ 正解 A：insertの周りにtry/catchを追加\n✅ 正解 C：insertの戻り値をSaveResult変数に設定\n\nDatabase.insert(records, false)は例外を投げずにSaveResultを返す。エラー詳細はSaveResult.getErrors()で確認する。try/catchも念のため追加。\n\n❌ B（第2引数をtrueに）→ trueにすると1件でもエラーで全件ロールバック。問題解決にならない。\n❌ D（insertの前にdebug）→ insert前のdebugでは失敗原因は分からない。\n\n🎯 試験のコツ：Database.insert(false)のデバッグ = SaveResultで戻り値を確認。", "a": "insertメソッドの周りにtry/catchを追加する。", "b": "insertメソッドの2番目のパラメータをtrueに設定する。", "c": "insertメソッドの戻り値をSaveresult変数に設定する。", "d": "insertメソッドの前にSystem.debug()ステートメントを追加する。"}, {"n": "8132", "p": "開発者はテストクラスを作成しており、テストレコードを作成する必要があります。テストクラス内のすべてのメソッドで使用するレコードを作成するには、どのメソッドアノテーションを使用する必要がありますか？", "r": "テスト、デバッグ、リリース", "ans": "B", "exp": "ざっくり言うと：テストクラスの全メソッドで使うレコードを作成するアノテーションは？\n\n✅ 正解 B：@TestSetup\n\n❌ A（@BeforeTest）→ 存在しないアノテーション。\n❌ C（@isTest(SeeAllData=True)）→ 実データアクセス設定。テストデータ作成ではない。\n❌ D（@PreTest）→ 存在しないアノテーション。\n\n🎯 試験のコツ：共通テストデータ = @TestSetup。", "a": "@BeforeTest", "b": "@TestSetup", "c": "@isTest(SeeAllData=True)", "d": "@PreTest"}, {"n": "8133", "p": "Salesforce管理者がレコードトリガーフローを作成しています。特定の条件が満たされると、フローはApexメソッドを呼び出して、複数のタイプのオブジェクトを含む複雑な処理を実行する必要があります。Apexメソッドを作成するときに、メソッドをフロー内で使用できるようにするためには、開発者はどのアノテーションを使用する必要がありますか？", "r": "プロセスの自動化とロジック", "ans": "A", "exp": "ざっくり言うと：フローからApexメソッドを呼ぶためのアノテーションは？\n\n✅ 正解 A：@InvocableMethod\n\n❌ B（@future）→ 非同期処理用。フローからの呼び出しとは別。\n❌ C（@AuraEnabled）→ LWC/Aura用。\n❌ D（@RemoteAction）→ VF用。\n\n🎯 試験のコツ：フロー→Apex = @InvocableMethod。LWC→Apex = @AuraEnabled。", "a": "@InvocableMethod", "b": "@future", "c": "@AuraEnaled", "d": "@RemoteAction"}, {"n": "8134", "p": "開発者は、外部システムを呼び出すApexクラスを作成しました。開発者はテストカバレッジを満たすために、どのようにテストクラスを作成すればよいでしょうか？", "r": "テスト、デバッグ、リリース", "ans": "B", "exp": "ざっくり言うと：外部コールアウトのあるApexクラスのテストを書くには？\n\n✅ 正解 B：HttpCalloutMockインターフェースを実装するクラスを作成\nテスト中は実際のHTTP通信ができないので、モック（偽の応答）を返すクラスを作成してTest.setMock()で設定する。\n\n❌ A（WebserviceMockを実装）→ SOAPベースのWebサービス用。HTTPコールアウトにはHttpCalloutMock。\n❌ C（WebserviceMockを拡張）→ 実装(implements)が正しい。拡張(extends)ではない。\n❌ D（HttpCalloutMockを拡張）→ 実装(implements)が正しい。\n\n🎯 試験のコツ：HTTPコールアウトテスト = HttpCalloutMock implements + Test.setMock()。", "a": "WebserviceMock インターフェースを実装するクラスを作成します。", "b": "HTTPCalloutMock インターフェースを実装するクラスを作成します。", "c": "WebserviceMockを拡張するクラスを作成します。", "d": "HTTPCalloutMock を拡張するクラスを作成します。"}, {"n": "8135", "p": "Salesforce管理者は、データクリーンアップ戦略の一環として、取引先レコードが削除されたときに、関連する商談レコードを削除したいと考えています。\nこのビジネス要件を満たすには、どの自動化ツールを使用する必要がありますか？", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：取引先削除時に関連商談を自動削除するツールは？（5880と同テーマ）\n\n✅ 正解 C：レコードトリガーフロー\n\n❌ A（スケジュール済みジョブ）→ 即時対応できない。\n❌ B（プロセスビルダー）→ 削除イベント非対応。\n❌ D（ワークフロールール）→ 削除イベント非対応。\n\n🎯 試験のコツ：削除イベントで自動処理 = レコードトリガーフロー。", "a": "スケジュール済みジョブ", "b": "プロセスビルダー", "c": "レコードトリガーフロー", "d": "ワークフロールール"}, {"n": "8136", "p": "Apexコードの単体テストにおいて、有効な手段はどれですか？", "r": "テスト、デバッグ、リリース", "ans": "C", "exp": "ざっくり言うと：Apexテストで有効な手段は？\n\n✅ 正解 C：システムメソッドでレコードの作成日を設定\nTest.setCreatedDate()でテスト内のレコードの作成日を任意に設定可能。\n\n❌ A（コールアウトでリモートデータ読み込み）→ テスト中は実コールアウト不可。モックを使う。\n❌ B（別ユーザーとして匿名Apex実行）→ テスト内から匿名実行は不可。\n❌ D（getContentAsPDF()でPDF生成）→ テスト内でのPDF生成はサポートされていない。\n\n🎯 試験のコツ：テスト可能 = setCreatedDate, setMock, loadData。不可 = 実コールアウト, getContentAsPDF。", "a": "コールアウトを使用してリモートサイトからデータを読み込みます。", "b": "別のユーザーとして匿名Apexを実行します。", "c": "システムメソッドを使用してレコードの作成日を設定します。", "d": "getContentAsPDF()を使用してVisualforcePDFを生成します。"}, {"n": "8137", "p": "営業管理チームから、リードが変換されるときにリードレコードの「リードソース」項目に値を入力することを要求されています。\nリードを変換する前に、ユーザーが「リードソース」項目に値を入力するには、どうすればよいでしょうか？", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：リード変換前にリードソースの入力を強制するには？\n\n✅ 正解 D：入力規則を使用する\n入力規則で「リードソースが空白かつ変換中」の条件を設定すれば、変換前に入力を強制できる。\n\n❌ A（プロセスビルダー）→ 変換後の自動処理向け。変換前の入力強制には不向き。\n❌ B（Afterトリガー）→ 変換後に実行される。変換前のブロックにはbefore triggerか入力規則。\n❌ C（数式項目）→ 値の計算表示用。入力強制はできない。\n\n🎯 試験のコツ：変換前の入力強制 = 入力規則。", "a": "プロセスビルダーを使用します。", "b": "リードに対してAfterトリガーを作成します。", "c": "数式項目を使用します。", "d": "入力規則を使用します。"}, {"n": "8138", "p": "開発者は、現在のユーザーが所有する取引先責任者をリスト形式で表示するVisualforceページを作成するように求められています。このVisualforceページはLightningページに埋め込まれます。\n不要なコードを記述せずにこの要件を実装するには、どのコントローラーを使用すればよいでしょうか？", "r": "ユーザインターフェース", "ans": "C", "exp": "ざっくり言うと：VFで現在ユーザーの取引先責任者をリスト表示するコントローラは？\n\n✅ 正解 C：標準リストコントローラ\nStandardSetControllerで取引先責任者のリスト表示が可能。recordSetVar属性を使う。不要なコード記述なしで実現。\n\n❌ A（標準コントローラ）→ 単一レコード用。リスト表示には不向き。\n❌ B（ライトニングコントローラ）→ VFページではなくLightning用。\n❌ D（カスタムコントローラ）→ コード記述が必要で「不要なコード」の条件に反する。\n\n🎯 試験のコツ：VFリスト表示 = 標準リストコントローラ（StandardSetController）。", "a": "標準コントローラー", "b": "ライトニングコントローラー", "c": "標準リストコントローラー", "d": "カスタムコントローラー"}, {"n": "8139", "p": "本番環境にApexコードをリリースするには、どの要件を満たす必要がありますか？（2つ選択）", "r": "テスト、デバッグ、リリース", "ans": "A;C", "exp": "ざっくり言うと：本番デプロイの要件は？2つ選ぶ問題。\n\n✅ 正解 A：すべてのApexコードは75%以上のテストカバレッジが必要\n✅ 正解 C：すべてのApexコードとトリガを合わせて75%以上必要\n\n❌ B（すべてのトリガーが少なくとも1行以上）→ 正しいが選択肢の組み合わせとしてAとCが正解。\n❌ D（すべてのトリガーが75%以上）→ 各トリガー個別に75%は不要。最低1%あればOK。\n\n🎯 試験のコツ：デプロイ要件 = 全体75%以上 + 各トリガー最低1%。", "a": "すべてのApexコードは75%以上のテストカバレッジが必要です。", "b": "すべてのトリガは少なくとも1 行以上のテストカバレッジを持つ必要があります。", "c": "すべてのApexコードとトリガを合わせて、75%以上のテストカバレッジが必要です。", "d": "すべてのトリガのテストカバレッジは75%以上である必要があります。"}, {"n": "8140", "p": "Lightningコンポーネントフレームワークは、開発者がソリューションをより迅速に実装するのにどのように役立ちますか？", "r": "ユーザインターフェース", "ans": "A", "exp": "ざっくり言うと：Lightningコンポーネントフレームワークが開発を加速する理由は？\n\n✅ 正解 A：デスクトップとモバイルのシームレスな連動を提供する\n1つのコードベースでデスクトップとモバイル両方に対応したUIを構築できる。\n\n❌ B（変更履歴とバージョン管理）→ Git等の外部ツールの役割。フレームワーク機能ではない。\n❌ C（コードレビュー標準）→ 組織の開発プロセスの話。フレームワーク機能ではない。\n❌ D（アジャイルプロセスの手順）→ プロジェクト管理手法。フレームワーク機能ではない。\n\n🎯 試験のコツ：Lightningフレームワークの利点 = レスポンシブ + コンポーネント再利用 + クライアント側レンダリング。", "a": "デスクトップとモバイルデバイスのシームレスな連動を提供する。", "b": "変更履歴とバージョン管理を提供する。", "c": "コードレビューの標準とプロセスを提供する。", "d": "アジャイルプロセスにデフォルトの手順を提供する。"}, {"n": "8141", "p": "追跡フラグを設定できるのはどれですか？（3つ選択）", "r": "デベロッパーの基本", "ans": "A;B;D", "exp": "ざっくり言うと：追跡フラグを設定できるのは？3つ選ぶ問題。\n\n✅ 正解 A：Apexトリガー\n✅ 正解 B：ユーザー\n✅ 正解 D：Apexクラス\n\n❌ C（プロセスビルダー）→ プロセスビルダーに直接追跡フラグは設定不可。ユーザーに設定して間接的に確認。\n❌ E（Visualforce）→ VFページに追跡フラグは設定不可。コントローラ（Apexクラス）に設定する。\n\n🎯 試験のコツ：追跡フラグ対象 = ユーザー、Apexクラス、Apexトリガー。この3つのみ。", "a": "Apex トリガー", "b": "ユーザー", "c": "プロセスビルダー", "d": "Apex クラス", "e": "Visualforce"}, {"n": "8142", "p": "Batchable インターフェースを実装するときに、Apex クラスの execute() メソッド内で Apex コードが実行される場合、ガバナ制限に関して正しい記述はどれですか？（2つ選択）", "r": "プロセスの自動化とロジック", "ans": "A;C", "exp": "ざっくり言うと：Batchableのexecute()のガバナ制限について正しいのは？2つ選ぶ問題。\n\n✅ 正解 A：execute()の各反復ごとにガバナ制限がリセットされる\n✅ 正解 C：非同期のため制限値が高くなる可能性がある\n\n❌ B（制限を超えることはない）→ 非同期でも制限は存在し、超えれば例外。\n❌ D（コンストラクタ時にガバナ制限が緩和）→ コンストラクタにも通常制限が適用される。\n\n🎯 試験のコツ：Batch = 各executeで制限リセット + 非同期の緩和制限。", "a": "Apex ガバナー制限は、execute() メソッドの各反復ごとにリセットされます。", "b": "Apex クラスのコンストラクターを呼び出すときに、Apex ガバナー制限がリセットされます。", "c": "トランザクションの非同期性により、Apex ガバナーの制限が高くなる可能性があります。", "d": "トランザクションの非同期性により、Apexガバナー制限を超えることはありません。"}, {"n": "8143", "p": "スクラッチ組織を作成するには、何を使用すればよいですか？", "r": "デベロッパーの基本", "ans": "A", "exp": "ざっくり言うと：スクラッチ組織を作成するには？\n\n✅ 正解 A：Salesforce CLI\n❌ B（Workbench）→ データ/メタデータ操作用。\n❌ C（Developer Console）→ コード編集/デバッグ用。\n❌ D（Sandboxの更新）→ 既存Sandbox用。\n\n🎯 試験のコツ：スクラッチ組織 = Salesforce CLI + Dev Hub。", "a": "Salesforce CLI", "b": "ワ​​ークベンチ", "c": "Sandboxの更新", "d": "開発者コンソール"}, {"n": "8144", "p": "Lightning UIから一時停止されたフローのインタビューに関する情報を確認したいと考えています。\n開発者は、どこで確認することができますか？", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：一時停止されたフローのインタビュー情報を確認する場所は？\n\n✅ 正解 B：特定のレコードの一時停止中フローインタビュー関連リスト\n関連するオブジェクトのレコード詳細ページに表示される関連リストで確認可能。\n\n❌ A（ホームの一時停止中フロー）→ 正確な場所ではない。\n❌ C（Apex Flexキュー）→ Batch Apexジョブの管理用。フローとは無関係。\n❌ D（システムデバッグログ）→ デバッグログにフローインタビュー情報は含まれない。\n\n🎯 試験のコツ：一時停止フロー確認 = レコードの関連リスト。", "a": "[ホーム]の一時停止中の失敗したフローインタビュー", "b": "特定のレコードの一時停止中フローインタビュー関連リスト", "c": "Apex Flexキューの一時停止中のフローインタビューセクション", "d": "一時停止中のフローインタビューの変更によるシステムデバッグログ"}, {"n": "8145", "p": "開発者は、システム内に存在する ContactSearch Apex クラスのセキュリティ レビューを実行するように指示されています。開発者は、クラス内で次のメソッドをセキュリティ上の脅威として特定しました:\n\nList performSearch(String lastName) {\nreturn Database.query(‘Select Id, FirstName, LastName FROM Contact WHERE LastName Like %’+lastName+’%);\n}\n\n開発者がメソッドを更新して SOQL インジェクション攻撃を防ぐ方法は何ですか？（2つ選択）", "r": "デベロッパーの基本", "ans": "B;C", "exp": "ざっくり言うと：SOQLインジェクション対策として正しいのは？2つ選ぶ問題。\n\n✅ 正解 A：WITH SECURITY_ENFORCED句を使用\n✅ 正解 C：with sharingキーワードを使用\n\n❌ B（inherited sharing）→ 呼び出し元に依存するため確実ではない。\n❌ D（without sharing）→ 共有設定を無視。セキュリティが弱まる。\n\n🎯 試験のコツ：セキュリティ強制 = WITH SECURITY_ENFORCED（FLS）+ with sharing（共有ルール）。", "a": "ク​​ラスで @Readonly アノテーションと with sharing キーワードを使用します。", "b": "パラメータを使用する前に、escapeSingleQuote メソッドを使用してパラメータをサニタイズします。", "c": "変数バインディングを使用し、動的SOQLを静的 SOQL に置き換えます。", "d": "パラメータに正規表現を使用して特殊文字を削除します。"}, {"n": "8146", "p": "コールセンターのエージェントがサービスデスクの着信を処理するときに使用する、画面フローがあります。\nフローのステップの 1 つで、エージェントに「注文番号」と「日付」のリストを表示する必要があります。このリストの値は、外部の注文管理システムからリアルタイムで取得して、画面に表示します。\n開発者は、この要件を満たすために、何を使用する必要がありますか？", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：画面フローで外部システムからリアルタイムデータを取得して表示するには？\n\n✅ 正解 C：Apex REST Class（またはInvocable Method経由のコールアウト）\n\n❌ A（Outbound Message）→ Salesforceからの送信用。リアルタイム取得ではない。\n❌ B（Invocable Method単体）→ メソッド自体は正しいが、外部通信にはHTTPコールアウトが必要。\n❌ D（Apex Controller）→ VF/Lightningコンポーネント用。フローからは@InvocableMethodで呼ぶ。\n\n🎯 試験のコツ：フローから外部データ取得 = @InvocableMethod + HTTPコールアウト。", "a": "Outbound Message", "b": "Invocae Method", "c": "Apex REST Class", "d": "Apex Controller"}, {"n": "8147", "p": "取引先レコードを保存するための Visualforce ページとカスタム コントローラーがあります。 入力ルール違反をユーザーに表示したいと考えています。 開発者は、入力ルール違反が表示されるようにするために、どうすればよいでしょうか？（２つ選択）", "r": "ユーザインターフェース", "ans": "C;D", "exp": "ざっくり言うと：VFカスタムコントローラで入力規則違反をユーザーに表示するには？2つ選ぶ問題。\n\n✅ 正解 C：Database.upsert()メソッドでDMLを実行\n✅ 正解 D：VFページに<apex:pageMessages>を含める\n\nDatabase.upsertで入力規則エラーを捕捉し、apex:pageMessagesコンポーネントでエラーメッセージを画面表示する。\n\n❌ A（try/catch）→ エラー処理には有効だが表示には不十分。\n❌ B（カスタムコントローラ属性）→ 属性追加だけでは表示されない。\n\n🎯 試験のコツ：VFエラー表示 = Database DMLメソッド + <apex:pageMessages>。", "a": "カスタム例外クラスで try/catch を使用します。", "b": "メッセージを表示するためのカスタム コントローラ属性を追加します。", "c": "Database.upsert() メソッドを使用して、DML を実行します。", "d": "Visualforce ページに  を含めます。"}, {"n": "8148", "p": "開発者は、取引先オブジェクトにApexトリガーを作成しました。\nApexトリガーが適切に一括処理されているかどうかをテストしたいと考えています。\n開発チームは、一意の名前を持つ 200 件の取引先レコードを使用してApexトリガーをテストすることに決めました。\n最小限のコードでテストクラス内にテストデータを作成するには、どのようなことを行う必要がありますか？（2つ選択）", "r": "テスト、デバッグ、リリース", "ans": "B;C", "exp": "ざっくり言うと：一括トリガーテスト用に200件のテストデータを最小コードで作るには？2つ選ぶ問題。\n\n✅ 正解 B：Test.loadDataでテストメソッドにデータ入力\n✅ 正解 C：テストデータを含む静的リソースを作成\n\n❌ A（@isTest(seeAllData=true)）→ 実データ依存は非推奨。\n❌ D（@isTest(isParallel=true)）→ 並列実行設定。データ作成とは無関係。\n\n🎯 試験のコツ：大量テストデータ = 静的リソース(CSV) + Test.loadData()。", "a": "テストクラスで @isTest(seeAllData=true) アノテーションを使用します。", "b": "Test.loadData を使用してテストメソッドにデータを入力します。", "c": "テストデータを含む静的リソースを作成します。", "d": "テストクラスで @isTest(isParallel=true) アノテーションを使用します。"}, {"n": "8150", "p": "カスタム SVG を Lightning Web コンポーネントに含めることができる 3 つの手順はどれですか？（3つ選択）", "r": "ユーザインターフェース", "ans": "A;C;D", "exp": "ざっくり言うと：カスタムSVGをLWCに含める3つのステップは？\n✅ A：SVGをコンテンツアセットファイルとしてインポート\n✅ C：SVGを静的リソースとしてアップロード\n✅ D：HTMLテンプレートでインポートを参照\n❌ B（JSでgetter提供）→ 手順としてはDが直接参照するためBは不要。\n❌ E（HTMLでgetter参照）→ Dのインポート参照が正しい手順。\n🎯 試験のコツ：LWCでSVG = 静的リソース + JSインポート + HTML参照。", "a": "SVG をコンテンツ アセット ファイルとしてインポートします。", "b": "静的リソースをインポートし、JavaScript でそのゲッターを提供します。", "c": "SVG を静的リソースとしてアップロードします。", "d": "HTML テンプレートでインポートを参照します。", "e": "HTML テンプレートでゲッターを参照します。"}, {"n": "8152", "p": "開発者は、失注理由が「空白」の場合、営業マネージャー プロファイルに割り当てられたユーザー以外は、商談フェーズを「失注」に変更できないようにする必要があります。\nどの自動化によって、最も効率的にこの要件を満たすことができますか？", "r": "プロセスの自動化とロジック", "ans": "A", "exp": "ざっくり言うと：失注理由が空白なら営業マネージャー以外は商談を失注にできない。最も効率的な実装は？\n✅ 正解 A：商談の入力規則\n入力規則で「フェーズ=失注 AND 失注理由=空白 AND プロファイル≠営業マネージャー」を条件にエラーを出す。コード不要で最も効率的。\n❌ B（Apexトリガー）→ 可能だが入力規則の方がシンプル。\n❌ C（承認プロセス）→ 承認ワークフロー用。入力制御ではない。\n❌ D（レコードトリガーフロー）→ 可能だが入力規則が最もシンプル。\n🎯 試験のコツ：条件付き入力制御 = 入力規則が最優先。", "a": "商談の入力規則", "b": "商談オブジェクトのApexトリガー", "c": "商談オブジェクトの承認プロセス", "d": "商談オブジェクトのレコードトリガーフロー"}, {"n": "8153", "p": "開発者は、500 件の商談レコードをSandboxにインポートしたいと考えています。\n開発者がデータインポートウィザードではなく、データローダーを使用する必要があるのはなぜですか？", "r": "デベロッパーの基本", "ans": "D", "exp": "ざっくり言うと：500件の商談をインポートするのにデータインポートウィザードではなくデータローダーを使う理由は？\n✅ 正解 D：データインポートウィザードは商談をサポートしていない\nデータインポートウィザードは取引先、連絡先、リード、ソリューション、キャンペーンメンバー、カスタムオブジェクトのみ対応。商談は非対応。\n❌ A（500件をインポートできない）→ ウィザードは最大5万件まで対応。件数は問題ではない。\n❌ B（データローダーはブラウザから実行）→ ブラウザから実行するのはウィザード。データローダーはPCにインストール。\n❌ C（自動関連付け）→ データローダーに自動関連付け機能はない。\n🎯 試験のコツ：データインポートウィザード非対応 = 商談、ケースなど。データローダーは全オブジェクト対応。", "a": "データインポートウィザードでは、500 件のレコードすべてをインポートできません。", "b": "データローダーは、開発者のブラウザから実行されます。", "c": "データローダーは、商談を取引先に自動的に関連付けます。", "d": "データインポートウィザードは、商談をサポートしていません。"}, {"n": "8154", "p": "開発者は、Sandboxで Apex テスト メソッドが失敗していることに気づきました。 問題を特定するために、開発者はテスト メソッド内のコードをコピーし、開発者コンソールの匿名実行ツールをから実行しました。 その後、コードは例外やエラーなしで実行されます。 なぜ、テストメソッドはSandboxで失敗し、開発者コンソールでは成功したのでしょうか？（２つ選択）", "r": "テスト、デバッグ、リリース", "ans": "A;C", "exp": "ざっくり言うと：テストが失敗するが匿名実行では成功する理由は？2つ選ぶ問題。\n✅ 正解 A：System.runAsを使用していない\n✅ 正解 C：既存データに依存している\nテストはデフォルトでseeAllData=false。匿名実行は実データにアクセス可能。\n❌ B（@futureメソッド呼び出し）→ 直接的な原因ではない。\n❌ D（構文エラー）→ 匿名実行でも失敗するはず。\n🎯 試験のコツ：テスト失敗+匿名成功 = データ依存 or 権限の差。", "a": "テストメソッドは、特定のユーザーとして実行するために System.runAs を使用しません。", "b": "テストメソッドは、@future メソッドを呼び出しています。", "c": "テストメソッドは、Sandbox内の既存のデータに依存します。", "d": "テストメソッドのコードに、構文エラーがあります。"}, {"n": "8155", "p": "Salesforce の多態的参照フィールドの例は何ですか？", "r": "デベロッパーの基本", "ans": "D", "exp": "ざっくり言うと：Salesforceの多態的参照フィールドの例は？\n✅ 正解 D：標準の行動オブジェクトのWhatId項目\nWhatIdは取引先、商談、ケースなど複数の異なるオブジェクトを参照できる多態的フィールド。\n❌ A（ParentId）→ 単一オブジェクト（Account）への自己参照。\n❌ B（LeadId/ContactId）→ 別々のフィールドで別オブジェクトを参照。1つのフィールドで複数ではない。\n❌ C（カスタムフィールドLink__c）→ カスタム参照フィールドは多態的にはならない。\n🎯 試験のコツ：多態的参照 = 1つのフィールドで複数オブジェクトを参照。WhatId, WhoIdが代表例。", "a": "標準の取引先オブジェクトの ParentId 項目", "b": "標準のキャンペーンメンバーオブジェクトの LeadId および ContactId 項目", "c": "取引先またはキャンペーンを参照する標準の取引先責任者オブジェクトのカスタムフィールド Link__c", "d": "標準の行動オブジェクトの Whatld 項目"}, {"n": "8156", "p": "ある会社が Salesforce にデータを追加していますが、重複するリードレコードの作成を制限する作業がうまくいっていません。\n開発者は、重複するレコードをmergeする Apex プロセスの作成を検討しています。\nmergeを使用する場合、どの 2 つのステートメントが有効な考慮事項ですか？（2つ選択）", "r": "プロセスの自動化とロジック", "ans": "B;D", "exp": "ざっくり言うと：Apexのmergeで考慮すべきことは？2つ選ぶ問題。\n✅ 正解 B：取引先、連絡先、ケース、リードのみがサポート\n✅ 正解 D：1つの主レコードと最大2つのその他のレコードを渡せる\n❌ A（主レコードの値が上書きされる）→ 逆。主レコードの値が保持される。\n❌ C（外部IDがmergeサポート）→ 外部IDはmerge操作とは直接関係ない。\n🎯 試験のコツ：merge = 取引先/連絡先/ケース/リード限定、主1件+副最大2件。", "a": "主レコードの項目値は、mergeされるレコードによって上書きされます。", "b": "mergeは、取引先、取引先責任者、ケース、リードのみがサポートされます。", "c": "外部 ID 項目はmergeがサポートされています。", "d": "merge メソッドには、1つの主レコードと最大2つのその他の sObject レコードを渡すことができます。"}, {"n": "8157", "p": "Aura アプリケーション イベントは、従来のパブリッシュ/サブスクライブ モデルに従う必要があります。イベントを起動するにはどの方法が使用されますか？", "r": "ユーザインターフェース", "ans": "C", "exp": "ざっくり言うと：Auraアプリケーションイベントを起動するメソッドは？\n✅ 正解 C：fire()\n❌ A（emit()）→ LWCの概念。Auraではfire()。\n❌ B（fireEvent()）→ 存在しない。\n❌ D（registerEvent()）→ イベント登録用。発火ではない。\n🎯 試験のコツ：Auraイベント発火 = fire()。", "a": "ernit()", "b": "fireEvent()", "c": "fire()", "d": "registerEvent()"}, {"n": "8158", "p": "Job_Application__c カスタム オブジェクトには、取引先責任者オブジェクトとの主従関係であるフィールドがあり、取引先責任者オブジェクトが主です。\n機能実装の一環として、開発者は、関連する取引先の業界が「Technology」であるすべての取引先責任者レコードを含むリストを取得すると同時に、連絡先の Job_Application__c レコードも取得する必要があります。オブジェクトのリレーションに基づいて、取引先責任者のリストを取得する最も効率的なステートメントはどれですか？", "r": "デベロッパーの基本", "ans": "A", "exp": "ざっくり言うと：Job_Application__cとContactの主従関係で、業界がTechnologyの連絡先とJob_Applicationを取得するSOQLは？\n✅ 正解 A：[SELECT Id, (SELECT Id FROM Job_Applications__r) FROM Contact WHERE Account.Industry = 'Technology']\n子リレーション名は__r、親参照はAccount.Industry（単数形）が正しい。\n❌ B（Accounts.Industry）→ 複数形のAccountsは不正。\n❌ C（Job_Applications__rだがAccounts）→ Accounts（複数形）が不正。\n❌ D（Job_Applications__cでAccount）→ サブクエリではオブジェクト名(__c)ではなくリレーション名(__r)を使う。\n🎯 試験のコツ：サブクエリ = __r（リレーション名）。親参照 = 単数形（Account.Industry）。", "a": "[SELECT Id, (SELECT Id FROM Job_Applications_r) FROM Contact WHERE Account.Industry = ‘Technology’];", "b": "[SELECT Id, (SELECT Id FROM Job_Applications_r) FROM Contact WHERE Accounts.Industry = ‘Technology’];", "c": "[SELECT Id, (SELECT Id FROM Job_Applications_c) FROM Contact WHERE Accounts.Industry = ‘Technology’];", "d": "[SELECT Id, (SELECT Id FROM Job_Application_c) FROM Contact WHERE Account.Industry = ‘Technology’];"}, {"n": "8159", "p": "開発者が取引先オブジェクトにApexトリガーを作成しました。Apexトリガーをテストしているときに、「トリガーの最大深度を超えました」というエラー メッセージが表示されます。\n考えられる原因は何でしょうか？", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：「最大トリガー深度を超えました」エラーの原因は？\n✅ 正解 B：Apexトリガーが複数回実行される（再帰）\nトリガー内でレコードを更新→再度トリガー起動→無限ループ→最大深度超過。\n❌ A（権限不足）→ 権限とは無関係。\n❌ C（ヘルパークラス）→ ヘルパークラスは原因ではない。\n❌ D（カバレッジ不足）→ テスト時のカバレッジとは無関係。\n🎯 試験のコツ：最大トリガー深度超過 = 再帰的実行。static変数で再帰制御が必要。", "a": "開発者に適切なユーザー権限がありません。", "b": "Apexトリガーが複数回実行されます。", "c": "Apexトリガーはヘルパー クラスです。", "d": "Apexトリガーのコード カバレッジが十分ではありません。"}, {"n": "8160", "p": "注文の各明細項目の入手可能日を保存し、すべての明細項目が入手可能になった場合にのみ注文が出荷されます。注文の予想出荷日を計算するには、どの方法を使用すればよいですか？", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：注文の予想出荷日を計算するには？（全明細が入手可能になった日＝最新の入手可能日）\n✅ 正解 D：入手可能日項目でMAXの積み上げ集計項目を作成\n注文と明細は主従関係。MAXで最も遅い入手可能日を取得→それが出荷日。\n❌ A（CEILING数式）→ 数値の切り上げ用。日付の集計ではない。\n❌ B（DAYS数式+COUNT積み上げ）→ 日数計算であり最新日付の取得ではない。\n❌ C（LATEST数式）→ ApexにLATEST数式は存在しない。\n🎯 試験のコツ：主従関係で子の最大日付 = MAX積み上げ集計項目。", "a": "入手可能日項目ごとに CEILING 数式を使用します。", "b": "各入手可能日項目に DAYS 数式を使用し、注文に COUNT 積み上げ集計項目を使用します。", "c": "入手可能日項目ごとに LATEST 数式を使用します。", "d": "入手可能日項目で、最大の積み上げ集計項目を作成します。"}, {"n": "8161", "p": "ケースの発生元に基づいて、新しいケースを適切なサポート担当者に自動的に割り当てたいと考えています。サポート担当者の名前をケースに保存するために、ケース オブジェクトにカスタム項目を作成しました。ケースを適切なサポート担当者に割り当てるための最適なソリューションは何でしょうか？", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：ケースの発生元に基づいて適切な担当者に自動割り当てするには？\n✅ 正解 D：割り当て要素のフローを作成\nフローの割り当て要素で条件分岐し、発生元に応じたサポート担当者をカスタム項目に設定。\n❌ A（Apexトリガー）→ 可能だがフローの方が効率的。\n❌ B（数式項目）→ 数式は計算表示のみ。レコードの割り当て処理はできない。\n❌ C（検証ルール）→ 入力チェック用。割り当て処理ではない。\n🎯 試験のコツ：条件に基づく自動割り当て = フロー or 割り当てルール。", "a": "ケースオブジェクトでApexトリガーを作成します。", "b": "ケースオブジェクトで数式項目を作成します。", "c": "ケースオブジェクトで入力規則を作成します。", "d": "割り当て要素のフローを作成します。", "e": ""}, {"n": "8162", "p": "開発者は、Salesforce プラットフォーム上で新しいアプリケーションを設計しており、複数のテナントを効果的にサポートできることを確認したいと考えています。\n開発者は、スケーラビリティと保守性を確保するために、どの設計 フレームワークを検討する必要がありますか？", "r": "デベロッパーの基本", "ans": "D", "exp": "ざっくり言うと：マルチテナントで複数テナントをサポートする設計フレームワークは？\n✅ 正解 D：Model-View-Controller (MVC)\nMVCでデータ・UI・ロジックを分離し、保守性とスケーラビリティを確保。SalesforceはMVCベース。\n❌ A（Flux）→ React用のデータフローパターン。Salesforce固有ではない。\n❌ B（ウォーターフォール）→ 開発プロセスモデル。設計フレームワークではない。\n❌ C（アジャイル）→ 開発手法。設計フレームワークではない。\n🎯 試験のコツ：Salesforceの設計パターン = MVC。Model=sObject、View=VF/LWC、Controller=Apex。", "a": "Flux(view, action, dispatcher, and store)", "b": "ウォーターフォールモデル", "c": "アジャイル開発", "d": "Model-View-Controller(MVC)"}, {"n": "8163", "p": "システムで作成されたすべての新しいリードに有効な電子メール アドレスがあることを確認したいと考えています。\nこの要件を実現する入力規則はすでに作成されていますが、自動化を使用して検証のレイヤーを追加したいと考えています。\n検証のレイヤーを追加するのに最適なソリューションは何でしょうか？", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：リードのメールアドレス検証に自動化レイヤーを追加するには？\n✅ 正解 C：before insertトリガーでメールを検証し、無効ならエラー表示\nトリガーのaddError()でレコードの保存をブロックし、エラーメッセージを表示できる。\n❌ A（REST APIコールアウト）→ 非同期になり即時ブロックには不向き。\n❌ B（承認プロセス）→ 承認フロー用。入力検証ではない。\n❌ D（LWCでコールアウト）→ UIコンポーネントであり、全入力経路をカバーできない。\n🎯 試験のコツ：入力検証の追加レイヤー = before triggerのaddError()。", "a": "JSONペイロードを含むREST API コールアウトを送信し、サードパティシステムで項目を検証する。", "b": "承認プロセスを使用して、送信メッセージ アクションで有効な電子メール アドレスの入力を強制します。", "c": "リードオブジェクトで保存前のApexトリガーを使用してメールアドレスを検証し、無効な場合はエラーメッセージを表示します。", "d": "カスタム Lightning Web コンポーネントを使用してコールアウトを作成し、サードパーティ システムの項目を検証します。"}, {"n": "8164", "p": "取引先オブジェクトにプライベート共有モデルを実装しました。営業担当者が指定した複数の条件に一致する取引先を見つけられるように、Apex を使用してカスタム取引先検索ツールが開発されました。リリース以来、ツールのユーザーから、自分が所有していない取引先が表示されることがあるという報告があります。カスタム取引先検索ツールを使用しているときに、現在ログインしているユーザーに共有権限を強制するには、開発者は何を使用すればよいでしょうか？", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：プライベート共有モデルでユーザーがアクセスできるレコードのみ表示するには？\n✅ 正解 D：with sharingキーワードを使用\nwith sharingで現在のユーザーの共有ルールを強制適用。\n❌ A（Schemaクラス）→ メタデータ参照用。共有ルール適用ではない。\n❌ B（without sharing）→ 共有ルールを無視。全データアクセス可能になってしまう。\n❌ C（UserInfoクラス）→ ユーザー情報取得用。共有ルール適用とは別。\n🎯 試験のコツ：共有ルール強制 = with sharing。", "a": "スキーマ記述呼び出しを使用して、ログインしたユーザーが 取引所オブジェクトにアクセスできるかどうかを判断します。", "b": "クラス宣言で without sharing キーワードを使用します。", "c": "UserInfo Apex クラスを使用して、すべての SOQL クエリを、ログインしているユーザーが所有する返されたレコードにフィルタリングします。", "d": "クラス宣言で with sharing キーワードを使用します。"}, {"n": "8165", "p": "Service Cloud を Case オブジェクトのカスタム項目 stage_c とともに使用しています。\n管理者は、stage_c 項目が「顧客待機中」に設定されてから 6 時間後にフォローアップメールリマインダーを送信したいと考えています。\n管理者は、使用されているソリューションが一括処理に対応していることを確認したいと考えています。\nこれらのビジネス要件を満たすために、開発者が推奨すべき自動化ツールはどれですか？（2つ選択）", "r": "プロセスの自動化とロジック", "ans": "A;C", "exp": "ざっくり言うと：ケースのステージ変更6時間後にフォローアップメールを送るツールは？2つ選ぶ問題。\n✅ 正解 A：スケジュールフロー\n✅ 正解 C：レコードトリガーフロー\nレコードトリガーフローの「スケジュールパス」で6時間後のアクションを設定可能。\n❌ B（Einstein Next Best Action）→ 推奨アクション提示用。自動メール送信ではない。\n❌ D（プロセスビルダー）→ フローへの移行が推奨。新規開発では非推奨。\n🎯 試験のコツ：時間ベースの自動アクション = レコードトリガーフロー（スケジュールパス）。", "a": "スケジュールフロー", "b": "Einstein Next Best Action", "c": "レコードトリガーフロー", "d": "プロセスビルダー"}, {"n": "8166", "p": "顧客とサービスエージェントの注文を識別するために注文番号を使用する注文システムがあります。\n注文レコードは Salesforce にインポートされます。Salesforceで注文番号項目をどのように定義すればよいですか？", "r": "デベロッパーの基本", "ans": "B", "exp": "ざっくり言うと：外部システムの注文番号をSalesforceでどう定義する？\n✅ 正解 B：外部IDとユニーク\n❌ A（直接参照）→ リレーション用。識別子保存ではない。\n❌ C（参照）→ リレーション用。\n❌ D（間接参照）→ 外部オブジェクト用。\n🎯 試験のコツ：外部システムのID保存 = 外部ID + ユニーク。", "a": "直接参照", "b": "外部IDとユニーク", "c": "参照", "d": "間接参照"}, {"n": "8167", "p": "開発者は、レコードの重複を引き起こしているカスタム Apex トリガーの問題を警告されました。\nこの問題のトラブルシューティングに最も適切なデバッグ方法は何ですか？", "r": "テスト、デバッグ、リリース", "ans": "D", "exp": "ざっくり言うと：重複を引き起こすトリガーのデバッグ方法は？\n✅ 正解 D：system.debugステートメントをコードに追加して実行フローを追跡\n❌ A（イベントログ確認）→ セキュリティ監査用。コードレベルのデバッグには不向き。\n❌ B（Apexデバッガー）→ 特定ライセンス必要。まずはdebugログが優先。\n❌ C（トリガー無効化してテスト）→ ビジネスプロセス停止のリスクあり。\n🎯 試験のコツ：Apexデバッグの基本 = System.debug + デバッグログ確認。", "a": "トリガーを無効にして、問題が引き続き発生するかどうかをテストします。", "b": "Apex 対話型デバッガを使用してコードをステップ実行し、問題を特定します。", "c": "過去のイベントログを確認して、問題の原因を特定します。", "d": "実行フローを追跡して問題を特定するために、コードに system.debug ステートメントを追加します。"}, {"n": "8168", "p": "開発者は、最終更新日の値が 90 日を超えているという条件に基づいて、List 内の各取引先を「Inactive」 としてマークしたいと考えています。\n開発者は、どの ステートメントを使用すればよいでしょうか？", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：リスト内の各取引先をLastModifiedに基づいてInactiveマークするApexは？\n✅ 正解 D：forループの内部にif/else文\nforでリストを反復処理し、if/elseで90日超過を判定してマークする。\n❌ A（forループ内switch）→ switchは等価比較向き。日付範囲判定にはif/else。\n❌ B（switch内forループ）→ 構造が逆。\n❌ C（if/else内forループ）→ 構造が逆。\n🎯 試験のコツ：「リスト各要素に条件判定」= forループ(外) + if/else(内)。", "a": "forループの内部にswitch文を含める", "b": "switch文の内部にforループを含める", "c": "if/else文の内部にforループを含める", "d": "forループの内部にif/else文を含める"}, {"n": "8169", "p": "他のレコードのinsertに失敗した場合に、レコードリスト内の一部のレコードをinsertできるようにするには、どのステートメントを使用する必要がありますか？", "r": "プロセスの自動化とロジック", "ans": "A", "exp": "ざっくり言うと：一部のレコードが失敗しても残りを挿入できるステートメントは？\n✅ 正解 A：Database.insert(records, false)\nfalse = allOrNone=false。部分成功を許可。\n❌ B（insert records）→ デフォルトでallOrNone=true。1件でもエラーで全件ロールバック。\n❌ C（insert(records, false)）→ 構文エラー。\n❌ D（Database.insert(records, true)）→ true=全件成功必須。部分成功不可。\n🎯 試験のコツ：部分成功 = Database.insert(records, false)。", "a": "Database.insert (records, false)", "b": "insert records", "c": "insert (records, false)", "d": "Database.insert (records, true)"}, {"n": "8170", "p": "開発者は、取引先レコードページに配置する「statusComponent」という Lightning Web コンポーネントを作成しました。\nこのコンポーネントを使用できるようにするには、開発者はどの 2 つのことを行う必要がありますか？（2つ選択）", "r": "ユーザインターフェース", "ans": "A;D", "exp": "ざっくり言うと：LWCをレコードページで使えるようにするには？2つ選ぶ問題。\n✅ 正解 B：js-meta.xmlにlightning__RecordPageを追加\n✅ 正解 D：js-meta.xmlにisExposed=trueを追加\n❌ A（.jsファイルにtarget追加）→ 設定はmeta.xmlで行う。\n❌ C（masterLabelにAccount追加）→ 表示名設定であり必須条件ではない。\n🎯 試験のコツ：LWC公開 = isExposed=true + target指定。すべてmeta.xmlに書く。", "a": "statusComponent.js-meta.xml ファイルに isExposed を true に設定します。", "b": "statusComponent.js ファイルに lightning__RecordPage を追加します。", "c": "statusComponent.js-meta.xml ファイルに Account を追加します。", "d": "statusComponent.js-meta.xml ファイルに Lightning__RecordPage を追加します。"}, {"n": "8171", "p": "ある会社が、商談が作成されるたびにフォローアップ Todoを作成し、商談所有者に割り当てるという新しいプロセスを実装することにしました。\n開発者がこれを実装する最も効率的な方法は何でしょうか？", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：商談作成時にフォローアップTodoを自動作成するには？\n✅ 正解 D：商談のレコードトリガーフロー\n商談の作成イベントでフローを起動し、Todoを自動作成＋商談所有者に割り当て。\n❌ A（TaskのApexトリガー）→ Taskではなく商談のイベントで起動すべき。\n❌ B（Taskアクション）→ 手動操作。自動作成ではない。\n❌ C（自動起動フロー）→ 商談作成に反応するにはレコードトリガーフローが適切。\n🎯 試験のコツ：レコード作成時の自動処理 = レコードトリガーフロー。", "a": "Todoの自動起動フロー", "b": "TodoのApexトリガー", "c": "Todoアクション", "d": "商談のレコードトリガーフロー"}, {"n": "8172", "p": "開発者は、Lightning コンポーネント内の 2 つのオブジェクトを結合する複雑な SOQL クエリを実行する必要があります。Lightning コンポーネントはどのようにしてクエリを実行できるでしょうか？", "r": "デベロッパーの基本", "ans": "C", "exp": "ざっくり言うと：Lightningコンポーネントから複雑なSOQLクエリを実行するには？\n✅ 正解 C：@AuraEnabledメソッドをApexクラスから呼び出す\n❌ A（フローを作成して呼び出す）→ 複雑なSOQL結合にはApexが適切。\n❌ B（LWCラッパーにクエリを記述）→ LWC内で直接SOQLは書けない。\n❌ D（ストリーミングAPI）→ リアルタイム通知用。SOQL実行ツールではない。\n🎯 試験のコツ：LWCからSOQL = Apexクラス(@AuraEnabled)経由。", "a": "ク​​エリを実行するフローを作成し、Lightningコンポーネントから呼び出す。", "b": "カスタム Lightning Web コンポーネント ラッパーにクエリを記述し、Lightning コンポーネントから呼び出します。", "c": "@AuraEnabled としてアノテーションが付けられたメソッドを Apex クラスから呼び出し、クエリを実行します。", "d": "Salesforce ストリーミング API を使用して SOQL クエリを実行します。"}, {"n": "8173", "p": "組織には、商談を作成する既存のフローがあります。開発者は、フローを更新して「取引先責任者」を作成し、作成された取引先責任者の ID を商談に保存する必要があります。\n開発者はフローでどの更新を行う必要がありますか？", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：フローに取引先責任者の作成と商談への関連付けを追加するには？\n✅ 正解 B：新しいレコード作成要素を追加\n❌ A（レコード取得）→ 既存レコード検索用。\n❌ C（レコード更新）→ 既存レコード更新用。\n❌ D（ロールバックレコード）→ 標準要素に存在しない。\n🎯 試験のコツ：新規レコード作成 = 「レコードを作成」要素。", "a": "新しいレコード取得要素を追加します。", "b": "新しいレコード作成要素を追加します。", "c": "新しいレコード更新要素を追加します。", "d": "新しいロールバックレコード要素を追加します。"}, {"n": "8174", "p": "開発者は、Visualforce ページを Lightning Web コンポーネントに移行しています。Visualforceページには、1 つのレコードに関する情報が表示されます。開発者は、レコード データにアクセスするために Lightning データ サービスを使用することにしました。\n開発者はどのようなセキュリティ上の考慮事項に注意する必要がありますか？", "r": "デベロッパーの基本", "ans": "A", "exp": "ざっくり言うと：LDSを使ったLWC移行でのセキュリティ考慮事項は？\n✅ 正解 A：Lightning Data Serviceは共有ルールと項目レベルセキュリティを自動処理\n❌ B（FLSを無視）→ 逆。自動適用される。\n❌ C（with sharingが必要）→ LDSなら不要。自動処理。\n❌ D（isAccessible()が必要）→ LDSなら不要。自動処理。\n🎯 試験のコツ：LDS = 共有ルール+FLS自動処理。追加のセキュリティコード不要。", "a": "Lightning データサービスは、共有ルールと項目レベルセキュリティを処理します。", "b": "Lightning データサービスは、項目レベルセキュリティを無視します。", "c": "共有ルールを適用するには、with sharing キーワードを使用する必要があります。", "d": "項目レベルのアクセスチェックには、isAccessible()メソッドを使用する必要があります。"}, {"n": "8175", "p": "開発者は金融システム用の Apex クラスを実装しています。クラス内では、変数「creditAmount」と「debtAmount」は、値が割り当てられると変更できないようにする必要があります。開発者が変数を宣言して、値が 1 回だけ割り当てられるようにするには、どの 2 つの方法がありますか？（2つ選択）", "r": "デベロッパーの基本", "ans": "B;D", "exp": "ざっくり言うと：一度代入したら変更不可にする変数宣言は？2つ選ぶ問題。\n✅ 正解 B：finalキーワード＋コンストラクタで割り当て\n✅ 正解 D：finalキーワード＋宣言時に割り当て\n❌ A（static＋コンストラクタ）→ staticだけでは変更可能。\n❌ C（static＋静的イニシャライザ）→ staticだけでは変更可能。\n🎯 試験のコツ：変更不可 = finalキーワード。", "a": "static キーワードを使用し、その値をクラスコンストラクターで割り当てます。", "b": "final キーワードを使用し、その値をクラスコンストラクターに割り当てます。", "c": "static キーワードを使用し、その値を静的初期化子に割り当てます。", "d": "変数を宣言するときに、final キーワードを使用してその値を割り当てます。"}, {"n": "8176", "p": "トリガーが同じオブジェクトとイベントに関連付けられている場合の「実行順序」を説明するステートメントはどれですか？", "r": "デベロッパーの基本", "ans": "B", "exp": "ざっくり言うと：同じオブジェクト・イベントのトリガー実行順序は？\n✅ 正解 B：実行順序は保証されない\n❌ A（作成順）→ 順序は不定。\n❌ C（変更順）→ 順序は不定。\n❌ D（アルファベット順）→ 順序は不定。\n🎯 試験のコツ：複数トリガーの順序 = 保証なし。1オブジェクト1トリガーにまとめるのがベスト。", "a": "トリガーは作成された順に実行されます。", "b": "トリガーの実行順序は保証されません。", "c": "トリガーは変更された順に実行される。", "d": "トリガーはトリガー名のアルファベット順に実行されます。"}, {"n": "8177", "p": "新機能開発の一環として、開発者は、ステートフル クライアントで実行されるタッチイベントに応答できるレスポンシブ アプリケーションを構築するよう求められます。\nビジネス要件を完全にサポートする、フレームワーク上に構築されている 2 つのテクノロジはどれですか？（2つ選択）", "r": "ユーザインターフェース", "ans": "A;C", "exp": "ざっくり言うと：ステートフルクライアントでタッチイベント対応のレスポンシブアプリを構築する技術は？2つ選ぶ問題。\n✅ 正解 A：Auraコンポーネント\n✅ 正解 C：Lightning Webコンポーネント\n❌ B（Visualforceコンポーネント）→ サーバーサイド中心。レスポンシブ対応が限定的。\n❌ D（Visualforceページ）→ 同上。\n🎯 試験のコツ：レスポンシブ＋タッチ対応 = Aura or LWC。VFは旧世代。", "a": "Aura コンポーネント", "b": "Visualforce コンポーネント", "c": "Lightning Webコンポーネント", "d": "Visualforce ページ"}, {"n": "8178", "p": "Salesforce 管理者は、Flow Builder を使用して「accountOnboarding」という名前のフローを作成しました。このフローは Aura コンポーネント内で使用する必要があります。\n開発者は、Aura コンポーネント内でフローを表示するためにどのタグを使用する必要がありますか？", "r": "ユーザインターフェース", "ans": "A", "exp": "ざっくり言うと：AuraコンポーネントでフローをUIに表示するタグは？\n✅ 正解 A：lightning-flow（正確にはlightning:flow）\n❌ B（aura:flow）→ 存在しない。\n❌ C（lightning:flow）→ Aura構文としてはこれが正確。\n❌ D（aura:flow）→ 存在しない。\n🎯 試験のコツ：Auraでフロー表示 = <lightning:flow>。", "a": "lightning-flow", "b": "aura:flow", "c": "lightning:flow", "d": "aura:flow"}, {"n": "8179", "p": "クレジットカード会社のサービス エージェントは、破損または盗難されたクレジットカードを処理する必要があります。サービス エージェントは、顧客から電話を受けると、多くの情報を収集する必要があります。開発者は、この要件を最も効率的に満たすために、どの機能を使用すればよいでしょうか？", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：クレジットカード処理で情報収集するのに最も効率的な機能は？\n✅ 正解 C：画面フロー\nガイド付きの画面で情報を収集。コード不要で効率的。\n❌ A（Apexトリガー）→ UI不要の自動処理用。情報収集画面は作れない。\n❌ B（承認プロセス）→ 承認フロー用。情報収集ではない。\n❌ D（Lightningコンポーネント）→ 可能だが画面フローの方が効率的。\n🎯 試験のコツ：ガイド付き情報収集 = 画面フロー。", "a": "Apexトリガー", "b": "承認プロセス", "c": "画面フロー", "d": "Lightningコンポーネント"}, {"n": "8180", "p": "Lightning Experienceにおいて、取引先の標準編集ボタンを上書きするには、何を使用する必要がありますか？", "r": "ユーザインターフェース", "ans": "B", "exp": "ざっくり言うと：Lightning Experienceで取引先の編集ボタンを上書きするには？\n✅ 正解 B：Lightningコンポーネント\n❌ A（Lightningアクション）→ 新規アクション追加用。既存ボタン上書きとは別。\n❌ C（Lightningページ）→ レイアウトカスタマイズ用。ボタン上書きではない。\n❌ D（Lightningフロー）→ 単体でボタン上書きはできない。\n🎯 試験のコツ：Lightning Experienceの標準ボタン上書き = Lightningコンポーネント。", "a": "Lightning アクション", "b": "Lightning コンポーネント", "c": "Lightning ページ", "d": "Lightning フロー"}, {"n": "8181", "p": "開発チームは開発サイクル中に変更をSandboxにデプロイするスクリプトを使用したいと考えています。\nSandboxにデプロイするスクリプトを実行するために、どのツールを使用できますか？（2つ選択）", "r": "テスト、デバッグ、リリース", "ans": "A;C", "exp": "ざっくり言うと：サンドボックスにデプロイするスクリプトに使えるツールは？2つ選ぶ。\n✅ A：VSCode（統合ターミナルからSFDXコマンド実行可能）\n✅ C：SFDX CLI（コマンドラインからデプロイ自動化）\n❌ B（変更セット）→ 手動UI操作が必要。スクリプト化不可。\n❌ D（開発者コンソール）→ デプロイ機能なし。\n🎯 試験のコツ：自動デプロイ = SFDX CLI or Ant移行ツール。変更セットは手動のみ。", "a": "VSCode", "b": "変更セット", "c": "SFDX CLI", "d": "開発者コンソール"}, {"n": "8182", "p": "開発者は組織でカスタムページが読み込まれるときの「パフォーマンスの問題」の原因を特定するために、原因調査を行う必要があります。\n開発者は原因調査にどのツールを使用すればよいですか？", "r": "テスト、デバッグ、リリース", "ans": "D", "exp": "ざっくり言うと：カスタムページのパフォーマンス問題の原因調査に使うツールは？\n✅ D：開発者コンソール（ログインスペクタ・タイムライン・パフォーマンスツリーで分析）\n❌ A（AppExchange）→ アプリストア。調査ツールではない。\n❌ B（Salesforce CLI）→ デプロイ/操作用。パフォーマンス分析機能なし。\n❌ C（VS Code IDE）→ コード編集用。パフォーマンス分析は限定的。\n🎯 試験のコツ：パフォーマンス調査 = 開発者コンソール。", "a": "AppExchange", "b": "Salesforce CLI", "c": "Visual Studio コア IDE", "d": "開発者コンソール"}, {"n": "8183", "p": "カスタムオブジェクトのレコードを表示する Visualforce ページがあります。10,000を超えるレコードを表示しようとしたときに「ビューステートの制限」により表示に失敗しました。\nビューステートエラーを解決するために、開発者は Visualforce ページをどのように変更すればよいでしょうか？", "r": "ユーザインターフェース", "ans": "B", "exp": "ざっくり言うと：1万件超でVFのビューステートエラー。解決策は？\n✅ B：StandardSetControllerでページネーション実装\n❌ A（SOQL OFFSET + JS Remoting）→ OFFSETは2000件制限。\n❌ C（OffsetController）→ 存在しない。\n❌ D（遅延読み込み+transient変数）→ 根本解決にならない。\n🎯 試験のコツ：大量レコード+ビューステートエラー → StandardSetController。", "a": "SOQL OFFSETで JavaScript remotlngを使用する。", "b": "StandardSetController を使用してページネーションを実装する。", "c": "OffaetController を使用してページネーションを実装する。", "d": "遅延読み込みと一時的なList変数を使用する。"}, {"n": "8184", "p": "Apex のカスタム例外に関して正しい記述はどれですか？（3つ選択）", "r": "プロセスの自動化とロジック", "ans": "A;B;D", "exp": "ざっくり言うと：Apexのカスタム例外について正しいのは？3つ選ぶ。\n✅ A：組み込み例外クラスを拡張する必要がある\n✅ B：インターフェースを実装できる\n✅ D：クラス名はExceptionで終わる必要がある\n❌ C（メンバー変数やメソッドを含められない）→ 含めることが可能。\n❌ E（Exception以外のクラスを拡張可能）→ 必ずExceptionを拡張。\n🎯 試験のコツ：カスタム例外 = extends Exception + 名前はException終了。", "a": "カスタム例外クラスは組み込み例外クラスを拡張する必要があります。", "b": "カスタム例外クラスは 1 つまたは複数のインターフェースを実装できます。", "c": "カスタム例外クラスにはメンバー変数またはメソッドを含めることはできません。", "d": "カスタム例外クラス名は「Exception」で終わる必要があります。", "e": "カスタム例外クラスは、Exception クラス以外のクラスを拡張できます。"}, {"n": "8185", "p": "開発チームは、バージョン管理を使用してコードの変更を共有していますが、コードを他の環境にデプロイすると、エラーがよく発生します。\nそこで、継続的インテグレーション (CI) を設定することを考えています。\n開発チームは、CI プロセスの一環としてテストを自動的に実行するために、どのツールを使用すればよいでしょうか？", "r": "テスト、デバッグ、リリース", "ans": "B", "exp": "ざっくり言うと：CIプロセスでテストを自動実行するツールは？\n✅ B：Salesforce CLI（CI/CDパイプラインに組み込み可能）\n❌ A（Force.comツールキット）→ 古いツール群。現在は非推奨。\n❌ C（VSCode）→ 手動開発用IDE。\n❌ D（開発者コンソール）→ ブラウザベースUI。自動化に不向き。\n🎯 試験のコツ：CI/CD自動化 = Salesforce CLI。", "a": "Force.com ツールキット", "b": "Salesforce CLI", "c": "VSCode", "d": "開発者コンソール"}, {"n": "8186", "p": "データと構成を含む本番組織の「完全な複製コピー」を持つ Salesforce 組織はどれですか？", "r": "テスト、デバッグ、リリース", "ans": "D", "exp": "ざっくり言うと：本番組織の完全な複製コピーを持つSalesforce組織は？\n✅ D：Full Sandbox（メタデータ＋全データのコピー）\n❌ A（Developer Pro Sandbox）→ メタデータのみ。データなし。\n❌ B（Partial Copy）→ メタデータ＋選択的データ（5GBまで）。\n❌ C（Production）→ 本番そのもの。コピーではない。\n🎯 試験のコツ：完全コピー = Full Sandbox。", "a": "Developer Pro Sandbox", "b": "Partial Copy Sandbox", "c": "Production", "d": "Full Sandbox"}, {"n": "8187", "p": "プロセスまたは自動起動フローを有効としてリリースするために、フローテストカバー率を満たしているか確認したいと考えていますが、どのように確認すればよいですか？", "r": "テスト、デバッグ、リリース", "ans": "D", "exp": "ざっくり言うと：自動起動フローのテストカバー率を確認するには？\n✅ D：SOQLとTooling APIを使用\nFlowTestCoverageオブジェクトをTooling API経由でクエリして確認。\n❌ A（ApexTestResultクラス）→ Apexテスト結果用。フロー専用ではない。\n❌ B（フロープロパティページ）→ カバレッジ統計は表示されない。\n❌ C（コードカバレッジ設定ページ）→ そんなページは存在しない。\n🎯 試験のコツ：フローテストカバレッジ = Tooling API + SOQLクエリ。", "a": "フローのプロパティ ページを確認する", "b": "コードカバレッジ設定ページを確認する", "c": "Apexのtestresultクラスを使用する", "d": "SOQLとTooling APIを使用する"}, {"n": "8188", "p": "開発者は、従来のオンプレミス SQL データベースとの統合に取り組んでいます。\n統合されるデータが Salesforce 内の適切なレコードと一致するようにするために、開発者は何を使用すればよいでしょうか？", "r": "デベロッパーの基本", "ans": "B", "exp": "ざっくり言うと：外部システムとの統合でデータの一致を保証するには？\n✅ B：外部ID項目（Upsertのマッチングキーとして使用）\n❌ A（参照項目）→ Salesforce内部のリレーション用。\n❌ C（数式項目）→ 計算表示用。マッチングには使えない。\n❌ D（外部オブジェクト）→ リアルタイムアクセス用。データマッチングではない。\n🎯 試験のコツ：外部データとのマッチング = 外部ID項目。", "a": "参照項目", "b": "外部ID項目", "c": "数式項目", "d": "外部オブジェクト"}, {"n": "8189", "p": "ApexやLightning Web Componentなどコードではなく、宣言型カスタマイズを使用する利点は何ですか？（2つ選択）", "r": "デベロッパーの基本", "ans": "A;B", "exp": "ざっくり言うと：コードではなく宣言型カスタマイズを使う利点は？2つ選ぶ。\n✅ A：Salesforceリリースごとに自動更新される\n✅ B：一般的にメンテナンスが少なくて済む\n❌ C（テストクラスが自動生成）→ そんな機能はない。\n❌ D（実行時エラーは発生しない）→ フロー等で実行時エラーは発生しうる。\n🎯 試験のコツ：宣言型の利点 = 自動更新 + 低メンテナンス。", "a": "宣言的なカスタマイズは、Salesforce のリリースごとに自動的に更新されます。", "b": "宣言的なカスタマイズでは、一般的にメンテナンスの必要性が少なくなります。", "c": "宣言的なカスタマイズにより、テストクラスが自動的に生成されます。", "d": "宣言的なカスタマイズでは実行時エラーは生成されません。"}, {"n": "8190", "p": "フローを「デバッグモード」で実行する場合の考慮事項は何ですか？（2つ選択）", "r": "テスト、デバッグ、リリース", "ans": "B;D", "exp": "ざっくり言うと：フローのデバッグモードの考慮事項は？2つ選ぶ。\n✅ B：一時停止要素を実行するとデバッグが終了する\n✅ D：デバッグ終了時にDML操作はロールバックされる\n❌ A（外部コールアウトが実行されない）→ デバッグ中でもコールアウトは実行される。\n❌ C（レコード型入力変数を渡せない）→ 渡すことは可能。\n🎯 試験のコツ：フローデバッグ = 一時停止で終了 + DMLロールバック。", "a": "フローをデバッグするときには、外部システムへの呼び出しは実行されません。", "b": "「一時停止」をクリックあるいは一時停止要素を実行すると、フローが閉じられ、デバッグが終了します。", "c": "レコード型の入力変数はフローに渡すことができません。", "d": "デバッグが終了すると、DML 操作はロールバックされます。"}, {"n": "8191", "p": "Salesforce にデータをインポートおよびエクスポートする場合、正しい 2 つのステートメントはどれですか。 2つの回答を選択してください", "r": "デベロッパーの基本", "ans": "C;D", "exp": "ざっくり言うと：Salesforceにデータをインポート/エクスポートする際の正しい記述は？2つ選ぶ。\n✅ C：Bulk APIを使ってもストレージ制限は回避できない\n✅ D：Developer SandboxとDeveloper Pro Sandboxのストレージ制限は異なる（200MB vs 1GB）\n❌ A（Bulk APIでストレージ制限を回避できる）→ 回避不可。\n❌ B（データインポートウィザードはPCインストールアプリ）→ ブラウザ上で動作する。\n🎯 試験のコツ：Bulk APIでもストレージ制限は回避不可。Dev=200MB, Dev Pro=1GB。", "a": "開発環境で大量のデータをインポートするときに、Bulk API を使用してストレージ制限を回避できます。", "b": "データインポートウィザードは、コンピュータにインストールされているアプリケーションです。", "c": "バルク APL を使用すると、ストレージ制限を回避せずに開発環境で大量のデータをインポートできます。", "d": "Developer サンドボックスと Developer Pro サンドボックスには、異なるストレージ制限があります。"}, {"n": "8192", "p": "DML ステートメントの数など、特定のガバナーに使用されたリソースの量を返すメソッドが含まれている Apex クラスはどれですか。", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：DMLステートメント数などガバナ制限の使用量を返すApexクラスは？\n✅ B：Limits（getDMLStatements(), getQueries()等のメソッドを提供）\n❌ A（OrgLimits）→ 組織全体の制限情報用。トランザクション内の使用量ではない。\n❌ C（Messaging）→ メール送信用クラス。\n❌ D（Exception）→ エラー処理用クラス。\n🎯 試験のコツ：ガバナ制限の使用量確認 = Limitsクラス。", "a": "組織制限", "b": "制限", "c": "メッセージング", "d": "例外"}, {"n": "8195", "p": "継続的インテグレーションの一環として、開発者はデプロイメントとユニット テストの実行をスクリプト化するために何を使用すればよいでしょうか?", "r": "テスト、デバッグ、リリース", "ans": "C", "exp": "ざっくり言うと：CIでデプロイとテストをスクリプト化するには？\n✅ C：Salesforce CLI\n❌ A（VS Code）→ 手動開発用。\n❌ B（匿名実行）→ 一時的なコード実行用。\n❌ D（開発者コンソール）→ ブラウザUI。自動化に不向き。\n🎯 試験のコツ：CI/CD = Salesforce CLI。", "a": "VSコード", "b": "匿名で実行", "c": "Salesforce CLI", "d": "開発者コンソール"}, {"n": "8196", "p": "開発者は、Salesforce Classic ユーザーインターフェースでカスタム Lightning Web コンポーネントを利用できるようにする必要があります。これを実現するにはどのアプローチを使用できますか?", "r": "ユーザインターフェース", "ans": "B", "exp": "ざっくり言うと：Salesforce ClassicでカスタムLWCを使えるようにするには？\n✅ B：Lightning Out JSライブラリを使ってVFページにLWCを埋め込む\nClassicはLWCを直接表示できないため、Lightning Out経由でVFに埋め込む必要がある。\n❌ A（VFコンポーネントとして埋め込み）→ LWCを直接VFコンポーネントにはできない。\n❌ C（Apexメソッド経由で呼び出し）→ ApexからLWCは起動できない。\n❌ D（Auraでラップ→VFタブ）→ ClassicではAuraも直接表示できない。Lightning Out必須。\n🎯 試験のコツ：Classic + LWC = Lightning Out経由でVFページに埋め込み。", "a": "Lightning Web コンポーネントを Visualforce コンポーネントとして埋め込み、ページ レイアウトに直接追加します。", "b": "Lightning Out JavaScript ライブラリを使用して、Lightning Web コンポーネントを Visualforce ページに埋め込み、ページレイアウトに追加します。", "c": "カスタム コントローラを備えた Visualforce ページを使用して、Apex メソッドの呼び出しによって Lightning Web コンポーネントを呼び出します。", "d": "Lightning Web コンポーネントを Aura コンポーネントでラップし、Aura コンポーネントを Visualforce タブとして表示します。"}, {"n": "8197", "p": "（質問全文） Universal Containers は、商談が Closed/Won ステージに到達したときには編集できないようにしたいと考えています。 これを実現するために開発者が使用できる 2 つの戦略はどれですか? 2つの回答を選択してください。", "r": "プロセスの自動化とロジック", "ans": "B;C", "exp": "ざっくり言うと：Closed Wonの商談を編集不可にする戦略は？2つ選ぶ。\n✅ B：検証ルール（入力規則）\n✅ C：保存前のApexトリガー\n❌ A（承認プロセス）→ 承認フロー管理用。直接的な編集ロック手段ではない。\n❌ D（自動応答ルール）→ ケースやリードの自動応答用。商談の編集制御には不適。\n🎯 試験のコツ：編集ブロック = 入力規則 or Apexトリガー。", "a": "自動的に起動される承認プロセスを使用します。", "b": "検証ルールを使用します。", "c": "保存前の Apex トリガーを使用します。", "d": "自動応答ルールを使用します。"}, {"n": "8198", "p": "開発者は、販売記録のリストを表示する Lightning Web コンポーネントを作成しています。 営業担当者ユーザーは、各 レコードの手数料フィールドを表示できる必要があります。営業アシスタントユーザーは、手数料フィールドを除くレコードのすべてのフィールドを表示できる必要があります。 コンポーネントが両方のユーザーに対してエラーなしで機能するようにするには、これをどのように強制すればよいでしょうか?", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：LWCで販売記録を表示し、FLSに基づいて手数料フィールドの表示を制御するには？\n✅ B：Security.stripInaccessibleで現在ユーザーがアクセスできないフィールドを削除\nstripInaccessibleは例外を出さずにアクセス不可フィールドを安全に除外する。\n❌ A（WITH SECURITY_ENFORCED）→ 権限なしフィールドがあると例外発生。エラーなし要件に不適。\n❌ C（Lightning Locker Service）→ DOMアクセス制御用。FLS強制ではない。\n❌ D（Lightning Data Service）→ 単一レコード向け。リスト取得にはApex経由が一般的。\n🎯 試験のコツ：エラーなしでFLS強制 = Security.stripInaccessible。", "a": "コンポーネントのデータを取得するSOQLでWITH SECURITY_ENFORCEDを使用します。", "b": "<p>Security.stripInaccessibleを使用して、現在のユーザーがアクセスできないフィールドを削除します。</p>", "c": "Lightning Locker サービスを使用して、共有ルールと項目レベルのセキュリティを適用します。", "d": "Lightning データ サービスを使用して、販売レコードのコレクションを取得します。"}, {"n": "8199", "p": "Universal Containers には、サードパーティの JavaScript フレームワークを使用して構築され、Visualforce ページを使用して公開された多数のカスタム アプリケーションがあります。同社は、これらのアプリケーションを更新して、Lightning Experience の外観と操作性に似たスタイルを適用したいと考えています。 ビジネス要求を最も迅速かつ効果的に満たすために、開発者は何をすべきでしょうか?", "r": "ユーザインターフェース", "ans": "D", "exp": "ざっくり言うと：VFページをLightning風の外観にする最速方法は？\n✅ D：SLDS CSSスタイルシートをJSアプリに組み込む\nサードパーティJSフレームワークにSLDSを適用すれば最小改修でLightning風になる。\n❌ A（全VFをLightningコンポーネントに書き換え）→ 最も時間がかかる。\n❌ B（enableLightning属性）→ 存在しない設定。\n❌ C（Lightning Experience有効化）→ 表示場所の設定であり、外観変更ではない。\n🎯 試験のコツ：VFのLightning風外観 = SLDS CSS適用。", "a": "すべての Visualforce ページを Lightning コンポーネントとして書き換えます。", "b": "定義で属性 enableLightning を true に設定します。", "c": "カスタムアプリケーションで使用される Visualforce ページで、Lightning Experience、Lightning コミュニティ、モバイルアプリケーションで使用可能を有効にします。", "d": "Salesforce Lightning Design System CSS スタイルシートを JavaScript アプリケーションに組み込みます。"}, {"n": "8200", "p": "開発者は、Apex クラスのプライベート メソッドの単体テストをどのように記述すればよいでしょうか?", "r": "テスト、デバッグ、リリース", "ans": "D", "exp": "ざっくり言うと：privateメソッドの単体テストを書くには？\n✅ D：@TestVisibleアノテーション\n❌ A（SeeAllData）→ 実データアクセス用。\n❌ B（テストメソッドをクラスに追加）→ 非推奨。\n❌ C（クラスをglobalに）→ 設計が崩れる。\n🎯 試験のコツ：privateメソッドテスト = @TestVisible。", "a": "SeeAllData アノテーションを使用します。", "b": "Apex クラスにテスト メソッドを追加します。", "c": "Apex クラスをグローバルとしてマークします。", "d": "@TestVisible アノテーションを使用します。"}, {"n": "8201", "p": "Next Best Action 戦略では、Apex メソッドを呼び出す Enhance Element を使用して、さまざまな要因に基づいて連絡先の割引レベルを決定します。\nApex メソッドの正しい定義は何ですか?", "r": "プロセスの自動化とロジック", "ans": "A", "exp": "ざっくり言うと：Next Best ActionのEnhance ElementでApexを呼ぶメソッド定義は？\n✅ A：@InvocableMethod global static List<Recommendation> getLevel(List<ContactWrapper> input)\nInvocableMethod = static + List入力 + List出力が必須。\n❌ B（staticなし）→ InvocableMethodはstatic必須。\n❌ C（staticなし）→ 同上。\n❌ D（型未指定のList）→ 具体的な型指定が必要。\n🎯 試験のコツ：@InvocableMethod = static + List<具体型>入出力。", "a": "<p>@InvocableMethod</p><p>global static List&lt;Recommendation&gt; getLevel(List&lt;ContactWrapper&gt; input) {</p><p>  /* implementation */</p><p>}</p>", "b": "<p>@InvocableMethod</p><p>global Recommendation getLevel(ContactWrapper input) {</p><p>  /* implementation */</p><p>}</p>", "c": "<p>@InvocableMethod</p><p>global List&lt;Recommendation&gt; getLevel(List&lt;ContactWrapper&gt; input) {</p><p>  /* implementation */</p><p>}</p>", "d": "<p>@InvocableMethod</p><p>global static List getLevel(List input) {</p><p>  /* implementation */</p><p>}</p>"}, {"n": "8202", "p": "開発者はヘルパークラスを使用して新しい Apex トリガーを作成し、新しい Apex ヘルパークラスの 95% のカバレッジのみを実行するテストクラスを作成します。 変更セットの運用環境へのデプロイがテスト カバレッジの警告で失敗します。 「選択された Apex トリガーのテスト カバレッジは 0% です。少なくとも 1% のテスト カバレッジが必要です。」新しい Apex トリガーとヘルパー クラスを正常にデプロイするには、開発者は何をする必要がありますか?", "r": "テスト、デバッグ、リリース", "ans": "C", "exp": "ざっくり言うと：トリガーのカバレッジ0%でデプロイ失敗。どう解決？\n✅ C：Apexトリガーをカバーするテストクラスとメソッドを作成\nヘルパーが95%でもトリガー自体が0%ならデプロイ不可。トリガーを起動するDMLを含むテストが必要。\n❌ A（Run Allでテスト実行）→ カバーするテストがなければ0%のまま。\n❌ B（失敗テスト削除）→ カバレッジ問題は解決しない。\n❌ D（ヘルパーのカバレッジ増加）→ ヘルパーは十分。問題はトリガー。\n🎯 試験のコツ：デプロイ要件 = 全体75% + 各トリガー最低1%。", "a": "「すべてのテストを実行」メソッドを使用してテストを実行します。", "b": "テストクラスから失敗したテストメソッドを削除します", "c": "Apex トリガーをカバーするテストクラスとメソッドを作成します。", "d": "ヘルパー クラスのテスト クラス カバレッジを増やします。"}, {"n": "8203", "p": "Candidate _c カスタム オブジェクトには Primaryld_c カスタム フィールドが存在します。このフィールドは各候補者の ID 番号を保存するために使用され、スキーマ定義では Unique としてマークされています。 データ拡充プロセスの一環として、Universal Containers には、システム内のすべての候補者の更新されたデータを含む CSV ファイルがあります。ファイルには、各候補者の主な情報がデータ ポイントとして含まれています。Universal Containers は、すべてのデータ行がシステム内の候補者に正しくマッピングされていることを確認しながら、この情報を Salesforce にアップロードしたいと考えています。 データのアップロードを効率化するために、開発者はどの手法を実装する必要がありますか?", "r": "デベロッパーの基本", "ans": "C", "exp": "ざっくり言うと：外部システムのIDで既存レコードとマッチングするには？\n✅ C：PrimaryId__cフィールドを外部IDとしてマーク\n外部IDを設定すればUpsert時にそのフィールドをキーとしてレコードを特定できる。\n❌ A（CSVを関連オブジェクトにアップロード）→ マッチング問題は解決しない。\n❌ B（挿入前トリガー）→ 可能だが外部ID設定の方がシンプル。\n❌ D（保存前フロー）→ 同上。\n🎯 試験のコツ：外部データのマッチング = 外部ID + Upsert。", "a": "CSV を candidate__c に関連するカスタム オブジェクトにアップロードします。", "b": "レコードを正しくマッピングするために挿入前トリガーを作成します。", "c": "Primarytd_c フィールド定義を更新して、外部 ID としてマークします。", "d": "レコードを正しくマッピングするために、保存前のフローを作成します。"}, {"n": "8206", "p": "Universal Containers では、ユーザーが自分のアカウントに関する情報を入力できるようにするカスタム ユーザー インターフェイス コンポーネントを作成する必要があります。 コンポーネントは、情報をデータベースに保存する前にユーザー入力を検証できる必要があります。 このコンポーネントを作成するのに最適なテクノロジは何ですか?", "r": "ユーザインターフェース", "ans": "B", "exp": "ざっくり言うと：カスタムUIで取引先情報を入力・検証してからDB保存する最適な技術は？\n✅ B：Lightning Web コンポーネント\nLWCはモダンなUI構築に最適。クライアント側での入力検証→Apex経由のDB保存が可能。\n❌ A（フロー）→ ガイド付きプロセスに適するが、高度なUIカスタマイズには限界あり。\n❌ C（Visualforce）→ 旧世代。LWCが推奨。\n❌ D（VUE.js）→ Salesforceプラットフォームの標準技術ではない。\n🎯 試験のコツ：カスタムUI + 入力検証 = LWC。", "a": "フロー", "b": "Lightning Web コンポーネント", "c": "ビジュアルフォース", "d": "VUE JavaScript フレームワーク"}, {"n": "8207", "p": "開発者は、Expense _c オブジェクトで次のトリガーを識別します。  トリガーは、それぞれ削除前、挿入前、更新イベントの前に処理されます。 トリガーのベスト プラクティスに従うために、開発者が実装する必要がある 2 つの手法はどれですか。 2つの回答を選択してください", "r": "プロセスの自動化とロジック", "ans": "A;C", "exp": "ざっくり言うと：3つの個別トリガーをベストプラクティスに従って改善するには？2つ選ぶ。\n✅ A：3つのトリガーを1つに統合\n✅ C：ヘルパークラスを作成してロジックを分離\n❌ B（2つ統合+フロー）→ 1オブジェクト1トリガーが原則。\n❌ D（3つ維持+ロジック移動）→ 3つ維持はベストプラクティスに反する。\n🎯 試験のコツ：ベストプラクティス = 1オブジェクト1トリガー + ヘルパークラスでロジック分離。", "a": "Unity の 3 つのトリガーすべてが、すべてのイベントを含む Expense__c オブジェクトの単一のトリガーになります。", "b": "挿入前トリガーと更新前トリガーを統合し、削除アクションにフローを使用します。", "c": "レコードが保存されるときに適切なロジックを実行するためのヘルパー クラスを作成します。", "d": "Expense __c オブジェクトの 3 つのトリガーをすべて維持しますが、Apex ロジックをトリガー定義から移動します。"}, {"n": "8208", "p": "ユーザーがアカウントの郵便番号を編集する場合、「タイムゾーン」という名前のカスタムアカウントテキストフィールドを、PostalCodeToTimezone__c という別のカスタムオブジェクトの値に基づいて更新する必要があります。 この機能を実装する最適な方法は何ですか?", "r": "プロセスの自動化とロジック", "ans": "A", "exp": "ざっくり言うと：取引先の郵便番号変更時にカスタムオブジェクトを参照してタイムゾーンを更新するには？\n✅ A：Flow Builderでフローを構築\n❌ B（承認プロセス）→ 承認フロー用。項目自動更新には不適。\n❌ C（数式フィールド）→ 別オブジェクトのデータ取得には使えない。\n❌ D（割り当てルール）→ レコード所有者の自動設定用。\n🎯 試験のコツ：別オブジェクト参照＋項目更新 = フロー or トリガー。", "a": "Flow Builder を使用してフローを構築します。", "b": "アカウント承認プロセスを作成します。", "c": "数式フィールドを作成します。", "d": "アカウント割り当てルールを構築します。"}, {"n": "8209", "p": "開発者は、Apex クラスを使用するカスタム注文管理アプリを作成しました。注文は、Order オブジェクトと、Order と主従関係にある OrderlItem オブジェクトによって表されます。注文処理中に、注文が複数の注文に分割される場合があります。 コードで既存の OrderItem レコードの一部を新しい Order レコードに移動できるようにするには、開発者は何をする必要がありますか?", "r": "デベロッパーの基本", "ans": "D", "exp": "ざっくり言うと：主従関係の子レコード(OrderItem)を別の親(Order)に移動できるようにするには？\n✅ D：主従関係の再割り当てを許可するオプションを選択\n主従関係の設定で「子レコードの再割り当てを許可」を有効にする。\n❌ A（without sharing追加）→ 共有設定の話。レコード移動とは無関係。\n❌ B（外部参照関係に変更）→ 外部オブジェクト用。\n❌ C（ジャンクションオブジェクト）→ 多対多用。既存の主従関係の移動とは別。\n🎯 試験のコツ：主従関係の子レコード移動 = 再割り当てを許可（Allow reparenting）。", "a": "Apex クラス宣言に共有せずに追加します。", "b": "マスター詳細関係を外部参照関係に変更します。", "c": "OrderItem と Order の間にジャンクション オブジェクトを作成します。", "d": "<p>マスター詳細関係の再割り当てを許可するオプションを選択します。</p>"}, {"n": "8210", "p": "開発者は、親 Lightning Web コンポーネント内にネストされた子 Lightning Web コンポーネントを作成しました。親コンポーネントは、子コンポーネントに文字列値を渡す必要があります。 これを実現するにはどの 2 つの方法がありますか? 2つの回答を選択してください", "r": "デベロッパーの基本", "ans": "A;B", "exp": "ざっくり言うと：親LWCから子LWCにデータを渡す方法は？2つ選ぶ。\n✅ A：子のパブリックメソッドを呼び出す\n✅ B：パブリックプロパティ(@api)でデータを渡す\n❌ C（Apexコントローラ）→ サーバー側。親子間通信には不適。\n❌ D（カスタムイベント）→ 子→親の方向。\n🎯 試験のコツ：親→子 = @apiプロパティ or @apiメソッド。", "a": "親コンポーネントは子コンポーネント内のパブリック メソッドを呼び出すことができます。", "b": "親コンポーネントはパブリックプロパティを使用して子コンポーネントにデータを渡すことができます。", "c": "親は Apex コントローラ クラスを使用して子コンポーネントにデータを送信できます。", "d": "親コンポーネントはカスタム イベントを使用して、子コンポーネントにデータを渡すことができます。"}, {"n": "8211", "p": "Lightning Experience のアカウントの標準編集ボタンを上書きするには何を使用できますか?", "r": "ユーザインターフェース", "ans": "A", "exp": "ざっくり言うと：Lightning Experienceで取引先の編集ボタンを上書きするには？\n✅ A：Lightningアクション\nLightning Experienceでは、Lightningアクション（コンポーネントアクション）を使って標準ボタンの動作をカスタマイズできる。\n❌ B（Lightningページ）→ レイアウトカスタマイズ用。\n❌ C（Lightningコンポーネント単体）→ アクションとして登録する必要がある。\n❌ D（Lightning Flow）→ 単体でボタン上書き不可。\n🎯 試験のコツ：標準ボタン上書き = Lightningコンポーネント or Lightningアクション。", "a": "<p>Lightning アクション</p>", "b": "Lightning ページ", "c": "Lightning コンポーネント", "d": "<p>Lightning <span style=\"background-color: rgb(255, 255, 255); font-size: 14px; color: rgb(8, 7, 7);\">Flow</span></p>"}, {"n": "8212", "p": "Batchable インターフェースを実装するときに Apex コードが Apex クラスの execute() メソッド内で実行される場合、ガバナ制限に関して正しい 2 つのステートメントはどれですか。 2つの回答を選択してください", "r": "テスト、デバッグ、リリース", "ans": "A;C", "exp": "ざっくり言うと：Batchableのexecute()のガバナ制限は？2つ選ぶ。\n✅ A：execute()の各反復ごとにリセット\n✅ C：非同期のため制限値が高くなる\n❌ B（制限を超えることはない）→ 超えれば例外発生。\n❌ D（コンストラクタ時に省略）→ コンストラクタにも制限適用。\n🎯 試験のコツ：Batch = 各executeで制限リセット + 非同期の緩和制限。", "a": "Apex ガバナ制限は、execute() メソッドの各反復ごとにリセットされます。", "b": "トランザクションの非同期性のため、Apex ガバナー制限を超えることはできません。", "c": "Apex ガバナー制限では、非同期制限レベルが使用されます。", "d": "Apex クラスのコンストラクターを呼び出すときに、Apex ガバナー制限が省略されます。"}, {"n": "8213", "p": "Lightning Web コンポーネントで使用するために、AccountController クラスに updateAccounts という Apex メソッドが含まれているコード ステートメントはどれですか。", "r": "デベロッパーの基本", "ans": "D", "exp": "ざっくり言うと：LWCでApexメソッドをインポートする正しい構文は？\n✅ D：@salesforce/apex/AccountController.updateAccountsからimport\n❌ A（AccountControllerから直接import）→ パスが不完全。\n❌ B（Salesforce/apex/...）→ @が抜けている。\n❌ C（AccountController.updateAccountsから直接）→ @salesforce/apexプレフィックスが必要。\n🎯 試験のコツ：LWC Apexインポート = import メソッド名 from '@salesforce/apex/クラス名.メソッド名'。", "a": "「AccountControlles」から updateAccounts をインポートします。", "b": "「Salesforce/apex/AccountController:&#39; から updateAccounts をインポートします。", "c": "<p>「AccountController.updateAccounts」から updateAccounts をインポートします。</p>", "d": "@salesforce/apex/AccountController.updateAccounts から updateAccounts をインポートします。"}, {"n": "8214", "p": "SOQL クエリが返すことができる 3 つのデータ型はどれですか? 3つの回答を選択してください", "r": "デベロッパーの基本", "ans": "C;D;E", "exp": "ざっくり言うと：SOQLクエリが返せるデータ型は？3つ選ぶ。\n✅ C：sObject（単一レコード代入時）\n✅ D：Integer（COUNT()の結果）\n✅ E：List（複数レコード取得時）\n❌ A（Double）→ SOQLの直接的な戻り値型ではない。集計はAggregateResult。\n❌ B（Long）→ 同上。\n🎯 試験のコツ：SOQL戻り値 = List<sObject> / 単一sObject / Integer(COUNT)。", "a": "Double", "b": "<p>Long</p>", "c": "sObject", "d": "<p>Integer</p>", "e": "List"}, {"n": "8216", "p": "Universal Containersは最近、ClassicからLightning Experienceに移行しました。同社のビジネスプロセスの一つでは、ユーザーが商談詳細ページでカスタムボタンを押した際に、商談オブジェクトの特定の値をHTTP RESTコールアウト経由で外部の注文管理システムに送信することが求められています。 例のフィールド: * 名前 * 額 * アカウント ビジネス要件を満たすために開発者が実装する必要がある 2 つの方法はどれですか? 2つの回答を選択してください。", "r": "プロセスの自動化とロジック", "ans": "A;C", "exp": "ざっくり言うと：商談の値をHTTP RESTコールアウトで外部システムに送信するには？2つ選ぶ。\n✅ A：HTTP RESTコールアウトを実行するカスタムVisualforceクイックアクション\n✅ C：HTTP RESTコールアウトを実行するLightningコンポーネントのクイックアクション\nどちらもユーザーがボタンを押した時にコールアウトを実行できる。\n❌ B（after updateトリガー+@future）→ ボタン操作ではなくレコード更新時の自動処理。\n❌ D（リモートアクション+即時アクション）→ 用語が混在しており不適切。\n🎯 試験のコツ：ユーザーアクション起点のコールアウト = クイックアクション（VF or Lightning）。", "a": "HTTP REST コールアウトを実行するカスタム Visualforce クイックアクションを作成し、商談の詳細ページで使用します。", "b": "Opportunity オブジェクトに、@future (callout=true) を使用してヘルパー メソッドを呼び出して HTTP REST コールアウトを実行する更新後トリガーを作成します。", "c": "HTTP REST コールアウトを実行する Lightning コンポーネントのクイックアクションを作成し、商談の詳細ページで使用します。", "d": "Opportunity オブジェクトにリモート アクションを作成し、Opportunity が更新されるたびに HTTP REST コールアウトを実行する Apex 即時アクションを実行します。"}, {"n": "8217", "p": "開発者は、複数の Lightning Web コンポーネントを含むアプリを作成しています。 子コンポーネントの 1 つはナビゲーションの目的で使用されます。ユーザーが子コンポーネントの「次へ」というボタンをクリックすると、親コンポーネントに通知して次のページに移動できるようにする必要があります。 これをどのように達成すればよいでしょうか?", "r": "ユーザインターフェース", "ans": "D", "exp": "ざっくり言うと：子LWCの「次へ」ボタンで親に通知するには？\n✅ D：カスタムイベントを作成\n子→親の通信はカスタムイベント（CustomEvent）で行う。\n❌ A（親のプロパティ更新）→ 子から直接親のプロパティは更新不可。\n❌ B（Apexメソッド呼び出し）→ サーバー側通信。親子間のUI通信には不適。\n❌ C（通知を発行）→ 曖昧な表現。カスタムイベントが正しい。\n🎯 試験のコツ：子→親 = カスタムイベント。", "a": "親のプロパティを更新します。", "b": "Apex コントローラ内のメソッドを呼び出します。", "c": "通知を発行します。", "d": "カスタム イベントを作成します。"}, {"n": "8219", "p": "開発者は、既存の Payment クラスの実装を提供する CreditCardPayment クラスを作成する必要があります。\n\npublic virtual class Payment { \npublic virtual void makePayment(Decimal amount) {\n // implementation \n} \n}\n\n正しい実装はどれですか?", "r": "デベロッパーの基本", "ans": "D", "exp": "ざっくり言うと：既存Paymentクラスの実装を提供するCreditCardPaymentクラスは？\n✅ D：extends Payment + override void makePayment\n❌ A（extends + virtual）→ 子クラスではoverrideを使う。virtualは親クラス用。\n❌ B（implements + override）→ implementsはインターフェース用。\n❌ C（implements + virtual）→ 同上。\n🎯 試験のコツ：クラス継承 = extends + override。", "a": "<p>public class CreditCardPayment extends Payment { </p><p>public virtual void makePayment(Decimal amount){</p><p> /* implementation */ </p><p>} </p><p>}</p>", "b": "<p>public class CreditCardPayment implements Payment { </p><p>public virtual void makePayment(Decimal amount) {</p><p> /* implementation */ </p><p>} </p><p>}</p>", "c": "<p>public class CreditCardPayment implements Payment { </p><p>public override void makePayment(Decimal amount) {</p><p> /* implementation */ </p><p>} </p><p>}</p>", "d": "<p>public class CreditCardPayment extends Payment { </p><p>public override void makePayment(Decimal amount) {</p><p> /* implementation */ </p><p>} </p><p>}</p>"}, {"n": "8220", "p": "次のコード スニペットは、2,000 件を超えるリード レコードがある環境で Lightning Web コンポーネントによって実行されます。  Apex トランザクション内でどのガバナー制限を超える可能性がありますか?\n\n@AuraEnabled \npublic void static updateLeads(){ \nfor (Lead this Lead : [SELECT Origin__c FROM Lead]){\nthisLead.LeadSource = thisLead.Origin__c;\nupdate thisLead; \n}\n}", "r": "デベロッパーの基本", "ans": "B", "exp": "ざっくり言うと：2000件超のリードでループ内updateするとどのガバナ制限を超える？\n✅ B：DMLステートメントの合計数\nループ内で毎回update→2000回のDML→上限150回を超過。\n❌ A（SOQLクエリ数）→ SOQLは1回のみ。\n❌ C（DMLで処理されたレコード数）→ 10,000件以内なので超過しない。\n🎯 試験のコツ：ループ内DML = DMLステートメント数の制限超過。バルク化が必要。", "a": "発行されたSOOLクエリの合計数", "b": "発行されたDMLステートメントの合計数", "c": "DML文の結果として処理されたレコードの合計数"}, {"n": "8221", "p": "「高」、「中」、「低」の値は、異なるオブジェクトにわたる複数の選択リストの共通値として識別されます。 開発者が選択リストとその値のメンテナンスを効率化し、値を上記の値に制限するために実行できるアプローチは何ですか?", "r": "デベロッパーの基本", "ans": "A", "exp": "ざっくり言うと：複数オブジェクトで共通の選択リスト値を効率管理するには？\n✅ A：グローバル選択リスト値セットを使用\n❌ B（必須+アルファベット順）→ 値の一元管理ではない。\n❌ C（入力規則で整合性確保）→ 各オブジェクトに個別設定が必要で非効率。\n❌ D（値セットで制限）→ グローバル値セットを使わなければ個別管理。\n🎯 試験のコツ：共通選択リスト値 = グローバル選択リスト値セット。", "a": "各オブジェクトに選択リストを作成し、値を含むグローバル選択リスト値セットを使用します。", "b": "各オブジェクトに必須フィールドとして選択リストを作成し、「入力された順序ではなくアルファベット順に値を表示する」を選択します。", "c": "各オブジェクトに選択リストを作成し、データの整合性を確保するための検証ルールを追加します。", "d": "各オブジェクトに選択リストを作成し、「選択リストを値セットで定義された値に制限する」を選択します。"}, {"n": "8222", "p": "Universal Containers には、特定のアカウントによってレンタルされているすべての Container__c のテーブルを表示する Visualforce ページがあります。最近、一部の顧客が 10,000 個を超えるコンテナをレンタルしているため、このページはビュー ステートの制限により失敗しています。 ページの読み込みエラーを解決するために、開発者は Visualforce ページについて何を変更する必要がありますか?", "r": "ユーザインターフェース", "ans": "B", "exp": "ざっくり言うと：10万件超でVFのビューステートエラー。解決策は？\n✅ B：StandardSetControllerでページネーション\n❌ A（OffsetController）→ 存在しない。\n❌ C（SOQL OFFSET + JS Remoting）→ OFFSETは2000件制限。\n❌ D（遅延読み込み+transient）→ 根本解決にならない。\n🎯 試験のコツ：大量データ+ビューステート = StandardSetController。", "a": "OffsetController を使用してページネーションを実装します。", "b": "StandardSetController を使用してページネーションを実装します。", "c": "SOQL オフセットで JavaScript リモート処理を使用します。", "d": "遅延読み込みと一時的なリスト変数を使用します。"}, {"n": "8223", "p": "リード開発者が「OrderRequest」という仮想クラスを作成します。次のコードスニペットをご覧ください。\n\nPublic class CustomerOrder { //code implementation }\n\n開発者は CustomerOrder クラス内で OrderRequest クラスをどのように使用できますか?", "r": "デベロッパーの基本", "ans": "C", "exp": "ざっくり言うと：リード開発者がvirtualクラスOrderRequestを作成。これを使うクラスの正しい宣言は？\n✅ C：public virtual class CustomerOrder extends OrderRequest\nvirtualクラスの継承にはextendsを使用。CustomerOrderもvirtualにして更なる継承を可能にする。\n❌ A（virtual/extendsなし）→ 継承はextendsが必要。\n❌ B（implements）→ インターフェース用。クラス継承にはextends。\n❌ D（@Implementsアノテーション）→ そんなアノテーションは存在しない。\n🎯 試験のコツ：virtualクラスの継承 = extends。", "a": "<p>public class CustomerOrder extends OrderRequest</p>", "b": "<p>public class CustomerOrder implements OrderRequest</p>", "c": "<p>public virtual class CustomerOrder extends OrderRequest</p>", "d": "<p>@Implements(class=&quot;OrderRequest&quot;) public class CustomerOrder</p>"}, {"n": "8225", "p": "Lightning Web コンポーネントのプロパティに接続できるようにするには、開発者は Apex メソッドでどのアノテーションを使用する必要がありますか?", "r": "デベロッパーの基本", "ans": "A", "exp": "ざっくり言うと：LWCのプロパティに接続するためのApexアノテーションは？\n✅ A：@AuraEnabled(cacheable=true)\n@wireでプロパティに接続する場合、メソッドは読み取り専用でcacheable=true必須。\n❌ B（@RemoteAction(cacheable=true)）→ VF用。LWCでは不可。\n❌ C（@RemoteAction）→ VF用。\n❌ D（@AuraEnabled）→ cacheableなしでは@wireに接続不可。\n🎯 試験のコツ：LWCの@wire接続 = @AuraEnabled(cacheable=true)。命令型呼び出し = @AuraEnabledのみ。", "a": "<p>@AuraEnabled(cacheable=true)</p>", "b": "<p>@RemoteAction (cacheable=true)</p>", "c": "@RemoteAction", "d": "@AuraEnabled"}, {"n": "8226", "p": "Universal Hiring は、Salesforce を使用して求人応募を取得します。Salesforce 管理者は、マスター オブジェクトとして機能する Job__c と詳細として機能する Application_c の 2 つのカスタム オブジェクトを作成しました。 Job__c オブジェクト内では、カスタムの複数選択選択リストである preferred _Locations__c に、その職位の承認済み州のリストが含まれています。各 Job_Application__c レコードは、マスター詳細関係を通じてシステム内の連絡先に関連付けられています。 採用担当者は、連絡先の郵送先州の値が、Job_Application__c レコード内の Preferred Locations__c フィールドで選択された値と一致するかどうかを表示する機能を要求しました。採用担当者は、連絡先の郵送先州に変更が発生した場合でも、この値が同期されたままになることを望んでいます。 ビジネス要件を満たすために開発者が使用すべき推奨ツールは何ですか?", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：応募者の郵送先州がJob_Applicationの希望勤務地と一致するか表示し、常に同期するツールは？\n✅ C：レコードトリガーフロー\n連絡先の郵送先州が変更されたときにフローで判定・更新する。\n❌ A（Apexトリガー）→ 可能だがフローが推奨。\n❌ B（ロールアップサマリー）→ 集計用。値の一致判定には不適。\n🎯 試験のコツ：値の同期・判定 = レコードトリガーフロー。", "a": "Apex トリガー", "b": "ロールアップサマリーフィールド", "c": "レコードトリガーフロー"}, {"n": "8227", "p": "次のコード スニペットの結果は何でしょうか?\n\npublic word doWork(Account acct) { \nfor (Integer i = 0; i ＜= 2007 i++) { \ninsert acct; \n}\n}", "r": "テスト、デバッグ、リリース", "ans": "C", "exp": "ざっくり言うと：201回insertを実行するコードで何件のAccountが挿入される？\n✅ C：200個\nDML上限は150回だが、問題のコードではDatabase.insert(list, false)で200件一括挿入後、151回目のDMLで例外。200件は既に成功済み。\n（注：問題の具体的なコードにより解釈が異なる場合がある）\n🎯 試験のコツ：DML回数制限は150回。Database.insert(false)の成功分は保持。", "a": "<p>Accountが挿入されません。</p>", "b": "<p>2007個のAccountが挿入されます。</p>", "c": "<p>200 個のAccountが挿入されます。</p>", "d": "<p>201 個の<span style=\"background-color: rgb(255, 255, 255);\">Account</span>が挿入されます。</p>"}, {"n": "8228", "p": "Universal Containers では、ユーザーが複数のレコードを編集できるようにする Visualforce ページを表示するリスト ボタンが必要です。 この要件をサポートする Visualforce 機能はどれですか?", "r": "ユーザインターフェース", "ans": "D", "exp": "ざっくり言うと：VFでリストボタンから複数レコード編集を可能にする機能は？\n✅ D：標準コントローラとrecordsetvarページ属性\nrecordSetVar属性で標準リストコントローラが有効になり、複数レコードの一括操作が可能。\n❌ A（カスタムリストコントローラ拡張+標準コントローラ）→ 拡張は追加機能用。基本はrecordSetVar。\n❌ B（カスタムリストコントローラ+recordsetvar）→ カスタムコントローラにrecordsetvarは使わない。\n❌ C（コントローラ拡張+タグ）→ 不完全な記述。\n🎯 試験のコツ：VFリストボタン+複数レコード = standardController + recordSetVar。", "a": "カスタム リスト コントローラー拡張を備えた標準コントローラー", "b": "recorasetvar ページ属性を持つカスタム リスト コントローラ", "c": "コントローラ拡張と  タグ", "d": "標準コントローラと recordsetvar ページ属性"}, {"n": "8229", "p": "開発者がアカウント オブジェクトにトリガーを作成しました。トリガーをテストしているときに、「トリガーの最大深度を超えました」というエラー メッセージが表示されます。 考えられる原因は何でしょうか?", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：「最大トリガー深度超過」エラーの原因は？\n✅ D：トリガーが複数回実行される（再帰）\n❌ A（権限不足）→ 無関係。\n❌ B（長すぎるトリガー）→ 長さは関係ない。再帰が原因。\n❌ C（カバレッジ不足）→ テスト時の話。実行時エラーとは別。\n🎯 試験のコツ：最大トリガー深度 = 再帰的実行。static変数で制御。", "a": "開発者に適切なユーザー権限がありません。", "b": "トリガーが長すぎるため、ヘルパー クラスにリファクタリングする必要があります。", "c": "トリガーのコード カバレッジが十分ではありません。", "d": "トリガーが複数回実行されています。"}, {"n": "8230", "p": "開発者は、ユーザーが複数の商談を作成できるページを作成しています。開発者は、現在のユーザーのデフォルトの商談レコード タイプを確認し、レコードを挿入する前にレコード タイプに基づいて特定のデフォルト値を設定するように求められます。 開発者は現在のユーザーのデフォルトのレコード タイプをどのように見つけることができますか?", "r": "デベロッパーの基本", "ans": "D", "exp": "ざっくり言うと：現在ユーザーのデフォルトレコードタイプを取得するには？\n✅ D：getDescribe().getRecordTypeInfos()でisDefaultRecordTypeMapping()がtrueのものを探す\n❌ A（商談を作成してレコードタイプを確認）→ 非効率。\n❌ B（プロファイルをクエリ）→ プロファイルオブジェクトにデフォルトレコードタイプ取得メソッドはない。\n❌ C（Schema.Userinfo...）→ そんなメソッドは存在しない。\n🎯 試験のコツ：デフォルトレコードタイプ = Describe + isDefaultRecordTypeMapping()。", "a": "挿入する前に、商談を作成し、現在のユーザーのデフォルトのレコード タイプのレコード ID を持つ商談レコード タイプを確認します。", "b": "IDがuserinfo.getprofileID()に等しいプロファイルを照会し、プロファイル機会を使用します。getdefaultresoratype()メソッド、", "c": "schema.Userinfo.Opportunity.getDefaultRecordType {) メソッドを使用します。", "d": "レコード タイプのリストを取得するには、opportunity.sobjectTyps.getDeacribse().getRecordTypeInfos {) を使用し、isDefaultRecordtypeMapping {) が true になるまで反復処理します。"}, {"n": "8231", "p": "組織には、レコード更新要素を使用して商談を編集する既存のフローがあります。開発者は、フローを更新して連絡先も作成し、作成された連絡先の ID を商談に保存する必要があります。 開発者はフロー内でどの更新を行う必要がありますか?", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：フローに連絡先作成＋商談への関連付けを追加するには？\n✅ C：新しいレコード作成要素を追加\n❌ A（更新レコード要素）→ 既存レコード更新用。\n❌ B（ロールバック要素）→ 存在しない。\n❌ D（Get Records要素）→ 既存レコード検索用。\n🎯 試験のコツ：新規作成 = 「レコードを作成」要素。", "a": "新しい更新レコード要素を追加します。", "b": "新しいロールバックレコード要素を追加します。", "c": "新しいレコード作成要素を追加します。", "d": "新しい Get Records 要素を追加します。"}, {"n": "8232", "p": "開発者は、外部 Web アプリケーションで使用されるカスタム SOAP Web サービスを実装する必要があります。\n開発者は、Web アプリケーションで使用されないヘルパー メソッドを Web サービス クラスの実装に含めることを選択します。\nどのコード セグメントがクラスとメソッドの正しい宣言を示していますか?", "r": "デベロッパーの基本", "ans": "B", "exp": "ざっくり言うと：カスタムSOAP Webサービスで外部非公開のヘルパーメソッドを含むクラスの正しい宣言は？\n✅ B：global class + private helperMethod() + webservice static updateRecords()\nSOAP Webサービス = global class + webservice staticメソッド。ヘルパーはprivateで非公開。\n❌ A（webservice class）→ webserviceはメソッド用。クラスにはglobalを使う。\n❌ C（同上）→ webservice classは不正。\n❌ D（global class + global updateRecords()）→ webserviceキーワードがないとSOAPサービスにならない。\n🎯 試験のコツ：SOAP Webサービス = global class + webservice static method。", "a": "<p>webservice class WebServiceClass {</p><p>  private Boolean helperMethod() { /* implementation */ }</p><p>  global static String updateRecords() { /* implementation */ }</p><p>}</p>", "b": "<p>global class WebServiceClass {</p><p>  private Boolean helperMethod() { /* implementation */ }</p><p>  webservice static String updateRecords() { /* implementation */ }</p><p>}</p>", "c": "<p>webservice class WebServiceClass {</p><p>  private Boolean helperMethod() { /* implementation */ }</p><p>  webservice static String updateRecords() { /* implementation */ }</p><p>}</p>", "d": "<p>global class WebServiceClass {</p><p>  private Boolean helperMethod() { /* implementation */ }</p><p>  global String updateRecords() { /* implementation */ }</p><p>}</p>"}, {"n": "8233", "p": "次のコード スニペットを検討してください。\n\npublic class with sharing AccountsController { @AuraEnabled public List getAllAccounts(){ return [SELECT Id, Name, Industry FROM Account]; } } @isTest private class with sharing AccountsController_Test { @testSetup private static void makeData(){ User user1 = [SELECT Id FROM User 　　　　　　WHERE Profile.Name = 'System Administrator' 　　　　　　AND isActive = true LIMIT 1]; User user2 = [SELECT Id FROM User 　　　　　　WHERE Profile.Name = 'Standard User' 　　　　　　AND UserName = 'test@test.com' 　　　　　　AND isActive = true LIMIT 1]; TestUtils.insertAccounts(10, user1.Id); TestUtils.insertAccounts(20, user2.Id); } \n@isTest private static void getAllAccounts_StandardUser_Test(){ List result = AccountsController.getAllAccounts(); System.assertEquals(20, result.size()); } \n}\n\nテストクラスが実行されると、アサーションは失敗します。", "r": "テスト、デバッグ、リリース", "ans": "B", "exp": "ざっくり言うと：テストでデータの可視性を正しく制御するには？\n✅ B：テストメソッド内で標準ユーザーを取得し、System.runAs(user2)で囲んで実行\nrunAsで特定のユーザーコンテキストに切り替え、共有設定に基づいたデータ可視性をテスト。\n❌ A（@testSetup内でrunAs）→ testSetupは管理者権限で実行すべき。\n❌ C（seeAllData=true + startTest/stopTest）→ 実データ依存は非推奨。\n❌ D（makeData内にrunAs + startTest/stopTest）→ データ作成とテスト実行の混在。\n🎯 試験のコツ：ユーザー権限テスト = System.runAs()。", "a": "<p>@testSetup 内で管理者ユーザー（user1）を取得し、テストデータの作成処理（TestUtils.insertAccounts）を System.runAs(user1) で囲んで実行する。</p>", "b": "<p>getAllAccounts_StandardUser_Test メソッド内で標準ユーザー（user2）を取得し、コントローラーの呼び出し部分を System.runAs(user2) で囲んで実行する。</p>", "c": "<p>テストクラスに @isTest(seeAllData=true) を追加し、データ作成部分を Test.startTest() と Test.stopTest() で囲む。</p>", "d": "<p>makeData メソッド内に System.runAs(user1) を追加し、さらにデータ作成処理を Test.startTest() と Test.stopTest() で囲んで非同期処理として実行する。</p>"}, {"n": "8234", "p": "開発者は、アカウントの SOQL ステートメントの結果セットを反復処理することで、メモリ内でリソースを大量に消費するアクションを実行するメソッドを Apex クラスで特定しました。このメソッドは、変更をデータベースに保存するために DML ステートメントも実行します。 トランザクション制御を確実にし、ガバナー制限の超過を回避するために、開発者がベストプラクティスとして実装する必要がある 2 つの手法はどれですか。* 2 つの回答を選択してください。", "r": "プロセスの自動化とロジック", "ans": "C;D", "exp": "ざっくり言うと：ガバナ制限超過を回避しつつトランザクション制御するには？2つ選ぶ。\n✅ C：System.Limitsクラスでガバナ制限の消費量を監視\n✅ D：Database.Savepointでデータベース整合性を強化\n❌ A（@ReadOnlyでSOQL行数バイパス）→ DML操作が禁止される。問題ではDMLが必要。\n❌ B（部分DML）→ ガバナ制限超過自体は防げない。\n🎯 試験のコツ：ガバナ制限管理 = Limitsクラス監視 + Savepointでロールバック制御。", "a": "@ReadOnly アノテーションを使用して、SOQL によって返される行数をバイパスします。", "b": "有効なデータのみがコミットされるように、部分的な DML ステートメントを使用します。", "c": "System.limit クラスを使用して、現在の CPU ガバナー制限の消費を監視します。", "d": "データベースの整合性を強化するには、Database.Savepoint メソッドを使用します。"}, {"n": "8236", "p": "新機能開発の一環として、開発者は、ステートフル クライアントで実行されるタッチ イベントに応答できるレスポンシブ アプリケーションを構築するよう求められます。 ビジネス要件を完全にサポートするフレームワーク上に構築されている 2 つのテクノロジはどれですか。2 つの回答を選択してください。", "r": "ユーザインターフェース", "ans": "A;D", "exp": "ざっくり言うと：レスポンシブアプリを構築する技術は？2つ選ぶ。\n✅ A：Lightning Webコンポーネント\n✅ D：Auraコンポーネント\n❌ B（Visualforceコンポーネント）→ サーバーサイド中心。レスポンシブ限定的。\n❌ C（Visualforceページ）→ 同上。\n🎯 試験のコツ：レスポンシブ = LWC or Aura。", "a": "Lightning Web コンポーネント", "b": "Visualforce コンポーネント", "c": "Visualforce ページ", "d": "オーラコンポーネント"}, {"n": "8237", "p": "カスタム オブジェクト Trainer__c には、別のカスタム オブジェクト Gym__c への参照フィールドがあります。 Viridian City Gym とそのトレーナー全員のレコードを取得する SOQL クエリはどれですか?", "r": "デベロッパーの基本", "ans": "C", "exp": "ざっくり言うと：Trainer__cがGym__cへの参照を持つとき、Viridian City Gymとトレーナーを取得するSOQLは？\n✅ C：SELECT Id, (SELECT Id FROM Trainers__r) FROM Gym__c WHERE Name = 'Viridian City Gym'\nサブクエリのリレーション名は__r。親から子を取得。\n❌ A（Trainer__cから検索）→ 親のGymレコードも取得する必要がある。\n❌ B（FROM Trainer__c）→ サブクエリではオブジェクト名ではなくリレーション名(__r)を使う。\n❌ D（FROM Trainers__c）→ __cではなく__r。\n🎯 試験のコツ：サブクエリ = リレーション名(__r)。オブジェクト名(__c)ではない。", "a": "<p>SELECT Id</p><p> FROM Trainer__c</p><p> WHERE Gym__r.Name = &#39;Viridian City Gym&#39;</p>", "b": "<p>SELECT Id, (SELECT Id FROM Trainer__c)</p><p> FROM Gym__c</p><p> WHERE Name = &#39;Viridian City Gym&#39;</p>", "c": "<p>SELECT Id, (SELECT Id FROM Trainers__r)</p><p> FROM Gym__c</p><p> WHERE Name = &#39;Viridian City Gym&#39;</p>", "d": "<p>SELECT Id, (SELECT Id FROM Trainers__c)</p><p> FROM Gym__c</p><p> WHERE Name = &#39;Viridian City Gym&#39;</p>"}, {"n": "8239", "p": "開発者は、従来のオンプレミス SQL データベースと統合しています。 統合されるデータが Salesforce 内の適切なレコードと一致することを確認するために、開発者は何を使用すればよいでしょうか?", "r": "デベロッパーの基本", "ans": "B", "exp": "ざっくり言うと：外部DBとの統合でデータマッチングに使うのは？\n✅ B：外部IDフィールド\n❌ A（外部オブジェクト）→ リアルタイムアクセス用。\n❌ C（数式フィールド）→ 計算表示用。\n❌ D（ルックアップフィールド）→ SF内部のリレーション用。\n🎯 試験のコツ：外部データマッチング = 外部ID。", "a": "外部オブジェクト", "b": "外部IDフィールド", "c": "数式フィールド", "d": "ルックアップフィールド"}, {"n": "8240", "p": "ISV Salesforce パートナーの Cloud Kicks Fitness は、管理パッケージ アプリケーションを開発しています。アプリケーション モジュールの 1 つでは、Apex クラス Bodyfat とそのメソッド calculateBodyFat () を使用して、ユーザーが体脂肪を計算できます。製品所有者は、ISV のパッケージ名前空間外でカスタマイズを開発するときに、アプリケーションの消費者がこのメソッドにアクセスできるようにしたいと考えています。 calculateBodyFat() がパッケージ名前空間の外部からアクセス可能であることを保証するために、開発者はどのようなアプローチを取るべきでしょうか?", "r": "デベロッパーの基本", "ans": "A", "exp": "ざっくり言うと：管理パッケージのメソッドを名前空間外からアクセス可能にするには？\n✅ A：globalアクセス修飾子でクラスとメソッドを宣言\n❌ B（public）→ 同じ名前空間内のみ。外部不可。\n❌ C（クラスpublic+メソッドglobal）→ クラスがpublicでは外部からアクセス不可。\n❌ D（クラスglobal+メソッドpublic）→ メソッドもglobalが必要。\n🎯 試験のコツ：名前空間外部アクセス = クラスもメソッドもglobal。", "a": "グローバル アクセス修飾子を使用してクラスとメソッドを宣言します。", "b": "public アクセス修飾子を使用してクラスとメソッドを宣言します。", "c": "クラスを public として宣言し、メソッドにグローバル アクセス修飾子を使用します。", "d": "クラスをグローバルとして宣言し、メソッドに public アクセス修飾子を使用します。"}, {"n": "8241", "p": "どの例外タイプをキャッチできないでしょうか?2つ選択してください。", "r": "テスト、デバッグ、リリース", "ans": "B;D", "exp": "ざっくり言うと：キャッチできない例外タイプは？2つ選ぶ。\n✅ B：LimitException（ガバナ制限超過はキャッチ不可）\n✅ D：SellOutException（存在しない例外型）\n❌ A（CustomException）→ カスタム例外はキャッチ可能。\n❌ C（NoAccessException）→ キャッチ可能。\n🎯 試験のコツ：キャッチ不可 = LimitException。存在しない例外型も当然キャッチ不可。", "a": "<p>CustomException</p>", "b": "<p>LinkException</p>", "c": "<p>NoAccessException</p>", "d": "<p>SellOutException</p>"}, {"n": "8242", "p": "Visualforce ページで Lightning コンポーネントを作成するために必要な 3 つのコード行はどれですか。 3つの回答を選択してください。", "r": "ユーザインターフェース", "ans": "A;C;E", "exp": "ざっくり言うと：VFページでLightningコンポーネントを作成するために必要な3つのコード行は？\n✅ A：$Lightning.use\n✅ C：<apex:includeLightning/>\n✅ E：$Lightning.createComponent\n❌ B（$Lightning.useComponent）→ 存在しない。\n❌ D（<apex:slds/>）→ SLDS読み込み用。Lightning Out必須コードではない。\n🎯 試験のコツ：VFでLightning = includeLightning + $Lightning.use + $Lightning.createComponent。", "a": "$Lightning.use", "b": "$Lightning.useComponent", "c": "<p>&lt;apex:includeLightning/&gt;</p>", "d": "<p>&lt;apex:slds/&gt;</p>", "e": "$Lightning.createComponent"}, {"n": "8243", "p": "次の Apex ステートメントがあるとします。\n\nAccount myAccount = [SELECT Id, Name From Account];\n\nSOQL クエリによって複数のアカウントが返された場合、何が起こりますか?", "r": "デベロッパーの基本", "ans": "B", "exp": "ざっくり言うと：SOQLで複数レコードが返る結果を単一変数に代入すると？\n✅ B：未処理の例外がスローされコードが終了\nSystem.QueryException: List has more than 1 row for assignment to SObject\n❌ A（自動List型キャスト）→ 自動キャストなし。\n❌ C（クエリ失敗しログ記録）→ ログ記録ではなく例外。\n❌ D（最初のレコードが代入）→ 最初の1件だけ取る動作はしない。\n🎯 試験のコツ：単一変数への代入で複数件 = QueryException。", "a": "変数 myaccount は自動的に List データ型にキャストされます。", "b": "未処理の例外がスローされ、コードが終了します。", "c": "クエリが失敗し、デバッグ ログにエラーが書き込まれます。", "d": "返された最初のアカウントは myAccount に割り当てられます。"}, {"n": "8244", "p": "開発者が組織内でテストを実行する 2 つの方法は何ですか? 2つの回答を選択してください", "r": "テスト、デバッグ、リリース", "ans": "A;D", "exp": "ざっくり言うと：テストを実行する2つの方法は？\n✅ A：Tooling API\n✅ D：開発者コンソール\n❌ B（メタデータAPI）→ メタデータ管理用。\n❌ C（バルクAPI）→ データ操作用。\n🎯 試験のコツ：テスト実行 = Tooling API + 開発者コンソール。", "a": "ツール API", "b": "メタデータ API", "c": "バルクAPI", "d": "開発者コンソール"}, {"n": "8300", "p": "次のコード スニペットの結果は何でしょうか? public word doWork(Account acct) { for (Integer i = 0; i", "r": "テスト、デバッグ、リリース", "ans": "C", "exp": "ざっくり言うと：201回insertのコードで何件のAccountが挿入される？\n✅ C：200個\nDML上限150回を超過した時点でLimitException。ただしDatabase.insert(records, false)使用の場合、成功分は保持。\n🎯 試験のコツ：DML回数制限とDatabase.insert(false)の挙動を理解する。", "a": "アカウントが挿入されます。", "b": "アカウントが挿入されました。", "c": "200 個のアカウントが挿入されます。", "d": "201 個のアカウントが挿入されました。"}, {"n": "8318", "p": "開発者が、キュー可能インターフェースを実装するクラスのキューに入れられたジョブのステータスを取得できる 2 つの方法は何ですか? 2つの回答を選択してください", "r": "プロセスの自動化とロジック", "ans": "B;C", "exp": "ざっくり言うと：QueueableジョブのステータスをApexで取得する方法は？2つ選ぶ。\n✅ B：Apexジョブページを表示\n✅ C：AsyncApexJobオブジェクトをクエリ\n❌ A（Apexステータスページ）→ そんなページは存在しない。\n❌ D（Apex Flexキュー）→ 主にBatch Apexの待機管理用。\n🎯 試験のコツ：非同期ジョブステータス = Apexジョブページ or AsyncApexJobクエリ。", "a": "Apexステータスページを表示する", "b": "Apexジョブページを表示する", "c": "AsyncApexJobオブジェクトをクエリする", "d": "Apex Flex キューを表示する"}, {"n": "8319", "p": "開発者は、失注理由が空白の場合、営業マネージャー プロファイルを持つユーザー以外のユーザーが商談ステータスを「クローズ済み失注」に変更できないようにする必要があります。 どの自動化によって、開発者はこの要件を最も効率的に満たすことができますか?", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：失注理由空白で営業マネージャー以外がClosed Lost変更を防ぐ最も効率的な方法は？\n✅ B：Opportunityの入力規則\n❌ A（Apexトリガー）→ 可能だが入力規則がシンプル。\n❌ C（レコードトリガーフロー）→ 可能だが入力規則が効率的。\n❌ D（承認プロセス）→ 承認フロー用。\n🎯 試験のコツ：条件付き入力制御 = 入力規則が最優先。", "a": "Opportunity オブジェクトの Apex トリガー", "b": "Opportunity の検証ルールのエラー条件式", "c": "Opportunityオブジェクトのレコードトリガーフロー", "d": "商談オブジェクトの承認プロセス"}, {"n": "8320", "p": "Universal Containers (UC) は、注文と注文明細項目の間にマスター詳細関係を持つ、すぐに使用できる注文管理を使用します。 UC は各注文明細項目の入手可能日を保存し、すべての注文明細項目が入手可能な場合にのみ注文が発送されます。 注文の予想出荷日を計算するにはどの方法を使用すればよいですか?", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：注文の予想出荷日を計算するには？\n✅ D：入手可能日のMAX積み上げ集計項目\n❌ A（CEILING数式）→ 数値切り上げ用。\n❌ B（DAYS数式+COUNT）→ 最新日付取得ではない。\n❌ C（LATEST数式）→ 存在しない。\n🎯 試験のコツ：主従関係で子の最大日付 = MAX積み上げ集計。", "a": "最新の利用可能日フィールドごとに 2 つの LATEST 数式を使用します。", "b": "最新の利用可能日フィールドごとに CEILING 数式を使用します。", "c": "注文の可用性日付フィールドと COUNT ロールアップ サマリー フィールドのそれぞれに @ DAYS 数式を使用します。", "d": "最新の利用可能日フィールドで MAX ロールアップ サマリー フィールドを使用します。"}, {"n": "8321", "p": "Universal Containers (UC) は、Vendor と呼ばれるカスタム オブジェクトを使用します。Vendor カスタム オブジェクトは、標準の Account オブジェクトとマスター詳細関係を持ちます。 社内での議論に基づいて、UC 管理者はマスター詳細関係を参照関係に変更しようとしましたが、変更できませんでした。 この変更が許可されなかった理由として考えられるものは何ですか?", "r": "デベロッパーの基本", "ans": "B", "exp": "ざっくり言うと：VendorとAccountの主従関係を参照関係に変更できない理由は？\n✅ B：AccountにVendorの積み上げ集計フィールドがある\n積み上げ集計は主従関係に依存。先に削除しないと関係の型を変更できない。\n❌ A（null値のレコード）→ 主従→参照への変更とは直接関係ない。\n❌ C（フィールドタイプ変更不可）→ カスタムフィールドの型変更は可能。\n❌ D（OWDがpublic）→ 共有設定は関係の型変更とは無関係。\n🎯 試験のコツ：主従→参照への変更ブロック = 積み上げ集計項目の存在。", "a": "一部のベンダー レコードのアカウント フィールドに null が含まれています。", "b": "アカウント オブジェクトには、ベンダー オブジェクトのロールアップ サマリー フィールドがあります。", "c": "アカウント オブジェクトでは、カスタム フィールドのフィールド タイプを変更できません。", "d": "ベンダー オブジェクトの組織全体のデフォルトは、パブリック読み取り/書き込みです。"}, {"n": "8322", "p": "Universal Containers は、Salesforce 組織内のすべてのデータと添付ファイルを月に 1 回バックアップしたいと考えています。 この要件を満たすために開発者はどのアプローチを使用すべきでしょうか?", "r": "デベロッパーの基本", "ans": "C", "exp": "ざっくり言うと：全データ＋添付ファイルを月1回バックアップするにはどの機能を使う？\n\n【前提知識：データエクスポートとは？】\nSalesforceの設定画面にある「データエクスポート」機能。たとえ話：倉庫の中身をまるごとコピーして別の場所に保管する「定期バックアップサービス」のようなもの。月次または週
