function glossarize(text){if(!text)return'';var h=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');h=h.replace(/\\n/g,'<br>');var keys=Object.keys(GLOSSARY).sort(function(a,b){return b.length-a.length});var used={};for(var i=0;i<keys.length;i++){var k=keys[i];if(used[k])continue;var ek=k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');var rx=new RegExp('(?:<[^>]*>)?('+ek+')(?![^<]*>)');var m=h.match(rx);if(m&&m[1]){h=h.replace(m[1],'<span class="gl" data-term="'+k+'">'+m[1]+'</span>');used[k]=1}}return h}

const Q=[{"n": "5669", "p": "デバッグログに書き込まれるときのxの値は何ですか。\n\nInteger x = 0;\ndo {\n    x = 1;\n    x++;\n} while (x ＜ 1);\nSystem.debug(x);", "r": "テスト、デバッグ、リリース", "ans": "C", "exp": "ざっくり言うと：do-whileループ実行後のxの値は？\n\n【前提知識：do-whileループとは？】\ndo-whileは「まず1回実行してから条件をチェック」するループ。たとえ話：レストランで「とりあえず1品頼んでから、もう1品いるか考える」パターン。通常のwhileは「注文する前にメニューを確認する」パターン。\n\n✅ 正解 C：2\n実行の流れ：\n1. x = 0（初期値）\n2. doブロックに入る → x = 1 に代入\n3. x++（インクリメント）→ x = 2\n4. while条件 x < 1 を評価 → 2 < 1 は false → ループ終了\n5. System.debug(x) → 2が出力される\n\n❌ A（0）→ 初期値のまま。doブロックは必ず1回実行されるので変わる。\n❌ B（1）→ x=1の代入直後の値。その後x++で2になる。\n❌ D（3）→ ループは1回しか実行されないので3にはならない。\n\n🎯 試験のコツ：do-whileは「最低1回実行」がポイント。while条件がfalseでも1回は通る。", "a": "0", "b": "1", "c": "2", "d": "3"}, {"n": "5670", "p": "LightningコンポーネントからApexメソッドおよびプロパティへのアクセスを可能にするアノテーションはどれですか。", "r": "デベロッパーの基本", "ans": "B", "exp": "ざっくり言うと：LightningコンポーネントからApexを呼ぶためのアノテーションは？\n\n✅ 正解 B：@AuraEnabled\nLightningコンポーネントからApexメソッドやプロパティにアクセスするには@AuraEnabledをつける。たとえば、LWCのJSファイルからApexのメソッドを呼び出すとき、そのメソッドに@AuraEnabledがないと呼べない。\n\n❌ A（@RestResource）→ ApexクラスをREST APIとして外部に公開するためのアノテーション。外部システムとの連携用で、Lightning内部の通信には使わない。\n❌ C（@RemoteAction）→ VisualforceページのJavaScriptからApexを呼ぶためのもの。Lightningコンポーネントでは使えない。\n❌ D（@HttpInvocable）→ そもそもSalesforceに存在しないアノテーション。\n\n🎯 試験のコツ：Lightning↔Apex = @AuraEnabled、Visualforce↔Apex = @RemoteAction、外部API公開 = @RestResource。この3つはセットで覚える。", "a": "@RestResource", "b": "@AuraEnabled", "c": "@RemoteAction", "d": "@HttpInvocable"}, {"n": "5671", "p": "非同期Apexを実行して、ガバナ制限と実行制限が緩和されるものはどれですか。3つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "A;B;E", "exp": "ざっくり言うと：非同期Apexで緩和されるガバナ制限はどれ？3つ選ぶ問題。\n\n【前提知識：同期 vs 非同期のガバナ制限】\n同期＝ユーザーが画面で操作した直後に走る処理。非同期＝裏側で後から走る処理（Batch, Future, Queueableなど）。非同期は他のユーザーに影響しにくいので、一部の制限が緩和される。\n\n✅ 正解 A：ヒープの合計サイズ\n同期: 6MB → 非同期: 12MB。メモリの上限が2倍になる。\n\n✅ 正解 B：Salesforceサーバの最大CPU時間\n同期: 10,000ms → 非同期: 60,000ms。処理に使える時間が6倍になる。\n\n✅ 正解 E：SOQLクエリ発行総数\n同期: 100回 → 非同期: 200回。クエリを2倍打てる。\n\n❌ C（最大実行時間）→ 同期も非同期も10分で同じ。緩和されない。\n❌ D（SOQLで取得できるレコード数）→ 同期も非同期も50,000件で同じ。緩和されない。\n\n🎯 試験のコツ：非同期で「倍になる」のはヒープ(6→12MB)、CPU時間(10→60秒)、SOQLクエリ数(100→200回)。「変わらない」のは実行時間(10分)とSOQL取得件数(5万件)。", "a": "ヒープの合計サイズ", "b": "Salesforceサーバの最大CPU時間", "c": "Apexトランザクションごとの最大実行時間", "d": "SOQLクエリによって取得されるレコードの合計数", "e": "SOQLクエリ発行総数"}, {"n": "5672", "p": "現在取引先が100個ある場合に、開発者コンソールを使用して次のコードを実行します。\n\nAccount myAccount = new Account(Name = ’MyAccount’);\ninsert myAccount;\nFor(Integer x = 0; x ＜ 250; x++) {\n   Account newAccount = new Account(Name = ’MyAccount’ + x);\n    try {\n        Insert newAccount;\n    } catch (Exception ex) {\n        System.debug(ex);\n    }\n   insert new Account(Name = ’myAccount’);\n}\n\nこのコードの実行後、組織にはいくつの取引先がありますか。", "r": "テスト、デバッグ、リリース", "ans": "B", "exp": "ざっくり言うと：DMLのガバナ制限に引っかかったとき、DBにはいくつレコードが残る？\n\n【前提知識：ガバナ制限とロールバック】\n1トランザクションでDML操作は最大150回。150回を超えるとLimitExceptionが発生し、そのトランザクション内の全DMLがロールバック（取り消し）される。たとえ話：レストランで「150品まで」のルール。151品目を頼んだ瞬間、全注文がキャンセルされる。\n\n✅ 正解 B：100（元の100個のまま）\n1. insert myAccount → 1回目のDML\n2. ループ内で毎回DML2回 → 75回目で1+150=151回目に到達\n3. LimitException発生 → トランザクション全体がロールバック\n4. 最初のinsertも取り消される → 元の100個のまま\n\n❌ A（101）→ 最初の1件だけ残ると思ったパターン。ロールバックは全部取り消し。\n❌ C（102）→ 途中まで成功すると思ったパターン。Salesforceは「全部成功 or 全部取り消し」。\n❌ D（252）→ ガバナ制限を無視した計算。\n\n🎯 試験のコツ：ガバナ制限エラー → トランザクション全体がロールバック。「途中まで成功」はしない。Database.insert(records, false)を使った場合のみ部分成功が可能。", "a": "101", "b": "100", "c": "102", "d": "252"}, {"n": "5673", "p": "トリガーの実行順序で、beforeトリガーが実行された後、およびafterトリガーが実行される前に、どのステップが発生しますか。正確な順序を答えなさい。\n\n1：システム検証ステップが再度実行され、ユーザー定義の入力規則がチェックされます。\n\n2：beforeトリガー\n\n3：afterトリガー\n\n4：レコードはデータベースに保存されますが、まだコミットされていません。\n\n5：重複ルールを実行します。", "r": "テスト、デバッグ、リリース", "ans": "C", "exp": "ざっくり言うと：beforeトリガー後〜afterトリガー前の間に起きるステップの順番は？\n\n【前提知識：トリガーの実行順序】\nSalesforceでレコードが保存されるとき、裏側では決まった順番で処理が走る。beforeトリガー→各種検証→DB保存→afterトリガーという流れ。\n\n✅ 正解 C：2→1→5→4→3\n問題文から「ステップ2=beforeトリガー」「ステップ3=afterトリガー」が読み取れる。その間の順序は：\n2（beforeトリガー）→ 1（システム検証・入力規則）→ 5（重複ルール）→ 4（DBに一時保存）→ 3（afterトリガー）\n\n❌ A（1→2→5→3→4）→ beforeトリガー(2)が先に来るべき。\n❌ B（2→3→4→1→5）→ afterトリガー(3)が最後に来るべき。\n❌ D（2→1→5→3→4）→ DB保存(4)はafterトリガー(3)の前。\n\n🎯 試験のコツ：実行順序の問題はSalesforce公式ドキュメント「トリガーと実行の順序」が出典。before→検証→重複→保存→afterの流れを覚える。", "a": "1→2→5→3→4", "b": "2→3→4→1→5", "c": "2→1→5→4→3", "d": "2→1→5→3→4"}, {"n": "5674", "p": "レコードセット内のレコード数が不明な場合、開発者は.size()または.length()メソッド呼び出しを実行せずに、レコードセット内のすべてのレコードに対して実行するコードセットを実装するためにどの制御ステートメントを使用する必要がありますか。", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：レコード数がわからないリストを全部回すには、どのループを使う？\n\n✅ 正解 C：For(variable : list_or_set) { }\nこれは「拡張forループ（for-each）」と呼ばれる構文。リストやセットの中身を1つずつ取り出して処理する。要素数を事前に知る必要がない。たとえば for(Account a : accountList) と書けば、リスト内の全Accountを順番に処理できる。\n\n❌ A（For(init_stmt, exit_condition; increment_stmt)）→ 通常のforループ。ループ回数（終了条件）を事前に設定する必要がある。レコード数不明の場合は.size()を呼ぶことになり、問題の条件に反する。\n❌ B（Do { } While(Condition)）→ 最低1回実行してから条件判定するループ。レコード数不明時の「適切な終了条件」を設定しにくい。\n❌ D（While(Condition) { }）→ 条件が真の間ループ。B同様、終了条件の設定が難しい。\n\n🎯 試験のコツ：「レコード数不明」「.size()を使わずに全件処理」→ 拡張forループ（for-each）が正解。", "a": "For(init_stmt, exit_condition; increment_stmt) { }", "b": "Do { } While(Condition)", "c": "For(variable : list_or_set) { }", "d": "While(Condition) { … }"}, {"n": "5675", "p": "共有に関する正確な説明はどれですか。2つ選びなさい。", "r": "デベロッパーの基本", "ans": "B;C", "exp": "ざっくり言うと：Apexの共有設定（with sharing）について正しいのは？2つ選ぶ問題。\n\n【前提知識：内部クラスと外部クラス】\n外部クラス＝ファイルの一番外側のクラス。内部クラス＝外部クラスの中に定義されたクラス。Javaのインナークラスと同じ概念。\n\n✅ 正解 B：内部クラスは外部クラスから共有設定を継承しない\n内部クラスは独自のwith sharing/without sharing設定を持つ。外部クラスがwith sharingでも、内部クラスに指定がなければ別の動作になる。\n\n✅ 正解 C：内部クラスと外部クラスの両方をwith sharingで宣言できる\nApexでは内部・外部の両方にwith sharingをつけることが可能。\n\n❌ A（両方には宣言できない）→ Cの通り、両方に宣言できる。\n❌ D（内部クラスは継承する）→ Bの通り、継承しない。\n\n🎯 試験のコツ：内部クラスの共有設定は「独立」。外部から自動で引き継がない。", "a": "内部クラスまたは外部クラスのいずれかを共有と同様に宣言できますが、両方は宣言できません。", "b": "内部クラスは外部クラスから共有設定を継承しません。", "c": "内部クラスと外部クラスの両方を共有と同様に宣言できます。", "d": "内部クラスは外部クラスから共有設定を継承します。"}, {"n": "5676", "p": "開発者には、コードブロックを共有ありまたはなしで実行するかどうかを示すwith sharingおよびwithout sharingを省略したコードブロックがあります。Salesforce組織でコードを実行するユーザーの組織全体のデフォルトおよび共有設定に自動的に従うものは次のうちどれですか。", "r": "ユーザインターフェース", "ans": "D", "exp": "ざっくり言うと：with sharing/without sharingを省略したとき、ユーザーの共有設定に自動的に従うのは？\n\n✅ 正解 D：匿名ブロック\n匿名ブロック（開発者コンソールの「匿名実行」）は、現在ログインしているユーザーの権限と共有設定で実行される。sharing宣言を省略しても、ユーザーの共有ルールが自動適用される。\n\n❌ A（Apexトリガー）→ トリガーにはwith sharing/without sharingを明示的に指定できない。デフォルトではwithout sharing（システムモード）で実行される。\n❌ B（HTTPコールアウト）→ 外部サービスへのHTTPリクエストであり、Salesforceの共有設定とは無関係。\n❌ C（カスタムコントローラ）→ sharing宣言を省略した場合、呼び出し元のクラスやトリガーのデフォルト動作に従う。ユーザーの共有設定に「自動的に」従うわけではない。\n\n🎯 試験のコツ：匿名ブロック＝「ログインユーザーとして実行」。トリガー＝「sharing指定不可、デフォルトはwithout sharing」。", "a": "Apexトリガー", "b": "HTTPコールアウト", "c": "カスタムコントローラ", "d": "匿名ブロック"}, {"n": "5677", "p": "SalesforceDXを使用する場合、スクラッチ組織を作成・管理するために開発者は何を有効にする必要がありますか。", "r": "テスト、デバッグ、リリース", "ans": "B", "exp": "ざっくり言うと：Salesforce DXでスクラッチ組織を使うために何を有効にする？\n\n✅ 正解 B：Dev Hub\nDev Hub（開発ハブ）は、スクラッチ組織を作成・管理するための中央管理機能。本番環境またはビジネス組織でDev Hubを有効にすることで、そこからスクラッチ組織を作成できるようになる。\n\n❌ A（Production）→ 本番環境自体はスクラッチ組織の作成機能を持たない。本番環境「上で」Dev Hubを有効にするのが正しい。\n❌ C（環境ハブ）→ 複数のSalesforce組織を一元管理するためのツール。スクラッチ組織の作成・管理とは別物。\n❌ D（Sandbox）→ サンドボックスは本番のコピー環境。スクラッチ組織とは仕組みが違う。\n\n🎯 試験のコツ：スクラッチ組織 = Dev Hub + Salesforce CLI。この2つはセットで覚える。", "a": "Production", "b": "Dev Hub", "c": "環境ハブ", "d": "Sandbox"}, {"n": "5678", "p": "開発者は、取引先を操作するApexメソッドに十分なテストカバレッジがあることを確認する必要があります。 開発者はテストデータを作成する必要があります。このテストデータをSalesforceに読み込むための好ましい方法は何ですか。2つ選びなさい。", "r": "テスト、デバッグ、リリース", "ans": "A;D", "exp": "ざっくり言うと：Apexテストでテストデータを読み込む方法は？2つ選ぶ問題。\n\n✅ 正解 A：CSVファイルを使用する\nテストデータをCSV形式で作成し、静的リソースとしてSalesforceにアップロードする。Test.loadDataメソッドでそのCSVを読み込んでテストデータとして利用できる。\n\n✅ 正解 D：静的リソースを使用する\nAと組み合わせて使う。CSVファイルを静的リソースとして保存し、Test.loadData(sObjectType, 'リソース名')で一括読み込みする。\n\n❌ B（HttpCalloutMocks）→ 外部HTTPコールアウトのモック（偽物）を作るためのもの。テストデータの読み込みとは別の話。\n❌ C（WebServiceTests）→ Webサービスのテスト用であり、テストデータの作成とは関係ない。\n\n🎯 試験のコツ：テストデータ読み込み = CSVファイル + 静的リソース + Test.loadData()。この3点セットを覚える。", "a": "CSVファイルを使用する", "b": "HttpCalloutMocksを使用する", "c": "WebServiceTestsを使用する", "d": "静的リソースを使用する"}, {"n": "5679", "p": "開発者はオブジェクトProperty__cのレコードを作成する必要があります。\n\n開発者は次のコードブロックを使用します。\n\nList propertiesToCreate = helperClass.CreateProperties();\ntry {\n    /*Question*/\n} catch (Exception exp) {\n    //Exception handling\n}\n\nレコードにエラーが発生して作成に失敗した場合でも、開発者は「/*Question*/」にどのようなコードを挿入すれば、少なくともいくつかのレコードを作成することができるでしょうか。", "r": "テスト、デバッグ、リリース", "ans": "C", "exp": "ざっくり言うと：insertに失敗してもエラーにならず、成功したレコードだけ保存する方法は？\n\n✅ 正解 C：Database.insert(propertiesToCreate, false)\n第2引数のfalseは「allOrNone = false」の意味。つまり「全部成功しなくてもOK」。1件でもエラーがあった場合、エラーのレコードだけスキップして、残りは正常に保存される。たとえ話：クラス全員のテストを採点するとき、1人白紙でも他の人の採点は続ける。\n\n❌ A（System.ALLOW_PARTIAL）→ そんなオプションはApexに存在しない。\n❌ B（insert propertiesToCreate;）→ 標準のinsert文は「allOrNone = true」がデフォルト。1件でもエラーがあると全件ロールバック。\n❌ D（Database.insert(propertiesToCreate)）→ 第2引数を省略するとデフォルトでtrue（全件成功必須）。\n\n🎯 試験のコツ：部分成功 = Database.insert(records, false)。標準のinsert文では部分成功できない。", "a": "Database.insert(propertiesToCreate, System.ALLOW_PARTIAL);", "b": "insert propertiesToCreate;", "c": "Database.insert(propertiesToCreate, false);", "d": "Database.insert(propertiesToCreate);"}, {"n": "5680", "p": "サンドボックスで作業する開発者は、新しいテストクラスを実行するために何を使用する必要がありますか。2つ選びなさい。", "r": "テスト、デバッグ、リリース", "ans": "C;D", "exp": "ざっくり言うと：サンドボックスで新しいテストクラスを実行するには何を使う？2つ選ぶ問題。\n\n✅ 正解 C：Salesforceセットアップの[Apexテスト実行]ページ\n設定画面から「Apexテスト実行」を開いて、テストクラスを選択して実行できる。\n\n✅ 正解 D：開発者コンソールのテストメニュー\n開発者コンソールの[Test]タブから、テストクラスを選んで実行できる。\n\n❌ A（REST APIおよびApexTestRunメソッド）→ ApexTestRunメソッドという標準メソッドは存在しない。\n❌ B（Salesforceセットアップの[テストの実行]ページ）→ 正確なページ名は「Apexテスト実行」。「テストの実行」というページは存在しない。\n\n🎯 試験のコツ：テスト実行方法 = セットアップの「Apexテスト実行」ページ or 開発者コンソール。名前の微妙な違いに注意。", "a": "REST APIおよびApexTestRunメソッド", "b": "Salesforceセットアップの[テストの実行]ページ", "c": "Salesforceセットアップの[Apexテスト実行]ページ", "d": "開発者コンソールのテストメニュー"}, {"n": "5681", "p": "Universal Containers社は、注文管理アプリケーションを実装しました。各注文は1つ以上の注文明細項目を持つことができます。注文明細オブジェクトは、主従関係を通じて注文オブジェクトに関連しています。各注文明細について、合計価格は注文明細の価格に注文数量を掛け合わせることで計算されます。注文レコード上のすべての注文明細項目の合計を取得するためのベストプラクティスは何ですか。", "r": "デベロッパーの基本", "ans": "C", "exp": "ざっくり言うと：子オブジェクト（注文明細）の合計金額を親（注文）に自動表示するには？\n\n【前提知識：積み上げ集計項目とは？】\n主従関係の子レコードのCOUNT/SUM/MIN/MAXを親レコードに自動表示する項目。たとえ話：家計簿で各明細の金額を自動で合計してくれる機能。主従関係が前提条件。\n\n✅ 正解 C：積み上げ集計項目\n注文と注文明細は主従関係なので、積み上げ集計項目でSUM（合計価格）を自動計算できる。コードを書く必要がなく、設定だけで実現できるのでベストプラクティス。\n\n❌ A（クイックアクション）→ レコード作成やデータ更新を素早く行うUI機能。集計計算の仕組みではない。\n❌ B（Apexトリガー）→ コードで同じことはできるが、標準機能で実現できるならそちらを優先するのがSalesforceのベストプラクティス。\n❌ D（数式項目）→ 同一レコード内の項目を計算する機能。子レコードの集計はできない。\n\n🎯 試験のコツ：「主従関係 + 子の集計を親に表示」→ 積み上げ集計項目。参照関係では使えないので注意。", "a": "クイックアクション", "b": "Apex トリガー", "c": "積み上げ集計項目", "d": "数式項目"}, {"n": "5682", "p": "開発者は次の匿名コードブロックを実行します。\n\nList acc =[SELECT Id FROM Account LIMIT 10]; \nDelete acc;\nDatabase.emptyRecycleBin(acc);\nsystem.debug(Limits.getDMLStatements() + ’、’ + Limits.getLimitDMLStatements());\n\n結果は次の選択肢のうちのどれになりますか。", "r": "テスト、デバッグ、リリース", "ans": "A", "exp": "ざっくり言うと：匿名ブロックでDML操作した後のLimitsメソッドの戻り値は？\n\n✅ 正解 A：2、150\ngetDMLStatements() = 現在のトランザクションで実行済みのDML回数。deleteで1回、emptyRecycleBinで1回 = 合計2回。\ngetLimitDMLStatements() = 1トランザクションのDML上限 = 常に150。\n\n❌ B（11、150）→ DML回数は2回であり11ではない。\n❌ C（150、2）→ 順番が逆。getDML=2、getLimit=150。\n❌ D（150、11）→ 両方とも値が間違い。\n\n🎯 試験のコツ：Limits.getDML〜() = 「今何回使った？」、Limits.getLimit〜() = 「上限は何回？」。emptyRecycleBinもDMLとしてカウントされる。", "a": "<p>2、150</p>", "b": "<p>11、150</p>", "c": "150、2", "d": "150、11"}, {"n": "5683", "p": "カスタム例外「RecordNotFoundException」は、次のブロックコードによって定義されます。\n\npublic class RecordNotFoundException extends Exception() {\n\n}\n\n開発者はどのステートメントを使用してカスタム例外をスローできますか。2つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "A;B", "exp": "ざっくり言うと：カスタム例外のthrow文として正しい書き方はどれ？2つ選ぶ問題。\n\n【前提知識：例外のスロー】\nApexで例外を投げるにはthrow new 例外クラス名()と書く。newキーワードが必須。Javaと同じ構文。\n\n✅ 正解 A：throw new RecordNotFoundException(\"problem occured\");\nnewで例外インスタンスを生成し、エラーメッセージ付きでスロー。正しい構文。\n\n✅ 正解 B：throw new RecordNotFoundException();\nメッセージなしでスロー。メッセージは省略可能。\n\n❌ C（throw RecordNotFoundException(\"problem occured\");）→ newキーワードがない。例外は必ずnewでインスタンスを作る必要がある。\n❌ D（throw RecordNotFoundException();）→ 同じくnewがない。\n\n🎯 試験のコツ：throw文 = throw new クラス名()。newが抜けてたら即アウト。", "a": "throw new RecordNotFoundException(“problem occured”);", "b": "throw new RecordNotFoundException();", "c": "throw RecordNotFoundException(“problem occured”);", "d": "throw RecordNotFoundException();"}, {"n": "5684", "p": "Apexテストクラスを作成するときに使用できるメソッドは何ですか。2つ選びなさい。", "r": "テスト、デバッグ、リリース", "ans": "C;E", "exp": "ざっくり言うと：Apexテストクラスで使えるTestクラスのメソッドは？2つ選ぶ問題。\n\n✅ 正解 C：ApexテストでCreatedDateフィールドを設定・変更するメソッド\nTest.setCreatedDate(recordId, datetime)でテスト中にレコードの作成日を任意に設定できる。本来システムが自動設定する項目をテスト用に上書きできる。\n\n✅ 正解 E：CSVファイルを使用してテストデータを選択するメソッド\nTest.loadData(sObjectType, 'staticResource')で静的リソースのCSVからテストデータを一括読み込みできる。\n\n❌ A（エラータイプを無視するメソッド）→ そんなメソッドは存在しない。エラーはtry/catchで処理する。\n❌ B（@futureメソッドの後にアサーション）→ @futureは非同期。Test.startTest()/stopTest()で制御する。「@futureの後にアサーション」するメソッドは存在しない。\n❌ D（ブレークポイント設定メソッド）→ Apexテストクラスにブレークポイントを設定するメソッドは存在しない。\n\n🎯 試験のコツ：Testクラスの主なメソッド = startTest/stopTest、loadData、setCreatedDate、getStandardPricebookId。", "a": "開発者コンソールで無視するエラータイプを選択するメソッド", "b": "@futureメソッドの後にテストするアサーションを作成するメソッド", "c": "ApexテストでCreatedDateフィールドを設定および変更するメソッド", "d": "ブレークポイントを設定して、特定のポイントで実行をフリーズするメソッド", "e": "システムに保存されているcsvファイルを使用してテストデータを選択するメソッド"}, {"n": "5685", "p": "次のクエリを実行します。\n\nContact con = [SELECT ID,FirstName,LastName,Email FROM Contact WHERE LastName = ’Smith’];\n\n姓が「Smith」のレコードがない場合、クエリは何を返しますか。", "r": "テスト、デバッグ、リリース", "ans": "D", "exp": "ざっくり言うと：SOQLの結果を単一の変数に代入して、結果が0件だったらどうなる？\n\n✅ 正解 D：行が見つからないというエラー\nSOQLの結果を単一のsObject型変数に代入する場合、結果が0件だとSystem.QueryException（List has no rows for assignment to SObject）がスローされる。\n\n❌ A（空の値を持つ取引先責任者）→ 空のオブジェクトが作られるわけではない。例外が発生する。\n❌ B（nullに初期化された取引先責任者）→ nullが返るわけでもない。例外が発生する。\n❌ C（空のリスト）→ リスト型に代入すれば空のリストが返るが、問題は単一のsObject型変数への代入。\n\n🎯 試験のコツ：SOQL結果を単一変数に代入→0件:例外、1件:OK、2件以上:例外。安全に使うならList型で受け取る。", "a": "空の値を持つ取引先責任者", "b": "nullに初期化された取引先責任者", "c": "取引先責任者の空のリスト", "d": "行が見つからないというエラー"}, {"n": "5686", "p": "Lightningコンポーネントフレームワークでは、クライアント側のコントローラーロジックはどこに含まれていますか。", "r": "ユーザインターフェース", "ans": "D", "exp": "ざっくり言うと：Lightningコンポーネントのクライアント側ロジックはどの言語？\n\n✅ 正解 D：JavaScript\nLightningコンポーネント（Aura/LWC共通）のクライアント側コントローラーはJavaScriptで記述する。ユーザーの操作への応答、データの加工、UIの動的制御などを担当。\n\n❌ A（Apex）→ Apexはサーバー側の言語。DB操作やビジネスロジックを担当するが、クライアント側のUI制御には使わない。\n❌ B（Visualforce）→ VisualforceはHTMLベースのUI技術。プログラムロジック用の言語ではない。\n❌ C（HTML）→ HTMLはページの構造を定義するマークアップ言語。ロジックの実装には使えない。\n\n🎯 試験のコツ：クライアント側 = JavaScript、サーバー側 = Apex、画面構造 = HTML。MVC的に覚える。", "a": "Apex", "b": "Visualforce", "c": "HTML", "d": "JavaScript"}, {"n": "5687", "p": "Full Sandboxには当てはまらないが、Partial Copy Sandboxに当てはまるものはどれですか。2つ選びなさい。", "r": "デベロッパーの基本", "ans": "A;D", "exp": "ざっくり言うと：Full Sandboxには当てはまらないがPartial Copyには当てはまる特徴は？2つ選ぶ問題。\n\n✅ 正解 A：より頻繁に更新される\nPartial Copy = 5日ごとに更新可能。Full = 29日ごと。Developer/Dev Pro = 1日ごと。\n\n✅ 正解 D：データストレージに上限が存在する\nPartial Copy = 5GBの上限あり。Full = 本番と同じストレージ（上限なし≒本番と同じ）。\n\n❌ B（メタデータのみ）→ Partial Copyはメタデータ＋選択的なデータを含む。メタデータのみなのはDeveloper/Developer Pro。\n❌ C（変更セットが使用できる）→ すべてのサンドボックスタイプで変更セットは使える。\n\n🎯 試験のコツ：サンドボックス4種の違い（Developer/Dev Pro/Partial/Full）の更新頻度・データ容量・テンプレートの有無を整理して覚える。", "a": "より頻繁に更新される", "b": "コピーされる内容はメタデータのみ", "c": "変更セットが使用できる", "d": "データストレージに上限が存在する"}, {"n": "5688", "p": "開発者は、取引先オブジェクトの不要なカスタム項目をスキーマビルダーを使用して削除するには、どうすればよいでしょうか。", "r": "デベロッパーの基本", "ans": "B", "exp": "ざっくり言うと：スキーマビルダーでカスタム項目を削除するときの正しい手順は？\n\n✅ 正解 B：コードからすべての参照を削除してから、スキーマビルダーから項目を削除する\nApexコードやフローなどでその項目を参照している場合、先にコード側の参照を消さないと項目を削除できない。Salesforceは「参照されている項目は削除させない」安全装置がある。\n\n❌ A（コード参照を消すと自動で項目も消える）→ コード参照を消しても項目は自動削除されない。項目の削除は別途手動で行う必要がある。\n❌ C（削除マークをつけてからUIで削除）→ スキーマビルダーに「削除マーク」機能は存在しない。\n❌ D（項目を消すとコード参照も消える）→ 逆。項目が参照されているとそもそも削除できない。\n\n🎯 試験のコツ：項目削除の手順 = まずコード参照を全部消す → その後に項目を削除。順番を間違えるとエラー。", "a": "コード内のすべての参照を削除すると、スキーマビルダーからカスタム項目が削除されます。", "b": "コードからすべての参照を削除してから、スキーマビルダーからカスタム項目を削除します。", "c": "スキーマビルダーで削除するカスタム項目をマークしてから、宣言型UIから削除します。", "d": "スキーマビルダーからカスタム項目を削除すると、コード内のすべての参照が削除されます。"}, {"n": "5689", "p": "開発者は、すべてのテストが合格しているかどうかを知る必要があります。開発者はどの機能を使用できますか。 2つ選びなさい。", "r": "テスト、デバッグ、リリース", "ans": "A;C", "exp": "ざっくり言うと：すべてのApexテストが合格しているか確認できる場所は？2つ選ぶ問題。\n\n✅ 正解 A：開発者コンソール\n開発者コンソールのテストメニューからテストを実行し、結果（合格/不合格）を確認できる。\n\n✅ 正解 C：Salesforce UI [Apexテスト実行]\n設定画面のApexテスト実行ページでテストを実行し、結果を確認できる。\n\n❌ B（Ant移行ツール）→ メタデータの移行・デプロイ用ツール。テスト結果の確認機能はない。\n❌ D（Workbenchメタデータの取得）→ メタデータの取得・照会用ツール。テストの実行・結果確認はできない。\n\n🎯 試験のコツ：テスト実行＆結果確認 = 開発者コンソール or セットアップのApexテスト実行ページ。", "a": "開発者コンソール", "b": "Ant 移行ツール", "c": "Salesforce UI [Apex テスト実行]", "d": "Workbenchメタデータの取得"}, {"n": "5690", "p": "Salesforce Lightning環境において、ユーザーページレイアウトのアクションに関係なく、ユーザープロファイルページに表示される標準的なChatterアクションは何ですか。2つ選びなさい。", "r": "ユーザインターフェース", "ans": "A;C", "exp": "ざっくり言うと：Lightning Experienceのユーザープロファイルに常に表示されるChatterアクションは？2つ選ぶ問題。\n\n✅ 正解 A：投稿\nユーザープロファイルの標準Chatterアクションとして「投稿」は常に表示される。\n\n✅ 正解 C：アンケート\n「アンケート」もユーザープロファイルの標準Chatterアクションとして表示される。\n\n❌ B（感謝(WDC)）→ 感謝アクションはSalesforce Classic専用。Lightning Experienceでは表示されない。\n❌ D（ファイル）→ ファイルアクションもSalesforce Classic専用。\n❌ E（メール）→ メールはユーザープロファイルの標準Chatterアクションではない。\n\n🎯 試験のコツ：Lightning vs Classicで使えるChatterアクションの違いが問われる。", "a": "投稿", "b": "感謝(WDC)", "c": "アンケート", "d": "ファイル", "e": "メール"}, {"n": "5691", "p": "Lightningコンポーネントバンドルに含めることができるリソースはどれですか。2つ選びなさい。", "r": "ユーザインターフェース", "ans": "C;D", "exp": "ざっくり言うと：Lightningコンポーネントバンドルに含められるリソースは？2つ選ぶ問題。\n\n✅ 正解 C：JavaScript\nコントローラ（イベントハンドラ）やヘルパー（共通ロジック）としてJavaScriptファイルを含められる。\n\n✅ 正解 D：ドキュメント\nコンポーネントの説明文やサンプルコードを記述するドキュメントファイルを含められる。\n\n❌ A（Apexクラス）→ Apexはサーバー側のコード。コンポーネントバンドルに直接含めるものではなく、@AuraEnabled等で別途呼び出す。\n❌ B（Adobe Flash）→ FlashはSalesforceではサポートされていない。\n\n🎯 試験のコツ：Auraコンポーネントバンドル = コンポーネント(.cmp) + コントローラ(.js) + ヘルパー(.js) + スタイル(.css) + ドキュメント + デザイン + レンダラー + SVG。", "a": "Apexクラス", "b": "Adobe Flash", "c": "JavaScript", "d": "ドキュメント"}, {"n": "5692", "p": "ユーザーが特定のオブジェクト用の作成アクションを使って新しいデータを作成する場合、その新しいデータに関連する情報がどのタイムラインに表示されますか。3つ選びなさい。", "r": "ユーザインターフェース", "ans": "A;B;D", "exp": "ざっくり言うと：作成アクションで新しいデータを作ったとき、どのフィードに表示される？3つ選ぶ問題。\n\n✅ 正解 A：レコードを作成したユーザーのChatterフィード\n作成者のフィードにアクションが記録される。\n\n✅ 正解 B：新しいレコードが作成されたレコードのフィード\n作成元の親レコードのフィードにも情報が表示される。\n\n✅ 正解 D：新しいレコードのフィードの最初のエントリとして\n新規レコード自身のフィードにも、最初のエントリとして作成情報が表示される。\n\n❌ C（レコードを表示できるすべてのユーザーのプロフィールフィード）→ 全ユーザーには表示されない。関係するユーザーのみ。\n❌ E（レコードをフォローする最初のユーザーのフィード）→ フォローしているだけでは自動表示されない。\n\n🎯 試験のコツ：作成アクションの結果は「作成者」「親レコード」「新レコード自身」の3箇所に反映される。", "a": "レコードを作成したユーザーのChatterフィード", "b": "新しいレコードが作成されたレコードのフィード", "c": "レコードを表示できるすべてのユーザーのユーザープロフィールフィード", "d": "新しいレコードのフィードの最初のエントリとして", "e": "レコードが作成されたレコードをフォローする最初のユーザーのChatterフィード"}, {"n": "5693", "p": "開発者は、商品(API名:Product2)と価格表(API名:Pricebook2)のテストデータを作成するときにどのステートメントを使用しますか。", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：商品と価格表のテストデータを作るとき、どのメソッドを使う？\n\n✅ 正解 C：Id pricebookId = Test.getStandardPricebookId();\nテスト環境では標準価格表に直接アクセスできない。Test.getStandardPricebookId()は、テスト内で標準価格表のIDを取得するための専用メソッド。商品（Product2）と価格表エントリ（PricebookEntry）のテストには必須。\n\n❌ A（Test.loadData(Account.sObjectType, \"myResource\")）→ Account用のデータ読み込みであり、Product2や価格表とは無関係。\n❌ B（Pricebook pb = new Pricebook()）→ API名が間違い。正しくはPricebook2。\n❌ D（IsTest(SeeAllData = false)）→ アノテーションであり、テストデータを作成するメソッドではない。\n\n🎯 試験のコツ：価格表テスト = Test.getStandardPricebookId()。このメソッド名を覚えておけばOK。", "a": "List objList = Test.loadData(Account.sObjectType, “myResource”);", "b": "Pricebook pb = new Pricebook();", "c": "Id pricebookId = Test.getStandardPricebookId();", "d": "IsTest(SeeAllData = false);"}, {"n": "5694", "p": "Universal Containers社は、顧客やサービスエージェントが注文を識別するために注文番号を使用する注文システムを使用しています。注文レコードはSalesforceにインポートされます。Salesforceで注文番号項目はどのように定義されるべきですか。", "r": "デベロッパーの基本", "ans": "B", "exp": "ざっくり言うと：外部システムのIDをSalesforceに持ち込むとき、どの項目設定にする？\n\n✅ 正解 B：外部IDおよびユニーク\n外部ID＝「Salesforceの外で使われていた番号をSalesforce上でも検索キーにする」設定。たとえば、元の注文システムで「ORD-00123」という番号で管理してたものをSalesforceでも同じ番号で検索・紐付けできるようにする。「ユニーク」をつける理由は、注文番号が重複したらどの注文かわからなくなるから。\n\n❌ A（直接参照）→ Salesforceレコード同士を紐付けるリレーション。外部番号の取り込みとは別の話。\n❌ C（参照）→ これもリレーション（参照関係）のこと。親子関係を作る機能で、番号の一意性とは無関係。\n❌ D（間接参照）→ 外部オブジェクト（Salesforce Connectで接続した外部DB）と紐付けるときに使う特殊なリレーション。今回は「インポート済み」なので外部オブジェクトではない。\n\n🎯 試験のコツ：「外部からデータを持ち込む」＋「一意に識別したい」→ 外部ID＋ユニーク。鉄板パターン。", "a": "直接参照", "b": "外部IDおよびユニーク", "c": "参照", "d": "間接参照"}, {"n": "5695", "p": "通貨項目は、Apexのどのプリミティブデータ型に自動的に割り当てられますか。", "r": "デベロッパーの基本", "ans": "B", "exp": "ざっくり言うと：Salesforceの通貨項目は、Apexではどのデータ型になる？\n\n✅ 正解 B：Decimal\n通貨項目はDecimal型に自動割り当て。Decimal型は固定小数点数を正確に表現でき、お金の計算で起きがちな丸め誤差を防げる。\n\n❌ A（Integer）→ 整数型。小数点以下を扱えないので、99.99円みたいな値が表現できない。\n❌ C（Double）→ 浮動小数点型。計算できるが、丸め誤差が発生する可能性がある。通貨にはDecimalが推奨。\n❌ D（Currency）→ ApexにCurrencyというプリミティブデータ型は存在しない。\n\n🎯 試験のコツ：通貨 = Decimal。「お金の計算はDecimal」と覚える。DoubleではなくDecimalである理由は精度の問題。", "a": "Integer", "b": "Decimal", "c": "Double", "d": "Currency"}, {"n": "5696", "p": "dowork() メソッドを呼び出す際に使用できるコードセグメントはどれですか。", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：トリガー内でdowork()メソッドをInsert時にだけ呼び出す正しい書き方は？\n\n✅ 正解 B：If(Trigger.isInsert) dowork();\nTrigger.isInsertはboolean型のプロパティで、現在のトリガーがInsert操作で実行されているときにtrueを返す。if文の条件として使い、trueならdowork()を呼ぶ。\n\n❌ A（For(Trigger.isInsert t: Trigger.new)）→ for-eachループの変数にboolean型（Trigger.isInsert）を指定している。構文エラー。\n❌ C（If(Trigger.isRunning) dowork();）→ Trigger.isRunningというプロパティは存在しない。\n❌ D（For(Trigger.isRunning t: Trigger.new)）→ isRunningが存在しない上に、for文の構文も不正。\n\n🎯 試験のコツ：トリガーの条件分岐 = Trigger.isInsert, isUpdate, isDelete, isBefore, isAfter。isRunningは存在しない。", "a": "For(Trigger.isInsert t: Trigger.new) { dowork(); }", "b": "If(Trigger.isInsert) dowork();", "c": "If(Trigger.isRunning) dowork();", "d": "For(Trigger.isRunning t: Trigger.new) { dowork(); }"}, {"n": "5697", "p": "企業は、候補者と面接をモデル化する求人アプリを求めています。各候補者レコードの面接の総数を表示します。\n面接レコードのセキュリティを、候補レコードのセキュリティとは独立して定義します。開発者はこのタスクを達成するために何をしますか。2つ選びなさい。", "r": "デベロッパーの基本", "ans": "C;D", "exp": "ざっくり言うと：セキュリティを独立に設定しつつ、面接の件数を候補者に表示するには？2つ選ぶ問題。\n\n【前提知識：主従関係 vs 参照関係のセキュリティ】\n主従関係→子のセキュリティは親に依存（独立設定不可）。参照関係→それぞれ独立したセキュリティ設定が可能。\n\n✅ 正解 C：参照関係を作成する\n「セキュリティを独立して定義」という要件があるため、主従関係ではなく参照関係を使う。\n\n✅ 正解 D：候補オブジェクトの項目を更新するトリガーを面接オブジェクトに作成する\n参照関係では積み上げ集計項目が使えない（主従関係限定）。そのため、面接レコードが追加/削除されたときにトリガーで候補者の面接数を更新する。\n\n❌ A（積み上げ集計項目を作成）→ 積み上げ集計項目は主従関係でしか使えない。今回は参照関係なので不可。\n❌ B（主従関係を作成）→ 主従関係にするとセキュリティが親に依存し、「独立して定義」の要件を満たせない。\n\n🎯 試験のコツ：「セキュリティ独立」→ 参照関係。「参照関係で集計」→ トリガーかフローで手動集計。", "a": "面接レコードをカウントする候補オブジェクトに積み上げ集計項目を作成します", "b": "候補オブジェクトと面接オブジェクトの間に主従関係を作成します", "c": "候補オブジェクトと面接オブジェクトの間に参照関係を作成します", "d": "候補オブジェクトの項目を更新するトリガーを面接オブジェクトに作成します"}, {"n": "5698", "p": "組織には、取引先関連の機能を提供するさまざまなApexクラスがあります。新しい入力規則がオブジェクトに追加された後、多くのテストメソッドが失敗します。失敗を解決し、将来の入力規則に必要なコード変更の数を減らすために何ができますか。2つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "A;B", "exp": "ざっくり言うと：入力規則の追加でテストが大量に失敗。修正範囲を最小限にするには？2つ選ぶ問題。\n\n✅ 正解 A：有効なレコードを作成するメソッドを作成し、テストから呼び出す\nテストデータ作成を1つのメソッド（TestDataFactory）に集約する。入力規則が変わったらそのメソッドだけ直せばOK。\n\n✅ 正解 B：静的リソースからレコードをロードするメソッドを作成する\nCSVファイルを静的リソースに保存し、Test.loadDataで読み込む。入力規則が変わったらCSVを更新するだけ。\n\n❌ C（コールアウトでレコードを作成）→ テスト中に外部システムとの依存関係を作るのはNG。テストは独立して動くべき。\n❌ D（既存レコードを照会）→ テストメソッドは組織の実データに依存すべきではない。テストは独立したデータで動くのがベストプラクティス。\n\n🎯 試験のコツ：テストデータの一元管理 = TestDataFactoryパターン or 静的リソース。変更に強い設計が重要。", "a": "有効な取引先レコードを作成するメソッドを作成し、テストメソッド内からこのメソッドを呼び出します。", "b": "有効な取引先レコードを静的リソースからロードするメソッドを作成し、テストメソッド内でこのメソッドを呼び出します。", "c": "有効な取引先レコードのコールアウトを実行するメソッドを作成し、テストメソッド内からこのメソッドを呼び出します。", "d": "有効な取引先レコードを照会するメソッドを作成し、テストメソッド内からこのメソッドを呼び出します。"}, {"n": "5699", "p": "ある開発者が、エンジンとその部品を追跡するアプリケーションを作成しています。個々の部品は、異なるタイプのエンジンで使用することができます。データを追跡し、孤立したレコードを防ぐには、どのようなデータモデルを使用する必要がありますか。", "r": "デベロッパーの基本", "ans": "B", "exp": "ざっくり言うと：エンジンと部品の多対多の関係を追跡し、孤立レコードを防ぐには？\n\n【前提知識：連結オブジェクト（Junction Object）】\n多対多の関係を実現するための中間テーブル。2つの親オブジェクトに対してそれぞれ主従関係を持つ。たとえ話：映画の出演者リスト。1本の映画に複数の俳優、1人の俳優が複数の映画に出演→「出演」という中間テーブルが必要。\n\n✅ 正解 B：連結オブジェクトを作成し、主従関係を通じて多数のエンジンと多数の部品を関連付ける\n主従関係で連結することで、親レコードが削除されると連結レコードも自動削除される→孤立レコードが防げる。\n\n❌ A（一対多の主従関係）→ 「1つの部品は複数のエンジンで使える」ので一対多ではなく多対多が必要。\n❌ C（参照関係）→ 参照関係では親が削除されても子は残る→孤立レコードが発生する。\n❌ D（参照関係で連結）→ 参照関係の連結では孤立防止ができない。主従関係が必要。\n\n🎯 試験のコツ：多対多＋孤立防止 → 主従関係の連結オブジェクト。参照関係だと孤立が起きる。", "a": "エンジンと部品の一対多のモデルを表すために、主従関係を作成する。", "b": "連結オブジェクトを作成し、主従関係を通じて多数のエンジンと多数の部品を関連付けます。", "c": "参照関係を作成し、各部品が親エンジン・オブジェクトにどのように関係するかを表現します。", "d": "連結オブジェクトを作成し、参照関係を通じて多数のエンジンと多数の部品を関連付けます。"}, {"n": "5700", "p": "StandardControllerクラスで定義されているメソッドはどれですか。2つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "B;D", "exp": "ざっくり言うと：StandardControllerクラスに定義されているメソッドは？2つ選ぶ問題。\n\n✅ 正解 B：Save\nレコードの変更を保存し、更新されたPageReferenceを返すメソッド。\n\n✅ 正解 D：Cancel\nキャンセル操作を実行し、前のページへのPageReferenceを返すメソッド。\n\n❌ A（Merge）→ StandardControllerにMergeメソッドは含まれていない。\n❌ C（Undelete）→ StandardControllerにUndeleteメソッドは含まれていない。\n\n🎯 試験のコツ：StandardControllerの主なメソッド = save(), cancel(), delete(), edit(), view(), getId()。merge/undeleteは含まれない。", "a": "Merge", "b": "Save", "c": "Undelete", "d": "Cancel"}, {"n": "5701", "p": "取引先レコードの項目値が更新された場合、関連する商談のカスタム項目の値を更新する方法はどれですか。2つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "A;B", "exp": "ざっくり言うと：取引先の項目が変わったとき、関連する商談のカスタム項目を更新する方法は？2つ選ぶ問題。\n\n✅ 正解 A：取引先オブジェクトのApexトリガー\n取引先が更新されたときにトリガーを起動し、関連する商談のカスタム項目をApexコードで更新できる。\n\n✅ 正解 B：取引先オブジェクトのプロセスビルダー\n取引先の更新をトリガーにして、関連する商談のカスタム項目を自動更新するプロセスを作成できる。※現在はフローへの移行が推奨されている。\n\n❌ C（クロスオブジェクト数式項目）→ 他のオブジェクトの値を「表示」することはできるが、「更新」はできない。読み取り専用。\n❌ D（ワークフロールール）→ ワークフローの項目更新は同一オブジェクト内のみ。別オブジェクト（商談）の項目は更新できない。\n\n🎯 試験のコツ：「別オブジェクトの項目を更新」→ Apexトリガーかフロー/プロセスビルダー。ワークフローは同一オブジェクトのみ。", "a": "取引先オブジェクトのApexトリガー", "b": "取引先オブジェクトのプロセスビルダー", "c": "取引先オブジェクトのクロスオブジェクト数式項目", "d": "取引先オブジェクトのワークフロールール"}, {"n": "5702", "p": "Lightningコンポーネントは次のうちどの製品で利用できますか。3つ選びなさい。", "r": "ユーザインターフェース", "ans": "A;C;D", "exp": "ざっくり言うと：Lightningコンポーネントが使える製品は？3つ選ぶ問題。\n\n✅ 正解 A：Salesforceモバイルアプリ\nモバイルアプリ上でLightningコンポーネントが動作する。\n\n✅ 正解 C：コミュニティ\nSalesforceコミュニティ（Experience Cloud）でLightningコンポーネントを使用できる。\n\n✅ 正解 D：Lightning Experience\nSalesforceの標準UIであるLightning Experienceが主な利用場所。\n\n❌ B（Force.com）→ Force.comは開発プラットフォームの名称で、エンドユーザー向けのUIではない。Lightningコンポーネントの「利用場所」としては適切でない。\n\n🎯 試験のコツ：Lightningコンポーネントが動く場所 = Lightning Experience + モバイルアプリ + コミュニティ。", "a": "Salesforceモバイルアプリ", "b": "Force.com", "c": "コミュニティ", "d": "Lightning Experience"}, {"n": "5703", "p": "以下コードセグメントが実行された後のxの値は何ですか。\n\nString x = ’A’;\nInteger i = 10;\nif (i ＜ 15 ){\n    i = 15;\n    x = ’B’;\n} else if (i ＜ 20 ){\n    x = ’C’;\n} else {\n    x = ’D’;\n}", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：if-else文を実行した後のxの値は？\n\n✅ 正解 B：B\n1. iの初期値は10\n2. 最初のif条件 i < 15 → 10 < 15 = true\n3. iが15に変更、xが'B'に変更\n4. if-elseは最初にtrueになった条件のブロックだけ実行→以降のelse ifやelseは評価すらされない\n\n❌ A（A）→ 'A'に設定されるロジックは存在しない。\n❌ C（C）→ 最初のif条件がtrueなので、else if(i < 20)は評価されない。\n❌ D（D）→ 同様にelseブロックには到達しない。\n\n🎯 試験のコツ：if-else文は上から順に評価し、最初にtrueになった条件のブロック「だけ」実行。残りは無視。", "a": "A", "b": "B", "c": "C", "d": "D"}, {"n": "5704", "p": "開発者がプログラムで新しい取引先責任者レコードを作成する際、どの標準項目が必須で入力が求められますか。", "r": "デベロッパーの基本", "ans": "C", "exp": "ざっくり言うと：取引先責任者をプログラムで作成するとき、必須の標準項目は？\n\n✅ 正解 C：LastName\n取引先責任者（Contact）レコードの作成にはLastName項目のみが必須。FirstNameはオプション。\n\n❌ A（AccountId）→ 取引先との紐付けは任意。AccountIdなしでもContactは作成可能（ただし業務上は推奨されない）。\n❌ B（Name）→ Name項目は読み取り専用の複合項目。FirstNameとLastNameから自動生成される。直接書き込もうとするとエラー。\n❌ D（FirstName）→ オプション項目。入力しなくてもContactレコードは作成できる。\n\n🎯 試験のコツ：Contact必須項目 = LastNameのみ。Nameは読み取り専用（書き込み不可）。", "a": "Accountld", "b": "Name", "c": "LastName", "d": "FirstName"}, {"n": "5705", "p": "Universal Containers社は、注文を外部データオブジェクトとしてSalesforceに含めています。 外部オブジェクトと取引先の両方にある取引先のキー項目を活用して、取引先と注文オブジェクトの関係(1対多の関係)を作成します。 どの関係を作成しますか。", "r": "デベロッパーの基本", "ans": "B", "exp": "ざっくり言うと：外部オブジェクトと標準オブジェクトを「共通キー項目」で紐付けるリレーションは？\n\n✅ 正解 B：間接参照関係\n間接参照関係は、外部オブジェクトと標準/カスタムオブジェクトの間で、共通のキー項目（この場合は取引先のキー項目）を使って関連を作る。外部オブジェクトの外部キー項目と、標準オブジェクトの一意な項目をマッチさせる仕組み。\n\n❌ A（主従関係）→ 外部オブジェクトは主従関係の従側になれない。\n❌ C（参照関係）→ 外部オブジェクトは通常の参照関係を持てない。\n❌ D（階層関係）→ ユーザーオブジェクト内の上下関係専用。他のオブジェクトには使えない。\n❌ E（外部参照関係）→ 外部オブジェクト同士を紐付けるためのもの。外部と標準の紐付けには間接参照。\n\n🎯 試験のコツ：外部オブジェクト↔標準オブジェクト = 間接参照関係。外部オブジェクト↔外部オブジェクト = 外部参照関係。", "a": "主従関係", "b": "間接参照関係", "c": "参照関係", "d": "階層関係", "e": "外部参照関係"}, {"n": "5706", "p": "承認のためにロックされた後、どのユーザーがレコードを編集できますか。2つ選びなさい。", "r": "デベロッパーの基本", "ans": "A;C", "exp": "ざっくり言うと：承認プロセスでロックされたレコードを編集できるユーザーは？2つ選ぶ問題。\n\n✅ 正解 A：システム管理者\nシステム管理者は「すべてのデータの編集」権限を持つため、ロックされたレコードも編集できる。\n\n✅ 正解 C：現在の承認者として割り当てられているユーザー\n承認プロセスの設定で「管理者または現在の承認者」オプションが選択されている場合、現在の承認者もロックされたレコードを編集できる。\n\n❌ B（以前にレコードを承認したユーザー）→ 過去の承認者には自動的に編集権限は付与されない。\n❌ D（階層内でより高い役割を持つユーザー）→ ロール階層の上位だからといって、ロックされたレコードの編集権限は自動的に得られない。\n\n🎯 試験のコツ：承認ロック中の編集 = システム管理者 + 現在の承認者。過去の承認者や上位ロールは含まない。", "a": "システム管理者", "b": "以前にレコードを承認したユーザー", "c": "現在の承認者として割り当てられているユーザー", "d": "階層内でより高い役割を持つユーザー"}, {"n": "5707", "p": "Apexで単体テストを作成する場合、以下のどの記述が正しいですか。", "r": "テスト、デバッグ、リリース", "ans": "D", "exp": "ざっくり言うと：Apexの単体テストについて正しい記述は？\n\n✅ 正解 D：System.Assert文は、コードカバレッジを増加させないが、単体テストで重要な役割を果たす\nSystem.Assert（assertEquals, assertNotEqualsなど）はコードの実行行数としてはカウントされないためカバレッジ向上には貢献しない。しかし、期待される結果と実際の結果を比較してコードの正確性を保証する重要な仕組み。\n\n❌ A（1つのメソッド失敗→全メソッド失敗）→ 各テストメソッドは独立して実行される。1つが失敗しても他には影響しない。\n❌ B（大規模テストクラスが必要）→ テストは小さく分割して書くのがベストプラクティス。大きい＝良いではない。\n❌ C（トリガーにテストは不要）→ 全Apexコードの合計75%以上のカバレッジが必要で、各トリガーにも最低1%が必要。\n\n🎯 試験のコツ：System.Assert = カバレッジには貢献しないが、テストの「品質」を担保する重要なメソッド。", "a": "複数のメソッドを使用した単体テストでは、1つのメソッドが失敗するたびにすべてのメソッドが失敗します。", "b": "テストカバレッジを拡大するには、1つのメソッドに多数のコード行を含む大規模なテストクラスが必要です。", "c": "トリガーは、サンドボックスから実稼働環境に展開するために単体テストを必要としません。", "d": "コードカバレッジを増加させないSystem.Assert文は、単体テストで重要な役割を果たします。"}, {"n": "5708", "p": "開発者が、LastModified項目の値が90日以上である場合に、List内の各Accountを非アクティブまたは非アクティブとしてマークしたいと考えています。開発者はどのApexテクニックを使用する必要がありますか。", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：リスト内の取引先を条件に基づいてアクティブ/非アクティブにマークするには？\n\n✅ 正解 D：内部にif/else文があるforループ\nforループでリスト内の各Accountを1つずつ取り出し、if/else文でLastModified日付が90日以上かどうかを判定する。条件に合致すればInactive、そうでなければActiveとマークする。\n\n❌ A（forループ内にswitch文）→ switch文は特定の値に対する複数ケースの比較に使う。「90日以上か？」のような条件式にはif/elseが適切。\n❌ B（if/else文内にforループ）→ ループが外にないと、リストの各要素を順番に処理できない。\n❌ C（switch文内にforループ）→ 構造が逆。まずリストをループし、その中で条件判定するのが正しい。\n\n🎯 試験のコツ：「リストの各要素に対して条件判定」→ forループ（外側）+ if/else（内側）。", "a": "内部にswitch文を含むforループ", "b": "内部にforループを持つIf/else文", "c": "内部にforループがあるswitch文", "d": "内部にif/else文があるforループ"}, {"n": "5709", "p": "開発者は、複雑なトリガーロジックを処理するためにApexヘルパークラスを作成しました。トリガーがDMLガバナ制限を超えた場合、ヘルパークラスはどのようにユーザーに警告できますか。", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：トリガーがDMLガバナ制限に近づいたとき、事前にユーザーに警告するには？\n\n✅ 正解 C：Limits.getDMLRows()を使用して、制限超過前にエラーメッセージを表示する\nLimitsクラスのメソッドで現在のDML使用量を監視し、制限に達する前にaddError()等でカスタムエラーメッセージを表示できる。\n\n❌ A（Messaging.sendEmail()）→ ガバナ制限を超えるとトランザクション全体がロールバックされるので、メール送信も実行されない。\n❌ B（PageReference.setRedirect()）→ トリガー内ではページリダイレクトは使えない。VisualforceコントローラやApex拡張で使うもの。\n❌ D（ApexMessage.Messages()）→ そんなメソッドはSalesforceに存在しない。\n\n🎯 試験のコツ：ガバナ制限の監視 = Limitsクラス。getDMLStatements(), getDMLRows(), getQueries()などで使用量を確認。", "a": "Messaging.sendEmail()を使用してトランザクションを続行し、DML文の数を超えたらユーザーにアラートを送信する。", "b": "PageReference.setRedirect()を使用して、DML文の数を超える前にユーザーをカスタムVisualforceページにリダイレクトする。", "c": "Limits.getDMLRows()を使用して、DML文の数を超える前にエラーメッセージを表示する。", "d": "ApexMessage.Messages()を使用して、DML文の数を超えた後にエラーメッセージを表示する。"}, {"n": "5710", "p": "販売管理チームは新しいインターンを雇用します。 インターンは商談を表示することはできませんが、取引先レコードを表示するときは、すべての商談の最新の完了日を表示する必要があります。開発者はこの要件を満たすために何をすればよいでしょうか。", "r": "デベロッパーの基本", "ans": "C", "exp": "ざっくり言うと：商談を見れないインターンに、取引先画面で最新の完了日だけ表示するには？\n\n✅ 正解 C：取引先に商談の完了予定日の最大を表示する積み上げ集計項目を作成する\n取引先と商談は標準の主従関係。積み上げ集計項目でMAX（完了予定日）を設定すれば、全商談の中で最も遅い日付が取引先に表示される。積み上げ集計の値は取引先レコード上に保存されるので、商談へのアクセス権がなくても表示される。\n\n❌ A（ワークフロールール）→ ワークフローは同一オブジェクト内の更新のみ。関連リストの集計はできない。\n❌ B（数式項目）→ 数式項目は関連する子レコードの集計（MAX, SUM等）はできない。同一レコード内の計算のみ。\n❌ D（トリガー）→ コードでも実現可能だが、標準機能（積み上げ集計）で対応できるならそちらが優先。\n\n🎯 試験のコツ：主従関係で子の集計を親に表示 → 積み上げ集計項目。コード不要のベストプラクティス。", "a": "親取引先の項目を更新するワークフロールールを作成します。", "b": "取引先オブジェクトに商談の完了予定日で最大を表示する数式項目を作成します。", "c": "取引先オブジェクトに商談の完了予定日の最大を表示する積み上げ集計項目を作成します。", "d": "最新の商談の完了予定日を照会するトリガーを取引先オブジェクトに作成します。"}, {"n": "5711", "p": "開発者には次のコードブロックがあります。\n\npublic class PaymentTax {\n    public static decimal SalesTax = 0.0875;\n}\n\ntrigger OpportunityLineItemTrigger on OpportunityLineItem (before insert, before update) {\n    PaymentTax PayTax = new PaymentTax();\n    decimal ProductTax = ProductCost * XXXXXXXXXXX;\n}\n\nproductTaxを計算するために、開発者はどのコードセグメントをXXXXXXXXXXXに挿入して、トリガー内でクラス変数SalesTaxの値にアクセスできるようにしますか。", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：トリガーから外部クラスの静的変数を参照する正しい構文は？\n\n✅ 正解 C：PaymentTax.SalesTax\n静的変数はクラス名.変数名でアクセスする。インスタンスを作る必要はなく、クラス名から直接参照できる。\n\n❌ A（SalesTax）→ トリガーのスコープにSalesTaxという変数は存在しない。クラス名を指定する必要がある。\n❌ B（PayTax.SalesTax）→ クラス名はPaymentTaxであってPayTaxではない（問題文のインスタンス変数名と混同）。\n❌ D（OpportunityLineItemTrigger.SalesTax）→ トリガー名からクラスの変数を参照する構文は存在しない。\n\n🎯 試験のコツ：静的変数へのアクセス = クラス名.変数名。インスタンス変数名やトリガー名では参照できない。", "a": "SalesTax", "b": "PayTax.SalesTax", "c": "PaymentTax.SalesTax", "d": "OpportunityLineItemTrigger.SalesTax"}, {"n": "5712", "p": "ユーザーが生成したデバッグステートメントを表示するために必要な最小ログレベルはどれですか。", "r": "テスト、デバッグ、リリース", "ans": "A", "exp": "ざっくり言うと：System.debugの出力を見るために必要な最低限のログレベルは？\n\n【前提知識：デバッグログのレベル（低→高）】\nNONE → ERROR → WARN → INFO → DEBUG → FINE → FINER → FINEST\n上のレベルを設定すると、それ以下のレベルもすべて含まれる。\n\n✅ 正解 A：DEBUG\nSystem.debug()で出力したメッセージはDEBUGレベルで記録される。DEBUGレベル以上に設定すれば表示される。\n\n❌ B（FINE）→ DEBUGより詳細なレベル。表示はできるが「最小」ではない。\n❌ C（INFO）→ DEBUGレベルの情報は含まれない。System.debugの出力が見えない。\n❌ D（WARN）→ さらに低いレベル。デバッグ情報は含まれない。\n\n🎯 試験のコツ：System.debug()を見るには最低DEBUGレベル。INFO以下では見えない。", "a": "DEBUG", "b": "FINE", "c": "INFO", "d": "WARN"}, {"n": "5713", "p": "変更セットを送受信できる有効な宛先と送信元のペアはどれですか。2つ選びなさい。", "r": "デベロッパーの基本", "ans": "A;D", "exp": "ざっくり言うと：変更セットを送受信できる組み合わせは？2つ選ぶ問題。\n\n✅ 正解 A：本番環境へのサンドボックス\nサンドボックスから本番環境への変更セット送信は標準的な使い方。\n\n✅ 正解 D：サンドボックスへのサンドボックス\n同じ本番環境から派生したサンドボックス間では変更セットのやり取りが可能。\n\n❌ B（サンドボックスへの開発者エディション）→ 開発者エディションは本番環境やサンドボックスと直接関連がない独立した組織。変更セットは使えない。\n❌ C（本番環境への開発者エディション）→ 同上。開発者エディションからは変更セットを送信できない。\n\n🎯 試験のコツ：変更セット = 「関連する組織」間でのみ使える。本番↔サンドボックス、サンドボックス↔サンドボックス（同じ本番からの派生）。開発者エディションは別世界。", "a": "本番環境へのサンドボックス", "b": "サンドボックスへの開発者エディション", "c": "本番環境への開発者エディション", "d": "サンドボックスへのサンドボックス"}, {"n": "5714", "p": "開発者は、before insertトリガーを作成します。 開発者はトリガー本体のレコードにどのようにアクセスできますか。", "r": "プロセスの自動化とロジック", "ans": "A", "exp": "ざっくり言うと：before insertトリガーでレコードにアクセスするには？\n\n✅ 正解 A：Trigger.newコンテキスト変数にアクセスする\nTrigger.newは、挿入される予定のレコードのリスト（List<sObject>）を提供する。before insertではこのリストの各レコードの項目値を変更でき、その変更はDBに保存される。\n\n❌ B（Trigger.newRecords）→ そんなコンテキスト変数は存在しない。\n❌ C（Trigger.newMap）→ newMapはレコードIDをキーとしたMapだが、before insertではまだIDが生成されていないため利用できない。\n❌ D（Trigger.newList）→ そんなコンテキスト変数は存在しない。\n\n🎯 試験のコツ：before insert = Trigger.new（使える）、Trigger.newMap（使えない、IDがまだないから）。after insertなら両方使える。", "a": "Trigger.newコンテキスト変数にアクセスする", "b": "Trigger.newRecordsコンテキスト変数にアクセスする", "c": "Trigger.newMapコンテキスト変数にアクセスする", "d": "Trigger.newListコンテキスト変数にアクセスする"}, {"n": "5715", "p": "StandardSetControllerの機能とは何ですか。2つ選びなさい。", "r": "ユーザインターフェース", "ans": "B;C", "exp": "ざっくり言うと：StandardSetControllerの機能は？2つ選ぶ問題。\n\n✅ 正解 B：ページでレコードの一括更新を実行できる\nStandardSetControllerはレコードのセット（リスト）を扱うコントローラ。一括選択→一括更新の操作が可能。\n\n✅ 正解 C：ページで大きなレコードセットのページネーションを実行できる\nnext(), previous(), getHasNext(), setPageSizeなどのメソッドでページ送り機能を実装できる。\n\n❌ A（標準/カスタムコントローラの機能を拡張する）→ StandardSetControllerは拡張機能ではなく、リスト操作専用のコントローラ。\n❌ D（項目レベルセキュリティを適用する）→ FLSの適用はStandardSetControllerの主要機能ではない。\n\n🎯 試験のコツ：StandardSetController = リスト表示＋ページネーション＋一括操作。StandardController（単数形）は単一レコード用。", "a": "標準またはカスタムコントローラの機能を拡張します", "b": "ページでレコードの一括更新を実行できます", "c": "ページで大きなレコードセットのページネーションを実行できます", "d": "大規模なレコードセットを読み取るときに、項目レベルセキュリティを適用します"}, {"n": "5716", "p": "開発者は、組織データを変更せずに取引先トリガーが正常に機能していることを確認する必要があります。取引先トリガーをテストするには、開発者は何をすべきですか。", "r": "テスト、デバッグ、リリース", "ans": "B", "exp": "ざっくり言うと：組織データを変更せずに取引先トリガーの動作を確認するには？\n\n✅ 正解 B：開発者コンソールのテストメニューでテストクラスを実行する\nテストクラスは独自のテストデータを作成し、テスト終了後に自動ロールバックされる。組織の実データには影響しない。\n\n❌ A（[取引先]タブの新規ボタン）→ 実際にレコードが作成されるため、組織データが変更される。\n❌ C（Force.com IDE）→ 2019年に廃止済み。現在は使用できない。また、直接テストを実行する機能もない。\n❌ D（開発者コンソールの匿名実行）→ 匿名実行で実行した処理は実データに影響する（自動ロールバックなし）。\n\n🎯 試験のコツ：「組織データを変更せずにテスト」→ テストクラスの実行。匿名実行や手動操作は実データに影響する。", "a": "[取引先]タブの[新規]ボタンを使用して新しいレコードを作成する", "b": "開発者コンソールのテストメニューを使用して、取引先トリガーのすべてのテストクラスを実行する", "c": "Force.com IDEを使用する", "d": "開発者コンソールで匿名実行機能を使用する"}, {"n": "5717", "p": "Salesforce AppExchangeからパッケージをインストールおよびアンインストールするには、どの権限が必要ですか。", "r": "テスト、デバッグ、リリース", "ans": "C", "exp": "ざっくり言うと：AppExchangeからパッケージをインストール/アンインストールするのに必要な権限は？\n\n✅ 正解 C：AppExchangeパッケージのダウンロード\nこの権限があればAppExchangeからパッケージをダウンロード（インストール）でき、アンインストールもできる。\n\n❌ A（パッケージライセンスの管理）→ インストール済みパッケージのライセンスを管理する権限。インストール/アンインストール自体の権限ではない。\n❌ B（AppExchangeパッケージのアップロード）→ 自分のパッケージをAppExchangeに公開するための権限。インストールとは別。\n❌ D（AppExchangeパッケージの作成）→ 新しいパッケージを作成するための権限。インストールとは別。\n\n🎯 試験のコツ：インストール/アンインストール = 「ダウンロード」権限。公開 = 「作成」+「アップロード」権限。", "a": "パッケージライセンスの管理", "b": "AppExchange パッケージのアップロード", "c": "AppExchange パッケージのダウンロード", "d": "AppExchange パッケージの作成"}, {"n": "5718", "p": "マルチテナント環境で開発する際の重要な考慮事項は何ですか。", "r": "デベロッパーの基本", "ans": "B", "exp": "ざっくり言うと：マルチテナント環境で開発するとき最も重要な考慮事項は？\n\n【前提知識：マルチテナントとは？】\n1つのSalesforceインスタンス（サーバー群）を複数の組織（テナント）が共有する仕組み。たとえ話：1つのマンション（インスタンス）に複数の住人（テナント）が住んでいるようなもの。\n\n✅ 正解 B：ガバナ制限により、テナントが同じインスタンスの複数の組織のパフォーマンスに影響を与えるのを防ぐ\nガバナ制限はマルチテナント環境の安全装置。1つの組織がリソースを使いすぎると、同じインスタンス上の他の組織に影響が出る。これを防ぐのがガバナ制限の存在理由。\n\n❌ A（ポリグロットパーシスタンス）→ 異なるデータストレージ技術の同時使用の概念。多言語サポートとは無関係。\n❌ C（一意のドメイン名）→ ドメイン名は組織の識別用であり、コードの名前空間の代替にはならない。\n❌ D（組織全体のデータセキュリティ）→ テナント間のデータはプラットフォームレベルで完全に隔離されている。OWDは組織内のアクセス制御であり、テナント間の話ではない。\n\n🎯 試験のコツ：マルチテナント＋開発の考慮事項 → ガバナ制限。これが一番の出題ポイント。", "a": "ポリグロットパーシスタンスは、複数のインスタンスの複数の組織におけるグローバルな多言語ユーザーベースをサポートします。", "b": "ガバナ制限により、テナントが同じインスタンスの複数の組織のパフォーマンスに影響を与えるのを防ぎます。", "c": "一意のドメイン名は、複数のインスタンスの複数の組織用に開発されたコードの名前空間の代わりになります。", "d": "組織全体のデータセキュリティは、他のテナントが同じインスタンスの複数の組織のデータを表示できるかどうかを決定します。"}, {"n": "5719", "p": "Application__cという名前のカスタムオブジェクトは、Position__cという名前の別のカスタムオブジェクトとの参照関係を持っています。Application__cとPosition__cの両方に、Status__cという名前の選択リスト項目があります。Position__cのStatus__c項目が更新されると、Application__cのStatus__c項目に同じ値を自動的に入力し、Application__cでワークフロールールを実行する必要があります。開発者はどのようにこれを達成できますか。", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：参照関係の親オブジェクトの項目が更新されたとき、子のワークフローも実行される方法は？\n\n✅ 正解 C：DML操作でApexトリガーを使用する\nPosition__cのStatus__cが変更されたときにApexトリガーでApplication__cのStatus__cを更新すれば、Application__cのワークフロールールも実行される。DML操作による更新はワークフローをトリガーする。\n\n❌ A（積み上げ集計項目に変更）→ 積み上げ集計は主従関係のみ。今回は参照関係なので使えない。\n❌ B（数式項目に変更）→ 数式項目は動的に値を表示するだけ。ワークフロールールのトリガーにはならない。\n❌ D（ワークフローでオブジェクト間項目更新）→ ワークフローは同一オブジェクト内の項目更新のみ。異なるオブジェクトの項目は更新できない。\n\n🎯 試験のコツ：「参照関係 + 別オブジェクトの項目更新 + ワークフロー実行」→ Apexトリガーが唯一の手段。", "a": "Application__c.Status__cを積み上げ集計項目に変更する。", "b": "Application__c.Status__cを数式項目に変更する。", "c": "DML操作でApexトリガーを使用する。", "d": "ワークフローを使用してオブジェクト間項目更新を行う。"}, {"n": "5720", "p": "Apexクラスとインターフェースに関して、次のうち正しいステートメントはどれでしょうか。３つ選択してください。", "r": "プロセスの自動化とロジック", "ans": "A;C;D", "exp": "ざっくり言うと：Apexクラスとインターフェースについて正しいのは？3つ選ぶ問題。\n\n✅ 正解 A：クラスはデフォルトでfinal\nApexのクラスとメソッドはデフォルトでfinal（上書き不可）。サブクラスで上書きしたい場合はvirtualキーワードを明示的につける必要がある。\n\n✅ 正解 C：内部クラスはデフォルトでprivate\n内部クラス（クラスの中に定義されたクラス）は、アクセス修飾子を省略するとprivateになる。\n\n✅ 正解 D：最上位クラスは1つの内部クラスレベルのみ\nApexでは内部クラスのネスト（入れ子）は1レベルまで。内部クラスの中にさらに内部クラスは定義できない。\n\n❌ B（インターフェースのメソッドはデフォルトでpublic）→ インターフェースのメソッドはデフォルトでglobal。publicではない。\n\n🎯 試験のコツ：クラス=デフォルトfinal/private、インターフェースメソッド=デフォルトglobal、内部クラスのネスト=1レベルまで。", "a": "クラスはデフォルトでfinalです。", "b": "インターフェースのメソッドはデフォルトでpublicです。", "c": "内部クラスはデフォルトでprivateです。", "d": "最上位クラスは1つの内部クラスレベルのみを持つことができます。"}, {"n": "5721", "p": "階層カスタム設定は、Salesforceの各プロファイルの特定のURLを保存します。\n開発者は、どのステートメントを使用して現在のユーザーのプロファイルの正しいURLを取得し、このVisualforceページを表示できますか。", "r": "ユーザインターフェース", "ans": "B", "exp": "ざっくり言うと：Visualforceで階層カスタム設定の値を取得する構文は？\n\n✅ 正解 B：{!$Setup.Url_Settings__c.URL__c}\n階層カスタム設定をVisualforceで参照する構文は{!$Setup.設定名.項目名}。この構文を使うと、現在のユーザーのプロファイルに基づいた値が自動的に返される。Salesforceが自動的にユーザー→プロファイル→組織の順で設定値を検索してくれる。\n\n❌ A（Instance[Profile.Id]）→ 階層型カスタム設定でこの構文は使用しない。\n❌ C（[Profile.Id]）→ プロファイルIDを指定する構文ではない。\n❌ D（[$Profile.Id]）→ $Profileというグローバル変数はVisualforceに存在しない。\n\n🎯 試験のコツ：階層カスタム設定の参照 = {!$Setup.設定名__c.項目名__c}。プロファイルの指定は不要（自動判定される）。", "a": "{!$Setup.Url_Settings__c.Instance[Profile.Id].URL__c}", "b": "{!$Setup.Url_Settings__c.URL__c}", "c": "{!$Setup.Url_Settings__c.[Profile.Id].URL__c}", "d": "{!$Setup.Url_Settings__c.[$Profile.Id].URL__c}"}, {"n": "5722", "p": "APIツールを使用してレコードを挿入するとき、開発者は何を考慮する必要がありますか。2つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "B;D", "exp": "ざっくり言うと：APIでレコードを挿入するとき何が適用される？2つ選ぶ問題。\n\n✅ 正解 B：必須項目の設定が適用される\nオブジェクトレベルで「必須」に設定された項目は、API経由でも必須。値がないとエラーになる。\n\n✅ 正解 D：入力規則が適用される\n入力規則はAPI経由のデータ操作でも実行される。条件を満たさないレコードは保存できない。\n\n❌ A（ページレイアウトの必須項目）→ ページレイアウトの必須設定はUI（画面）専用。API経由では適用されない。\n❌ C（Apexトリガーは無視される）→ API経由の操作でもApexトリガーは通常通り実行される。\n\n🎯 試験のコツ：API経由で適用されるもの = 入力規則＋項目レベル必須＋トリガー。適用されないもの = ページレイアウトの必須設定。", "a": "ページレイアウトの必須項目が適用されます。", "b": "必須項目の設定が適用されます。", "c": "Apexトリガーは無視されます。", "d": "入力規則が適用されます。"}, {"n": "5723", "p": "Visualforceページで取引先責任者の標準コントローラを使用しています。親取引先レコードの名前をページに表示するにはどうすればよいですか。", "r": "ユーザインターフェース", "ans": "B", "exp": "ざっくり言うと：Visualforceで子オブジェクト（取引先責任者）から親（取引先）の名前を表示するには？\n\n✅ 正解 B：{!contact.account.name}の差し込み項目を使用する\n標準コントローラを使用している場合、リレーション名をドット（.）で繋いで親オブジェクトの項目にアクセスできる。Contact→Account→Nameという参照チェーン。\n\n❌ A（追加のApexロジック）→ 標準コントローラで差し込み項目を使えば不要。わざわざApexを書く必要はない。\n❌ C（取引先の標準コントローラを追加）→ Visualforceページには1つの標準コントローラしか関連付けられない。\n❌ D（SOQLでクエリ）→ Visualforceページ内で直接SOQLは実行できない。差し込み項目を使うのが正しい方法。\n\n🎯 試験のコツ：VFで親の項目参照 = {!子オブジェクト.リレーション名.項目名}。追加のコードは不要。", "a": "コントローラ内で追加のApexロジックを使用して、名前項目を検索する。", "b": "{!contact.account.name}の差し込み項目を使用する。", "c": "取引先の標準コントローラを追加する。", "d": "SOQLを使用して、関連する取引先名の項目をクエリする。"}, {"n": "5724", "p": "Apex単体テストの適切なプロセスは何ですか。", "r": "テスト、デバッグ、リリース", "ans": "C", "exp": "ざっくり言うと：Apex単体テストの正しい手順は？\n\n✅ 正解 C：テスト用のデータを作成→テストするメソッドを呼び出す→結果が正しいことを確認する\nこれがApex単体テストの基本的な3ステップ。テストデータを自分で作り、テスト対象のメソッドを実行し、System.assertで結果を検証する。\n\n❌ A（SeeAllData=true→メソッド呼び出し→確認）→ SeeAllData=trueは組織の実データにアクセスする設定で、推奨されない。テストは独自のデータで行うべき。\n❌ B（データ作成→runAllTests()→確認）→ runAllTests()というメソッドはApexに存在しない。\n❌ D（SeeAllData=true→runAllTests()→確認）→ AとBの問題を両方含む。\n\n🎯 試験のコツ：テストの3ステップ = ①データ作成 → ②テスト実行 → ③アサーションで検証。SeeAllData=trueは使わない。", "a": "SeeAllData=trueを使用してテストデータをクエリします。テストするメソッドを呼び出します。結果が正しいことを確認します。", "b": "テスト用のデータを作成します。runAllTests()を実行します。結果が正しいことを確認します。", "c": "テスト用のデータを作成します。テストするメソッドを呼び出します。結果が正しいことを確認します。", "d": "SeeAllData=trueを使用してテストデータをクエリします。runAllTests()を実行します。結果が正しいことを確認します。"}, {"n": "5725", "p": "サンドボックス内のLightningWebコンポーネントのバグを修正するには、開発者は何を使用する必要がありますか。", "r": "ユーザインターフェース", "ans": "A", "exp": "ざっくり言うと：サンドボックスでLWCのバグを直すのに何を使う？\n\n✅ 正解 A：VSCode\nVisual Studio Code + Salesforce Extension PackがLWC開発・デバッグの公式推奨環境。コードの編集、保存、デプロイ、デバッグがすべてVSCode内で完結する。\n\n❌ B（匿名実行）→ Apexコードの一時実行用ツール。LWCのJavaScript/HTMLの編集・デバッグには使えない。\n❌ C（開発者コンソール）→ Apexコードの編集・デバッグには使えるが、LWCの開発には対応していない。\n❌ D（Force.com IDE）→ 2019年に廃止済み。現在は使用不可。\n\n🎯 試験のコツ：LWC開発 = VSCode。開発者コンソールはApex/Visualforce用。Force.com IDEは廃止済み。", "a": "VSCode", "b": "匿名実行", "c": "開発者コンソール", "d": "Force.com IDE"}, {"n": "5726", "p": "Universal Containers社は、取引先オブジェクトのプライベート共有モデルを実装しました。Apexでカスタム取引先検索ツールを開発し、営業担当者が指定した複数の条件に一致する取引先を検索できるようにしました。リリース以来、このツールのユーザーは、自分が所有していない取引先を見ることができると報告しています。開発者は、カスタム検索ツールを使用している間、現在ログインしているユーザーに対して共有権限を強制するために何を使用する必要がありますか。", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：プライベート共有モデルで、ユーザーがアクセスできるレコードだけを表示するには？\n\n✅ 正解 C：クラス宣言でwith sharingキーワードを使用する\nwith sharingをApexクラスに宣言すると、そのクラス内のデータアクセスは実行ユーザーの共有設定に従う。ユーザーが見えないレコードはクエリ結果に含まれなくなる。\n\n❌ A（Schemaクラスのメソッド）→ Schemaクラスはメタデータ情報（項目定義等）の取得用。共有ルールの適用には使わない。\n❌ B（UserInfoクラスで絞り込み）→ UserInfoでユーザー情報は取れるが、共有設定の適用とは別の話。手動で絞り込むのは非効率。\n❌ D（without sharing）→ with sharingの逆。共有設定を無視して全レコードにアクセスしてしまう。\n\n🎯 試験のコツ：共有設定を強制 = with sharing。共有設定を無視 = without sharing。省略 = 呼び出し元に依存。", "a": "Schemaクラスのメソッドを使用して、ログインしているユーザーが取引先オブジェクトへのアクセス権を持っているかどうかを判断します。", "b": "UserInfoクラスを使用して、ログインしているユーザーが所有するレコードを返すようにすべてのSOQLクエリを絞り込みます。", "c": "クラス宣言でwith sharingキーワードを使用します。", "d": "クラス宣言でwithout sharingキーワードを使用します。"}, {"n": "5727", "p": "開発者は、販売活動中にユーザーが商品固有の情報を入力できるVisualforceページを提供する必要があります。どうすればこれを達成できますか。2つ選びなさい。", "r": "ユーザインターフェース", "ans": "A;D", "exp": "ざっくり言うと：販売活動中に商品情報を入力できるVFページを提供するには？2つ選ぶ問題。\n\n✅ 正解 A：新しいVisualforceページとApexコントローラを作成する\nゼロからカスタムのデータ入力ページを作成し、Apexで入力処理のロジックを組む。完全にカスタマイズ可能。\n\n✅ 正解 D：AppExchangeから未管理パッケージをダウンロードする\n未管理パッケージはコードを自由に編集・カスタマイズできるので、ダウンロード後にVFページを修正して商品情報入力に使える。\n\n❌ B（標準ページをコピー）→ Salesforceの標準ページを直接「コピー」する機能は存在しない。\n❌ C（管理パッケージをダウンロード）→ 管理パッケージのコードは変更不可。カスタマイズできないので要件を満たせない。\n\n🎯 試験のコツ：管理パッケージ = 変更不可（ロックされてる）。未管理パッケージ = 変更可能（自由にいじれる）。", "a": "新しいVisualforceページとApexコントローラを作成して、商品データ入力を提供します。", "b": "標準ページをコピーし、商品データ入力用の新しいVisualforceページを作成します。", "c": "変更するカスタムVisualforceページを提供するAppExchangeから管理パッケージをダウンロードします。", "d": "変更するカスタムVisualforceページを提供するAppExchangeから未管理パッケージをダウンロードします。"}, {"n": "5728", "p": "複数の通貨を有効にしている組織では、開発者は、CampaignオブジェクトでTotal_estimated_value__cと呼ばれる積み上げ集計項目を使用して、CampaignMemberオブジェクトからEstimated_value__c通貨項目の合計を集計する必要があります。Total_estimated_value__c積み上げ集計項目の通貨はどのように決定されますか。", "r": "デベロッパーの基本", "ans": "A", "exp": "ざっくり言うと：複数通貨で積み上げ集計項目の通貨はどう決まる？\n\n✅ 正解 A：子レコードの値が親レコードの通貨に変換され、親の通貨で合計が表示される\n複数通貨が有効な組織では、積み上げ集計項目の通貨は常に親レコード（この場合Campaign）の通貨に基づく。子レコード（CampaignMember）の値は自動的に親の通貨に換算されてから集計される。\n\n❌ B（子レコードの多数派の通貨に変換）→ 多数決ではない。常に親レコードの通貨が基準。\n❌ C（数値項目として表示）→ 通貨情報を無視して数値表示することはない。通貨変換は必須。\n❌ D（現在のユーザーの通貨に変換）→ ユーザーの通貨ではなく、親レコードの通貨が基準。\n\n🎯 試験のコツ：積み上げ集計の通貨 = 常に親レコードの通貨。ユーザーの通貨でも子の通貨でもない。", "a": "Campaignmember.Estimated_value__cの値は、Campaignオブジェクトのレコードの通貨に変換され、合計はCampaignオブジェクトのレコードの通貨を使用して表示されます。", "b": "CampaignMember.Estimated_value__cの値は、CampaignMemberレコードの大半で通貨に変換され、その通貨を使用して合計が表示されます。", "c": "CampaignMember.Estimated_value__cの値が合計され、結果のTotal_estimated_value__cフィールドがCampaignオブジェクトのレコードの数値項目として表示されます。", "d": "CampaignMember.Estimated_value__cの値は現在のユーザーの通貨に変換され、合計はCampaignオブジェクトのレコードの通貨を使用して表示されます。"}, {"n": "5729", "p": "開発者は、顧客の請求書を追跡するカスタムオブジェクトを作成したいと考えています。\n取引先にアクセスできるすべてのユーザーにすべての請求書が表示されるようにするには、請求書と取引先をどのように関連付ける必要がありますか。", "r": "デベロッパーの基本", "ans": "B", "exp": "ざっくり言うと：取引先にアクセスできるユーザーに請求書も全部見せるには、どのリレーション？\n\n✅ 正解 B：請求書は、取引先に対する主従関係が必要\n主従関係では、子のセキュリティは親に依存する。取引先（親）にアクセスできるユーザーは、関連する請求書（子）にも自動的にアクセスできる。\n\n❌ A（取引先から請求書への参照関係）→ 方向が逆。取引先が親、請求書が子になるべき。\n❌ C（取引先から請求書への主従関係）→ 方向が逆。請求書側に主従フィールドを作る。\n❌ D（請求書から取引先への参照関係）→ 参照関係ではセキュリティが独立するため、取引先にアクセスできても請求書が見えるとは限らない。\n\n🎯 試験のコツ：「親にアクセスできれば子も見える」→ 主従関係。セキュリティを親に依存させたいときは主従。", "a": "取引先は、請求書に対する参照関係が必要です。", "b": "請求書は、取引先に対する主従関係が必要です。", "c": "取引先は、請求書に対する主従関係が必要です。", "d": "請求書は、取引先に対する参照関係が必要です。"}, {"n": "5730", "p": "レビュアーは、候補者の採用が推奨されている場合にのみ、コメント項目に理由を入力する必要があります。 開発者はこの要件を実施するためにどのアクションを実行できますか。", "r": "デベロッパーの基本", "ans": "C", "exp": "ざっくり言うと：「採用推奨」の場合にだけコメントを必須にするには？\n\n✅ 正解 C：入力規則を作成する\n入力規則で「推奨=採用 AND コメント=空白」のときにエラーを出す設定ができる。特定の条件下でのみ必須にする柔軟な制御が可能。\n\n❌ A（必須のコメント項目を作成）→ 常にコメントが必須になってしまう。「採用推奨の場合のみ」という条件付き必須にはできない。\n❌ B（数式項目）→ 数式項目は他の項目の値を計算して表示するもの。入力の制御には使えない。\n❌ D（Visualforceコンポーネント）→ VFでも実現可能だが、入力規則でシンプルに対応できるので過剰。\n\n🎯 試験のコツ：「条件付きで必須にしたい」→ 入力規則。「常に必須」→ 項目の必須設定。", "a": "必須のコメント項目を作成します。", "b": "数式項目を作成します。", "c": "入力規則を作成します。", "d": "必要なVisualforceコンポーネントを作成します。"}, {"n": "5731", "p": "開発者がTest.startTest()およびTest.stopTest()を使用する理由は次のうちどれですか。", "r": "テスト、デバッグ、リリース", "ans": "D", "exp": "ざっくり言うと：Test.startTest()とTest.stopTest()を使う理由は？\n\n✅ 正解 D：テスト実行中にガバナ制限の追加セットを作成するため\nstartTest()を呼ぶと、その時点でガバナ制限がリセットされ、新しいセットの制限が適用される。stopTest()までの間のコードは、テストデータ準備で消費した制限とは別にカウントされる。たとえ話：テストの前半（データ準備）と後半（本番テスト）で別々のスコアカードを使うイメージ。\n\n❌ A（コードカバレッジ要件を回避）→ startTest/stopTestはカバレッジ要件を回避する機能ではない。\n❌ B（匿名ブロックの開始/停止）→ 匿名ブロックとは無関係。テストメソッド専用。\n❌ C（行数ガバナ制限に影響しない）→ 「行数」という特定の制限ではなく、すべてのガバナ制限がリセットされる。\n\n🎯 試験のコツ：startTest/stopTest = ガバナ制限のリセット＋非同期処理の同期実行。テストの「本番部分」を囲む。", "a": "この２つの行間のコードのApexコードカバレッジ要件を回避するため", "b": "匿名Apexコードの実行時に匿名ブロックの実行を開始および停止するため", "c": "テストコードを指定して、Apexの行数ガバナ制限に影響を与えないようにするため", "d": "単一のテストクラスの実行中にガバナ制限の追加セットを作成するため"}, {"n": "5732", "p": "標準の商談ビューボタンを上書きするには、Visulforceページのコントローラで何を使用する必要がありますか。", "r": "ユーザインターフェース", "ans": "D", "exp": "ざっくり言うと：商談の標準ビューボタンを上書きするVFページのコントローラは？\n\n✅ 正解 D：あらかじめ組み込まれた機能の商談オブジェクトのStandardController\n標準ボタンを上書きするVFページは、対象オブジェクト（商談）のStandardControllerを使用する必要がある。StandardControllerを指定することで、標準の表示・編集・削除などの機能がそのまま利用できる。\n\n❌ A（StandardSetController）→ リスト表示やページネーション用。単一レコードのビューボタン上書きには使わない。\n❌ B（コールバックコンストラクタ）→ コントローラ拡張のコンストラクタの話であり、ボタン上書きの必須要件ではない。\n❌ C（変数を初期化するコンストラクタ）→ カスタムロジック用。標準ビューボタンの上書きには不要。\n\n🎯 試験のコツ：標準ボタン上書き = StandardController必須。カスタム機能追加 = コントローラ拡張を追加。", "a": "ページネーション用の関連リストをサポートするStandardSetController", "b": "StandardControllerを参照するコールバックコンストラクタ", "c": "商談オブジェクトの変数を初期化するコンストラクタ", "d": "あらかじめ組み込まれた機能の商談オブジェクトのStandardController"}, {"n": "5733", "p": "開発者が、プライベートメソッドを含む Apex クラスを作成しました。プライベートメソッドがテストクラスからアクセスできるようにするために、開発者は何をすればよいでしょうか。", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：Apexクラスのprivateメソッドをテストからアクセス可能にするには？\n\n✅ 正解 D：TestVisible属性をApexメソッドに追加する\n@TestVisibleアノテーションをprivateメソッドに付けると、そのメソッドはテストクラスからのみアクセス可能になる。本番コードからはprivateのまま。\n\n❌ A（TestVisibleをクラスに追加）→ @TestVisibleはクラス全体ではなく、個別のメソッドや変数に適用する。\n❌ B（SeeAllDataをテストメソッドに追加）→ SeeAllDataは組織の実データにアクセスするための設定であり、privateメソッドへのアクセスとは無関係。\n❌ C（SeeAllDataをテストクラスに追加）→ Bと同じ理由で無関係。\n\n🎯 試験のコツ：privateメソッドのテスト = @TestVisible。実データへのアクセス = @isTest(SeeAllData=true)。混同しない。", "a": "TestVisible属性をApexクラスに追加する", "b": "SeeAllData属性をテストメソッドに追加する", "c": "SeeAllData属性をテストクラスに追加する", "d": "TestVisible属性をApexメソッドに追加する"}, {"n": "5734", "p": "カスタムボタンとカスタムリンクでサポートされるコンテンツソースは何ですか。2つ選びなさい。", "r": "ユーザインターフェース", "ans": "A;C", "exp": "ざっくり言うと：カスタムボタンとカスタムリンクのコンテンツソースは？2つ選ぶ問題。\n\n✅ 正解 A：VisualForceページ\nカスタムボタン/リンクの遷移先としてVisualforceページを指定できる。\n\n✅ 正解 C：URL\n任意のURLをカスタムボタン/リンクの遷移先に指定できる。\n\n❌ B（静的リソース）→ 静的リソースは画像・CSS・JSなどのファイル保存用。ボタン/リンクのコンテンツソースとしては直接指定できない。\n❌ D（Chatterファイル）→ Chatterの投稿に添付されるファイル。ボタン/リンクのソースにはできない。\n❌ E（Lightningページ）→ Lightningページをカスタムボタン/リンクのソースとして直接指定することはできない。\n\n🎯 試験のコツ：カスタムボタンのソース = URL or Visualforceページ。Lightning系は直接指定不可。", "a": "VisualForceページ", "b": "静的リソース", "c": "URL", "d": "Chatterファイル", "e": "Lightningページ"}, {"n": "5735", "p": "開発者は、ケースオブジェクトで使用可能なすべてのレコードタイプを表示したいと考えています。開発者は、ケースオブジェクトの状況項目の選択リスト値も表示したいと考えています。 ケースオブジェクトとケースオブジェクトの状況項目は、カスタムVisualforceページにあります。コントローラでレコードタイプと選択リスト値を取得するために、開発者はどのアクションを実行できますか。 ２つ選択してください。", "r": "プロセスの自動化とロジック", "ans": "A;B", "exp": "ざっくり言うと：Apexでケースのレコードタイプと選択リスト値を動的に取得する方法は？2つ選ぶ問題。\n\n✅ 正解 A：Case.Status.getDescribe().getPicklistValues()でSchema.PicklistEntryを取得\nDescribeメソッドを使えば、コード内で選択リストの全値を動的に取得できる。ハードコード不要。\n\n✅ 正解 B：Case.SObjectType.getDescribe().getRecordTypeInfos()でSchema.RecordTypeInfoを取得\nDescribeメソッドでオブジェクトの全レコードタイプ情報を動的に取得できる。\n\n❌ C（SOQLでケースレコードをクエリしてRecordType値を取得）→ 可能だが非効率。Describeの方がガバナ制限にも優しい。\n❌ D（SOQLでケースレコードをクエリして選択リスト値を取得）→ クエリで返るのは既存レコードの値のみ。全選択肢を取得するにはDescribeが必要。\n\n🎯 試験のコツ：メタデータの取得 = Describeメソッド。既存データの取得 = SOQL。全選択肢やレコードタイプ一覧はDescribeが正解。", "a": "Case.Status.getDescribe().getPicklistValues()によって返されるSchema.PicklistEntryを使用する。", "b": "Case.SObjectType.getDescribe().getRecordTypeInfos()によって返されるSchema.RecordTypeInfoを使用する。", "c": "SOQLを使用して組織内のケースレコードをクエリし、ケースオブジェクトで使用可能なすべてのRecordType値を取得する。", "d": "SOQLを使用して組織内のケースレコードをクエリし、状況項目のすべての値を取得する。"}, {"n": "5736", "p": "変数のスコープについての正確な記述はどれですか。3つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "A;B;C", "exp": "ざっくり言うと：Apexの変数スコープについて正しいのは？3つ選ぶ問題。\n\n✅ 正解 A：子ブロックは親ブロックの変数名を再利用できない\n同じメソッド内で親ブロックに宣言済みの変数名を子ブロックで再宣言するとコンパイルエラー。\n\n✅ 正解 B：ブロック内の任意のポイントで変数を定義できる\nApexではブロックの先頭でなくても、必要な場所で変数を宣言できる。\n\n✅ 正解 C：並列ブロックは同じ変数名を使用できる\n異なるメソッドや独立したブロック（例：別々のforループ内）では同じ変数名を使える。スコープが異なるため衝突しない。\n\n❌ D（nullなら子ブロックで再利用可能）→ 変数の値に関係なく、親ブロックの変数名は子ブロックで再宣言不可。\n❌ E（nullなら静的変数のスコープを制限可能）→ 静的変数のスコープはクラス全体。値がnullでもスコープは変わらない。\n\n🎯 試験のコツ：親の変数名=子で再利用不可、並列ブロック=同名OK、スコープは値ではなく宣言位置で決まる。", "a": "子ブロックは親ブロックの変数名を再利用できません。", "b": "ブロック内の任意のポイントで変数を定義できます。", "c": "並列ブロックは同じ変数名を使用できます。", "d": "変数の値がnullの場合、子ブロックは親ブロックの変数名を再利用できます。", "e": "変数の値がnullの場合、静的変数はスコープを現在のブロックに制限できます。"}, {"n": "5737", "p": "建設会社の運用管理者は、機械と呼ばれるカスタムオブジェクトを使用して、クレーンやその他の機械の使用と保守を管理します。管理者は、機械をさまざまな建設作業に割り当て、各作業に関連する日付とコストを追跡できるようにしたいと考えています。1つの建設作業に複数の機械を割り当てることも可能です。これらの要件を満たすために開発者は何をすべきですか。", "r": "デベロッパーの基本", "ans": "C", "exp": "ざっくり言うと：機械と建設作業の多対多関係で、日付やコストも追跡するには？\n\n✅ 正解 C：機械と建設作業の両方に主従関係を持つ連結オブジェクトを作成する\n連結オブジェクトを使えば多対多の関係を実現でき、連結オブジェクト自体に日付やコストの項目を追加して各作業ごとの情報を管理できる。\n\n❌ A（建設作業から機械への参照関係）→ 1つの建設作業に1台の機械しか紐付かない。多対多にならない。\n❌ B（機械から建設作業への参照関係）→ 同上。1台の機械に1つの建設作業しか紐付かない。\n❌ D（機械から建設作業への主従関係）→ 1対多の関係。多対多にはならない。\n\n🎯 試験のコツ：多対多 + 追加情報（日付・コスト等）→ 連結オブジェクト。連結オブジェクト自体に追加項目を持てるのがポイント。", "a": "建設作業オブジェクトに機械オブジェクトへの参照関係を作成する。", "b": "機械オブジェクトに建設作業オブジェクトへの参照関係を作成する。", "c": "機械オブジェクトと建設作業オブジェクトの両方に主従関係を持つ連結オブジェクトを作成する。", "d": "機械オブジェクトに、建設作業オブジェクトへの主従関係を作成する。"}, {"n": "5738", "p": "クイックアクションでレコードを作成する際、フィード項目を投稿する最も簡単な方法は何ですか。", "r": "デベロッパーの基本", "ans": "A", "exp": "ざっくり言うと：クイックアクションでレコード作成時にフィードに投稿する一番簡単な方法は？\n\n✅ 正解 A：クイックアクションでフィード項目の作成を選択する\nクイックアクションの設定画面で「フィード項目を作成」オプションを有効にするだけ。レコード作成と同時にフィードが自動更新される。最もシンプルな方法。\n\n❌ B（ケースフィードの作成を選択）→ ケースフィードはケースオブジェクト専用の機能。一般的なレコード作成には使えない。\n❌ C（ワークフロールールを追加）→ 可能だが、クイックアクションの設定だけで済むのに過剰な実装。\n❌ D（トリガーを追加）→ コードを書く必要があり「最も簡単」とは言えない。\n\n🎯 試験のコツ：「最も簡単」「最も効率的」→ 標準機能のオプション設定 > ワークフロー > トリガー。", "a": "クイックアクションでフィード項目の作成を選択する。", "b": "新しいレコードでケースフィードの作成を選択する。", "c": "新しいレコードにワークフロールールを追加する。", "d": "新しいレコードにトリガーを追加する。"}, {"n": "5739", "p": "ある会社には、Warehouseという名前のカスタムオブジェクトがあります。各Warehouseレコードには個別のレコード所有者がおり、Salesforceの親Accountに関連付けられています。開発者は、AccountとWarehouseを関連付けるために、どのような関係を使用しますか。", "r": "デベロッパーの基本", "ans": "B", "exp": "ざっくり言うと：Warehouseレコードが個別の所有者を持つ場合、Accountとの関係はどれ？\n\n✅ 正解 B：参照\n参照関係では、子レコード（Warehouse）は独自の所有者を持つことができる。親（Account）とは独立した所有者設定が可能。\n\n❌ A（一対多）→ 一般的な用語であり、Salesforceの具体的なリレーション型ではない。\n❌ C（主従）→ 主従関係では子レコードの所有者は親レコードと同じになる。「個別の所有者」という要件を満たせない。\n❌ D（親子）→ 一般用語であり、Salesforceの具体的なリレーション型ではない。\n\n🎯 試験のコツ：「独自の所有者を持つ」→ 参照関係。「親と同じ所有者」→ 主従関係。所有者の独立性がリレーション選択の鍵。", "a": "1対多", "b": "参照", "c": "主従", "d": "親子"}, {"n": "5740", "p": "開発者が、映画、俳優、契約を追跡するスキーマを作成することになりました。1つの映画は多くの契約を持つことができ、1人の俳優は多くの契約を持つことができます。各契約は、1 人のユーザーによって所有され、アクティブに管理されます。映画や俳優のレコードにアクセスすることなく、ユーザーが所有する契約を簡単に管理できるようにするには、どのスキーマを作成する必要がありますか。", "r": "デベロッパーの基本", "ans": "D", "exp": "ざっくり言うと：契約が独自の所有者を持ち、映画・俳優にアクセスせずに管理できるスキーマは？\n\n✅ 正解 D：映画と俳優の両方への参照関係\n参照関係×2にすることで、契約レコードは独自の所有者を持ち、映画や俳優のレコードへのアクセス権がなくても契約を管理できる。\n\n❌ A（映画:主従 + 俳優:参照）→ 主従関係があると、映画が削除されたら契約も消える。独立管理の要件に反する。\n❌ B（映画:参照 + 俳優:主従）→ 同上。俳優が削除されたら契約も消える。\n❌ C（映画:主従 + 俳優:主従）→ 両方主従だと、契約の所有者は最初の主従の親に依存する。「独自の所有者」を持てない。\n\n🎯 試験のコツ：「独自の所有者」「独立して管理」→ 参照関係。「親に依存」「カスケード削除」→ 主従関係。", "a": "映画オブジェクトへの主従関係と俳優オブジェクトへの参照関係", "b": "映画オブジェクトへの参照関係と俳優オブジェクトへの主従関係", "c": "映画オブジェクトへの主従関係と俳優オブジェクトへの主従関係", "d": "映画オブジェクトへの参照関係と俳優オブジェクトへの参照関係"}, {"n": "5741", "p": "以下のコードでは、Booleanはどのタイプから継承しますか。\n\nBoolean b = true;", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：ApexのBooleanはどの型から継承する？\n\n✅ 正解 B：Object\nApexではすべてのデータ型はObjectクラスから継承される。BooleanもObjectのサブクラス。Javaと同じ仕組み。\n\n❌ A（Enum）→ Enumは列挙型を定義するためのもの。Booleanの親クラスではない。\n❌ C（String）→ Stringは文字列型。Boolean（true/false）とは別系統。\n❌ D（Class）→ 「Class」という名前の具体的なクラスは存在しない。すべての型の最上位はObject。\n\n🎯 試験のコツ：Apexの型の頂点 = Object。すべてのプリミティブ型もsObject型も最終的にObjectを継承。", "a": "Enum", "b": "Object", "c": "String", "d": "Class"}, {"n": "5742", "p": "Visualforceページには、親オブジェクトへの参照関係を持つオブジェクトの標準コントローラがあります。開発者が親レコードのデータをページに表示するにはどうすればよいですか。", "r": "ユーザインターフェース", "ans": "B", "exp": "ざっくり言うと：VFで参照関係の親レコードのデータを表示するには？\n\n✅ 正解 B：差し込み項目の構文を使用する\n標準コントローラを使っていれば、{!オブジェクト.リレーション名.項目名}の構文で親レコードの項目に直接アクセスできる。\n\n❌ A（SOQL）→ Visualforceページ内で直接SOQLは使えない。差し込み項目が使える。\n❌ C（2つ目の標準コントローラを追加）→ VFページに標準コントローラは1つしか設定できない。\n❌ D（積み上げ集計項目）→ 積み上げ集計は子→親の集計。今回は親のデータを表示するだけなので不要。\n\n🎯 試験のコツ：VFで親データ表示 = 差し込み項目。SOQLは不要、コントローラ追加も不要。", "a": "VisualforceページでSOQLを使用して、親レコードのデータを取得する。", "b": "差し込み項目の構文を使用して、親レコードからデータを取得する。", "c": "親レコード用のページに2つ目の標準コントローラを追加する。", "d": "子レコードの積み上げ集計項目を使用して、親レコードのデータを含める。"}, {"n": "5743", "p": "開発者は次のコードを持っています。\n\ntry {\n    List nameList;\n    Account a;\n    String s = a.Name;\n    nameList.add(s);\n} catch (ListException le) {\n    System.debug(’List Exception’);\n} catch (NullPointerException npe) {\n    System.debug(’NullPointer Exception’);\n} catch (Exception e) {\n    System.debug(’Generic Exception’);\n}\n\nどのメッセージがログに記録されますか。", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：初期化されていない変数にアクセスしたとき、どの例外がキャッチされる？\n\n✅ 正解 D：NullPointer Exception\n未初期化の変数はnullを保持する。nullの変数に対してプロパティやメソッドにアクセスしようとするとNullPointerExceptionが発生する。\n\n❌ A（メッセージは記録されない）→ catchブロックがあるのでメッセージは記録される。\n❌ B（Generic Exception）→ NullPointerExceptionの方が具体的なので、そちらのcatchブロックが優先される。\n❌ C（List Exception）→ ListExceptionはリスト操作のエラー用。今回はnull参照が先に発生する。\n\n🎯 試験のコツ：未初期化変数へのアクセス = NullPointerException。try-catchでは最も具体的な例外型が優先的にキャッチされる。", "a": "メッセージは記録されない", "b": "Generic Exception", "c": "List Exception", "d": "NullPointer Exception"}, {"n": "5744", "p": "Force.comプラットフォームのMVCアーキテクチャのコントローラーを表すコードのタイプはどれですか。2つ選びなさい。", "r": "ユーザインターフェース", "ans": "B;C", "exp": "ざっくり言うと：Force.comのMVCでコントローラーにあたるのは？2つ選ぶ問題。\n\n✅ 正解 B：データの操作に使用されるカスタムApexおよびJavaScript\nApexはサーバー側のビジネスロジックを、JavaScriptはクライアント側のUI制御を担当。どちらもMVCの「コントローラー」の役割。\n\n✅ 正解 C：Visualforceによって参照されるStandardControllerシステムメソッド\nStandardControllerは標準のCRUD操作（save, edit, deleteなど）を提供する組み込みコントローラー。\n\n❌ A（CSSと画像の静的リソース）→ これはMVCの「ビュー」の装飾部分。コントローラーではない。\n❌ D（メニュー表示のJavaScript）→ メニュー表示はUIの一部であり「ビュー」に該当。コントローラーではない。\n\n🎯 試験のコツ：MVC → Model=データ/sObject、View=VFページ/HTML/CSS、Controller=Apex/JS/StandardController。", "a": "CSSと画像を含む静的リソース", "b": "データの操作に使用されるカスタムApexおよびJavaScript", "c": "Visualforceによって参照されるStandardControllerシステムメソッド", "d": "メニュー項目を表示するために使用されるJavaScript"}, {"n": "5745", "p": "開発者コンソールの機能は何ですか。", "r": "テスト、デバッグ、リリース", "ans": "B", "exp": "ざっくり言うと：開発者コンソールの機能は？\n\n✅ 正解 B：匿名Apexコードの実行、コードの作成/編集、デバッグログの表示\n開発者コンソールの3大機能：①匿名実行でApexを即座にテスト、②Apexクラス/トリガーの作成・編集、③デバッグログの確認。\n\n❌ A（REST APIの実行を含む）→ 開発者コンソールにREST APIを直接実行する機能はない。REST APIはWorkbenchやPostmanなどの外部ツールで実行する。\n❌ C（コード変更のデプロイを含む）→ デプロイは変更セット、SFDX CLI、メタデータAPIなどで行う。開発者コンソールにデプロイ機能はない。\n❌ D（REST APIとデプロイの両方）→ AとCの両方が含まれるため不正解。\n\n🎯 試験のコツ：開発者コンソール = コード編集 + 匿名実行 + デバッグログ。デプロイとREST API実行は含まない。", "a": "匿名Apexコードの実行、REST APIの実行、コードの作成/編集", "b": "匿名Apexコードの実行、コードの作成/編集、デバッグログの表示", "c": "匿名Apexコードの実行、コードの作成/編集、コード変更のデプロイ", "d": "匿名Apexコードの実行、REST APIの実行、コード変更のデプロイ"}, {"n": "5746", "p": "単一レコードで、ユーザーは複数選択リストから複数の値を選択します。選択した値はApexでどのように表されますか。", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：複数選択リストで選んだ値はApexでどう表現される？\n\n✅ 正解 D：各値をセミコロンで区切ったStringとして\n複数選択リストの値は「選択肢1;選択肢2;選択肢3」のようにセミコロン（;）で区切られた1つの文字列として保存される。\n\n❌ A（カンマ区切りのString）→ 区切り文字はカンマではなくセミコロン。\n❌ B（Setの要素として）→ Set型として提供されるわけではない。必要なら文字列をsplit(';')でSetに変換する。\n❌ C（Listの要素として）→ List型でもない。同様にsplitで変換が必要。\n\n🎯 試験のコツ：複数選択リスト = セミコロン区切りのString。分割するならsplit(';')を使う。", "a": "各値をカンマで区切ったStringとして", "b": "各値をSetの要素とした、Setとして", "c": "各値をListの要素とした、Listとして", "d": "各値をセミコロンで区切ったStringとして"}, {"n": "5747", "p": "カスタムSVGをLightning Webコンポーネントに含めることができる３つのステップはどれですか。3つ選びなさい。", "r": "ユーザインターフェース", "ans": "A;B;E", "exp": "ざっくり言うと：カスタムSVGをLWCに含める3つのステップは？\n\n✅ 正解 A：SVGを静的リソースとしてアップロードする\nまずSVGファイルをSalesforceの静的リソースに保存する。\n\n✅ 正解 B：HTMLテンプレートでgetterを参照する\nJSファイルで定義したgetterをHTMLテンプレート内で{getter名}として参照し、SVGを表示する。\n\n✅ 正解 E：静的リソースをインポートし、JavaScriptでgetterを提供する\nJSファイルで@salesforce/resourceUrl/リソース名をインポートし、getterメソッドで返す。\n\n❌ C（コンテンツアセットファイルとしてインポート）→ LWCでSVGを使う一般的な方法は静的リソース経由。\n❌ D（HTMLテンプレートでインポートを参照）→ HTML内で直接importはできない。JS経由のgetter参照が正しい。\n\n🎯 試験のコツ：LWCでの静的リソース利用 = ①静的リソースにアップロード → ②JSでインポート＆getter定義 → ③HTMLでgetter参照。", "a": "SVGを静的リソースとしてアップロードします。", "b": "HTMLテンプレートでgetterを参照します。", "c": "SVGをコンテンツアセットファイルとしてインポートします。", "d": "HTMLテンプレートでインポートを参照します。", "e": "静的リソースをインポートし、JavaScriptでgetterを提供します。"}, {"n": "5748", "p": "外部IDの用途は何ですか。2つ選びなさい。", "r": "デベロッパーの基本", "ans": "A;D", "exp": "ざっくり言うと：外部IDの用途は？2つ選ぶ問題。\n\n✅ 正解 A：外部システムからインポートされたレコード間の関係を作成する\n外部IDを使えば、インポート時にSalesforceのIDではなく外部システムのIDで関連レコードを紐付けできる。\n\n✅ 正解 D：Upsertを使用して重複レコードの作成を防ぐ\nUpsert操作で外部IDをキーに指定すると、既存レコードがあれば更新、なければ新規作成。重複を防げる。\n\n❌ B（別環境で同じSalesforce IDを使う）→ Salesforce IDは環境ごとに異なる。外部IDとSalesforce IDは別物。\n❌ C（sObjectタイプの識別）→ sObjectタイプの識別はAPI名やKeyPrefixで行う。外部IDの役割ではない。\n\n🎯 試験のコツ：外部ID = ①インポート時の関連付けキー ②Upsertの重複防止キー。インデックスも自動付与されるのでクエリも高速。", "a": "外部システムからインポートされたレコード間の関係を作成します。", "b": "別の環境と同じSalesforceIDを使用して開発環境でレコードを作成します。", "c": "SalesforceでsObjectタイプを識別します。", "d": "Upsertを使用して重複レコードを作成するのを防ぎます。"}, {"n": "5749", "p": "組織には「NoContacts」という名前の単一の取引先があり、関連する取引先責任者はありません。\n\nList accounts = [\n  SELECT Name, (SELECT Id, Name FROM Contacts)\n  FROM Account \n  WHERE Name = ’NoContacts’\n];\n\nこのApexを実行した結果はどうなりますか。", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：サブクエリで取引先責任者が0件の場合、結果はどうなる？\n\n✅ 正解 B：accounts[0].contactsは空\nSOQLのサブクエリで子レコードが0件の場合、nullではなく空のリスト（要素数0のList）が返る。.size()は0を返すが、リスト自体は有効なオブジェクト。\n\n❌ A（QueryExceptionがスローされる）→ 親レコード（Account）が存在する限り、例外は発生しない。子が0件でも正常。\n❌ C（contactsはNull）→ nullではなく空リスト。サブクエリの結果は常にリストが返る。\n❌ D（contactsは無効）→ 「無効」という状態はApexに存在しない。\n\n🎯 試験のコツ：サブクエリの結果0件 = 空リスト（null非ず）。単一変数への代入で0件 = QueryException。この違いを覚える。", "a": "QueryExceptionがスローされます。", "b": "accounts[0].contactsは空です。", "c": "accounts[0].contactsはNullです。", "d": "accounts[0].contactsは無効です。"}, {"n": "5750", "p": "Lightningコンポーネントで外部JavaScriptライブラリをロードするために使用されるタグの機能は何ですか。3つ選びなさい。", "r": "ユーザインターフェース", "ans": "B;C;D", "exp": "ざっくり言うと：ltng:requireタグでJSライブラリを読み込むときの機能は？3つ選ぶ問題。\n\n✅ 正解 B：重複するスクリプトの1回限りの読み込み\n同じライブラリが複数回指定されても、1回だけ読み込まれる。パフォーマンスを最適化。\n\n✅ 正解 C：読み込み順序の指定\nscripts属性にリストした順番でスクリプトが読み込まれる。依存関係を正しく管理できる。\n\n✅ 正解 D：スクリプトを並行して読み込む\n相互に依存しないスクリプトは並列で読み込まれ、読み込み時間を短縮できる。\n\n❌ A（ドキュメントからファイルを読み込む）→ ドキュメントではなく静的リソースから読み込む。\n❌ E（外部ホストのスクリプトを読み込む）→ CSP（Content Security Policy）により、外部URLからの直接読み込みは制限されている。静的リソース経由が必要。\n\n🎯 試験のコツ：ltng:require = 重複排除 + 順序保証 + 並列読み込み。外部URLは不可、静的リソースのみ。", "a": "ドキュメントからのファイルの読み込み", "b": "重複するスクリプトの1回限りの読み込み", "c": "読み込み順序の指定", "d": "スクリプトを並行して読み込む", "e": "外部でホストされているスクリプトの読み込み"}, {"n": "5751", "p": "GetterメソッドとSetterメソッドに関する記述のうち、正しいものはどれですか。2つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "C;D", "exp": "ざっくり言うと：Getter/Setterメソッドについて正しいのは？2つ選ぶ問題。\n\n✅ 正解 C：GetterとSetterの実行順序は保証されない\nVFページのライフサイクル中、GetterとSetterが呼ばれる順序は固定されていない。複数回呼ばれることもある。\n\n✅ 正解 D：Getterメソッドはコントローラからページに値を渡すことができる\nGetterはコントローラの変数やロジックの結果をVFページに提供する役割。\n\n❌ A（より適切なメソッドが必要）→ ページからコントローラへの値の受け渡しにはSetterメソッドを使う。「より適切なメソッド」が必要というのは誤り。\n❌ B（Setterは常にグローバル宣言が必要）→ Setterはpublicで十分。globalは異なる名前空間間のアクセス時のみ必要。\n\n🎯 試験のコツ：Getter = コントローラ→ページ。Setter = ページ→コントローラ。実行順序は保証されない。", "a": "ページからコントローラーに値を渡すには、より適切なメソッドが必要です。", "b": "Setterメソッドは常にグローバルに宣言する必要があります。", "c": "GetterメソッドとSetterメソッドの実行順序は保証されません。", "d": "Getterメソッドは、コントローラからページに値を渡すことができます。"}, {"n": "5752", "p": "開発者は以下のコントローラクラスを持ちます。\n\npublic with sharing class myFooController{\n\tpublic integer prop {get; private set;}\n}\n\nどのコードブロックが実行匿名ウィンドウで正常に実行されますか。", "r": "ユーザインターフェース", "ans": "A", "exp": "ざっくり言うと：初期化されていないInteger型プロパティの値は？\n\n✅ 正解 A：m.prop == null\nApexでは、Integer型の変数を宣言しても初期化しなければ値はnull。Javaのようにデフォルト0にはならない。\n\n❌ B（prop == 0）→ Apexでは未初期化のIntegerは0ではなくnull。\n❌ C（prop == 1）→ 明示的に1を代入しない限り1にはならない。\n❌ D（prop != null）→ 未初期化なのでnullであり、このアサーションは失敗する。\n\n🎯 試験のコツ：Apex未初期化変数のデフォルト値 = null（Integer含む）。Javaとの違いに注意。", "a": "myFooController m = new myFooController();<br>System.assert(m.prop == null);", "b": "myFooController m = new myFooController();<br>System.assert(m.prop == 0);", "c": "myFooController m = new myFooController();<br>System.assert(m.prop == 1);", "d": "myFooController m = new myFooController();<br>System.assert(m.prop != null);"}, {"n": "5753", "p": "マルチテナント環境で開発する場合、開発者がガバナ制限に達するのを避けるために使用すべき戦略はどれですか。2つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "C;D", "exp": "ざっくり言うと：マルチテナント環境でガバナ制限に達しないための戦略は？2つ選ぶ問題。\n\n✅ 正解 C：SOQL Forループを使用して大量データを繰り返し処理する\nSOQL Forループは200件ずつデータを取得して処理するため、ヒープメモリの消費を抑えられる。\n\n✅ 正解 D：Limitsクラスのメソッドを使用してガバナ制限を監視する\nLimits.getDMLStatements()やLimits.getQueries()で現在の使用量を確認し、制限に達する前に対処できる。\n\n❌ A（すべての項目をコレクションに保存）→ 「すべての項目」を保存するとヒープメモリを浪費し、逆にガバナ制限に達しやすくなる。\n❌ B（Apexクラスの変数に大量データを保存）→ 同上。大量データを変数に保持するとヒープ制限に達するリスクが高まる。\n\n🎯 試験のコツ：ガバナ制限対策 = SOQL Forループ（メモリ節約）+ Limitsクラス（使用量監視）。「全部保存」は逆効果。", "a": "コレクションを使用して、最低限必要な項目だけでなく、関連するオブジェクトのすべての項目を保存する。", "b": "Apexクラス内の変数を使用して、大量のデータを保存する。", "c": "SOQL For ループを使用して、多数の行を返すクエリから取得したデータを繰り返し処理する。", "d": "Limitsクラスのメソッドを使用して、ガバナ制限を監視する。"}, {"n": "5754", "p": "カスタムオブジェクトには、Food_Preference__cというカスタム選択リスト項目が存在します。この選択リストには、”Vegan”、”Kosher”、”No Preference”というオプションが含まれています。開発者は、レコードが作成または更新されるたびに値が入力されることを確認する必要があります。 レコードが保存されるたびに値が選択されることを確実にするための最も効率的な方法は何ですか。", "r": "プロセスの自動化とロジック", "ans": "A", "exp": "ざっくり言うと：レコード保存時にカスタム選択リストに必ず値が入るようにする最も効率的な方法は？\n\n✅ 正解 A：項目定義で項目を必須としてマークする\nカスタム項目の定義画面で「必須」にチェックを入れるのが最もシンプル。UI経由でもAPI経由でも必須が適用される。\n\n❌ B（デフォルト値を設定）→ デフォルト値が入るだけで、ユーザーが意図的に値を選択したことにはならない。\n❌ C（ページレイアウトで必須にする）→ ページレイアウトの必須はUI表示時のみ。API経由のデータ操作では適用されない。\n❌ D（入力規則を設定）→ 実現可能だが、項目定義の必須設定の方が簡潔で管理しやすい。\n\n🎯 試験のコツ：「最も効率的に必須にする」→ 項目定義で必須マーク。ページレイアウトの必須はUI限定なので注意。", "a": "項目定義で項目を必須としてマークします。", "b": "選択リスト作成時に「最初の値をデフォルト値とする」にチェックを入れます。", "c": "オブジェクトのページレイアウトで項目を必須としてマークします。", "d": "値が選択されることを強制するための入力規則を設定します。"}, {"n": "5755", "p": "開発者は実行匿名ウィンドウで次のコードを記述します。\n\nList acc = [SELECT Id FROM Account LIMIT 10];\nDelete acc;\nDatabase.emptyRecycleBin(acc);\nSystem.Debug(Limits.getDMLStatements()+', '+Limits.getLimitDMLStatements());\n\nデバッグステートメントの結果は何ですか。", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：匿名実行でDML操作した後のLimitsメソッドの出力は？\n\n✅ 正解 B：2, 150\ngetDMLStatements() = delete(1回) + emptyRecycleBin(1回) = 2\ngetLimitDMLStatements() = DML上限 = 150\n\n❌ A（1, 150）→ emptyRecycleBinもDMLとしてカウントされるので1ではなく2。\n❌ C（1, 100）→ DML回数もDML上限も間違い。\n❌ D（2, 200）→ DML上限は150であり200ではない。\n\n🎯 試験のコツ：Database.emptyRecycleBin = DMLとしてカウントされる。DML上限は常に150。", "a": "1, 150", "b": "2, 150", "c": "1, 100", "d": "2, 200"}, {"n": "5756", "p": "Lightningコンポーネントはリソースバンドルに何を含めることができますか。2つ選びなさい。", "r": "ユーザインターフェース", "ans": "A;C", "exp": "ざっくり言うと：Lightningコンポーネントのリソースバンドルに含められるのは？2つ選ぶ問題。\n\n✅ 正解 A：カスタムクライアント側のレンダリング動作\nレンダラーJSファイルで、コンポーネントのデフォルトのレンダリング動作をカスタマイズできる。\n\n✅ 正解 C：コンポーネントに割り当てられたCSSスタイル\nCSSファイルでコンポーネント固有のスタイルを定義できる。\n\n❌ B（縮小化のためのスクリプト）→ コードの縮小化（Minification）はプラットフォームが自動で行う。開発者が含める必要はない。\n❌ D（グローバル設定のプロパティファイル）→ Lightningコンポーネントに「プロパティファイル」は存在しない。属性はdesignファイルで公開する。\n\n🎯 試験のコツ：Auraバンドル = コンポーネント + コントローラ + ヘルパー + スタイル(CSS) + レンダラー + デザイン + ドキュメント + SVG。", "a": "カスタムクライアント側のレンダリング動作", "b": "縮小化のためのスクリプト作成", "c": "コンポーネントに割り当てられたCSSスタイル", "d": "グローバル設定を含むプロパティファイル"}, {"n": "5757", "p": "開発者がSalesforce REST APIにリクエストを送信し、レスポンスを表示できるツールはどれですか。", "r": "プロセスの自動化とロジック", "ans": "A", "exp": "ざっくり言うと：Salesforce REST APIにリクエストを送信してレスポンスを表示できるツールは？\n\n✅ 正解 A：Workbench RESTエクスプローラ\nWorkbenchにはREST APIを直接実行できるRESTエクスプローラ機能がある。GETやPOSTリクエストを送信し、レスポンスを確認できる。\n\n❌ B（RESTリソースパスのURL）→ URLはリクエスト先であり、ツールではない。\n❌ C（開発者コンソールのRESTタブ）→ 開発者コンソールにRESTタブは存在しない。\n❌ D（Force.com IDE RESTエクスプローラタブ）→ Force.com IDEは廃止済み。RESTエクスプローラタブも存在しなかった。\n\n🎯 試験のコツ：REST APIの手動テスト = Workbench RESTエクスプローラ。開発者コンソールではできない。", "a": "Workbench RESTエクスプローラ", "b": "RESTリソースパスのURL", "c": "開発者コンソールのRESTタブ", "d": "Force.com IDE RESTエクスプローラタブ"}, {"n": "5758", "p": "開発者は、ヘルパークラスを持つ新しいApexトリガーを作成し、新しいApexヘルパークラスの95%のカバレッジのみを実行するテストクラスを作成します。本番環境への変更セットのデプロイは、以下テストカバレッジの警告で失敗します。\n“選択したApexトリガーのテストカバレッジは0%です。少なくとも1%のテストカバレッジが必要です。”\n新しいApexトリガーとヘルパークラスのデプロイを成功させるために、開発者は何をする必要がありますか。", "r": "テスト、デバッグ、リリース", "ans": "D", "exp": "ざっくり言うと：トリガーのテストカバレッジが0%でデプロイ失敗。どう解決する？\n\n✅ 正解 D：Apexトリガーをカバーするテストクラスとメソッドを作成する\nエラーの原因は「トリガーのカバレッジが0%」。ヘルパークラスのカバレッジ95%があっても、トリガー自体が1回も実行されていなければデプロイできない。トリガーを起動させるDML操作を含むテストメソッドを作成する必要がある。\n\n❌ A（ヘルパークラスのカバレッジを増やす）→ ヘルパーは95%で十分。問題はトリガーのカバレッジが0%であること。\n❌ B（失敗したテストメソッドを削除）→ テストの失敗に関する情報はなく、カバレッジが問題。削除では解決しない。\n❌ C（Run Allでテスト実行）→ トリガーをカバーするテストが存在しないので、全テスト実行しても0%のまま。\n\n🎯 試験のコツ：デプロイ要件 = 全体75%以上 + 各トリガー最低1%。ヘルパーがOKでもトリガー自体のカバレッジが必要。", "a": "ヘルパークラスのテストクラスカバレッジを増やす。", "b": "失敗したテストメソッドをテストクラスから削除する。", "c": "開発者コンソールで「Run All」を使用してテストを実行する。", "d": "Apexトリガーをカバーするテストクラスとメソッドを作成する。"}, {"n": "5759", "p": "VisualforceページのコンテンツをPDFとして表示するコードはどれですか。", "r": "ユーザインターフェース", "ans": "B", "exp": "ざっくり言うと：VFページの内容をPDFとして表示するコードは？\n\n✅ 正解 B：<apex:page renderAs=\"pdf\">\nrenderAs属性に\"pdf\"を指定すると、VFページがPDF形式でレンダリングされる。ブラウザにはHTMLではなくPDFが返される。\n\n❌ A（contentType=\"pdf\"）→ contentTypeはMIMEタイプを指定する属性だが、PDF生成にはrenderAsを使う。\n❌ C（contentType=\"application/pdf\"）→ contentTypeではPDFレンダリングエンジンは起動しない。renderAsが必要。\n❌ D（rendersAs=\"application/pdf\"）→ 属性名はrenderAs（sなし）で、値は\"pdf\"（application/pdfではない）。\n\n🎯 試験のコツ：VFのPDF出力 = renderAs=\"pdf\"。contentTypeではなくrenderAs。値は\"pdf\"のみ。", "a": "<p>＜apex:page contentType=”pdf”＞</p>", "b": "<p>＜apex:page renderAs=”pdf”＞</p>", "c": "<p>＜apex:page contentType=”application/pdf”＞</p>", "d": "<p>＜apex:page rendersAs=”application/pdf”＞</p>"}, {"n": "5760", "p": "SOQLインジェクションの脆弱性から保護するために、開発者がVisualforceコントローラで使用できるクエリはどれですか。2つ選びなさい。", "r": "ユーザインターフェース", "ans": "B;C", "exp": "ざっくり言うと：SOQLインジェクションを防ぐクエリの書き方は？2つ選ぶ問題。\n\n✅ 正解 B：バインド変数(:qryName)を使った動的クエリ\nバインド変数を使用すると、ユーザー入力が自動的にエスケープされ、SOQLインジェクションを防げる。\n\n✅ 正解 C：String.escapeSingleQuotes()でサニタイズ＋バインド変数\nescapeSingleQuotesでシングルクォートをエスケープし、さらにバインド変数で安全にクエリに渡す。二重の防御。\n\n❌ A（バインド変数のみ、サニタイズなし）→ qryNameの値がどう設定されるか不明。ユーザー入力がサニタイズされずに渡される可能性がある。\n❌ D（String.enforceSecurityChecks）→ そんなメソッドはApexに存在しない。コンパイルエラーになる。\n\n🎯 試験のコツ：SOQLインジェクション対策 = ①バインド変数(:変数名) ②escapeSingleQuotes() ③静的SOQLに置き換え。", "a": "<p>String qryString = ’SELECT Id FROM Contact WHERE Name LIKE :qryName’；</p><p><br></p><p>List queryResults = Database.query(qryString)；</p>", "b": "<p>String qryName = ’%’ + Name + ’%’；</p><p><br></p><p>String qryString = ’SELECT Id FROM Contact WHERE Name LIKE :qryName’；</p><p><br></p><p>List queryResults = Database.query(qryString)；</p>", "c": "<p>String qryName = ’%’ + String.escapeSingleQuotes(name) + ’%’；</p><p><br></p><p>String qryString = ’SELECT Id FROM Contact WHERE Name LIKE ：qryName’；</p><p><br></p><p>List queryResults = Database.query(qryString)；</p>", "d": "<p>String qryName = ’%’ + String.enforceSecurityChecks(name) + ’%’；</p><p><br></p><p>String qryString = ’SELECT Id FROM Contact WHERE Name LIKE :qryName’；</p><p><br></p><p>List queryResults = Database.query(qryString)；</p>"}, {"n": "5761", "p": "開発者は、組織のデータを変更することなく、取引先トリガーが正しく動作していることを確認する必要があります。開発者は、取引先トリガーをテストするために何をすべきでしょうか。", "r": "テスト、デバッグ、リリース", "ans": "A", "exp": "ざっくり言うと：組織データを変更せずに取引先トリガーをテストするには？\n\n✅ 正解 A：開発者コンソールのテストメニューでテストクラスを実行する\nテストクラスは独自のテストデータで実行され、終了後に自動ロールバック。組織のデータは変更されない。\n\n❌ B（匿名実行でinsert Account DMLを実行）→ 匿名実行は実データを変更する。ロールバックされない。\n❌ C（VSCode IDEでApexクラスをデプロイ）→ デプロイはコードの展開であり、トリガーのテストとは別。\n❌ D（取引先タブの新規ボタン）→ 手動でレコードを作成すると実データが変更される。\n\n🎯 試験のコツ：「組織データを変更せずにテスト」= テストクラスの実行。匿名実行や手動操作は実データに影響。", "a": "開発者コンソールの[テスト]メニューを使用して、取引先トリガーのすべてのテストクラスを実行します。", "b": "開発者コンソールの匿名実行機能を使用して、’insert Account’DML文を実行します。", "c": "VSCode IDEのデプロイを使用して、’insert Account’Apexクラスをデプロイします。", "d": "Salesforceの[取引先]タブの[新規]ボタンを使用して、新しい取引先レコードを作成します。"}, {"n": "5762", "p": "Apexコンパイラエラーが発生するステートメントはどれですか。", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：Apexコンパイルエラーが発生するステートメントは？\n\n✅ 正解 D：List<String> s = List<String>{'a','b','c'};\nnewキーワードが抜けている。正しくは new List<String>{'a','b','c'}。Apexでは新しいオブジェクトやコレクションの作成にはnewが必須。\n\n❌ A（Map<Id,Lead> = new Map<Id,Lead>([SELECT...])）→ SOQLクエリの結果をMapのコンストラクタに渡す正しい構文。\n❌ B（Date d1 = Date.Today(), d2 = Date.ValueOf('2018-01-01')）→ 複数変数の同時宣言は有効。\n❌ C（Integer a=5, b=6, c, d=7）→ cは初期値なし（null）だが、宣言自体は有効。\n\n🎯 試験のコツ：コレクション初期化 = new List/Set/Map<型>{値}。newが抜けるとコンパイルエラー。", "a": "Map lmap = new Map([Select ID from Lead Limit 8]);", "b": "Date d1 = Date.Today(), d2 = Date.ValueOf(‘2018-01-01’);", "c": "Integer a=5, b=6, c, d = 7;", "d": "List s = List{‘a’,’b’,’c’};"}, {"n": "5763", "p": "新しく採用された開発者は、ケースオブジェクトに複数のトリガーがあることを発見しました。トリガーを使用する際に開発者は何を考慮すべきですか。", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：同じオブジェクトに複数のトリガーがあるとき何に注意すべき？\n\n✅ 正解 D：同じsObjectに対するトリガーは実行順序が保証されない\nSalesforceでは、同一オブジェクトに複数のトリガーが存在する場合、どのトリガーが先に実行されるかは保証されていない。バージョンアップで順序が変わる可能性もある。\n\n❌ A（実行順序を決めなければならない）→ 開発者がトリガーの実行順序を制御する手段はない。\n❌ B（作成日時に基づく）→ 作成日時は実行順序に影響しない。\n❌ C（テスト対象トリガーを指定する必要がある）→ テスト時に特定のトリガーだけを実行する仕組みはない。DML操作で全トリガーが起動する。\n\n🎯 試験のコツ：同一オブジェクトのトリガーは1つにまとめるのがベストプラクティス。複数作ると順序問題が発生する。", "a": "開発者はトリガーの実行順序を決めなければなりません。", "b": "トリガーの実行順序は作成日時に基づいています。", "c": "単体テストではテストするトリガーを指定する必要があります。", "d": "同じsObjectに対するトリガーは実行順序が保証されません。"}, {"n": "5764", "p": "標準機能とカスタム機能の両方を含むケースレコードを表示および編集するVisualforceページが必要です。VisualforceページにmyControllerExtensionというApexクラスで定義されたコントローラ機能を正しく実装するためにどの属性を含める必要がありますか。", "r": "テスト、デバッグ、リリース", "ans": "D", "exp": "ざっくり言うと：標準機能＋カスタム機能のVFページに必要な属性は？\n\n✅ 正解 D：standardController = \"Case\" extensions = \"myControllerExtension\"\nstandardControllerで標準コントローラ（Case）を指定し、extensionsでカスタムロジックを追加する拡張クラスを指定する。これにより標準の保存・編集機能を維持しつつ、カスタム機能を追加できる。\n\n❌ A（extensionsのみ）→ standardControllerの指定がないと、どのオブジェクトのレコードを扱うかわからない。\n❌ B（controller = \"myControllerExtension\"）→ controllerはカスタムコントローラ用。標準機能を使う場合はstandardControllerが必要。\n❌ C（controller = \"Case\" extensions = ...）→ standardControllerではなくcontrollerを使っている。controllerは標準機能なしのカスタムコントローラ用。\n\n🎯 試験のコツ：標準＋カスタム = standardController + extensions。純カスタム = controller。", "a": "extensions = “myControllerExtension”", "b": "controller = “myControllerExtension”", "c": "controller = “Case” extensions = “myControllerExtension”", "d": "standardController = “Case” extensions = “myControllerExtension”"}, {"n": "5765", "p": "開発者は、取引先責任者のリストを更新するApexメソッドを作成し、LightningWebコンポーネントで使用できるようにしたいと考えています。 これを実現するために、開発者はどのアノテーションをApexメソッドに追加する必要がありますか。", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：取引先責任者を更新するApexメソッドをLWCで使うためのアノテーションは？\n\n✅ 正解 B：@AuraEnabled\nLWCからApexメソッドを呼び出すには@AuraEnabledが必要。データを「更新」するメソッドなのでcacheable=trueは使わない。\n\n❌ A（@RemoteAction）→ VisualforceページのJavaScriptからApexを呼ぶためのもの。LWCでは使えない。\n❌ C（@AuraEnabled(cacheable=true)）→ cacheable=trueは読み取り専用メソッド用。データを更新するメソッドには使えない（DML操作が禁止される）。\n❌ D（@RemoteAction(cacheable=true)）→ @RemoteActionにcacheableオプションは存在しない。かつLWCでは使えない。\n\n🎯 試験のコツ：LWCから読み取りのみ = @AuraEnabled(cacheable=true)。更新あり = @AuraEnabled（cacheableなし）。", "a": "@RemoteAction", "b": "@AuraEnabled", "c": "@AuraEnabled(cacheable=true)", "d": "@RemoteAction(cacheable=true)"}, {"n": "5766", "p": "Visualforceページにページネーションを追加するために、開発者が使用すべき手段はどれですか。", "r": "ユーザインターフェース", "ans": "D", "exp": "ざっくり言うと：VFページにページネーション（ページ送り）を追加するには？\n\n✅ 正解 D：StandardSetController\nStandardSetControllerにはnext(), previous(), setPageSize()などのページネーション用メソッドが組み込まれている。大量レコードのリスト表示に最適。\n\n❌ A（StandardController）→ 単一レコード操作用。ページネーション機能はない。\n❌ B（pageのaction属性）→ ページ読み込み時に実行するメソッドを指定する属性。ページネーションとは別。\n❌ C（pageのextensions属性）→ コントローラ拡張を指定する属性。ページネーション機能は提供しない。\n\n🎯 試験のコツ：ページネーション = StandardSetController。単一レコード = StandardController。名前のSet有無で覚える。", "a": "StandardController", "b": "ページのaction属性", "c": "ページのextensions属性", "d": "StandardSetController"}, {"n": "5767", "p": "“without sharing”キーワードを使用してApexクラスを宣言すると、どのような影響がありますか。", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：without sharingキーワードを使うとどうなる？\n\n✅ 正解 B：現在のユーザーの共有ルールは適用されない\nwithout sharingでクラスを宣言すると、そのクラス内のコードは共有ルールを無視してすべてのレコードにアクセスできる。管理者権限のようなアクセスが可能になる。\n\n❌ A（現在のユーザーが所有するレコードのみ更新可能）→ 逆。共有ルールを無視するので、所有していないレコードにもアクセスできる。\n❌ C（共有ルールを設定できない）→ without sharingは実行時のアクセス制御の話。レコードへの共有ルール設定自体は可能。\n❌ D（開発者権限を持つユーザーのみ使用可能）→ without sharingはクラスの宣言であり、使用者の権限には依存しない。\n\n🎯 試験のコツ：with sharing = ユーザーの共有ルール適用。without sharing = 共有ルール無視（全データアクセス可能）。", "a": "現在のユーザーが所有するレコードのみを更新できます。", "b": "現在のユーザーの共有ルールは適用されません。", "c": "クラスが作成したレコードに共有ルールを設定することはできません。", "d": "このクラスは、開発者権限を持つユーザーのみが使用できます。"}, {"n": "5768", "p": "どの数式が正しく評価されますか。2つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "A;C", "exp": "ざっくり言うと：小数点を含む値を正しく代入できるデータ型は？2つ選ぶ問題。\n\n✅ 正解 A：Double d = 3.14159;\nDouble型は浮動小数点数を格納できる。小数値の代入が可能。\n\n✅ 正解 C：Decimal d = 3.14159;\nDecimal型も小数点を正確に表現できる。特に金融計算で推奨。\n\n❌ B（Integer I = 3.14159）→ Integer型は整数のみ。小数値を代入するとコンパイルエラー。\n❌ D（Long l = 3.14159）→ Long型は64ビット整数。小数値の代入はできない。\n\n🎯 試験のコツ：小数OK = Double, Decimal。整数のみ = Integer, Long。通貨計算にはDecimalが推奨。", "a": "Double d = 3.14159;", "b": "Integer I = 3.14159;", "c": "Decimal d = 3.14159;", "d": "Long l = 3.14159;"}, {"n": "5769", "p": "変更セットのデプロイについて正しい説明はどれですか。3つ選びなさい。", "r": "テスト、デバッグ、リリース", "ans": "B;C;D", "exp": "ざっくり言うと：変更セットのデプロイについて正しいのは？3つ選ぶ問題。\n\n✅ 正解 B：変更セットは関連する組織間でのみ使用できる\n本番とサンドボックス、またはサンドボックス同士（同じ本番から派生）でのみ使える。\n\n✅ 正解 C：デプロイは一方向の単一トランザクションで行われる\n変更セットは送信元→受信先への一方向。デプロイ中のすべてのコンポーネントは1つのトランザクションとして処理される。\n\n✅ 正解 D：2つの組織間で変更セットを送信するにはデプロイメント接続が必要\n送信元と受信先の間にデプロイメント接続を事前に設定する必要がある。\n\n❌ A（カスタム設定データをデプロイ可能）→ 変更セットはメタデータのみ。カスタム設定のデータ（値）は含まれない。\n❌ E（レコードの転送に使用可能）→ 変更セットはメタデータ専用。レコード（データ）は転送できない。\n\n🎯 試験のコツ：変更セット = メタデータのみ、関連組織間のみ、一方向、接続必要。データは転送不可。", "a": "変更セットはカスタム設定データをデプロイできます。", "b": "変更セットは、関連する組織間でのみ使用できます。", "c": "デプロイは一方向の単一トランザクションで行われます。", "d": "2つの組織間で変更セットを送信するには、デプロイメント接続が必要です。", "e": "変更セットはレコードの転送に使用できます。"}, {"n": "5770", "p": "before insertトリガーを使用する代わりにafter insertトリガーを使用する利点は何ですか。", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：before insertではなくafter insertトリガーを使う利点は？\n\n✅ 正解 B：新しいレコードを参照する他のオブジェクトを挿入できる\nafter insertの時点でレコードのIDが確定している。そのIDを使って関連レコード（子オブジェクトなど）を作成できる。before insertではIDがまだない。\n\n❌ A（入力規則を回避できる）→ after insertでも入力規則は保存前に適用される。回避はできない。\n❌ C（外部サービスにコールアウトできる）→ before/afterに関わらず、トリガー内で直接コールアウトはできない。@futureを使う必要がある。\n❌ D（クエリなしで項目を変更できる）→ after insertではレコードは既に保存済み。項目を変更するには別途DML（update）が必要。before insertなら直接変更可能。\n\n🎯 試験のコツ：after insert = IDが確定→関連レコード作成可能。before insert = IDなし→項目を直接変更可能。", "a": "after insertトリガーを使用すると、開発者は新しいレコードの項目を更新する際に入力規則を回避できます。", "b": "after insertトリガーを使用すると、開発者は新しいレコードを参照する他のオブジェクトを挿入できます。", "c": "after insertトリガーを使用すると、開発者は外部サービスにコールアウトを行うことができます。", "d": "after insertトリガーを使用すると、開発者はクエリなしで新しいレコードの項目を変更できます。"}, {"n": "5771", "p": "開発者は、会社のブランドガイドラインを使用してフォーマットされたPDF見積書を作成し、それを商談レコードに自動的に保存するよう求められます。開発者がこの機能を実現する方法はどれですか。2つ選びなさい。", "r": "プロセスの自動化とロジック", "ans": "A;C", "exp": "ざっくり言うと：会社ブランドのPDF見積書を自動作成して商談に保存するには？2つ選ぶ問題。\n\n✅ 正解 A：カスタムスタイルを使用してVisualforceページを作成する\nVFページをrenderAs=\"pdf\"で作成し、カスタムCSSでブランドガイドラインに沿ったデザインを適用。Apexで商談に添付として保存できる。\n\n✅ 正解 C：AppExchangeからアプリケーションをインストールして文書を生成する\nConga ComposerやFormstackなどのAppExchangeアプリを使えば、コード不要でPDF見積書の生成・保存が可能。\n\n❌ B（Visual Workflow）→ フローには直接PDF文書を生成する機能がない。\n❌ D（メールテンプレート＋プロセスビルダー）→ メールテンプレートはメール送信用。PDF見積書の作成・保存機能はない。\n\n🎯 試験のコツ：PDF生成 = VFページ(renderAs=\"pdf\") or AppExchangeアプリ。フローやメールテンプレートでは不可。", "a": "カスタムスタイルを使用してVisualforceページを作成します。", "b": "会社の書式設定を実装するVisual workflowを作成します。", "c": "AppExchangeからアプリケーションをインストールして文書を生成します。", "d": "メールテンプレートを作成してプロセスビルダーで使用します。"}, {"n": "5772", "p": "DescribeSObjectResultを使用して、現在のユーザーがオブジェクトのレコードを編集できるかどうかを判断するために、開発者が使用できるApexメソッドはどれですか。", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：現在のユーザーがオブジェクトのレコードを編集できるか確認するメソッドは？\n\n✅ 正解 C：isUpdateable()\nDescribeSObjectResultクラスのisUpdateable()メソッドで、現在のユーザーがそのオブジェクトのレコードを更新（編集）できるかどうかをtrue/falseで判定できる。\n\n❌ A（canUpdate()）→ DescribeSObjectResultにcanUpdate()メソッ
