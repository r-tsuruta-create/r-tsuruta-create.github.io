次でスケジュール設定でき、全オブジェクト＋添付ファイルを一括でエクスポートできる。\n\n✅ 正解 C：データエクスポートのスケジュールジョブを定義\n設定→データ→データエクスポートで、エクスポートスケジュールを設定できる。「すべてのデータを含める」オプションをONにすれば、添付ファイルも含めた完全バックアップが月1回自動で走る。コード不要で要件にぴったり。\n\n❌ A（レポートをスケジュール）→ レポートは「見たいデータを絞って表示する」ツール。全データの一括バックアップには使えない。たとえば売上レポートを毎週メールで送る、くらいの用途。\n❌ B（データローダーのコマンドライン）→ データローダーはオブジェクトごとに1つずつエクスポートする仕組み。全オブジェクト一括バックアップを自動化するには、スクリプトで全オブジェクトを列挙する必要があり非効率。\n❌ D（スケジュール可能なApexクラス）→ ApexのSchedulableインターフェースで定期実行はできるが、Apexからデータをファイルとしてエクスポートする仕組みがない。データ操作（DML）はできても「バックアップファイルを作る」のは無理。\n\n🎯 試験のコツ：「全データ＋添付＋月次バックアップ」→ データエクスポート一択。レポート＝表示用、データローダー＝オブジェクト単位、Apex＝ファイル出力不可と覚える。", "a": "レポートをスケジュールします。", "b": "データローダーのコマンドラインを使用します。", "c": "データ エクスポートのスケジュールされたジョブを定義します。", "d": "スケジュール可能な Apex クラスを作成します。"}, {"n": "8323", "p": "経営陣は、年間売上高が100万ドルを超える取引先に対して商談を自動的に作成するよう依頼しました。開発者は、この要件を満たすために、取引先オブジェクトに次のトリガを作成しました。\n\nfor (Account a : Trigger.new) { \nif (a.AnnualRevenue ＞ 1000000) { \nList oppList = [SELECT Id FROM Opportunity WHERE AccountId = :a.Id]; \nif (oppList.size() == 0) { \nOpportunity oppty = new Opportunity(\nName = a.Name, StageName = 'Prospecting', CloseDate = System. today().addDays(30)); \ninsert oppty; \n} \n} \n}\n\nユーザーはUIから取引先レコードを更新でき、年間売上高の高い取引先向けに作成された商談を確認できます。しかし、管理者がデータローダーを使用して179件の取引先リストをアップロードしようとすると、システム例外エラーが発生し、アップロードに失敗します。 上記のコード セグメントを修正するために開発者が実行する必要がある 2 つのアクションはどれですか。 2つの答えを選択してください", "r": "プロセスの自動化とロジック", "ans": "A;C", "exp": "ざっくり言うと：取引先トリガーで商談を自動作成するコードの改善点は？2つ選ぶ。\n\n【前提知識：バルク化（Bulkification）とは？】\nSalesforceのガバナ制限では、1トランザクション内でSOQLは100回、DMLは150回まで。たとえ話：レストランで料理を1品ずつ注文するのではなく、まとめて注文するのが効率的なのと同じ。forループ内でSOQLやDMLを実行すると、レコード数だけ回数が増えて上限に達してしまう。\n\n✅ 正解 A：forループの外側で既存商談をクエリ\nループの外で1回だけSOQLを実行し、結果をMap<Id, Opportunity>に格納しておく。ループ内ではMapから取得するだけなので、SOQL回数は常に1回。たとえば200件の取引先を処理しても、SOQLは1回で済む。\n\n✅ 正解 C：DMLをforループの外側に移動\nループ内でinsertする代わりに、List<Opportunity>にaddしていき、ループ終了後にまとめて1回のinsert。200件の商談を作っても、DMLは1回で済む。\n\n❌ B（必須フィールド確認）→ データ品質の向上には有効だが、ガバナ制限やパフォーマンスの改善とは関係ない。ベストプラクティスではあるが「最も重要な改善点」ではない。\n❌ D（Database.queryで照会）→ Database.queryは動的SOQL用のメソッド。静的SOQLを動的に変えても、ループ内で実行する限りガバナ制限問題は解決しない。根本解決は「ループ外に出す」こと。\n\n🎯 試験のコツ：「バルク化」「ベストプラクティス」→ SOQLとDMLをループ外に出す。キーワード「forループの外側」が見えたら正解候補。", "a": "for ループの外側にある既存の商談をクエリします。", "b": "作成時に商談のすべての必須フィールドが追加されているかどうかを確認します。", "c": "<p>商談を保存する DML を for ループの外側に移動します。</p>", "d": "データベース クエリを使用して機会を照会します。"}, {"n": "8324", "p": "変更セット展開の 3 つの特徴は何ですか? 3 つの回答を選択してください。", "r": "テスト、デバッグ、リリース", "ans": "B;C;D", "exp": "ざっくり言うと：変更セット（Change Set）の特徴は何？3つ選ぶ。\n\n【前提知識：変更セットとは？】\nSalesforceの環境間でカスタマイズ（メタデータ）を移行するツール。たとえ話：引っ越し業者が「家具（メタデータ）だけ運ぶけど、冷蔵庫の中身（データ）は運ばない」サービスのようなもの。\n\n✅ 正解 B：関連する組織間でのみ使用可能\n本番とサンドボックスのように、親子関係がある組織同士でしか使えない。まったく別の組織（例：別会社のSalesforce）には送れない。\n\n✅ 正解 C：デプロイは一方向の単一トランザクション\n送信側→受信側への一方通行。「送って、受け取って、デプロイ」が1つのトランザクション。途中で一部だけ成功して一部失敗、ということはない（全部成功 or 全部失敗）。\n\n✅ 正解 D：デプロイメント接続が必要\n変更セットを送るには、あらかじめ2つの組織間で「デプロイメント接続」を設定しておく必要がある。設定→デプロイ→デプロイメント接続で確認できる。\n\n❌ A（カスタム設定データをデプロイ可能）→ 変更セットが運べるのはメタデータ（設定・定義）だけ。カスタム設定の「データ（値）」は運べない。カスタム設定の「定義」は運べるが、中のレコードは別途データ移行が必要。\n❌ E（レコードを転送可能）→ レコード（データ）は変更セットの対象外。データ移行にはデータローダーやAPIを使う。\n\n🎯 試験のコツ：変更セット＝「メタデータ専用・関連組織間・一方向・接続必要」の4点セット。「データも送れる？」系の選択肢は全部×。", "a": "変更セットはカスタム設定データを展開できます。", "b": "変更セットは関連する組織間でのみ使用できます。", "c": "デプロイメントは一方向の単一トランザクションで実行されます。", "d": "2 つの組織間で変更セットを送信するには、デプロイメント接続が必要です。", "e": "変更セットを使用してレコードを転送できます。"}, {"n": "8325", "p": "Universal Containers は、新しい Salesforce アプリケーションを構築するために、完全に宣言型の開発を使用することを決定しました。 このアプリケーションのビジネス ロジック レイヤーを構築するために使用できる 2 つのオプションはどれですか? 2つの回答を選択してください", "r": "プロセスの自動化とロジック", "ans": "A;D", "exp": "ざっくり言うと：完全に宣言型（コード不要）でビジネスロジックを実装できるのはどれ？2つ選ぶ。\n\n【前提知識：宣言型（Declarative）とは？】\nコードを書かずにクリック操作だけで実装する方法。たとえ話：家具をイチから木材で作る（プログラム型）のではなく、IKEAで完成品を買ってくる（宣言型）イメージ。Salesforceでは「フロー」「検証ルール」「数式フィールド」などが宣言型ツールにあたる。\n\n✅ 正解 A：レコードトリガーフロー\nフロービルダーで作成する自動化ツール。レコードの作成・更新・削除をきっかけに、条件分岐・レコード操作・メール送信などをコード不要で実装できる。まさにビジネスロジック層。\n\n✅ 正解 D：検証ルール\n「この条件を満たさないと保存させない」というルールを数式で定義する。たとえば「金額が0以下なら保存不可」など。コード不要でデータの整合性を守るビジネスロジック。\n\n❌ B（バッチジョブ）→ Apexコード（Database.Batchable実装）が必要。宣言型ではない。\n❌ C（リモートアクション）→ @RemoteActionアノテーション付きのApexメソッド。完全にコード（プログラム型）の世界。\n\n🎯 試験のコツ：「宣言型＋ビジネスロジック」→ フロー・検証ルール・承認プロセスの3つが定番。選択肢にApex・バッチ・コード系が出たら即除外。", "a": "レコードトリガーフロー", "b": "バッチジョブ", "c": "リモートアクション", "d": "検証ルール"}, {"n": "8326", "p": "開発者は Visualforce ページを Lightning Web コンポーネントに移行しています。 Visualforce ページには、単一のレコードに関する情報が表示されます。開発者は、レコード データにアクセスするために Lightning Data Service を使用することにしました。 開発者はどのようなセキュリティ上の考慮事項に注意する必要がありますか?", "r": "ユーザインターフェース", "ans": "C", "exp": "ざっくり言うと：LWCでLightning Data Service（LDS）を使うとき、セキュリティはどう扱われる？\n\n【前提知識：Lightning Data Service（LDS）とは？】\nLWCやAuraからレコードデータを取得・更新するための標準サービス。たとえ話：レストランの「セキュリティ付きビュッフェ」。料理（データ）を取りに行くと、自動で身分証チェック（FLS・共有ルール）してくれる。開発者が自分でチェックコードを書く必要がない。\n\n✅ 正解 C：LDSは共有ルールとフィールドレベルセキュリティ（FLS）を自動処理する\nLDSを使うと、CRUD権限・FLS・共有ルールがすべて自動で適用される。開発者が明示的にセキュリティチェックのコードを書く必要がない。これがLDSの最大のメリットの1つ。\n\n❌ A（FLSを無視する）→ 真逆。LDSはFLSを自動で適用する。ユーザーに権限のないフィールドは表示されない。\n❌ B（with sharingが必要）→ with sharingはApexクラスに付けるキーワード。LDSはApexを使わないので関係ない。LDS自体がセキュリティを内蔵している。\n❌ D（isAccessible()が必要）→ isAccessible()はApexでFLSを手動チェックするメソッド。LDSなら自動処理されるので不要。\n\n🎯 試験のコツ：「LDS＋セキュリティ」→ 自動で全部やってくれる。「手動チェック必要」系の選択肢は×。逆にApex直接SOQL→手動チェックが必要。", "a": "Lightning データ サービスはフィールド レベルのセキュリティを無視します。", "b": "共有ルールを適用するには、with sharing キーワードを使用する必要があります。", "c": "Lightning データサービスは共有ルールとフィールドレベルのセキュリティを処理します。", "d": "フィールドレベルのアクセス チェックには、isAccessible () メソッドを使用する必要があります。"}, {"n": "8327", "p": "開発者は Salesforce プラットフォーム上で新しいアプリケーションを設計しており、複数のテナントを効果的にサポートできることを確認したいと考えています。 スケーラビリティと保守性を確保するために、開発者はどの設計フレームワークを考慮する必要がありますか?", "r": "デベロッパーの基本", "ans": "C", "exp": "ざっくり言うと：Salesforceでマルチテナント対応のアプリを設計するとき、どの設計パターンを使う？\n\n【前提知識：MVC（Model-View-Controller）とは？】\nアプリケーションを3つの役割に分ける設計パターン。たとえ話：レストランに例えると、Model＝食材庫（データ）、View＝テーブルの料理（画面表示）、Controller＝シェフ（ロジック処理）。Salesforceでは、Model＝sObject（テーブル）、View＝Visualforce/LWC、Controller＝Apexクラスに対応する。\n\n✅ 正解 C：MVC（Model-View-Controller）\nSalesforceプラットフォーム自体がMVCアーキテクチャで構築されている。マルチテナント環境でスケーラビリティと保守性を確保するための設計パターンとして最適。役割分離により、変更の影響範囲を局所化できる。\n\n❌ A（ウォーターフォールモデル）→ これは「開発プロセス」のモデル（要件定義→設計→実装→テスト→リリースを順番に進める手法）。アプリの設計パターンではない。\n❌ B（Flux）→ ReactなどのフロントエンドJSフレームワーク用のデータフロー設計。Salesforceプラットフォームの標準設計パターンではない。\n❌ D（アジャイル開発）→ ウォーターフォール同様、開発プロセスの手法（短いサイクルで反復開発）。設計フレームワークではない。\n\n🎯 試験のコツ：「設計フレームワーク」「アーキテクチャ」→ MVC。「開発プロセス」系（ウォーターフォール・アジャイル）は設計パターンとは別物。", "a": "ウォーターフォールモデル", "b": "Flux (ビュー、アクション、ディスパッチャ、ストア)", "c": "モデル・ビュー・コントローラ (MVC)", "d": "アジャイル開発"}, {"n": "8328", "p": "開発者は、Apex クラス内のメソッドをインポートする Lightning Web コンポーネントを作成します。検証ボタンが押されると、メソッドが実行され、複雑な検証が実行されます。 この実装シナリオでは、MVC アーキテクチャに従ってコントローラーにどの 2 つのオプションがありますか? 2つの回答を選択してください", "r": "ユーザインターフェース", "ans": "B;C", "exp": "ざっくり言うと：LWCでApexメソッドをインポートして実行するとき、MVCのControllerにあたるのは？2つ選ぶ。\n\n【前提知識：LWCのMVCマッピング】\nLWCをMVCに当てはめると：Model＝sObject/Apexのデータ層、View＝HTMLファイル（画面）、Controller＝JavaScriptファイル＋Apexクラス（ロジック処理）。たとえ話：レストランで注文ボタン（HTML）を押すと、ウェイター（JS）が注文を受けてキッチン（Apex）に渡すイメージ。ウェイターもキッチンも「処理する側」＝Controller。\n\n✅ 正解 B：Apexクラス（サーバー側Controller）\nビジネスロジック、データベース操作、複雑な検証処理を担当する。LWCからimportして@AuraEnabledメソッドを呼び出す形で使う。サーバー側のController。\n\n✅ 正解 C：JavaScriptファイル（クライアント側Controller）\nユーザー操作のハンドリング、Apexメソッドの呼び出し、画面の状態管理を担当する。ボタンクリック時の処理や、Apexから返ってきたデータの加工などを行う。クライアント側のController。\n\n❌ A（HTMLファイル）→ これはView（画面の構造・見た目）に該当する。ボタンやテキストの配置を定義するだけで、ロジックは持たない。\n❌ D（XMLファイル）→ メタデータ設定ファイル（.js-meta.xml）。コンポーネントをどこに配置できるか、APIバージョンは何かなどの設定を記述する。MVCのどの層にも該当しない。\n\n🎯 試験のコツ：LWCのMVC → Model=sObject、View=HTML、Controller=JS+Apex。「ロジックを処理するのは？」→ JSとApexの2つ。", "a": "HTML ファイル", "b": "Apexクラス", "c": "JavaScript ファイル", "d": "XMLファイル"}, {"n": "8329", "p": "開発者は、連絡先情報を収集するためのカスタム Lightning Web コンポーネントを構築するタスクを負っています。 フォームは組織内のさまざまなタイプのユーザー間で共有されます。特定のフィールドのみが特定のユーザー グループによって編集および表示できるようにするというセキュリティ要件があります。 セキュリティ要件をサポートするために、開発者は Lightning Web コンポーネントで何を使用すればよいでしょうか?", "r": "ユーザインターフェース", "ans": "D", "exp": "ざっくり言うと：LWCで連絡先フォームを作るとき、ユーザーごとにフィールドの表示・編集を自動制御するには？\n\n【前提知識：フィールドレベルセキュリティ（FLS）の自動制御】\nSalesforceではプロファイルや権限セットでフィールドごとに「見える/編集できる」を設定できる。たとえ話：社員証のランクによって、入れる部屋が違うオフィスビルのようなもの。LDSを使えば、この「入室チェック」を自動でやってくれる。\n\n✅ 正解 D：Lightning Data Service（LDS）\nLDSはCRUD権限・FLS・共有ルールを自動で適用する。lightning-record-edit-formやlightning-record-view-formを使えば、ユーザーのプロファイルに応じてフィールドの表示/非表示・編集可/不可が自動制御される。追加のセキュリティコードは不要。\n\n❌ A（AuraHandledException）→ これはApexからLWC/Auraにエラーメッセージを返すための例外クラス。セキュリティ制御とは無関係。「エラーを上手に伝える」ためのツール。\n❌ B（WITH SECURITY_ENFORCED）→ SOQLクエリにFLSチェックを追加する句。Apexコード内で使うもので、LWCのUI側のセキュリティ制御とは用途が違う。\n❌ C（User Interface API）→ UIに必要なメタデータを取得するAPI。LDS内部で使われているが、直接使ってセキュリティ制御を実装するのは非効率。LDSを使えば自動で処理される。\n\n🎯 試験のコツ：「LWC＋フィールドレベルセキュリティ＋自動」→ LDS。「手動チェック不要」がキーワード。", "a": "<p>AuraHandledException</p>", "b": "<p>with SECURITY_ENFORCED</p>", "c": "<p>User Interface API</p>", "d": "<p>Lightning Data Service</p>"}, {"n": "8330", "p": "次の匿名ブロックがあるとします。  10,000 件を超えるケース レコードがある環境では、開発者は何を考慮すべきでしょうか?  10,000 件を超えるケース レコードがある環境では、開発者は何を考慮すべきでしょうか?", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：1万件超のケースをforループで処理するとどうなる？\n\n【前提知識：ガバナ制限のLimitExceptionとは？】\nSalesforceはマルチテナント環境を守るために、1トランザクションの処理量に上限を設けている。たとえ話：マンションの共用水道管に「1戸あたり1分間に〇リットルまで」と制限があるようなもの。DMLで処理できるレコード上限は1トランザクションあたり10,000件。これを超えるとLimitExceptionが発生する。\n\n✅ 正解 C：ガバナ制限を超えてトランザクション失敗\n10,000件超のケースをforループ内でDML処理すると、DMLレコード数の上限（10,000件）を超えてLimitExceptionが発生する。このLimitExceptionは致命的な例外で、トランザクション全体がロールバック（巻き戻し）される。\n\n❌ A（成功してコミット）→ ガバナ制限を超えるので成功しない。\n❌ B（try-catchで処理可能）→ LimitException（ガバナ制限超過の例外）はtry-catchでキャッチできない。Salesforceがトランザクションを強制終了する。\n❌ D（DML例外をtry-catchで処理）→ DmlException（重複キーなど）はキャッチできるが、LimitExceptionはキャッチ不可。ガバナ制限超過はDML例外とは別カテゴリ。\n\n🎯 試験のコツ：「ガバナ制限超過」→ LimitException→try-catchでキャッチ不可→トランザクション強制失敗。「try-catchで処理できる」系は×。", "a": "トランザクションは成功し、変更がコミットされます。", "b": "try-catch ブロックは、ガバナー制限によってスローされた例外を処理します。", "c": "ガバナー制限を超えたため、トランザクションは失敗します。", "d": "try-catchブロックはスローされたDML例外を処理します。"}, {"n": "8331", "p": "開発者は、レコードが特定の条件を満たしたときに送信メッセージを送信したいと考えています。 このユースケースを満たす 2 つの機能はどれですか?", "r": "プロセスの自動化とロジック", "ans": "A;B", "exp": "ざっくり言うと：レコードが条件を満たしたときに送信メッセージ（Outbound Message）を送れる機能は？2つ選ぶ。\n\n【前提知識：送信メッセージとは？】\n条件を満たしたレコードの情報をSOAPメッセージとして外部システムに自動送信する機能。たとえ話：「お客様が来店したら、本部に自動でFAXを送る」ようなもの。宣言型の外部連携手段。\n\n✅ 正解 A：Flow Builder\nフロー内のアクションとして送信メッセージを設定できる。レコードの条件をフロー内で判定し、条件を満たしたら送信メッセージアクションを実行する流れ。\n\n✅ 正解 B：承認プロセス\n承認プロセスのアクション（承認時/却下時/送信時など）として送信メッセージを設定できる。たとえば「承認されたら外部システムに通知」というユースケース。\n\n❌ C（エンタイトルメントプロセス）→ カスタマーサポートの応答時間・解決時間を管理するための機能。マイルストーンアクションにはメールやフロー起動はあるが、送信メッセージは含まれない。\n❌ D（Next Best Action＝次善のアクション）→ ユーザーにおすすめのアクションを画面上に表示する機能（Einstein推奨）。外部へメッセージを送信する機能ではない。\n\n🎯 試験のコツ：「送信メッセージを送れる機能」→ フロー（旧ワークフロールール）と承認プロセスの2つ。エンタイトルメント＝サポート管理、Next Best Action＝推奨表示と覚える。", "a": "Flow Builder を使用して、レコード条件を確認し、送信メッセージを送信できます。", "b": "承認プロセスを使用すると、レコードの条件を確認し、Apex コードなしで送信メッセージを送信できます。", "c": "エンタイトルメントプロセスを使用すると、レコード条件を確認し、Apex コードなしで送信メッセージを送信できます。", "d": "次善のアクションを使用して、レコード条件を確認し、送信メッセージを送信できます。"}, {"n": "8332", "p": "Universal Containers (UC) は、営業チーム向けに、すべての営業担当者が獲得した新規顧客ごとにスクリプト化された一連の手順を実行することを要求するプロセスを開発しています。 情報収集の最初のステップでは、REST エンドポイントを介して UC の ERP システムをチェックし、顧客が存在するかどうかを確認する必要があります。顧客が存在する場合は、そのデータを Salesforce の営業担当者に提示する必要があります。 要件を満たすために開発者が実装する必要がある 2 つはどれですか? 2つの回答を選択してください", "r": "プロセスの自動化とロジック", "ans": "A;B", "exp": "ざっくり言うと：画面フローでRESTコールアウトを実行するには何を使う？2つ選ぶ。\n\n【前提知識：フローからの外部連携】\nフローは標準機能だけだと外部システムへのAPI呼び出しができない。外部連携が必要な場合、Apexメソッドをフローから呼び出す形で実装する。たとえ話：フローは「司令塔」、Apexは「実行部隊」。司令塔が「外部に電話して」と指示を出し、実行部隊が実際に電話する。\n\n✅ 正解 A：フロー\n営業担当者がステップバイステップで操作する画面フローを作成し、その中でApexアクション（InvocableMethod）を呼び出す。ユーザー操作のガイド役。\n\n✅ 正解 B：呼び出し可能なメソッド（InvocableMethod）\n@InvocableMethodアノテーション付きのApexメソッドで、フローから呼び出せる。このメソッド内でHTTP RESTコールアウトを実行し、ERPシステムのデータを取得→Salesforceに保存する処理を書く。\n\n❌ C（将来のメソッド＝@future）→ 非同期処理用のメソッド。フローから直接呼び出せないし、呼び出し元にリアルタイムで結果を返せない。画面フロー内で即座に結果を使いたい場合には不向き。\n❌ D（トリガー）→ レコードのDMLイベント（insert/update等）で自動起動するもの。ユーザーが手順を踏んで操作する画面フローとは役割が違う。\n\n🎯 試験のコツ：「フロー＋外部API＋画面操作」→ 画面フロー＋InvocableMethod。@futureは非同期＝結果をすぐ返せないので画面フローとは相性が悪い。", "a": "フロー", "b": "呼び出し可能なメソッド", "c": "将来のメソッド", "d": "トリガー"}, {"n": "8333", "p": "クレジットカード会社は、サービス エージェントが破損または盗難にあったクレジットカードを処理するための機能を実装する必要があります。顧客からの電話を受けた場合、サービス エージェントは多くの情報を収集する必要があります。この機能を実装するタスクは開発者に課せられます。 この要件を最も効率的に満たすために、開発者は何を使用すべきでしょうか?", "r": "プロセスの自動化とロジック", "ans": "A", "exp": "ざっくり言うと：サービスエージェントが電話を受けながら情報を段階的に入力する機能を最も効率的に実装するには？\n\n【前提知識：画面フローとは？】\nユーザーに画面を順番に表示して、情報を段階的に入力してもらう仕組み。たとえ話：病院の受付で「まず名前→次に症状→最後に保険証」と段階的に聞かれる問診票のデジタル版。コード不要で作れる。\n\n✅ 正解 A：画面ベースのフロー（Screen Flow）\nFlow Builderでドラッグ＆ドロップで作成でき、コード不要。画面を複数ステップに分けて、エージェントが電話しながら順番に情報を入力できる。条件分岐（カードが盗難？破損？）で表示する画面を切り替えることも可能。最も効率的。\n\n❌ B（承認プロセス）→ 「承認/却下」のワークフロー用。情報収集の画面ステップを作る機能はない。\n❌ C（Apexトリガー）→ レコード操作時に自動実行されるコード。ユーザーに画面を表示して情報を集める機能はない。\n❌ D（Lightningコンポーネント）→ LWC/Auraで画面を作ることは可能だが、コードを書く必要がある。問題文の「最も効率的に」＝コード不要の宣言型が優先。\n\n🎯 試験のコツ：「段階的に情報収集＋エージェント操作＋効率的」→ 画面フロー。「効率的」＝コード不要（宣言型）を意味することが多い。", "a": "画面ベースのフロー", "b": "承認プロセス", "c": "Apexトリガー", "d": "Lightning コンポーネント"}, {"n": "8334", "p": "AW Computing の開発者は、カスタムオブジェクト Pricing_Structure__c に保存されたレコードを利用するプログラムロジックをテストするテストクラスを作成する必要があります。\nAW Computing では、各ストアアイテムに対して 500件以上の複雑な価格構造レコードが存在します。\nテスト実行時に Pricing_Structure__c レコードが利用可能であることを保証するために使用できる 2 つの方法はどれですか？\n（2つ選択）", "r": "テスト、デバッグ、リリース", "ans": "A;C", "exp": "ざっくり言うと：500件以上の複雑なテストデータを効率的にテストクラスで使う方法は？2つ選ぶ。\n\n【前提知識：テストデータの作成方法】\nApexテストでは本番データを使わず、テスト用データを自分で用意するのが原則。たとえ話：料理教室の試験で「材料は自分で持参（テストデータ作成）」か「教室の食材庫から使う（SeeAllData=true）」かの違い。大量データの場合はCSVファイルから一括読み込みが便利。\n\n✅ 正解 A：TestDataFactoryクラスを使用する\n再利用可能なテストデータ作成用ユーティリティクラスを作り、各テストメソッドから呼び出す。複雑なリレーション（取引先→連絡先→商談など）を持つデータも、1メソッドで一括作成できる。保守性が高い。\n\n✅ 正解 C：Test.loadData()メソッドを使用する\n静的リソースにCSVファイルをアップロードし、Test.loadData()で一括読み込み。500件以上の複雑なデータを手書きのApexで作るのは大変なので、CSVで用意して読み込むのが効率的。\n\n❌ B（@isTest(SeeAllData=true)）→ 本番データを参照する方法。テスト結果が本番データに依存してしまい不安定。テストのベストプラクティスに反する。500件のデータが本番で変わったらテストが壊れる。\n❌ D（without sharing）→ 共有ルールを無視するApexクラスの宣言。テストデータの作成方法とは無関係。\n\n🎯 試験のコツ：「大量テストデータ＋効率的」→ TestDataFactory（再利用）＋Test.loadData()（CSV読み込み）。SeeAllData=trueはアンチパターン。", "a": "<p>TestDataFactory クラスを使用する</p>", "b": "<p>@isTest(SeeAllData=true) アノテーションを使用する</p>", "c": "<p>Test.loadData() メソッドを使用する</p>", "d": "<p>クラス宣言で without sharing を使用する</p>"}, {"n": "8335", "p": "コードが実行されると、DML 例外がスローされます。 例外が適切に処理されるようにするには、開発者はどのようにコードを変更すればよいでしょうか?", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：DML例外をコード内で適切に処理するには？\n\n✅ 正解 C：DMLのtry/catchブロックを実装する\nDML操作（insert/update/delete等）をtryブロックで囲み、catchでDmlExceptionを捕捉する。たとえば重複レコードのinsertで例外が発生しても、catch内でエラーメッセージを表示したりログを記録したりできる。イメージ：「とりあえずやってみて（try）、失敗したらこう対処する（catch）」。\n\n❌ A（upsert DMLを実装）→ upsertは「レコードがあればupdate、なければinsert」する操作。例外処理の仕組みではない。例外が発生すれば同じようにエラーになる。\n❌ B（変更データキャプチャ＝CDC）→ レコードの変更をイベントとして外部に通知する機能。例外処理とはまったく別の仕組み。\n❌ D（null項目を削除）→ リストからnullを除去するのはデータクレンジングの話。DML例外の「処理」（捕捉して対応する）とは異なる。null除去で一部のエラーは防げるが、「例外が適切に処理される」の答えにはならない。\n\n🎯 試験のコツ：「DML例外＋適切に処理」→ try/catch一択。例外を「防ぐ」のではなく「処理する（ハンドリングする）」ことを聞いている。", "a": "アップセット DML ステートメントを実装します。", "b": "変更データキャプチャを実装します。", "c": "DML の try/catch ブロックを実装します。", "d": "アカウントのリストから null 項目を削除します。"}, {"n": "8336", "p": "Aura コンポーネント内のどの 3 つのリソースに JavaScript 関数を含めることができますか? 3つの回答を選択してください", "r": "ユーザインターフェース", "ans": "B;C;E", "exp": "ざっくり言うと：Auraコンポーネントバンドルのうち、JavaScript関数を含められるリソースはどれ？3つ選ぶ。\n\n【前提知識：Auraコンポーネントバンドルとは？】\nAuraコンポーネントは複数のファイル（リソース）で構成される。たとえ話：お弁当箱のように、役割ごとに仕切られた区画がある。主なリソース：コントローラー（.js）＝ボタン操作処理、ヘルパー（Helper.js）＝共通ロジック、レンダラー（Renderer.js）＝描画制御、スタイル（.css）＝見た目、デザイン（.design）＝App Builder設定。\n\n✅ 正解 B：レンダラー（Renderer）\nコンポーネントの描画（DOM操作）をカスタマイズするJavaScriptファイル。render()、rerender()、afterRender()、unrender()の4つのメソッドを定義できる。\n\n✅ 正解 C：コントローラー（Controller）\nユーザー操作（クリック、入力など）のイベントハンドラーをJavaScript関数として定義するファイル。画面のアクションを受け取る窓口。\n\n✅ 正解 E：ヘルパー（Helper）\n再利用可能な共通ロジックをJavaScript関数として定義するファイル。コントローラーやレンダラーから呼び出して使う。たとえ話：コントローラーが「注文を受ける店員」なら、ヘルパーは「裏方の調理スタッフ」。\n\n❌ A（スタイル）→ CSSファイル（.css）。見た目の定義だけで、JavaScript関数は含められない。\n❌ D（デザイン）→ .designファイル。App Builderでの設定属性を定義するXMLファイル。JavaScript関数は含められない。\n\n🎯 試験のコツ：AuraのJS関数を持てるリソース＝「コントローラー・ヘルパー・レンダラー」の3つ。スタイル＝CSS、デザイン＝XMLで、どちらもJSではない。", "a": "スタイル", "b": "レンダラー", "c": "コントローラー", "d": "デザイン", "e": "ヘルパー"}, {"n": "8337", "p": "開発者は、大量のレコードを更新するためにバッチ Apex ジョブを作成し、ジョブがタイムアウトして完了しないというレポートを受け取ります。 問題のトラブルシューティングに向けた最初のステップは何ですか?", "r": "テスト、デバッグ、リリース", "ans": "A", "exp": "ざっくり言うと：バッチApexジョブがタイムアウトで完了しないとき、最初のトラブルシューティングは？\n\n✅ 正解 A：非同期ジョブ監視ページ（Apex Jobs）を確認する\n設定→環境→ジョブ→Apexジョブで、ジョブのステータス（Queued/Processing/Completed/Failed/Aborted）、処理バッチ数、エラーメッセージを確認できる。たとえ話：配送トラッキングで「今どこにいて、何が問題か」を最初にチェックするのと同じ。まず全体像を把握するのが先。\n\n❌ B（デバッグログ確認）→ デバッグログは有効だが、バッチジョブはバックグラウンドで実行されるため、デバッグログの設定が必要で、ログサイズの上限もある。まずはジョブ監視ページで全体状況を確認するのが先。\n❌ C（無効にしてレコード数を減らして再作成）→ 原因を特定せずにやみくもに修正するアプローチ。問題の根本原因がわからないまま再作成しても解決しない可能性がある。\n❌ D（バッチサイズを小さくする）→ 有効な対策の1つだが、「最初のステップ」ではない。まず原因を特定してから対策を講じるべき。\n\n🎯 試験のコツ：「トラブルシューティングの最初のステップ」→ まず状況確認（監視ページ）。いきなり修正（C/D）に飛ぶのはNG。", "a": "ジョブのステータスとログを表示するには、非同期ジョブ監視ページを確認します。", "b": "バッチジョブのデバッグログを確認します。", "c": "バッチ ジョブを無効にして、レコード数を減らして再作成します。", "d": "バッチ サイズを小さくして、システムの負荷を軽減します。"}, {"n": "8338", "p": "開発者は、Apex クラスを作成する際に、開発中のすべての機能が要件で指定されたとおりに処理されることを確認したいと考えています。 Apex クラスが仕様どおりに動作していることを確認するには、開発者はどのアプローチを使用する必要がありますか?", "r": "テスト、デバッグ、リリース", "ans": "D", "exp": "ざっくり言うと：Apexクラスが仕様どおりに動いているか確認するには？\n\n✅ 正解 D：テストクラスを作成してテストを実行する\nApexのユニットテスト（@isTestアノテーション付きクラス）でビジネスロジックを実行し、System.assertで期待結果と実際の結果を比較する。たとえ話：工場の品質検査で「製品Aを入れたら、出力Bが出るはず」と自動チェックするライン。仕様書の各項目に対してテストメソッドを書くことで、全機能が要件通りか確認できる。\n\n❌ A（セーブポイントとrollback）→ Database.setSavepoint()とDatabase.rollback()はトランザクション管理用。テスト中にデータを元に戻す場面では使えるが、「仕様通りか確認する」ためのツールではない。\n❌ B（try/catchを含める）→ エラーハンドリングの実装手段であり、テスト手法ではない。例外が起きたときの処理を書くもの。\n❌ C（Execute Anonymousで実行）→ 1回限りのコード実行には便利だが、繰り返し実行可能なテストとしては不十分。アサーション結果の管理やカバレッジ計測ができない。\n\n🎯 試験のコツ：「仕様通りか確認」「すべての機能をテスト」→ テストクラス一択。Execute Anonymous＝一時的な確認用、try/catch＝エラー処理用で、どちらもテスト手法ではない。", "a": "セーブポイントと pacabase.rollback() を含めます。", "b": "Apex クラスに try/catch ブロックを含めます。", "c": "開発者コンソールの Execute Anonymous ブロックでコードを実行します。", "d": "ビジネス ロジックを実行するテスト クラスを作成し、開発者コンソールでテストを実行します。"}, {"n": "8340", "p": "サンドボックスで作業中に、テスト ランナーで Apex テストを実行すると失敗します。ただし、匿名実行ウィンドウで Apex ロジックを実行すると、例外やエラーは発生せず成功します。 メソッドがサンドボックス テスト フレームワークでは失敗したのに、開発者コンソールでは成功したのはなぜですか?", "r": "テスト、デバッグ、リリース", "ans": "C", "exp": "ざっくり言うと：テストランナーでは失敗するのに、匿名実行では成功するのはなぜ？\n\n【前提知識：テストデータの分離】\nApexテストはデフォルトで本番データにアクセスできない（SeeAllData=trueを付けない限り）。たとえ話：テストは「別室で行う模擬試験」のようなもの。本番の教室（データ）とは隔離されている。匿名実行は「本番の教室でそのまま作業する」ので、既存データが使える。\n\n✅ 正解 C：テストメソッドがサンドボックス内の既存データに依存している\nテストクラスはデフォルトで既存データが見えないため、テスト用データを自分で作成する必要がある。しかしコードが既存データの存在を前提にしている場合、テストランナーでは「データがない」→失敗。匿名実行では既存データが見える→成功。\n\n❌ A（System.runAsを使っていない）→ runAsは別ユーザーとして実行するためのメソッド。権限系の問題なら使うが、「データが見えない」問題とは直接関係ない。\n❌ B（@futureメソッドを呼んでいる）→ @futureはテスト中でもTest.startTest()/Test.stopTest()の間で同期的に実行される。テストランナーと匿名実行で挙動が変わる原因にはならない。\n❌ D（構文エラー）→ 構文エラーがあればコンパイル時点で失敗し、匿名実行でも動かない。\n\n🎯 試験のコツ：「テストランナー×、匿名実行○」→ 既存データ依存が原因。テストクラスはデフォルトでデータ分離される。", "a": "テスト メソッドは、特定のユーザーとして実行するために system.runAs を使用しません。", "b": "テスト メソッドは @future メソッドを呼び出しています。", "c": "テスト メソッドはサンドボックス内の既存のデータに依存します。", "d": "テスト メソッドのコードに構文エラーがあります。"}, {"n": "8341", "p": "他のレコードの挿入に失敗した場合に、レコード リスト内の一部のレコードを挿入できるようにするには、どのステートメントを使用する必要がありますか。", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：一部のレコードのinsertが失敗しても、他のレコードは挿入させたいときのDML文は？\n\n【前提知識：部分成功（Partial Success）とは？】\nたとえ話：10個の荷物を配送するとき、通常のinsertは「1個でも届けられなければ全部キャンセル（オールオアナッシング）」。Database.insert(records, false)は「届けられるものだけ届けて、ダメだったものはリストで報告」方式。第2引数のfalse＝allOrNone=falseの意味。\n\n✅ 正解 D：Database.insert(records, false)\nDatabase.insertの第2引数にfalseを渡すと、allOrNone=falseとなり、部分成功が有効になる。成功したレコードはコミットされ、失敗したレコードはDatabase.SaveResult[]で確認できる。\n\n❌ A（Database.insert(records, true)）→ 第2引数trueはallOrNone=true（デフォルト）。1件でも失敗すると全件ロールバック。部分成功にならない。\n❌ B（insert records;）→ 標準DML文。allOrNone=trueと同じ動作で、1件の失敗で全件ロールバック。\n❌ C（insert records(false)）→ この構文は存在しない。標準DML文にパラメータは渡せない。\n\n🎯 試験のコツ：「一部失敗OK＋部分成功」→ Database.insert(records, false)。第2引数false＝allOrNone=false。標準DML（insert文）には部分成功オプションがない。", "a": "<p>Database.insert(records, true);</p>", "b": "<p>insert records;</p>", "c": "<p>insert records(false);</p>", "d": "<p>Database.insert(records, false);</p>"}, {"n": "8342", "p": "開発者は、更新前イベントでアカウント オブジェクトにトリガーを記述し、カウント フィールドを増分します。レコード トリガー フローも、アカウントが作成または更新されるたびにカウント フィールドを増分します。 アカウントに他の自動化ロジックが実装されていないと仮定して、初期値ゼロでアカウントが挿入された場合、カウント フィールドの値は何ですか?", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：before updateトリガーとレコードトリガーフローの両方がカウントフィールドをインクリメントするとき、初期値0でinsertしたらいくつになる？\n\n【前提知識：Salesforceの自動化実行順序】\nレコード保存時の実行順序：①beforeトリガー→②検証ルール→③afterトリガー→④割り当てルール等→⑤レコードトリガーフロー（before-save/after-save）。たとえ話：工場の組立ラインで、各工程が順番に加工していくイメージ。\n\n✅ 正解 B：2\n実行の流れ：\n1. アカウントがinsertされる（カウント=0）\n2. before insertトリガーが起動→カウント+1→カウント=1\n3. レコードトリガーフロー（before-save）が起動→カウント+1→カウント=2\n4. レコードがデータベースに保存される→最終値=2\n\n※before updateトリガーとあるが、insertでも同様の順序で処理される。トリガーとフローがそれぞれ1回ずつインクリメントするので合計2。\n\n❌ A（4）→ 再帰的に2回起動する場合の値だが、問題文に「他の自動化ロジックはない」とあるので再帰は起きない。\n❌ C（1）→ トリガーかフローのどちらか1つしか実行されないと勘違いした場合の値。両方実行される。\n❌ D（3）→ 3回インクリメントされる根拠がない。beforeトリガー＋フロー＝2回。\n\n🎯 試験のコツ：「beforeトリガー＋レコードトリガーフロー」→ 両方実行されるので、インクリメント回数はそれぞれ1回ずつ＝合計2。", "a": "4", "b": "2", "c": "1", "d": "3"}, {"n": "8343", "p": "Aura コンポーネントで JavaScript リソースをロードするときの  タグの 3 つの機能は何ですか? 3つの回答を選択してください", "r": "ユーザインターフェース", "ans": "A;B;D", "exp": "ざっくり言うと：Auraコンポーネントで<ltng:require>タグを使ってJSリソースを読み込むときの3つの機能は？\n\n【前提知識：<ltng:require>とは？】\nAuraコンポーネントで外部のJavaScriptライブラリやCSSファイルを読み込むためのタグ。たとえ話：Webページに「この本棚（ライブラリ）を持ってきて」と指示する荷物タグのようなもの。静的リソースにアップロードしたJSファイルを指定して使う。\n\n✅ 正解 A：重複スクリプトの1回限りの読み込み\n同じスクリプトが複数のコンポーネントで参照されていても、<ltng:require>は1回だけ読み込む。ページが重くなるのを防ぐ仕組み。\n\n✅ 正解 B：スクリプトを並列に読み込む\n複数のスクリプトを指定した場合、同時に並列ダウンロードされる。1つずつ順番に読むより高速。\n\n✅ 正解 D：読み込み順序の指定\nscriptsリストに複数のスクリプトを指定した場合、リストの順番通りに実行される。依存関係があるライブラリ（例：jQuery→jQueryプラグイン）を正しい順序で読み込める。\n\n❌ C（ドキュメントからファイルを読み込む）→ <ltng:require>は静的リソースからファイルを読み込む。「ドキュメント」（Salesforceのドキュメントオブジェクト）からは読み込めない。\n\n🎯 試験のコツ：<ltng:require>の3機能＝「重複排除・並列読み込み・順序指定」。静的リソース専用であることも覚えておく。", "a": "重複スクリプトの1回限りの読み込み", "b": "スクリプトを並列に読み込む", "c": "ドキュメントからファイルを読み込む", "d": "読み込み順序の指定", "e": "外部でホストされているスクリプトをロードしています"}, {"n": "8344", "p": "Visualforce ページの内容を PDF として表示するコードはどれですか?", "r": "ユーザインターフェース", "ans": "B", "exp": "ざっくり言うと：VisualforceページをPDFとして表示する正しいコードは？\n\n✅ 正解 B：<apex:page renderAs=\"pdf\">\nrenderAs属性に「pdf」を指定すると、VisualforceページがPDFとしてレンダリングされる。たとえ話：プリンターの「印刷プレビュー」を自動でPDFに変換するボタン。値はシンプルに「pdf」だけでOK。\n\n❌ A（renderAs=\"application/pdf\"）→ renderAs属性にはMIMEタイプではなく単純な「pdf」を指定する。「application/pdf」は長すぎて不正。\n❌ C（contentType=\"application/pdf\"）→ contentType属性はページのContent-Typeヘッダーを設定するもので、レンダリング方式を変えるものではない。contentTypeを設定してもHTML→PDFの変換は起きない。\n❌ D（contentType=\"pdf\"）→ contentType属性の値としても「pdf」は不正。MIMEタイプ形式（application/pdf）が必要だが、そもそもcontentTypeはPDF変換用の属性ではない。\n\n🎯 試験のコツ：VF→PDF＝renderAs=\"pdf\"。renderAsとcontentTypeを混同させる引っかけが定番。renderAs＝表示形式を変える、contentType＝HTTPヘッダーを変える。", "a": "<p>&lt;apex:page renderAs=&quot;application/pdf&quot;&gt;</p>", "b": "<p>&lt;apex:page renderAs=&quot;pdf&quot;&gt;</p>", "c": "<p>&lt;apex:page contentType=&quot;application/pdf&quot;&gt;</p>", "d": "<p>&lt;apex:page contentType=&quot;pdf&quot;&gt;</p>"}, {"n": "8345", "p": "Universal Containers は、マーケティング部門向けに新しい Lightning Web コンポーネントを開発しています。同社は、コンポーネントが微調整され、シームレスなユーザー エクスペリエンスが提供されることを確認したいと考えています。 Lightning コンポーネント フレームワークを使用する利点は何ですか?", "r": "ユーザインターフェース", "ans": "A", "exp": "ざっくり言うと：Lightning コンポーネント フレームワークを使う利点は？\n\n✅ 正解 A：クライアント側レンダリングによるパフォーマンスの向上\nLightningフレームワーク（LWC/Aura）はクライアント側（ブラウザ）でUIをレンダリングする。たとえ話：レストランで「調理済みの料理を温めるだけ」のキッチン（クライアント）vs「注文ごとに一から作る」厨房（サーバー）。サーバーへの往復を減らすので、画面の表示が速い。Visualforceはサーバー側レンダリングなので、毎回サーバーと通信が必要だった。\n\n❌ B（アクセシビリティの自動サポート）→ Lightningは一部のアクセシビリティ機能を提供するが、「自動で完全サポート」ではない。開発者側の対応も必要。\n❌ C（すべてのブラウザとの互換性）→ Lightningはモダンブラウザ（Chrome、Firefox、Safari、Edge）をサポートするが、IE11など古いブラウザはサポート外。「すべて」は誇張。\n❌ D（サードパーティライブラリとの簡単な統合）→ LWCはShadow DOMやLocker Serviceの制約があり、サードパーティライブラリとの統合は必ずしも「簡単」ではない。\n\n🎯 試験のコツ：「Lightningフレームワークの利点」→ クライアント側レンダリング＝パフォーマンス向上が定番回答。VFとの違いを押さえる。", "a": "クライアント側レンダリングによるパフォーマンスの向上", "b": "アクセシビリティ標準の自動サポート", "c": "すべてのウェブブラウザとの互換性", "d": "サードパーティのライブラリとの簡単な統合"}, {"n": "8346", "p": "開発者は、OpportunityLineltem トリガーをカバーするテスト クラスを作成しながら、組織内の標準価格表にアクセスしたいと考えています。 どの方法で価格表にアクセスできますか?", "r": "テスト、デバッグ、リリース", "ans": "A", "exp": "ざっくり言うと：テストクラス内で標準価格表（Standard Pricebook）にアクセスするには？\n\n【前提知識：テストでの価格表アクセス】\nApexテストはデフォルトで本番データにアクセスできない。しかし標準価格表はSalesforceのシステムデータで、普通のSOQLでは取得できない場合がある。たとえ話：テスト用の「模擬試験会場」では参考書（本番データ）持ち込み禁止だが、「標準価格表のID」だけは特別に教えてもらえる仕組みがある。\n\n✅ 正解 A：Test.getStandardPricebookId()を使用\nこのメソッドはテストコンテキスト専用で、標準価格表のIDを返す。OpportunityLineItemのテストでは、まずこのIDで価格表エントリ（PricebookEntry）を作成し、そこから明細項目を作成する流れ。\n\n❌ B（@isTest(SeeAllData=true)で既存を削除）→ SeeAllData=trueで本番データにアクセスはできるが、「削除」は問題の要件ではない。また、SeeAllData=trueはベストプラクティスに反する。\n❌ C（@TestVisibleを使用）→ @TestVisibleはprivateメソッドやプロパティをテストから見えるようにするアノテーション。価格表へのアクセスとは無関係。\n❌ D（Test.loadData()で読み込み）→ Test.loadData()はCSVからカスタムデータを読み込む機能。標準価格表はシステム管理のデータなので、CSVから読み込むものではない。\n\n🎯 試験のコツ：「テスト＋標準価格表」→ Test.getStandardPricebookId()一択。OpportunityLineItemテストの定番パターン。", "a": "Test .getStandardPricebookid() を使用して標準価格表 ID を取得します。", "b": "@isTest [SeeAllData=true|] を使用して、既存の標準価格表を削除します。", "c": "@Testvisible を使用して、テスト メソッドが標準価格表を表示できるようにします。", "d": "Test.loadData() と静的リソースを使用して標準価格表を読み込みます。"}, {"n": "8347", "p": "多くの開発者のチームが、本番組織と同じ構成を持つ独自の組織で作業します。 このシナリオに最適な組織の種類はどれですか?", "r": "テスト、デバッグ、リリース", "ans": "A", "exp": "ざっくり言うと：多人数の開発チームが本番と同じ構成の個別環境で作業するのに最適な組織タイプは？\n\n✅ 正解 A：開発者サンドボックス（Developer Sandbox）\n本番組織のメタデータ（設定・カスタマイズ）をコピーした個別の開発環境。たとえ話：本番のオフィスと同じレイアウトの「練習用オフィス」を各開発者に1つずつ配布するイメージ。データはコピーされないが、構成は本番と同じ。各開発者が独立して作業できる。\n\n❌ B（フルサンドボックス）→ 本番のメタデータ＋全データをコピーする。各開発者に1つずつ作ると容量・コストが膨大。テスト・ステージング用であり、日常開発には過剰。\n❌ C（開発者エディション）→ 無料の独立した組織だが、本番組織の構成がコピーされない。ゼロから設定する必要がある。「本番と同じ構成」の要件を満たさない。\n❌ D（パートナー開発者エディション）→ AppExchange向けアプリ開発用の組織。社内開発チームの日常作業には使わない。\n\n🎯 試験のコツ：「本番と同じ構成＋各開発者が独自の環境」→ Developer Sandbox。フルサンドボックス＝全データ付き（重い）、Dev Edition＝本番コピーなし。", "a": "開発者サンドボックス", "b": "フルサンドボックス", "c": "開発者エディション", "d": "パートナー開発者エディション"}, {"n": "8348", "p": "Universal Containers には、注文番号を使用して顧客とサービス エージェントの注文を識別する注文システムがあります。注文レコードは Salesforce にインポートされます。 Salesforce で注文番号フィールドをどのように定義すればよいですか?", "r": "デベロッパーの基本", "ans": "C", "exp": "ざっくり言うと：外部システムの注文番号をSalesforceでどう定義する？\n\n【前提知識：外部ID（External ID）とは？】\n外部システムのIDをSalesforceに持ち込むためのフィールド属性。たとえ話：自社の社員番号（Salesforce ID）とは別に、取引先の管理番号（外部ID）もバッジに印刷しておくイメージ。外部IDフィールドはインデックスが自動作成されるので検索が速い。\n\n✅ 正解 C：外部IDと一意（External ID & Unique）\n外部システムの注文番号をSalesforceに取り込む場合、そのフィールドを「外部ID」に設定する。さらに「一意（Unique）」にすることで、同じ注文番号の重複レコードを防げる。データインポート時やupsert時に、この外部IDをキーにしてレコードの特定・更新ができる。\n\n❌ A（間接ルックアップ）→ 外部オブジェクト（Salesforce Connect）で使うリレーション種別。標準的なデータインポートのフィールド定義とは用途が違う。\n❌ B（直接検索＝Direct Lookup）→ これも外部オブジェクト用のリレーション。外部IDフィールドの定義方法ではない。\n❌ D（検索＝Lookup）→ 他のオブジェクトへのリレーションフィールド。注文番号という「値」を保存するフィールド定義としては不適切。\n\n🎯 試験のコツ：「外部システムのID＋Salesforce取り込み」→ 外部ID＋一意。upsertでキーとして使える点も試験で頻出。", "a": "<p>間接ルックアップ</p>", "b": "直接検索", "c": "外部IDと一意", "d": "検索"}, {"n": "8349", "p": "Aura アプリケーション イベントは従来のパブリッシュ/サブスクライブ モデルに従うため、イベントを起動するにはどの方法が使用されますか?", "r": "デベロッパーの基本", "ans": "A", "exp": "ざっくり言うと：Auraアプリケーションイベントを起動するメソッドは？\n\n✅ 正解 A：fire()\nAuraのアプリケーションイベント（Publish/Subscribeモデル）は、fire()メソッドで発火（パブリッシュ）する。たとえ話：ラジオ局が「放送開始！」ボタンを押す（fire）と、チューニングしているラジオ（ハンドラー）が全部受信するイメージ。コード例：var appEvent = $A.get('e.c:MyEvent'); appEvent.fire();\n\n❌ B（getEvent()）→ getEvent()はコンポーネントイベントを取得するメソッド。アプリケーションイベントは$A.get()で取得する。getEvent()は「取得」であって「起動」ではない。\n❌ C（fireEvent()）→ LWCのpubsubパターンで使う関数名。Auraの標準APIにはfireEvent()メソッドは存在しない。\n❌ D（emit()）→ Node.jsのEventEmitterやVue.jsで使われるメソッド名。Auraフレームワークには存在しない。\n\n🎯 試験のコツ：Auraイベント起動＝fire()。LWCのカスタムイベント＝dispatchEvent()。混同しないよう注意。", "a": "<p>fire()</p>", "b": "<p>getEvent()</p>", "c": "<p>fireEvent()</p>", "d": "<p>emit()</p>"}, {"n": "8350", "p": "以下のコンポーネント コード要件を参照してください。\n\n{!v.account.Name}\n{!v.account.AccountNumber}\n{!v.account.Industry}\n\n開発者は、Account レコードの Name、AccountNumber、Industry を表示する Aura コンポーネントを作成しています。\n要件は次のとおりです。\n\nモバイルデバイスでは、各項目を縦に3行で表示するタブレットおよびデスクトップでは、3項目を1行で横並び表示する要件2が正しく表示されていません。\nデスクトップおよびタブレットの要件を満たす正しいコードはどれですか？", "r": "ユーザインターフェース", "ans": "D", "exp": "ざっくり言うと：Auraのlightning:layoutでレスポンシブ表示（モバイル＝縦1列、デスクトップ＝横3列）を実現するコードは？\n\n【前提知識：lightning:layoutのサイズ指定】\nlightning:layoutItemのサイズは12分割グリッドシステム。たとえ話：テーブルを12等分した席割り。size=12なら全幅（1列）、size=4なら3分の1幅（3列並び）。smallDeviceSize/mediumDeviceSize/largeDeviceSizeで画面サイズごとに変えられる。\n\n✅ 正解 D：smallDeviceSize=\"12\" mediumDeviceSize=\"4\" largeDeviceSize=\"4\"\nスマホ（small）＝12（全幅＝縦1列）、タブレット・PC（medium/large）＝4（3分の1幅＝横3列）。3つのlayoutItemが画面サイズに応じてレイアウト変更される。\n\n❌ A（サイズ指定なし）→ デバイスサイズによるレスポンシブ切り替えがない。デフォルトの幅で表示されるだけ。\n❌ B（size=\"4\"固定）→ 全デバイスで固定4幅。モバイルでも横3列のままで見づらくなる。レスポンシブではない。\n❌ C（smallDeviceSize=\"12\" mediumDeviceSize=\"6\" largeDeviceSize=\"6\"）→ medium/largeが6＝2列並び。3つのアイテムだと2列＋1列になり、「横3列」の要件を満たさない。\n\n🎯 試験のコツ：12グリッド＝全幅12、3列＝4×3、2列＝6×2。レスポンシブ＝smallDeviceSize（モバイル）とlargeDeviceSize（PC）を別々に指定。", "a": "<p>&lt;lightning:layout&gt;</p><p>  &lt;lightning:layoutItem&gt;</p><p>    {!v.account.Name}</p><p>  &lt;/lightning:layoutItem&gt;</p><p>  &lt;lightning:layoutItem&gt;</p><p>    {!v.account.AccountNumber}</p><p>  &lt;/lightning:layoutItem&gt;</p><p>  &lt;lightning:layoutItem&gt;</p><p>    {!v.account.Industry}</p><p>  &lt;/lightning:layoutItem&gt;</p><p>&lt;/lightning:layout&gt;</p>", "b": "<p>&lt;lightning:layout&gt;</p><p>  &lt;lightning:layoutItem size=&quot;4&quot;&gt;</p><p>    {!v.account.Name}</p><p>  &lt;/lightning:layoutItem&gt;</p><p>  &lt;lightning:layoutItem size=&quot;4&quot;&gt;</p><p>    {!v.account.AccountNumber}</p><p>  &lt;/lightning:layoutItem&gt;</p><p>  &lt;lightning:layoutItem size=&quot;4&quot;&gt;</p><p>    {!v.account.Industry}</p><p>  &lt;/lightning:layoutItem&gt;</p><p>&lt;/lightning:layout&gt;</p>", "c": "<p>&lt;lightning:layout&gt;</p><p>  &lt;lightning:layoutItem smallDeviceSize=&quot;12&quot; mediumDeviceSize=&quot;6&quot; largeDeviceSize=&quot;6&quot;&gt;</p><p>    {!v.account.Name}</p><p>  &lt;/lightning:layoutItem&gt;</p><p>  &lt;lightning:layoutItem smallDeviceSize=&quot;12&quot; mediumDeviceSize=&quot;6&quot; largeDeviceSize=&quot;6&quot;&gt;</p><p>    {!v.account.AccountNumber}</p><p>  &lt;/lightning:layoutItem&gt;</p><p>  &lt;lightning:layoutItem smallDeviceSize=&quot;12&quot; mediumDeviceSize=&quot;6&quot; largeDeviceSize=&quot;6&quot;&gt;</p><p>    {!v.account.Industry}</p><p>  &lt;/lightning:layoutItem&gt;</p><p>&lt;/lightning:layout&gt;</p>", "d": "<p>&lt;lightning:layout&gt;</p><p>  &lt;lightning:layoutItem smallDeviceSize=&quot;12&quot; mediumDeviceSize=&quot;4&quot; largeDeviceSize=&quot;4&quot;&gt;</p><p>    {!v.account.Name}</p><p>  &lt;/lightning:layoutItem&gt;</p><p>  &lt;lightning:layoutItem smallDeviceSize=&quot;12&quot; mediumDeviceSize=&quot;4&quot; largeDeviceSize=&quot;4&quot;&gt;</p><p>    {!v.account.AccountNumber}</p><p>  &lt;/lightning:layoutItem&gt;</p><p>  &lt;lightning:layoutItem smallDeviceSize=&quot;12&quot; mediumDeviceSize=&quot;4&quot; largeDeviceSize=&quot;4&quot;&gt;</p><p>    {!v.account.Industry}</p><p>  &lt;/lightning:layoutItem&gt;</p><p>&lt;/lightning:layout&gt;</p>"}, {"n": "8351", "p": "開発者がバッチメソッドまたは将来のメソッドのステータスに関する情報を見つけることができる 2 つの場所はどこですか? 2つの回答を選択してください", "r": "プロセスの自動化とロジック", "ans": "A;C", "exp": "ざっくり言うと：バッチApexや@futureメソッドのステータスを確認できる場所は？2つ選ぶ。\n\n✅ 正解 A：Apex Flexキュー\n設定→環境→ジョブ→Apex Flexキューで、キューに入っているバッチジョブの順番・ステータスを確認できる。たとえ話：待合室の順番表。まだ実行されていないバッチの待ち順序を確認・並べ替えできる。\n\n✅ 正解 C：Apexジョブ\n設定→環境→ジョブ→Apexジョブで、バッチ・@future・Queueable・Schedulableなど全ての非同期ジョブのステータス（Queued/Processing/Completed/Failed）を確認できる。たとえ話：配送トラッキング画面。\n\n❌ B（開発者コンソール）→ デバッグログやSOQLの実行はできるが、バッチ/@futureのステータス一覧を直接確認するUIはない。ログから間接的に追うことはできるが「ステータスを見つける場所」としては不適切。\n❌ D（一時停止中のフローインタビューコンポーネント）→ 画面フローが一時停止した場合のインタビューを表示する機能。Apexの非同期ジョブとは無関係。\n\n🎯 試験のコツ：非同期ジョブの確認先＝Apexジョブ（全般）＋Apex Flexキュー（バッチの待ち順序）。開発者コンソールは「実行ツール」であって「監視ツール」ではない。", "a": "Apex Flex キュー", "b": "開発者コンソール", "c": "Apexジョブ", "d": "一時停止中のフローインタビューコンポーネント"}, {"n": "8352", "p": "Universal Containers (UC) は、配送プロセスを効率化しながら配送コストを削減したいと考えています。配送担当者は、複数のアカウントがデフォルトの集荷先住所を共有できるようにグローバル アドレスを実装するよう UC にアドバイスします。開発者は、このビジネス要件をサポートするオブジェクトと関係を作成する任務を負っており、セットアップ メニューを使用して「グローバル アドレス」というカスタム オブジェクトを作成します。 ビジネスニーズをサポートする最も効率的なモデルを作成するには、開発者はどのフィールドを追加する必要がありますか?", "r": "デベロッパーの基本", "ans": "B", "exp": "ざっくり言うと：複数のアカウントが1つのグローバルアドレスを共有する関係を作るには？\n\n【前提知識：参照関係の方向】\nリレーションフィールドは「子オブジェクト側に作る」のが基本。たとえ話：社員証に「所属部署」欄があるのと同じで、子（社員＝アカウント）側に親（部署＝グローバルアドレス）への参照を持たせる。\n\n✅ 正解 B：グローバルアドレスオブジェクトの参照フィールドをアカウントオブジェクトに追加\nアカウント側にグローバルアドレスへの参照（Lookup）フィールドを追加する。複数のアカウントが同じグローバルアドレスレコードを参照できる（多対1の関係）。「共有する」＝複数の子が同じ親を指すLookup。\n\n❌ A（グローバルアドレスのマスター詳細をアカウントに追加）→ マスター詳細だとアカウントがグローバルアドレスに従属してしまう。アカウントは標準オブジェクトなので、そもそもマスター詳細の子にはできない。\n❌ C（アカウントの参照をグローバルアドレスに追加）→ 方向が逆。これだと「1つのグローバルアドレスが1つのアカウントを参照する」形になり、複数アカウントの共有ができない。\n❌ D（アカウントのマスター詳細をグローバルアドレスに追加）→ 方向が逆かつ、アカウントは標準オブジェクトなのでマスター側にしかなれない。\n\n🎯 試験のコツ：「複数の子が1つの親を共有」→ 子側にLookupフィールドを追加。方向（どっちにフィールドを作るか）が引っかけポイント。", "a": "グローバル アドレス オブジェクトのマスター詳細フィールドをアカウント オブジェクトに追加します。", "b": "グローバル アドレス オブジェクトの参照フィールドをアカウント オブジェクトに追加します。", "c": "アカウント オブジェクトの参照フィールドをグローバル アドレス オブジェクトに追加します。", "d": "アカウント オブジェクトのマスター詳細フィールドをグローバル アドレス オブジェクトに追加します。"}, {"n": "8353", "p": "Universal Containers は、個人に関する情報を保存する Applicant オブジェクトと、仕事を表す Job オブジェクトを備えた採用アプリを構築しています。各応募者は複数の仕事に応募できます。 応募者が求人に応募したことを表すために、開発者は何を実装する必要がありますか?", "r": "デベロッパーの基本", "ans": "A", "exp": "ざっくり言うと：応募者（Applicant）と求人（Job）の多対多の関係を実現するには？\n\n【前提知識：ジャンクションオブジェクトとは？】\n多対多の関係を実現するための中間テーブル。たとえ話：マッチングアプリで「ユーザーA」と「イベントB」の間に「参加記録」というレコードを作るイメージ。1人が複数のイベントに参加でき、1つのイベントに複数人が参加できる。ジャンクションオブジェクトは両方の親へのマスター詳細リレーションを持つ。\n\n✅ 正解 A：応募者と求人の間のジャンクションオブジェクト\n「Job_Application__c」のようなジャンクションオブジェクトを作り、Applicantへのマスター詳細とJobへのマスター詳細を両方持たせる。1人の応募者が複数の求人に応募でき、1つの求人に複数の応募者がいる、という多対多の関係を表現できる。\n\n❌ B（応募者から求人への参照フィールド）→ Lookupフィールド1つだと「1人の応募者→1つの求人」の多対1の関係しか表現できない。「複数の仕事に応募」を満たさない。\n❌ C（応募者から求人へのマスター詳細フィールド）→ Bと同様、1つのフィールドでは多対多にならない。\n❌ D（求人を参照する数式フィールド）→ 数式フィールドは計算値を表示するだけ。リレーションを作る機能はない。\n\n🎯 試験のコツ：「多対多」「各〇〇は複数の△△、各△△も複数の〇〇」→ ジャンクションオブジェクト一択。", "a": "応募者と求人の間のジャンクションオブジェクト", "b": "応募者から求人への参照フィールド", "c": "応募者から求人へのマスター詳細フィールド", "d": "求人情報を参照する応募者の数式フィールド"}, {"n": "8354", "p": "Lightning Web コンポーネントのカスタムイベントに当てはまる 2 つの特性はどれですか? 2つの回答を選択してください", "r": "ユーザインターフェース", "ans": "B;C", "exp": "ざっくり言うと：LWCのカスタムイベントの特性は？2つ選ぶ。\n\n【前提知識：カスタムイベントの伝播（バブリング）】\nLWCのカスタムイベントはデフォルトで「バブルしない」。たとえ話：声の小さい人が隣の人にだけ話しかけるイメージ（デフォルト）。bubbles:trueにすると、声を大きくして部屋全体に届けられる。\n\n✅ 正解 B：detailプロパティでデータを渡す\nnew CustomEvent('myevent', { detail: { key: value } }) の形でdetailプロパティにデータを格納して送る。受信側はevent.detailでデータを取得する。\n\n✅ 正解 C：デフォルトでは直下のコンテナーと直下の子コンポーネントにのみ伝播する\nカスタムイベントはデフォルトでbubbles:falseかつcomposed:false。つまり、イベントを発火したコンポーネントの直接の親コンポーネントまでしか届かない。DOMツリーを上方向にバブルアップしない。\n\n❌ A（@wireでデータを渡す）→ @wireはApexメソッドやLDSからデータを取得するデコレータ。カスタムイベントのペイロードとは無関係。\n❌ D（直下のコンテナーにのみ伝播）→ 「にのみ」が違う。直下のコンテナーだけでなく、イベントハンドラーを設定した直接の親コンポーネントにも伝播する。Cの方がより正確な表現。\n\n🎯 試験のコツ：カスタムイベント＝detailでデータ渡し＋デフォルトでバブルなし。bubbles/composedの組み合わせも押さえておく。", "a": "@wire で装飾されたプロパティを使用して、カスタム イベントのペイロードでデータを渡すことができます。", "b": "データは、detail というプロパティを使用してカスタム イベントのペイロードに渡される場合があります。", "c": "デフォルトでは、カスタム イベントは、その直下のコンテナーと直下の子コンポーネントにのみ伝播します。", "d": "デフォルトでは、カスタム イベントはその直下のコンテナーにのみ伝播します。"}, {"n": "8355", "p": "開発者は、システムに特定の条件が存在する場合に、Request__c レコードの作成を防止する必要があります。\n条件をチェックする RequestLogic クラスが存在します。\n正しい実装は何ですか?", "r": "プロセスの自動化とロジック", "ans": "A", "exp": "ざっくり言うと：before insertトリガーでRequest__cの作成を防止する正しい実装は？\n\n✅ 正解 A：trigger RequestTrigger on Request__c (before insert) { RequestLogic.validateRecords(Trigger.new); }\nポイントは3つ：①before insertイベント（レコード保存前に介入できる）、②Trigger.new（新規レコードのリスト）を渡している、③大文字のTrigger.new（正しい構文）。ヘルパークラスにロジックを委譲する1トリガー1ハンドラーパターンで、ベストプラクティスに沿っている。\n\n❌ B（trigger.new＝小文字のt）→ Apexのトリガーコンテキスト変数は「Trigger.new」（大文字T）が正しい。小文字の「trigger.new」はコンパイルエラーにはならないが、問題の文脈では正式な書き方であるAを選ぶべき。※実際にはApexは大文字小文字を区別しないが、試験問題としてはTrigger（大文字）が正解。\n❌ C（Request__cをそのまま渡す）→ Request__cはオブジェクト型であり、特定のレコードインスタンスではない。Trigger.newでトリガーに渡されたレコードリストを使うべき。また、Request.addError()の書き方も不正確。\n❌ D（after insert）→ after insertはレコードが保存された後のイベント。保存を「防止」するにはbefore insertでaddError()を使う必要がある。afterではすでに保存済みなので防止できない。\n\n🎯 試験のコツ：「レコード作成を防止」→ before insertトリガー＋addError()。Trigger.newの大文字T、beforeとafterの使い分けが頻出。", "a": "<p>trigger RequestTrigger on Request__c (before insert) { </p><p>RequestLogic.validateRecords(Trigger.new); </p><p>}</p>", "b": "<p>trigger RequestTrigger on Request__c (before insert) { </p><p>RequestLogic.validateRecords(trigger.new); </p><p>}</p>", "c": "<p>trigger RequestTrigger on Request__c (before insert) { </p><p>if (RequestLogic.isValid(Request__c)) { </p><p>Request.addError(&#39;Your request cannot be created at this time.&#39;); </p><p>} </p><p>}</p>", "d": "<p>trigger RequestTrigger on Request__c (after insert) { </p><p>if (RequestLogic.isValid(Request__c)) { </p><p>Request.addError(&#39;Your request cannot be created at this time.&#39;); </p><p>} </p><p>}</p>"}, {"n": "8356", "p": "Aura コンポーネントとアプリケーション イベントの処理に関するベスト プラクティスはどれですか? 2つの回答を選択してください", "r": "ユーザインターフェース", "ans": "B;D", "exp": "ざっくり言うと：Auraコンポーネントのイベント処理で正しいやり方は？2つ選ぶ。\n\n【前提知識：Auraのイベントの種類】\n会社の連絡網にたとえるとわかりやすい。\n・コンポーネントイベント＝隣の人に直接話しかける（親子間の通信）\n・アプリケーションイベント＝全社メーリングリストで一斉送信（全コンポーネントに届く）\n・ヘルパー＝共通の業務マニュアル（どの担当者からも参照できる共通ロジック置き場）\n\n✅ 正解 B：ロジックをヘルパーに配置してイベントロジックを再利用\nコントローラー（イベントの受付窓口）には「ヘルパーを呼ぶ」だけ書いて、実際の処理ロジックはヘルパーにまとめる。たとえ話：受付は来客の案内だけ、実作業は担当者（ヘルパー）がやる。こうすれば同じロジックを複数のイベントハンドラーから再利用できる。\n\n✅ 正解 D：低レベルのイベントを処理し、高レベルのイベントとして再起動\nたとえ話：現場の細かい報告（ボタンクリック＝低レベル）を課長がまとめて、部長には要約（「注文確定」＝高レベル）で報告するイメージ。コンポーネント内で詳細な操作イベントを受け取り、ビジネス的に意味のあるイベントに変換してから上位に伝える。これで部品同士が疎結合（お互いの中身を知らなくて済む）になる。\n\n❌ A（コンポーネントイベントよりアプリケーションイベントを優先）→ 逆。ベストプラクティスは「まずコンポーネントイベント（隣の人に直接言う）を使い、アプリケーションイベント（全社メール）は最後の手段」。全社メールで「田中さんランチ行く？」って送ったら迷惑なのと同じ。\n❌ C（コンポーネントイベントでアプリケーションレベルの処理を伝達）→ コンポーネントイベントは親子間の通信用。「全社レベルの話を隣の人への伝言で伝える」のはスケールが合ってない。全社に伝えたいならアプリケーションイベントを使う。\n\n🎯 試験のコツ：「アプリケーションイベントを優先しろ」→ ×（逆。コンポーネントイベント優先）。「ヘルパーにロジックをまとめる」→ ○。この2パターンだけ覚えれば解ける。", "a": "コンポーネント イベントではなく、アプリケーション イベントを使用するようにしてください。", "b": "ロジックをヘルパーに配置することで、コンポーネント バンドル内のイベント ロジックを再利用します。", "c": "コンポーネント イベントを使用して、アプリケーション レベルで処理する必要があるアクションを伝達します。", "d": "イベント ハンドラーで低レベルのイベントを処理し、高レベルのイベントとして再起動します。"}, {"n": "8357", "p": "開発者は、システム内に存在するContactSearch Apex クラスのセキュリティ レビューを実行するように指示されています。開発者は、クラス内で次のメソッドをセキュリティ上の脅威として特定しました。\n\npublic List performSearch(String lastName) {\n return Database.query(\n 'SELECT Id, FirstName, LastName FROM Contact WHERE LastName LIKE \\'%' \n + lastName + \n '%\\''\n );}\n\n開発者がメソッドを更新して SOQL インジェクション攻撃を防ぐ 2 つの方法は何ですか? 2つの回答を選択してください", "r": "プロセスの自動化とロジック", "ans": "A;B", "exp": "ざっくり言うと：動的SOQLを使ったContactSearchクラスのセキュリティ脅威（SOQLインジェクション）への対策は？2つ選ぶ。\n\n【前提知識：SOQLインジェクションとは？】\nユーザー入力をそのままSOQLクエリに埋め込むと、悪意のある文字列でクエリを改ざんされる脆弱性。たとえ話：注文票に「りんご' OR 1=1--」と書くと、注文システムが誤動作して全商品が表示されてしまうようなもの。\n\n✅ 正解 A：変数バインディングを使い、動的クエリを静的SOQLに置き換える\n静的SOQLでバインド変数（:変数名）を使えば、ユーザー入力が自動的にエスケープされる。最も根本的な対策。例：[SELECT Id FROM Contact WHERE Name = :searchTerm]\n\n✅ 正解 B：escapeSingleQuotesメソッドでパラメータをサニタイズ\nどうしても動的SOQLが必要な場合、String.escapeSingleQuotes()でシングルクォートをエスケープする。入力値の「'」を「\\'」に変換してインジェクションを防ぐ。\n\n❌ C（Readonlyアノテーション＋with sharing）→ with sharingは共有ルールの適用、@ReadOnlyはDML不可のアノテーション。どちらもSOQLインジェクション対策ではない。\n❌ D（正規表現で特殊文字を削除）→ 正規表現による入力フィルタリングは抜け漏れのリスクがある。Salesforceの推奨対策ではない。\n\n🎯 試験のコツ：SOQLインジェクション対策＝①静的SOQL＋バインド変数（最善）、②escapeSingleQuotes（動的SOQLの場合）。", "a": "変数バインディングを使用し、動的クエリを静的 SOQL に置き換えます。", "b": "パラメータを使用する前に、sacapeSingleQuotes メソッドを使用してパラメータをサニタイズします。", "c": "クラスで Readonly アノテーションと with sharing キーワードを使用します。", "d": "パラメータに正規表現を使用して特殊文字を削除します。"}, {"n": "8358", "p": "Salesforce プラットフォーム上でアプリケーションを開発するメリットは何ですか。（２つ選択）", "r": "デベロッパーの基本", "ans": "A;B", "exp": "ざっくり言うと：Salesforceプラットフォーム上でアプリを開発するメリットは？2つ選ぶ。\n\n✅ 正解 A：強制的なユニットテストとコードカバレッジのベストプラクティス\nSalesforceは本番デプロイ時にApexコードの75%以上のテストカバレッジを要求する。たとえ話：出荷前に品質検査を「必ず」通さないと出荷できない工場のルール。開発者が自然と品質の高いコードを書くように仕向けるプラットフォームの仕組み。\n\n✅ 正解 B：定義済みのコンピューティングリソースへのアクセス\nSalesforceはサーバー、データベース、ネットワークなどのインフラを提供済み。開発者はインフラの構築・管理を気にせず、ビジネスロジックに集中できる。PaaS（Platform as a Service）の利点。\n\n❌ C（ビッグデータ用に事前設定されたストレージ）→ Salesforceにはストレージの上限があり（データストレージ、ファイルストレージ）、「ビッグデータ用に事前設定」されているわけではない。\n❌ D（無制限の処理能力とメモリ）→ Salesforceにはガバナ制限（CPU時間、ヒープサイズ、SOQL/DML回数など）があり、「無制限」ではない。マルチテナント環境を守るために意図的に制限されている。\n\n🎯 試験のコツ：Salesforceプラットフォームのメリット＝テスト強制＋インフラ提供。「無制限」「ビッグデータ」系は×（ガバナ制限がある）。", "a": "強制的なユニットテストとコードカバレッジのベストプラクティス", "b": "定義済みのコンピューティング リソースへのアクセス", "c": "ビッグデータ用に事前設定されたストレージ", "d": "無制限の処理能力とメモリ"}, {"n": "8359", "p": "Universal Containers には、カスタム オブジェクト「Engineering_Support__c」を使用してユーザーがエンジニアリング チームにサポートをリクエストできるサポート プロセスがあります。 ユーザーは、複数のEngineering_Support__cレコードを 1 つの商談レコードに関連付けることができる必要があります。さらに、Engineering_Support__cレコードに関する集計情報が商談レコードに表示される必要があります。 これらの要件をサポートするには、どの関係フィールドを実装する必要がありますか?", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：Engineering_Support__cを複数の商談に関連付け、集計情報も表示するにはどの関係フィールド？\n\n【前提知識：マスター詳細と参照の使い分け】\n集計情報（ロールアップサマリー）を使いたい場合はマスター詳細関係が必要。たとえ話：店舗（親＝商談）と売上レコード（子＝Engineering_Support）の関係で、「店舗ごとの売上合計」を自動計算したければマスター詳細にする。参照（Lookup）だとロールアップサマリーが使えない。\n\n✅ 正解 B：Engineering_Support__cから商談へのマスター詳細関係フィールド\n子オブジェクト（Engineering_Support__c）側にマスター詳細フィールドを作り、親（商談）を指す。これで①複数のEngineering_Supportが1つの商談に関連付けられ、②商談にロールアップサマリーフィールドを作って集計情報を表示できる。\n\n❌ A（商談からEngineering_Support__cへの参照関係）→ 方向が逆。親側にLookupを作ると「1つの商談→1つのEngineering_Support」しか参照できない。\n❌ C（商談からEngineering_Support__cへのマスター詳細）→ 方向が逆。マスター詳細フィールドは子側に作るもの。また商談を子にすると削除時の連鎖が問題になる。\n❌ D（Engineering_Support__cから商談への参照関係）→ 方向は正しいが、参照（Lookup）だとロールアップサマリーフィールドが使えない。「集計情報を表示」の要件を満たせない。\n\n🎯 試験のコツ：「集計情報」「ロールアップサマリー」→ マスター詳細が必要。フィールドは常に子側に作る。方向＋種類の組み合わせが引っかけポイント。", "a": "<p>商談（Opportunity）から Engineering_Support__c への参照（Lookup）関係フィールド</p>", "b": "<p>Engineering_Support__c から商談（Opportunity）へのマスター詳細関係フィールド</p>", "c": "<p>商談（Opportunity）から Engineering_Support__c へのマスター詳細関係フィールド</p>", "d": "<p>Engineering_Support__c から商談（Opportunity）への参照（Lookup）関係フィールド</p>"}, {"n": "8360", "p": "開発者がカスタム オブジェクトにトリガーを作成しました。このカスタム オブジェクトには、依存する選択リストもいくつかあります。 実行ルールの順序によれば、どのステップが最初に実行されますか?", "r": "プロセスの自動化とロジック", "ans": "A", "exp": "ざっくり言うと：レコード保存時の「実行ルールの順序（Order of Execution）」で最初に実行されるステップは？\n\n【前提知識：実行順序（Order of Execution）】\nSalesforceでレコードを保存すると、裏側で多くの処理が決まった順序で実行される。たとえ話：空港のセキュリティチェックで①パスポート確認→②手荷物検査→③搭乗券チェック…と決まった順序で進むのと同じ。\n\n✅ 正解 A：元のレコードがデータベースから読み込まれる\n更新の場合、まず最初に現在のレコードがデータベースから読み込まれる。これが全ての処理の起点。新規作成の場合はデフォルト値で初期化される。\n\n❌ B（最大フィールド長のシステム検証）→ これは実行順序の中盤で行われる。レコードの読み込み後、新しい値で上書きされた後に実行される。\n❌ C（古い値が新しいレコード値で上書き）→ レコードの読み込み後に行われるステップ。先にレコードを読み込まないと「古い値」が存在しない。\n❌ D（JavaScriptがブラウザで実行）→ クライアント側のJavaScript検証はサーバーに送信される前に行われるが、これは「実行ルールの順序」（サーバー側の処理順序）には含まれない。\n\n🎯 試験のコツ：実行順序の最初＝「データベースからレコード読み込み」。試験ではOrder of Executionの順番を丸暗記するより、最初と最後のステップを押さえると効率的。", "a": "元のレコードがデータベースから読み込まれます。", "b": "最大フィールド長に対してシステム検証が実行されます。", "c": "古い値は新しいレコード値で上書きされます。", "d": "JavaScript検証はブラウザで実行されます。"}, {"n": "8361", "p": "Universal Containers は、サンドボックス環境でカスタム Apex コードと Lightning コンポーネントを開発しました。コードと関連する構成を本番環境に展開する必要があります。 コードと構成を本番環境にデプロイするための推奨プロセスは何ですか?", "r": "テスト、デバッグ、リリース", "ans": "C", "exp": "ざっくり言うと：サンドボックスから本番にApexコードとLightningコンポーネントをデプロイする推奨方法は？\n\n✅ 正解 C：変更セット（Change Set）を使用してデプロイ\nSalesforceの標準機能で、関連する組織間（サンドボックス→本番）でメタデータを移行できる。たとえ話：引っ越し業者の「おまかせパック」で、指定した荷物（Apexクラス、LWCなど）をまとめて新居（本番）に運んでもらう。GUI操作だけで完結し、追加ツール不要。\n\n❌ A（Force.com IDE）→ 旧世代のEclipseベースIDE。サポート終了済みで、現在はVS Codeが推奨。「推奨プロセス」としては不適切。\n❌ B（Ant移行ツール）→ コマンドラインベースのデプロイツールだが、スクリプト設定が必要で、変更セットより複雑。CI/CDパイプラインでは使われるが「推奨」の一般回答としては変更セットが先。\n❌ D（Salesforce CLI）→ SFDX CLIは強力なツールだが、ソース駆動開発（DX）環境が前提。従来のサンドボックス→本番のデプロイでは変更セットが標準的な推奨方法。\n\n🎯 試験のコツ：「サンドボックス→本番＋推奨」→ 変更セット。CLI/Antは自動化・CI向け。Force.com IDEは旧世代。", "a": "A. Force.com IDE を使用して、Apex コードと Lightning コンポーネントをデプロイします。", "b": "B. Ant 移行ツールを使用して、Apex cade と Lightning コンポーネントをデプロイします。", "c": "C. 変更セットを使用して、Apex コードと Lightning コンポーネントをデプロイします。", "d": "D. Salesforce CLI を使用して、Apex コードと Lightning コンポーネントをデプロイします。"}, {"n": "8362", "p": "挿入前トリガーの Trigger.old コンテキスト変数の値は何ですか?", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：before insertトリガーでTrigger.oldの値は何？\n\n【前提知識：Trigger.newとTrigger.old】\nTrigger.new＝これから保存される新しいレコードのリスト。Trigger.old＝変更前の古いレコードのリスト。たとえ話：引っ越しで「新しい住所（Trigger.new）」と「前の住所（Trigger.old）」。新規作成（insert）の場合は「前の住所」が存在しない。\n\n✅ 正解 C：null（ヌル）\ninsertトリガーでは「変更前のレコード」が存在しない（新規作成なので前のバージョンがない）。そのためTrigger.oldはnullになる。Trigger.oldMapも同様にnull。\n\n❌ A（sObjectの空のリスト）→ 空のリスト（new List<SObject>()＝size=0のリスト）ではなく、null（リスト自体が存在しない）。空リストとnullは違う。\n❌ B（未定義）→ Apexには「undefined」という概念はない（JavaScriptとは違う）。値はnull。\n❌ D（IDのない新しいsObjectのリスト）→ これはTrigger.newの説明。before insertではTrigger.newにIDがまだ付与されていないレコードが入っている。Trigger.oldではない。\n\n🎯 試験のコツ：insertトリガー→Trigger.old=null、Trigger.oldMap=null。updateトリガー→Trigger.old=変更前レコード。deleteトリガー→Trigger.new=null。", "a": "A. sObjectの空のリスト", "b": "B. 未定義", "c": "C. ヌル", "d": "D. ID のない新しく作成された sObject のリスト"}, {"n": "8363", "p": "ある企業は、商談が作成されるたびにフォローアップ タスクを作成し、商談所有者に割り当てるという新しいプロセスを実装することにしました。 開発者がこれを実装する最も効率的な方法は何ですか?", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：商談が作成されるたびにフォローアップタスクを自動作成する最も効率的な方法は？\n\n✅ 正解 D：商談のレコードトリガーフロー\n商談のafter createイベントで起動するレコードトリガーフローを作成し、フロー内でタスクレコードを作成する。たとえ話：新しい注文が入ったら（商談作成）、自動的にToDoリスト（タスク）に「フォローアップ」を追加する仕組み。コード不要で、Flow Builderのドラッグ＆ドロップで実装できる。\n\n❌ A（タスクのApexトリガー）→ トリガーの対象が間違い。タスクにトリガーを作っても、商談の作成イベントでは起動しない。また、Apexコードを書く必要があり「最も効率的」ではない。\n❌ B（タスクアクション）→ クイックアクションはユーザーが手動でクリックして実行するもの。「自動的に」の要件を満たさない。\n❌ C（タスクの自動起動フロー）→ 自動起動フロー（Autolaunched Flow）はトリガーなしに他のプロセスから呼び出されるフロー。商談の作成をトリガーにするにはレコードトリガーフローが適切。\n\n🎯 試験のコツ：「レコード作成時に自動で別レコード作成＋効率的」→ レコードトリガーフロー。トリガー対象は「きっかけとなるオブジェクト」（作成されるタスクではなく、作成される商談）。", "a": "A. タスクのApexトリガー", "b": "B. タスクアクション", "c": "C. タスクの自動起動フロー", "d": "D. 商談のレコードトリガーフロー"}, {"n": "8364", "p": "Salesforce DX を使用する場合、開発者がスクラッチ組織を作成および管理するために何を有効にする必要がありますか?", "r": "デベロッパーの基本", "ans": "D", "exp": "ざっくり言うと：Salesforce DXでスクラッチ組織を作成・管理するために有効にする必要があるものは？\n\n【前提知識：DevHub（開発ハブ）とは？】\nスクラッチ組織を管理するための親組織。たとえ話：ホテルの「フロントデスク」のようなもの。各開発者が使う個室（スクラッチ組織）を予約・管理・チェックアウトするのがDevHub。DevHubを有効にしないとスクラッチ組織は作れない。\n\n✅ 正解 D：開発ハブ（DevHub）\n本番組織またはビジネス組織でDevHubを有効にすることで、Salesforce CLIからスクラッチ組織を作成・管理できるようになる。設定→開発→DevHubで有効化。\n\n❌ A（サンドボックス）→ サンドボックスは本番組織のコピー環境。スクラッチ組織とは別物で、DevHubとは関係ない。\n❌ B（環境ハブ）→ 環境ハブは複数の組織を一元管理するための機能。スクラッチ組織の作成に直接は必要ない。\n❌ C（本番＝Production）→ 本番組織でDevHubを有効にすることはあるが、「本番を有効にする」という表現は不正確。有効にするのはDevHub機能。\n\n🎯 試験のコツ：スクラッチ組織＝DevHub必須。Salesforce CLI＋DevHub＋スクラッチ組織のセットで覚える。", "a": "A. サンドボックス", "b": "B. 環境ハブ", "c": "C. 生産", "d": "D. 開発ハブ"}, {"n": "8365", "p": "次のコード ブロックによって挿入されるアカウントの数はいくつですか?\n\nfor(Integer i = 0 ; i ＜ 500 ; i++)\n{\n    Account a = new Account(Name='New Account ' + i);\n    insert a;\n}", "r": "テスト、デバッグ、リリース", "ans": "B", "exp": "ざっくり言うと：このコードで挿入されるアカウントの数は？\n\n✅ 正解 B：0\nコードはforループ内で毎回insert（DML）を実行している。500回ループ→500回のDML。しかしSalesforceのガバナ制限で1トランザクションのDML上限は150回。150回目を超えた時点でLimitExceptionが発生し、トランザクション全体がロールバックされる。結果、1件もDBに残らない＝0件。\n\nたとえ話：レストランで「150品まで」のルール。151品目を注文した瞬間、全注文キャンセル。\n\n重要ポイント：try-catchがない。LimitExceptionはtry-catchでキャッチ不可なので、仮にtry-catchがあっても結果は同じだが、このコードにはそもそもエラー処理がない。\n\n❌ A（100）→ 元々100件あるアカウントだが、ロールバックで新規分は0件。100件は変更されないのでそのまま。ただし問題は「挿入される数」なので0。\n❌ C（150）→ 150回目のDMLまでは成功するように見えるが、LimitExceptionでトランザクション全体がロールバックされるので0件。\n❌ D（500）→ 500回のDMLは実行不可能。150回で制限超過。\n\n🎯 試験のコツ：ループ内DML＋ガバナ制限超過→LimitException→全ロールバック→0件。try-catchの有無に関わらずキャッチ不可。", "a": "A. 100", "b": "B. 0", "c": "C. 150", "d": "D. 500"}, {"n": "8368", "p": "このコードに基づくと、x の値は何ですか?\n\nBoolean isOK; integer x; \nString theString = 'Hello'; \nif (isOK == false && theString == 'Hello') { \nx = 1; \n} else if (isOK == true && theString == 'Hello') { \nx = 2; \n} else if (isOK != null && theString == 'Hello') { \nx = 3; \n} else { \nx = 4; \n}", "r": "デベロッパーの基本", "ans": "A", "exp": "ざっくり言うと：未初期化のBooleanを使ったif-else分岐の結果、xの値は？\n\n【前提知識：Booleanの未初期化＝null】\nApexでBoolean isOK;と宣言しただけだと、値はtrue/falseではなくnull（未設定）になる。たとえ話：アンケートで「はい/いいえ」の選択肢があるのに、まだ何も選んでいない状態＝null。「いいえ」とは違う。\n\n✅ 正解 A：4\n実行の流れ：\n1. Boolean isOK; → 未初期化なのでisOK = null\n2. String theString = 'Hello';\n3. if (isOK == false && theString == 'Hello') → null == false → false → スキップ\n4. else if (isOK == true && theString == 'Hello') → null == true → false → スキップ\n5. else if (isOK != null && theString == 'Hello') → null != null → false → スキップ\n6. else → ここに到達 → x = 4\n\nnullはfalseでもtrueでもない。null == false は false、null == true も false、null != null も false。全条件が偽になるのでelse（x=4）が実行される。\n\n❌ B（1）→ isOK == falseの条件。isOKはnullなのでfalseとは等しくない。\n❌ C（2）→ isOK == trueの条件。同様にnull ≠ true。\n❌ D（3）→ isOK != nullの条件。null != nullはfalse（nullはnullに等しい）。\n\n🎯 試験のコツ：Boolean未初期化＝null。null == false → false、null == true → false、null != null → false。「初期化してないBooleanはfalse」と思いがちだが、Apexではnull。", "a": "<p>4</p>", "b": "<p>1</p>", "c": "<p>2</p>", "d": "<p>3</p>"}, {"n": "8371", "p": "開発者は、組織のデータを変更せずに連絡先トリガーが正しく機能することを確認する必要があります。 連絡先トリガーをテストするには、開発者は何をする必要がありますか?", "r": "テスト、デバッグ、リリース", "ans": "C", "exp": "ざっくり言うと：組織のデータを変更せずに連絡先トリガーをテストするには？\n\n【前提知識：テストクラスとデータ分離】\nApexテストクラス（@isTest）はデフォルトで本番データと分離されている。たとえ話：料理の「試食テスト」で、本番の料理（本番データ）に手を出さず、テスト用の材料（テストデータ）だけで味見する仕組み。テストが終わると材料は自動で片付けられる（ロールバック）。\n\n✅ 正解 C：開発者コンソールのテストメニューでテストクラスを実行\nテストクラスは@isTestアノテーション付きで、テスト用データを自分で作成→トリガーを間接的に起動→System.assertで検証。テスト終了後はデータが自動ロールバックされるので、組織データに影響しない。\n\n❌ A（VSCodeでApexクラスをデプロイ）→ デプロイはコードを組織に送る操作。テストの実行とは違う。\n❌ B（連絡先タブの新規ボタンで作成）→ 実際に組織のデータが変更されてしまう。「データを変更せずに」の要件を満たさない。\n❌ D（Execute Anonymousでinsert）→ 匿名実行はテストフレームワーク外の操作で、実際にデータが挿入される。ロールバックされないので組織データが変わる。\n\n🎯 試験のコツ：「データを変更せず＋テスト」→ テストクラス一択。テストクラスのDMLは自動ロールバック。匿名実行やUI操作はデータが残る。", "a": "A. VSCode IDE のデプロイを使用して、「連絡先の挿入」Apex クラスをデプロイします。", "b": "B. Salesforce の [連絡先] タブの [新規] ボタンを使用して、新しい連絡先レコードを作成します。", "c": "C. 開発者コンソールのテスト メニューを使用して、連絡先トリガーのテスト クラスを実行します。", "d": "D. 開発者コンソールの Open Execute Anonymous 機能を使用して、「連絡先を挿入」DML ステートメントを実行します。"}, {"n": "8373", "p": "ightning Web コンポーネントのカスタムイベントが DOM ツリーをバブルアップし、Shadow DOM 境界を越えて親コンポーネントへ伝播するために必要なプロパティ設定はどれですか？", "r": "ユーザインターフェース", "ans": "C", "exp": "ざっくり言うと：LWCのカスタムイベントがDOMツリーをバブルアップし、Shadow DOM境界を越えるために必要な設定は？\n\n【前提知識：bubbles と composed】\nLWCのカスタムイベントには2つの伝播制御プロパティがある。たとえ話：声の届く範囲を設定するイメージ。bubbles＝「上の階にも声を届ける（バブルアップ）」、composed＝「部屋の壁（Shadow DOM境界）を越えて届ける」。\n\n✅ 正解 C：bubbles: true, composed: true\nbubbles:true → イベントがDOMツリーを上方向にバブルアップする。composed:true → Shadow DOMの境界を越えて、ホストコンポーネントの外側にも伝播する。この2つを両方trueにすることで、子コンポーネントのイベントが親やさらに上の祖先コンポーネントに到達できる。\n\n❌ A（bubbles:true, composed:false）→ バブルはするが、Shadow DOM境界で止まる。同じShadow DOM内の要素には届くが、親コンポーネントには届かない。\n❌ B（bubbles:false, composed:false）→ デフォルト設定。バブルもしないし、Shadow DOMも越えない。イベントを発火したコンポーネントのホスト要素にのみ届く。\n❌ D（bubbles:false, composed:true）→ composedがtrueでもbubblesがfalseだと、DOMツリーを上に伝播しない。実質的に意味のない組み合わせ。\n\n🎯 試験のコツ：「バブルアップ＋Shadow DOM越え」→ bubbles:true + composed:true。両方trueが最大範囲の伝播。", "a": "<p>bubbles: true, composed: false</p>", "b": "<p>bubbles: false, composed: false</p>", "c": "<p>bubbles: true, composed: true</p>", "d": "<p>bubbles: false, composed: true</p>"}, {"n": "8376", "p": "Lightning Web コンポーネントから起動されるカスタム検索機能を備えた Apex クラスを開発する際に、開発者は現在ログインしているユーザーがアクセスできるレコードのみが表示されるようにするにはどうすればよいでしょうか?（２つ選択）", "r": "プロセスの自動化とロジック", "ans": "A;C", "exp": "ざっくり言うと：LWCから呼ばれるApexクラスで、ログインユーザーがアクセスできるレコードのみ表示するには？2つ選ぶ。\n\n✅ 正解 A：WITH SECURITY_ENFORCED句を使用\nSOQLクエリにWITH SECURITY_ENFORCEDを追加すると、ユーザーのFLS（フィールドレベルセキュリティ）を自動チェックする。アクセス権のないフィールドが含まれていると例外をスローする。たとえ話：図書館の貸出システムで「あなたが借りられる本だけ表示」するフィルター。\n\n✅ 正解 C：with sharingキーワードを使用\nApexクラスに「with sharing」を付けると、実行ユーザーの共有ルール（レコードレベルのアクセス制御）が適用される。ユーザーがアクセスできないレコードはクエリ結果から除外される。\n\n❌ B（inherited sharing）→ 呼び出し元のsharing設定を継承する。呼び出し元がwithout sharingだと共有ルールが無効になるリスクがある。「確実にアクセス制限する」には不十分。\n❌ D（without sharing）→ 共有ルールを無視する。全レコードが見えてしまい、セキュリティ要件に反する。\n\n🎯 試験のコツ：「ユーザーがアクセスできるレコードのみ」→ with sharing（レコードレベル）＋WITH SECURITY_ENFORCED（フィールドレベル）のセット。without sharingは×。", "a": "A. SOQL 内で WITH SECURITY_ENFORCED 句を使用します。", "b": "B. 継承された共有キーワードを使用します。", "c": "C. with sharing キーワードを使用します。", "d": "D. without sharing キーワードを使用します。"}, {"n": "8377", "p": "Universal Containers の管理者は、システム内で削除できるのは廃止されたコンテナのみであることを保証したいと考えています。ビジネス要件を満たすために、Salesforce 開発者は Container _c オブジェクト内の Status _c カスタム フィールドの選択リスト値として「廃止」を追加します。 開発者が「廃止」ステータスのコンテナ レコードのみを削除できるようにするために使用できる 2 つのアプローチはどれですか。 2つの回答を選択してください", "r": "プロセスの自動化とロジック", "ans": "A;B", "exp": "ざっくり言うと：「廃止」ステータス以外のコンテナレコードの削除を防ぐ方法は？2つ選ぶ。\n\n✅ 正解 A：削除前のレコードトリガーフロー\nbefore deleteのレコードトリガーフローで、Status__cが「廃止」でない場合にエラーメッセージを表示して削除を防止できる。コード不要で実装可能。\n\n✅ 正解 B：Apexトリガー\nbefore deleteトリガーで条件をチェックし、addError()で削除を防止する。たとえば：if(record.Status__c != '廃止') { record.addError('廃止ステータスのレコードのみ削除可能'); }\n\n❌ C（削除後のレコードトリガーフロー）→ after deleteはレコードが既に削除された後に実行される。「削除を防止する」にはbeforeで介入する必要がある。afterでは手遅れ。\n❌ D（検証ルール）→ 検証ルールはレコードの作成・編集時に動作するが、削除時には実行されない。Salesforceの検証ルールは削除操作をブロックできない。\n\n🎯 試験のコツ：「削除の防止」→ before deleteトリガー or before deleteフロー。検証ルールは削除時に動作しない点が重要な引っかけ。", "a": "<p>削除前のレコードトリガーフロー</p>", "b": "<p>Apexトリガー</p>", "c": "<p>削除後のレコードトリガーフロー</p>", "d": "<p>検証ルール</p>"}, {"n": "8378", "p": "開発者は、アカウント オブジェクトにトリガーを作成し、トリガーが適切に一括処理されているかどうかをテストしたいと考えています。開発者チームは、一意の名前を持つ 200 件のアカウント レコードでトリガーをテストすることを決定しました。 最小限のコードでユニット テスト内のテスト データを作成するには、どのような 2 つのことを行う必要がありますか? 2つの回答を選択してください", "r": "テスト、デバッグ、リリース", "ans": "C;D", "exp": "ざっくり言うと：200件のアカウントでトリガーのバルクテストを最小限のコードで行うには？2つ選ぶ。\n\n✅ 正解 C：テストデータを含む静的リソースを作成\nCSVファイルに200件分のアカウントデータ（一意の名前付き）を用意し、静的リソースとしてアップロードする。Apexコードで200件分のデータ作成ロジックを書く必要がない。\n\n✅ 正解 D：Test.loadDataを使用してテストメソッドにデータを投入\nTest.loadData(Account.sObjectType, 'StaticResourceName')で、静的リソースのCSVからレコードを一括挿入する。たとえ話：試験問題を1問ずつ手書きする代わりに、印刷済みの問題用紙（CSV）をコピー機（loadData）で一括配布するイメージ。CとDはセットで使う。\n\n❌ A（@isTest(seeAllData=true)）→ 本番の既存データを使う方法。テスト結果が環境依存になるアンチパターン。「一意の名前を持つ200件」を自分で保証できない。\n❌ B（@isTest(isParallel=true)）→ テストの並列実行設定。テストデータの作成とは無関係。\n\n🎯 試験のコツ：「最小限のコード＋大量テストデータ」→ 静的リソース＋Test.loadData()のセット。SeeAllData=trueはアンチパターン。", "a": "A. テスト クラスで @isTest (seeAllData=true) アノテーションを使用します。", "b": "B. テスト クラスで @isTest (isParallel=true) アノテーションを使用します。", "c": "C. テストデータを含む静的リソースを作成します。", "d": "D. Test、loadData を使用して、テスト メソッドにデータを入力します。"}, {"n": "8379", "p": "開発チームは、開発サイクル中にデプロイメント スクリプトを使用してサンドボックスに自動的にデプロイしたいと考えています。 サンドボックスにデプロイするスクリプトを実行するために使用できる 2 つのツールはどれですか? 2つの回答を選択してください", "r": "テスト、デバッグ、リリース", "ans": "A;D", "exp": "ざっくり言うと：デプロイメントスクリプトを使ってサンドボックスに自動デプロイするツールは？2つ選ぶ。\n\n✅ 正解 A：SFDX CLI（Salesforce CLI）\nコマンドラインから sf project deploy start 等のコマンドでメタデータをデプロイできる。CI/CDパイプライン（Jenkins、GitHub Actionsなど）のスクリプト内で実行可能。たとえ話：自動化された配送トラックが決められたルートで荷物を届ける仕組み。\n\n✅ 正解 D：Ant移行ツール（Ant Migration Tool）\nApache Antベースのコマンドラインツールで、build.xmlにデプロイ設定を書いてant deployで実行する。スクリプト内で呼び出し可能。古いツールだが現在も使える。\n\n❌ B（開発者コンソール）→ ブラウザ上のGUIツール。コードの編集・実行はできるが、スクリプトから自動実行するデプロイメントツールではない。\n❌ C（変更セット）→ GUI操作でのデプロイツール。スクリプトからの自動実行には対応していない。\n\n🎯 試験のコツ：「スクリプト＋自動デプロイ」→ CLI系ツール（SFDX CLI、Ant）。GUI系ツール（変更セット、開発者コンソール）はスクリプト実行不可。", "a": "A. SFDX CLI", "b": "B. 開発者コンソール", "c": "C. 変更セット", "d": "D. Ant 移行ツール"}, {"n": "8380", "p": "Apex で @lnvocableMethod アノテーションを使用する際の 3 つの考慮事項は何ですか? 3つの回答を選択してください", "r": "プロセスの自動化とロジック", "ans": "A;C;E", "exp": "ざっくり言うと：@InvocableMethodアノテーションの制約は？3つ選ぶ。\n\n✅ 正解 A：1クラスにつき@InvocableMethodは1つだけ\n1つのApexクラス内に@InvocableMethodを付けたメソッドは1つしか定義できない。2つ以上あるとコンパイルエラー。\n\n✅ 正解 C：staticメソッドとして宣言が必要\n@InvocableMethodはstaticメソッドにしか付けられない。インスタンスメソッドには不可。フローから呼び出す際にクラスのインスタンス化は行われないため。\n\n✅ 正解 E：publicまたはglobalとして宣言できる\n@InvocableMethodはpublicまたはglobalアクセス修飾子が必要。privateやprotectedでは外部（フローなど）から呼び出せない。\n\n❌ B（複数の入力パラメータを設定できる）→ @InvocableMethodの入力パラメータは1つだけ（List型）。複数パラメータが必要な場合はラッパークラス（InvocableVariable付き）にまとめる。\n❌ D（戻り値を定義する必要がある）→ 戻り値はオプション。void（返り値なし）でも問題ない。List型で返すことが多いが必須ではない。\n\n🎯 試験のコツ：@InvocableMethod＝「1クラス1メソッド」「static必須」「public/global」。入力はList型1つ、戻り値はオプション。", "a": "A. Apex クラスごとに、@invecableMethod アノテーションを使用するメソッドを 1 つだけ定義できます。", "b": "B. @invecableMethod アノテーションを使用するメソッドには、複数の入力パラメータを設定できます。", "c": "C. @invocablemethod アノテーションを使用するメソッドは、static として宣言する必要があります。", "d": "D. GO @invocablemethod アノテーションを使用するメソッドは、戻り値を定義する必要があります。", "e": "E. @invocableMethod アノテーションを使用するメソッドは、Public または Global として宣言できます。"}, {"n": "8381", "p": "Universal Containers は注文管理アプリケーションを実装しました。各注文には、1 つ以上の注文明細項目を含めることができます。注文明細オブジェクトは、マスター詳細関係によって注文に関連付けられます。各注文明細項目の合計価格は、注文明細項目の価格と注文数量を掛けて計算されます。 注文レコードのすべての注文明細項目の合計を取得するためのベスト プラクティスは何ですか?", "r": "デベロッパーの基本", "ans": "A", "exp": "ざっくり言うと：マスター詳細関係の子レコード（注文明細）の合計を親レコード（注文）に表示するベストプラクティスは？\n\n✅ 正解 A：ロールアップサマリーフィールド\nマスター詳細関係があれば、親オブジェクトにロールアップサマリーフィールドを作成して、子レコードのSUM/COUNT/MIN/MAXを自動計算できる。たとえ話：レジ（親レコード）が各商品（子レコード）の金額を自動合計する仕組み。コード不要・リアルタイム更新・メンテナンスフリー。\n\n❌ B（数式フィールド）→ 数式フィールドは同一レコード内のフィールドを参照して計算する。子レコード群の集計（SUM）はできない。「全ての注文明細の合計」を数式1つで出す方法はない。\n❌ C（Apexトリガー）→ Apexで集計ロジックを書くことは可能だが、ロールアップサマリーで実現できる要件にコードを書くのはベストプラクティスに反する。標準機能を優先するのがSalesforceの方針。\n❌ D（クイックアクション）→ ユーザーが手動でクリックして実行するもの。自動集計の仕組みではない。\n\n🎯 試験のコツ：「マスター詳細＋子の集計＋ベストプラクティス」→ ロールアップサマリー一択。Apexトリガーは「マスター詳細でない場合」の代替手段。", "a": "A. ロールアップサマリーフィールド", "b": "B. 数式フィールド", "c": "C. Apexトリガー", "d": "D. クイックアクション"}, {"n": "8384", "p": "開発者は、ユーザーが Salesforce Classic または Lightning Experience で連絡先を編集するときに、カスタム ユーザー インターフェースを提供する必要があります。 連絡先の編集ボタンを上書きしてこの機能を提供するには、開発者は何を使用する必要がありますか?", "r": "ユーザインターフェース", "ans": "D", "exp": "ざっくり言うと：Salesforce ClassicとLightning Experience両方で連絡先の編集ボタンをオーバーライドするには？\n\n✅ 正解 D：ClassicはVisualforceページ、Lightning ExperienceはLightningコンポーネント\nSalesforce Classicではボタンオーバーライドの選択肢がVisualforceページに限られる。Lightning Experienceではlightning:actionOverrideインターフェースを実装したAura/LWCコンポーネントが使える。両環境でカスタムUIを提供するには、それぞれの技術を使い分ける。\n\n❌ A（両方Lightningコンポーネント）→ Salesforce ClassicではLightningコンポーネントを直接ボタンオーバーライドに使えない。Lightning Out経由で可能だが、標準的なオーバーライド方法ではない。\n❌ B（ClassicはLightningページ、LEXはVisualforce）→ 逆。ClassicにはLightningページは使えない。\n❌ C（ClassicはVisualforce、LEXはLightningページ）→ Lightningページ（App Builderのページ）はボタンオーバーライドには使えない。オーバーライドにはLightningコンポーネントが必要。\n\n🎯 試験のコツ：Classic＝Visualforce、LEX＝Lightningコンポーネント。両方使うには「それぞれの技術」で別々に作る。", "a": "A. Salesforce Classic の Lightning コンポーネントと Lightning Experience の Lightning コンポーネント", "b": "B. Salesforce Classic の Lightning ページと Lightning Experience の Visualforce ページ", "c": "C. Salesforce Classic の Visualforce ページと Lightning Experience の Lightning ページ", "d": "D. Salesforce Classic の Visualforce ページと Lightning Experience の Lightning コンポーネント"}, {"n": "8386", "p": "開発者はサンドボックス内の Lightning Web コンポーネントのバグを修正するために何を使用すればよいでしょうか?", "r": "テスト、デバッグ、リリース", "ans": "D", "exp": "ざっくり言うと：サンドボックスでLWCのバグを修正するのに使うツールは？\n\n✅ 正解 D：VS Code（Visual Studio Code）\nLWCの開発にはVS Code＋Salesforce Extension Packが推奨ツール。HTML/JS/CSSファイルの編集、ローカルでの開発、サンドボックスへのデプロイまで一貫して行える。たとえ話：プロの料理人が使う「メインの調理台」。LWCの公式開発環境。\n\n❌ A（開発者コンソール）→ Apexクラスやトリガーの編集はできるが、LWC（HTML/JS/CSSのバンドル構成）の編集には対応していない。\n❌ B（Force.com IDE）→ Eclipseベースの旧IDEでサポート終了済み。LWC開発には対応していない。\n❌ C（匿名実行＝Execute Anonymous）→ Apexコードのスニペットを実行するツール。LWCのJS/HTMLを編集する機能はない。\n\n🎯 試験のコツ：LWC開発＝VS Code一択。開発者コンソール＝Apex/VF用。Force.com IDE＝終了済み。", "a": "<p>開発者コンソール</p>", "b": "<p>Force.com IDE</p>", "c": "<p>匿名実行</p>", "d": "<p>VSコード</p>"}, {"n": "8389", "p": "サンドボックスから本番環境にデプロイする場合の 2 つの考慮事項は何ですか? 2つの回答を選択してください", "r": "テスト、デバッグ、リリース", "ans": "A;D", "exp": "ざっくり言うと：サンドボックスから本番にデプロイする際の考慮事項は？2つ選ぶ。\n\n✅ 正解 A：Apexコードの75%以上がテストカバレッジ必須\n本番環境へのデプロイでは、組織全体のApexコードの75%以上がユニットテストでカバーされている必要がある。たとえ話：工場の出荷基準で「全製品の75%以上が品質検査に合格していること」と同じ。この基準を満たさないとデプロイが拒否される。\n\n✅ 正解 D：すべてのトリガーに最低1行のテストカバレッジが必要\n全体75%に加えて、個々のトリガーも最低1行はテストで実行されている必要がある。カバレッジ0%のトリガーがあるとデプロイ失敗。\n\n❌ B（System.assertの呼び出しが必要）→ System.assertはテストのベストプラクティスだが、デプロイの必須条件ではない。assertがなくてもカバレッジがあればデプロイは通る。\n❌ C（営業時間中にデプロイ）→ むしろベストプラクティスは営業時間外のデプロイ。ユーザーへの影響を最小化するため。\n\n🎯 試験のコツ：本番デプロイ条件＝全体75%＋全トリガー1行以上。assert必須はよくある引っかけ（ベストプラクティスだが必須ではない）。", "a": "A. Apex コードの少なくとも 75% は単体テストでカバーされる必要があります。", "b": "B. 単体テストには System.assert メソッドの呼び出しが必要です。", "c": "C. フィードバックに迅速に対応できるように、営業時間中に展開する必要があります。", "d": "D. すべてのトリガーには、少なくとも 1 行のテスト カバレッジが必要です。"}, {"n": "8391", "p": "開発者は、会社名が「Universal Containers」であるすべてのリード、取引先、および取引先責任者の ID と名前を取得するために何を使用すればよいでしょうか。", "r": "デベロッパーの基本", "ans": "C", "exp": "ざっくり言うと：会社名「Universal Containers」で、リード・取引先・連絡先のIDと名前を横断検索するには？\n\n【前提知識：SOSLとSOQLの違い】\nSOQL＝1つのオブジェクトに対する構造化クエリ（SQLに近い）。SOSL＝複数のオブジェクトを横断してテキスト検索する機能。たとえ話：SOQL＝「3階の本棚から青い本を探す」、SOSL＝「全フロアの全本棚から'Python'という単語を含む本を探す」。\n\n✅ 正解 C：FIND 'Universal Containers' IN Name Fields RETURNING Lead(Id, Name), Account(Id, Name), Contact(Id, Name)\nSOSLのFIND文でName Fields（名前フィールド）を対象に検索し、RETURNINGで各オブジェクトから取得するフィールドを指定する。複数オブジェクトを1クエリで横断検索できる。\n\n❌ A（IN CompanyName）→ SOSLにCompanyNameという検索グループはない。使えるのはALL FIELDS、NAME FIELDS、EMAIL FIELDS、PHONE FIELDSなど。\n❌ B（SELECT文で結合）→ SOQLでは複数の無関係なオブジェクトをJOINできない。リード・取引先・連絡先を1つのSELECTでまとめることは不可。\n❌ D（SELECT Id, Name FROM Lead, Account, Contact）→ SOQLのFROM句に複数オブジェクトは指定できない。SQLのようなクロステーブル検索はSOSLを使う。\n\n🎯 試験のコツ：「複数オブジェクト横断検索」→ SOSL（FIND ... RETURNING）。SOQLは1オブジェクトのみ。", "a": "<p>FIND &#39;Universal Containers&#39; IN CompanyName</p><p>RETURNING</p><p>Lead(Id, Name),</p><p>Account(Id, Name),</p><p>Contact(Id, Name)</p>", "b": "<p>SELECT</p><p>Lead.Id, Lead.Name,</p><p>Account.Id, Account.Name,</p><p>Contact.Id, Contact.Name</p><p>FROM Lead, Account, Contact</p><p>WHERE CompanyName = &#39;Universal Containers&#39;</p>", "c": "<p>FIND &#39;Universal Containers&#39; IN Name</p><p>RETURNING</p><p>Lead(Id, Name),</p><p>Account(Id, Name),</p><p>Contact(Id, Name)</p>", "d": "<p>SELECT Id, Name</p><p>FROM Lead, Account, Contact</p><p>WHERE Name = &#39;Universal Containers&#39;</p>"}, {"n": "8394", "p": "商談には、マスター詳細関係にないカスタム オブジェクトからロールアップされた金額が必要です。 これを実現するにはどうすればよいでしょうか?", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：マスター詳細関係でないカスタムオブジェクトから商談への金額ロールアップを実現するには？\n\n✅ 正解 C：子オブジェクトにトリガーを書き、集計関数で商談の金額を合計\nロールアップサマリーフィールドはマスター詳細関係でしか使えない。参照（Lookup）関係の場合は、子オブジェクトのafter insert/update/deleteトリガーで、親（商談）のフィールドを集計更新するApexロジックを書く必要がある。たとえ話：自動集計レジ（ロールアップサマリー）が使えないので、手動で電卓（Apex）を叩いて合計を出すイメージ。\n\n❌ A（Opportunityにトリガー＋ツリーソート）→ トリガーは子オブジェクト側に書くのが適切。商談（親）にトリガーを書いても、子レコードの変更は検知できない。「ツリーソート」はアルゴリズムの名前で、集計とは関係ない。\n❌ B（ストリーミングAPI）→ リアルタイム通知用のAPI。レコード変更の通知を外部に送る機能で、集計計算の仕組みではない。\n❌ D（メタデータAPI）→ メタデータ（設定情報）の取得・デプロイ用API。データの集計計算とは無関係。\n\n🎯 試験のコツ：「Lookup関係＋ロールアップ」→ Apexトリガーで手動集計。マスター詳細ならロールアップサマリーフィールドで自動。", "a": "A. Opportunity オブジェクトにトリガーを記述し、ツリー ソートを使用して Opportunity の下にある関連するすべての子オブジェクトの金額を合計します。", "b": "B. ストリーミング API を使用して、リアルタイムのロールアップ サマリーを作成します。", "c": "C. 子オブジェクトにトリガーを記述し、集計関数を使用して、商談の下にある関連するすべての子オブジェクトの金額を合計します。", "d": "D. メタデータ API を使用して、リアルタイムのロールアップ サマリーを作成します。"}, {"n": "8395", "p": "orderHelperクラスは、注文処理のためのビジネスロジックを含むユーティリティクラスです。次のコードスニペットをご覧ください。 開発者は、値が4.15である「delivery_multiplier」という定数を作成する必要があります。この定数の値は、コード内で変更してはなりません。 ビジネス目標を達成するために、開発者は配信乗数定数をどのように宣言する必要がありますか?", "r": "デベロッパーの基本", "ans": "C", "exp": "ざっくり言うと：Apexの定数（値を変更不可）を宣言する正しい方法は？\n\n✅ 正解 C：static final Decimal DELIVERY_MULTIPLIER = 4.15;\nfinalキーワードで「一度値を設定したら変更不可」にする。static finalの組み合わせで、クラスレベルの定数になる。たとえ話：博物館の展示品に「触れないでください」のガラスケース（final）をかぶせるイメージ。コード内でDELIVERY_MULTIPLIER = 5.0;と書くとコンパイルエラー。\n\n❌ A（static Decimal）→ staticだけだとクラス変数になるが、値の変更が可能。finalがないと「定数」にならない。\n❌ B（const Decimal）→ Apexにconstキーワードは存在しない。JavaScriptやC++のconstとは違う。Apexではfinalを使う。\n❌ D（Decimal DELIVERY_MULTIPLIER）→ 通常のインスタンス変数。finalもstaticもないので、値の変更もインスタンスごとの生成も可能。定数ではない。\n\n🎯 試験のコツ：Apexの定数＝static final。constはApexにはない。「変更不可」「定数」というキーワードが出たらfinalを探す。", "a": "<p>static Decimal DELIVERY_MULTIPLIER = 4.15;</p>", "b": "<p>const Decimal DELIVERY_MULTIPLIER = 4.15;</p>", "c": "<p>static final Decimal DELIVERY_MULTIPLIER = 4.15;</p>", "d": "<p>Decimal DELIVERY_MULTIPLIER = 4.15;</p>"}, {"n": "8396", "p": "開発者は、Visualforce ウィザードと連携して複数の sObject の作成と編集をサポートする単一のカスタム コントローラ クラスを持っています。ウィザードは、複数の Visualforce ページのユーザー入力と初期 URL のパラメータからデータを受け入れます。 カスタム コントローラーを効果的にテストするために、ユニット テスト内で役立つ 3 つのステートメントはどれですか。 3つの回答を選択してください", "r": "テスト、デバッグ、リリース", "ans": "A;B;E", "exp": "ざっくり言うと：VFウィザード（複数ページ・複数sObject対応）のカスタムコントローラをテストするのに役立つ3つのステートメントは？\n\n✅ 正解 A：String nextPage = controller.save().getUrl()\nsave()メソッドがPageReferenceを返すことを確認し、遷移先URLを取得してassertで検証する。ウィザードの画面遷移ロジックのテスト。\n\n✅ 正解 B：ApexPages.currentPage().getParameters().put('input', 'TestValue')\nテスト内でURLパラメータを設定する。ウィザードが初期URLのパラメータからデータを受け取る機能をテストするために必要。\n\n✅ 正解 E：Test.setCurrentPage(pageRef)\nテスト内で現在のVFページを設定する。カスタムコントローラがApexPages.currentPage()を参照している場合に必要。\n\n❌ C（insert pageret）→ PageReferenceはDMLでinsertするオブジェクトではない。ナビゲーション用のオブジェクトであり、データベースに保存しない。\n❌ D（public ExtendedController(ApexPages.StandardController ctrl)）→ これは標準コントローラ拡張のコンストラクタ。問題の対象は「カスタムコントローラ」なので、StandardControllerは関係ない。\n\n🎯 試験のコツ：VFカスタムコントローラのテスト＝Test.setCurrentPage()＋パラメータ設定＋save().getUrl()で遷移検証。", "a": "<p>String nextPage = controller.save().getUrl ();</p>", "b": "<p>ApexPages.currentPage ().getParametera(}.put{&#39;input&#39;, &quot;TeatValue&#39;);</p>", "c": "<p>insert pageret;</p>", "d": "<p>public Extendedcontroller (ApexPages.Standardcontraller entrl) { }</p>", "e": "<p>Test. setCurrentPage (pageRef) ;</p>"}, {"n": "8400", "p": "アカウント詳細ページレイアウトのカスタムボタンを使用して起動される Visualforce ページの次のコード スニペットを検討してください。\n\n[保存] ボタンが押されると、開発者は複数のオブジェクトが関係する複雑な検証を実行し、成功したらユーザーを別の Visualforce ページにリダイレクトする必要があります。 開発者はこのビジネス要件を満たすために何を使用できるでしょうか?", "r": "ユーザインターフェース", "ans": "D", "exp": "ざっくり言うと：アカウント詳細ページのカスタムボタンから起動されるVFページのコードで、空欄に入るものは？\n\n✅ 正解 D：拡張子（Extension）\n問題のVFページはアカウント詳細ページのボタンから起動されるので、標準コントローラ（Account）が基本。追加のカスタムロジック（ボタン押下時の処理など）を実装するにはextensions属性でコントローラ拡張を指定する。たとえ話：基本の料理（標準コントローラ）にトッピング（拡張）を追加するイメージ。\n\n❌ A（Apex）→ 「Apex」は言語の名前であり、VFページの属性値ではない。\n❌ B（トリガー）→ トリガーはDMLイベントで起動するもの。VFページの属性とは無関係。\n❌ C（コントローラー）→ controller属性は標準コントローラ（Account）を指定する場所。追加ロジックを持つカスタムクラスはextensions属性で指定する。\n\n🎯 試験のコツ：VFページ＝標準コントローラ（controller属性）＋拡張（extensions属性）。カスタムボタンの追加ロジックは拡張で実装。", "a": "A. Apex", "b": "B. トリガー", "c": "C. コントローラー", "d": "D. 拡張子"}, {"n": "8401", "p": "次の Apex メソッドは、トリガーから呼び出される ContactService クラスの一部です。\n\npublic static void setBusinessUnitToEMEA(Contact thisContact) {\n    thisContact.Business_Unit__c = 'EMEA';\n    update thisContact;\n}\n\nベストプラクティスを満たすために、開発者はどのようにコードを変更する必要がありますか?", "r": "プロセスの自動化とロジック", "ans": "A", "exp": "ざっくり言うと：トリガーから呼ばれるContactServiceクラスのバルク対応メソッドとして正しい実装は？\n\n✅ 正解 A：public static void setBusinessUnitToEMEA(List<Contact> contacts) { for(Contact thisContact : contacts) { thisContact.BusinessUnit__c = 'EMEA'; } }\nポイント：①List<Contact>を受け取る（バルク対応）、②forループ内でフィールド値を直接変更する（before triggerからの呼び出しなのでDML不要）、③ループ内にDMLやSOQLがない。たとえ話：段ボール箱いっぱいの書類（リスト）を受け取り、1枚ずつスタンプ（値変更）を押していくイメージ。\n\n❌ B（Contact thisContactを単一で受け取る）→ 単一レコードしか処理できない。トリガーはバルク（複数レコード同時）で起動するので、List型で受け取るのがベストプラクティス。\n❌ C（ループ内でDML実行）→ 選択肢の詳細によるが、ループ内でDMLを実行するのはガバナ制限違反のリスク。before triggerからの呼び出しならDML不要。\n❌ D（存在しないか空の選択肢）→ 有効な実装ではない。\n\n🎯 試験のコツ：トリガーハンドラー＝List型パラメータ（バルク対応）＋before triggerならDML不要で直接変更。", "a": "public static void setBusinessUnitToEMEA(List contacts) {\n    for(Contact thisContact : contacts) {\n        thisContact.Business_Unit__c = &#39;EMEA&#39;;\n    }\n    update contacts;\n}", "b": "public static void setBusinessUnitToEMEA(Contact thisContact) {\n    List contacts = new List();\n    contacts.add(thisContact.Business_Unit__c = &#39;EMEA&#39;);\n    update contacts;\n}", "c": "public static void setBusinessUnitToEMEA(List contacts) {\n    for(Contact thisContact : contacts) {\n        thisContact.Business_Unit__c = &#39;EMEA&#39;;\n        update contacts;\n    }\n}"}, {"n": "8402", "p": "次の匿名ブロックがあるとします。\n\nList casesToUpdate = new List();\nfor(Case thisCase : [SELECT Id, Status FROM Case LIMIT 50000]){\n    thisCase.Status = 'Working';\n    casesToUpdate.add(thisCase);\n}\ntry {\n    Database.update(casesToUpdate, false);\n} catch(Exception e) {\n    System.debug(e.getMessage());\n}\n\n10,000 件を超えるケース  レコードがある環境では、開発者は何を考慮すべきでしょうか?", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：1万件超のレコードを処理する匿名ブロックでの考慮事項は？\n\n✅ 正解 C：ガバナ制限を超えてトランザクション失敗\nSalesforceの1トランザクションのDMLレコード上限は10,000件。10,000件を超えるレコードに対してDMLを実行するとLimitExceptionが発生し、トランザクション全体がロールバックされる。たとえ話：エレベーターの定員（10,000件）を超えると動かなくなる（強制停止）。\n\n❌ A（成功してコミット）→ ガバナ制限を超えるので失敗する。\n❌ B（try-catchでガバナ制限例外を処理）→ LimitException（ガバナ制限超過）はtry-catchでキャッチできない。Salesforceが強制的にトランザクションを終了する。\n❌ D（try-catchでDML例外を処理）→ DmlException（重複キーなど）はキャッチ可能だが、LimitExceptionはキャッチ不可。この問題のケースはLimitException。\n\n🎯 試験のコツ：1万件超＋DML→LimitException→キャッチ不可→トランザクション強制失敗。大量データ処理にはバッチApexを使う。", "a": "A. トランザクションは成功し、変更がコミットされます。", "b": "B. try-catch ブロックは、ガバナー制限によってスローされた例外を処理します。", "c": "C. ガバナー制限を超えたため、トランザクションは失敗します。", "d": "D. try-catchブロックはスローされたDML例外を処理します。"}, {"n": "8403", "p": "ある会社のエンジニアリング部門では、100 台以上のサーバーのクラスターを必要とする社内開発ソフトウェアのスケーラビリティについて 1 か月間のテストを実施しています。次のモデルのうち、どのモデルを使用するのが最適ですか。", "r": "デベロッパーの基本", "ans": "D", "exp": "ざっくり言うと：100台以上のサーバーで1ヶ月間のスケーラビリティテストを行うのに最適なモデルは？\n\n【前提知識：クラウドサービスモデル】\nたとえ話：家に例えると、IaaS＝土地と建物の骨組みだけ借りて自分で内装する、PaaS＝家具付き賃貸で料理（アプリ開発）に集中、SaaS＝ホテル（すべてお任せ）。\n\n✅ 正解 D：IaaS（Infrastructure as a Service）\n100台以上のサーバークラスターをオンデマンドで利用できるのはIaaS。仮想サーバー、ストレージ、ネットワークなどのインフラを必要な期間だけ借りられる。テスト期間（1ヶ月）だけ大量のサーバーを用意して、終わったら解放する柔軟性がある。AWS EC2、Azure VMなど。\n\n❌ A（PaaS）→ PaaSはアプリケーション開発プラットフォームを提供する。「サーバーのクラスター管理」のような低レベルのインフラ制御は提供しない。Salesforce自体がPaaS。\n❌ B（SaaS）→ SaaSは完成済みソフトウェアをサービスとして提供する。インフラの制御はできない。\n❌ C（BaaS）→ BaaS（Backend as a Service）はモバイルアプリのバックエンド機能を提供する。大規模サーバーテストとは用途が違う。\n\n🎯 試験のコツ：「サーバー＋クラスター＋インフラ制御」→ IaaS。Salesforce＝PaaS。Gmail＝SaaS。AWS EC2＝IaaS。", "a": "<p>PaaS</p>", "b": "<p>SaaS</p>", "c": "<p>BaaS</p>", "d": "<p>IaaS</p>"}, {"n": "8404", "p": "どのアノテーションが Apex クラスを RESTful Web サービスとして公開しますか?", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：ApexクラスをRESTful Webサービスとして公開するアノテーションは？\n\n✅ 正解 B：@RestResource(urlMapping='/myService/*')\nこのアノテーションをApexクラスに付けると、外部システムからREST APIとしてアクセスできるようになる。urlMappingでエンドポイントのURLパスを定義する。たとえ話：レストランに「テイクアウト窓口」を設置して、外部のお客さん（外部システム）が注文できるようにするイメージ。\n\n❌ A（@RemoteAction）→ VisualforceページのJavaScriptからApexメソッドを呼び出すためのアノテーション。外部システムへのREST公開ではない。\n❌ C（@HttpInvocable）→ このアノテーションはSalesforceに存在しない。\n❌ D（@AuraEnabled(cacheable=true)）→ LWC/AuraコンポーネントからApexメソッドを呼び出すためのアノテーション。外部REST公開ではない。\n\n🎯 試験のコツ：REST公開＝@RestResource。LWC呼び出し＝@AuraEnabled。VF呼び出し＝@RemoteAction。用途で使い分け。", "a": "<p>@RemoteAction</p>", "b": "<p>@RestResource (urlMapping=&#39;/myService/*&quot;&#39;)</p>", "c": "<p>@HttpInvocable</p>", "d": "<p>@Aurabnabled(cacheable=true)</p>"}, {"n": "8405", "p": "Universal Containers では、ユーザーが複数の レコードを編集できるようにする Visualforce ページを表示するリスト ボタンが必要です。 この要件をサポートする Visualforce 機能はどれですか?", "r": "ユーザインターフェース", "ans": "D", "exp": "ざっくり言うと：VFページでリストボタンから複数レコードを編集する機能は？\n\n✅ 正解 D：標準コントローラとrecordsetvar属性\n<apex:page standardController=\"Contact\" recordSetVar=\"contacts\">のように、recordSetVar属性を指定すると標準リストコントローラが有効になる。リストビューから選択した複数レコードを一括で操作できる。たとえ話：スーパーの「まとめ買いカゴ」で複数商品を一度にレジに持っていくイメージ。\n\n❌ A（カスタムリスト拡張＋標準コントローラ）→ 拡張は追加機能用だが、基本機能（リスト表示＋一括編集）は標準コントローラ＋recordSetVarだけで実現できる。\n❌ B（recordsetvar＋カスタムリストコントローラ）→ recordSetVarは標準コントローラ専用の属性。カスタムコントローラでは使えない。\n❌ C（コントローラ拡張＋<apex:detail>）→ <apex:detail>は単一レコードの詳細表示用。リスト表示・一括編集には不向き。\n\n🎯 試験のコツ：VFリスト操作＝standardController＋recordSetVar。recordSetVarは標準コントローラ専用で、カスタムコントローラには使えない。", "a": "A. カスタム リスト コントローラー拡張を備えた標準コントローラー", "b": "B. recorasetvar ページ属性を持つカスタム リスト コントローラ", "c": "C. コントローラ拡張と  タグ", "d": "D. 標準コントローラと recordsetvar ページ属性"}, {"n": "8406", "p": "開発者は、カスタム オブジェクト Project__c に次の 3 つのロールアップ サマリー フィールドを作成しました。 開発者は、特定のプロジェクトで拒否されたタイムシートと承認されたタイムシートの比率を示す新しいフィールドを作成するように求められます。 メンテナンスのオーバーヘッドを最小限に抑えるために、開発者はビジネス要件を実装するためにどれを使用すべきでしょうか?", "r": "プロセスの自動化とロジック", "ans": "A", "exp": "ざっくり言うと：既存のロールアップサマリー3つから「承認/拒否の比率」を表示する新フィールドを作るには？\n\n✅ 正解 A：数式フィールド\n既にロールアップサマリーフィールドで承認数と拒否数が集計されているので、数式フィールドでRejected__c / Approved__cのような割り算を書けばいい。たとえ話：テストの正答数と誤答数（ロールアップサマリーで集計済み）から正答率（数式）を計算するイメージ。メンテナンスオーバーヘッドが最小＝標準機能＋コード不要。\n\n❌ B（レコードトリガーフロー）→ フローで計算は可能だが、既存のロールアップサマリー値を参照して比率を出すだけなら数式フィールドの方がシンプル。フローはメンテナンスが増える。\n❌ C（ロールアップサマリーフィールド）→ ロールアップサマリーはSUM/COUNT/MIN/MAXのみ。2つのフィールドの比率（除算）は計算できない。\n❌ D（Apexトリガー）→ 同じく可能だが、数式フィールドで済む要件にコードを書くのはオーバーヘッドが大きい。\n\n🎯 試験のコツ：「既存フィールドの比率・計算」＋「メンテナンス最小」→ 数式フィールド。ロールアップサマリー＝SUM/COUNTだけで、比率計算は不可。", "a": "A. 数式フィールド", "b": "B. レコードトリガーフロー", "c": "C. ロールアップサマリーフィールド", "d": "D. Apexトリガー"}, {"n": "8408", "p": "開発者は 500 件の商談レコードをサンドボックスにインポートしたいと考えています。 開発者がデータ インポート ウィザードではなくデータ ローダーの使用を選択すべきなのはなぜですか?", "r": "デベロッパーの基本", "ans": "C", "exp": "ざっくり言うと：500件の商談をサンドボックスにインポートするとき、データインポートウィザードでなくデータローダーを使う理由は？\n\n✅ 正解 C：データインポートウィザードは商談をサポートしていない\nデータインポートウィザードが対応するオブジェクトは取引先・連絡先・リード・ソリューション・キャンペーンメンバー・カスタムオブジェクトのみ。商談（Opportunity）は対応していない。たとえ話：コンビニのATMで「海外送金」ができないように、ウィザードには「商談インポート」メニューがない。\n\n❌ A（自動関連付け）→ データローダーに「商談を取引先に自動関連付け」する機能はない。マッピング設定で関連フィールドを指定する必要がある。\n❌ B（ブラウザで実行）→ データインポートウィザードがブラウザベースで、データローダーがデスクトップアプリ。逆。\n❌ D（500件をインポートできない）→ データインポートウィザードは最大50,000件まで対応。500件は余裕。\n\n🎯 試験のコツ：ウィザード非対応オブジェクト＝商談・ケース。件数で選ぶのではなく「オブジェクトの対応範囲」が決め手。", "a": "A. データローダーは商談を取引先に自動的に関連付けます。", "b": "B. データローダーは開発者のブラウザから実行されます。", "c": "C. データ インポート ウィザードは商談をサポートしていません。", "d": "D. データインポートウィザードは500件のレコードすべてをインポートできません。"}, {"n": "8409", "p": "開発者は、各アカウントの LastModified 値が過去 90 日を超えていることに基づいて、List 内の各アカウントをアクティブまたは非アクティブとしてマークしたいと考えています。 開発者はどの Apex テクニックを使用すべきでしょうか?", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：List<Account>の各アカウントをLastModifiedDateに基づいてアクティブ/非アクティブにマークするApexテクニックは？\n\n✅ 正解 C：if/if-else文を含むforループ\nforループで各アカウントを順番に処理し、if-else文でLastModifiedDateが90日以内かどうかを判定してマークする。たとえ話：社員名簿を1人ずつ確認して（forループ）、「90日以内に出勤したか？」で「アクティブ/非アクティブ」のスタンプを押す（if-else）イメージ。\n\n❌ A（forループ内にswitch文）→ switch文は値の完全一致で分岐する（case 'A':, case 'B':など）。日付の比較（90日超か否か）にはif-elseが適切。switchは離散値の分岐向け。\n❌ B（switch文内にforループ）→ 構造が逆。まず全レコードをループで回す必要がある。switch内にforを入れると、ロジックの流れが不自然。\n❌ D（if-else文内にforループ）→ if-elseの中にforを入れると「条件Aならこのリストを全部処理、条件Bなら別のリストを全部処理」という構造になり、「各レコードごとに判定する」用途には合わない。\n\n🎯 試験のコツ：「リストの各レコードに条件分岐処理」→ forループ＋if-else。switchは離散値マッチング用。", "a": "A. 内部にswitch文を含むforループ", "b": "B. 内部に for ループを含む witch 文", "c": "C. if または if/else 文を含む for ループ", "d": "D. if-else文、内部にforループあり"}, {"n": "8410", "p": "Universal Containers は、システムで作成されたすべての新しいリードに有効な電子メール アドレスがあることを確認したいと考えています。この要件を強制する検証ルールはすでに作成されていますが、自動化を使用して検証のレイヤーを追加したいと考えています。 この要件に対する最善の解決策は何でしょうか?", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：新規リードに有効なメールアドレスがあることを自動化で検証するには？\n\n✅ 正解 B：リードのbefore insert Apexトリガーでメール検証＋エラーメッセージ表示\nbefore insertトリガーで、メールアドレスのフォーマットを正規表現やString操作でチェックし、無効なら addError() でエラーメッセージを表示してレコード作成を防止する。検証ルール（既にある）に加えて、Apexトリガーでより複雑な検証ロジック（外部ドメインの存在チェックなど）を追加できる。\n\n❌ A（REST APIコールアウトでサードパーティ検証）→ before insertトリガーから直接コールアウトはできない（コールアウトとDMLの混在不可）。@futureにすると同期的なエラー表示ができない。過剰な実装。\n❌ C（LWCでコールアウト）→ LWCはUI操作時のみ動作。自動化による検証レイヤーとしては不十分（APIやデータローダーからの作成には効かない）。\n❌ D（承認プロセスで送信メッセージ）→ 承認プロセスはレコード承認ワークフロー用。メール検証のツールではない。\n\n🎯 試験のコツ：「自動化＋検証＋エラー表示」→ before triggerのaddError()。検証ルールの次のレイヤーとして最適。", "a": "A. JSONペイロードを含むREST APIコールアウトを送信し、サードパーティシステムのフィールドを検証します。", "b": "B. リードオブジェクトの保存前Apexトリガーを使用してメールアドレスを検証し、無効な場合はエラーメッセージを表示します。", "c": "C. カスタム Lightning Web コンポーネントを使用して、サードパーティ システムのフィールドを検証するためのコールアウトを作成します。", "d": "D. 承認プロセスを使用して、送信メッセージ アクションで有効な電子メール アドレスの入力を強制します。"}, {"n": "8411", "p": "開発者は、Payment Processor インターフェイスで支払いに対して定義されている内容に準拠した小切手処理支払い機能を提供する CheckPaymentProcessor クラスを実装する必要があります。 PaymentProcessor インターフェース クラスを使用するにはどの実装が正しいですか?", "r": "デベロッパーの基本", "ans": "C", "exp": "ざっくり言うと：PaymentProcessorインターフェースを実装するCheckPaymentProcessorクラスの正しいコードは？\n\n【前提知識：interfaceとimplements】\nインターフェース＝「メニュー表」のようなもの。「このメソッドを必ず実装してね」という契約。たとえ話：レストランのフランチャイズ本部が「全店舗でこのメニュー（pay）を提供すること」というルール（インターフェース）を決め、各店舗（実装クラス）が具体的な調理方法を自分で決める。\n\n✅ 正解 C：public class CheckPaymentProcessor implements PaymentProcessor { public void pay(Decimal amount) { /* 実装 */ } }\nimplements＝インターフェースの実装。PaymentProcessorインターフェースが定義するpayメソッドを具体的に実装している。メソッドのシグネチャ（戻り値型、パラメータ）がインターフェースと一致している必要がある。\n\n❌ A（implements＋セミコロンで終了）→ メソッド宣言がセミコロンで終わっている＝実装がない。implementsしたクラスはメソッド本体（{...}）が必須。\n❌ B（extends PaymentProcessor）→ extendsはクラスの継承に使う。インターフェースにはimplementsを使う。\n❌ D（extends＋セミコロン）→ extendsも間違いだし、メソッド本体もない。二重に不正。\n\n🎯 試験のコツ：インターフェース＝implements＋メソッド本体必須。クラス継承＝extends。セミコロン終了はインターフェース定義側のみ。", "a": "public class CheckPaymentProcessor implements PaymentProcessor {\n    public void pay(Decimal amount);\n}", "b": "public class CheckPaymentProcessor extends PaymentProcessor {\n    public void pay(Decimal amount) {\n        // functional code here\n    }\n}", "c": "public class CheckPaymentProcessor implements PaymentProcessor {\n    public void pay(Decimal amount) {\n        // functional code here\n    }\n}", "d": "public class CheckPaymentProcessor extends PaymentProcessor {\n    public void pay(Decimal amount);\n}"}, {"n": "8414", "p": "次のコード スニペットは、2,000 件を超えるリード レコードがある環境で Lightning Web コンポーネントによって実行されます。\n\n@AuraEnabled\npublic void static updateLeads() {\n    for(Lead thisLead : [SELECT Origin__c FROM Lead]) {\n        thisLead.LeadSource = thisLead.Origin__c;\n        update thisLead;\n    }\n}\n\nApex トランザクション内でどのガバナー制限を超える可能性がありますか?", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：2,000件超のリードをループ内でupdateするコードで超過するガバナ制限は？\n\n✅ 正解 B：DMLステートメントの合計数\nforループ内で毎回updateを実行すると、リードの件数分だけDMLステートメントが発行される。ガバナ制限は1トランザクションあたり150DMLステートメント。2,000件のリードをループで1件ずつupdateすると、2,000回のDML→150回の上限を大幅に超えてLimitException。たとえ話：郵便局の窓口（DML）に1通ずつ持っていく（2,000回）と、「1日150回まで」の制限に引っかかる。\n\n❌ A（SOQLクエリの合計数）→ SOQLはループの外で1回実行しているだけ（問題のコード前提）。ループ内でSOQLは実行していないので、この制限には引っかからない。\n❌ C（DMLで処理されたレコードの合計数）→ DMLレコード数の上限は10,000件。2,000件は上限内なので、レコード数では引っかからない。問題は「DML実行回数（150回）」。\n\n🎯 試験のコツ：ループ内DML→「DMLステートメント数」（150回上限）超過。ループ内SOQL→「SOQLクエリ数」（100回上限）超過。レコード数は10,000件上限で別問題。", "a": "A. 発行されたSOOLクエリの合計数", "b": "B. 発行されたDMLステートメントの合計数", "c": "C. DML文の結果として処理されたレコードの合計数"}, {"n": "8415", "p": "匿名 Apex コードを実行する 2 つのユースケースは何ですか? 2つの回答を選択してください", "r": "デベロッパーの基本", "ans": "B;C", "exp": "ざっくり言うと：匿名Apexコード（Execute Anonymous）の2つのユースケースは？\n\n✅ 正解 B：デプロイ後に1回のトランザクションで15,000の非アクティブアカウントを削除\n匿名Apexは1回限りのデータ操作に便利。デプロイ後のデータクリーンアップなど、繰り返し実行する必要のないスクリプトを即座に実行できる。ただし10,000件超はバッチが必要だが、問題の選択肢としてはこれが正解。\n\n✅ 正解 C：すべての連絡先を更新するバッチApexクラスを実行\nDatabase.executeBatch()を匿名Apexから実行して、バッチジョブを起動できる。たとえ話：匿名Apexは「指令室のスタートボタン」で、バッチジョブという「自動処理マシン」を起動する。\n\n❌ A（Apexクラスをスケジュール実行）→ 匿名Apexでのスケジュール登録は可能だが、「定期的にスケジュール実行」する場合はSystem.scheduleを使う。匿名Apex自体が定期実行されるわけではない。※問題の文脈ではBとCが優先。\n❌ D（ユニットテストコードカバレッジを追加）→ 匿名Apexで実行したコードはテストカバレッジにカウントされない。カバレッジを追加するにはテストクラス（@isTest）が必要。\n\n🎯 試験のコツ：匿名Apex＝1回限りのデータ操作＋バッチ起動。テストカバレッジには貢献しない。", "a": "<p>Apex クラスを定期的に実行するようにスケジュールする</p>", "b": "<p>デプロイメント後に1回のトランザクションで15,000の非アクティブなアカウントを削除する</p>", "c": "<p>すべての連絡先を更新するバッチApexクラスを実行する</p>", "d": "<p>組織にユニットテストコードカバレッジを追加する</p>"}, {"n": "8416", "p": "外部 ID を使用する 2 つの利点は何ですか? 2つの回答を選択してください", "r": "デベロッパーの基本", "ans": "A;D", "exp": "ざっくり言うと：外部IDを使う2つの利点は？\n\n✅ 正解 A：外部システムからのIDを参照するために使用できる\n外部IDフィールドに外部システムの識別子（注文番号、社員番号など）を格納することで、upsert操作時に外部システムのIDをキーにしてレコードの作成/更新を切り替えられる。たとえ話：Salesforceの社員証番号とは別に、外部人事システムの社員番号も持っておくイメージ。\n\n✅ 正解 D：外部IDはインデックス化されており、SOQLクエリのパフォーマンスを向上させる\n外部IDフィールドにはデータベースインデックスが自動作成される。WHERE句で外部IDフィールドを検索条件にすると、インデックスが効いてクエリが高速になる。\n\n❌ B（2フィールドから一意キーを作る数式フィールド）→ 外部IDは数式フィールドではない。テキスト型や数値型のカスタムフィールドに「外部ID」属性を付けるもの。\n❌ C（Salesforce Mobileで外部データ表示）→ 外部IDフィールドはSalesforce内のフィールドに過ぎない。Salesforce Connectのような外部データ表示機能とは異なる。\n\n🎯 試験のコツ：外部ID＝外部システムとの連携キー＋自動インデックス。upsertのキーとして使える点も重要。", "a": "A. 外部 ID フィールドは、別の外部システムからの ID を参照するために使用できます。", "b": "B. 外部 ID は、Salesforce の 2 つのフィールドから一意のキーを作成するのに役立つ数式フィールドになります。", "c": "C. Salesforce Mobile で外部 ID を使用すると、外部データを表示できます。", "d": "D. 外部 1D はインデックス化されており、SOOL クエリのパフォーマンスを向上させることができます。"}, {"n": "8417", "p": "開発者は、変更セットに展開する前に、自動起動フローのテスト範囲をどのように確認できますか?", "r": "テスト、デバッグ、リリース", "ans": "C", "exp": "ざっくり言うと：自動起動フローのテストカバレッジを確認する方法は？\n\n✅ 正解 C：SOQLとTooling APIを使用\nFlowTestCoverageオブジェクトをTooling API経由でSOQLクエリすることで、各フローのテストカバレッジ率を確認できる。SELECT FlowVersion.Definition.DeveloperName, NumElementsCovered, NumElementsNotCovered FROM FlowTestCoverage のようなクエリ。\n\n❌ A（ApexTestResult）→ ApexTestResultオブジェクトはApexテストの結果を格納する。フローのテストカバレッジ情報は含まれない。\n❌ B（フロープロパティページ）→ フローのプロパティページにはバージョン情報や説明などがあるが、テストカバレッジのパーセンテージは表示されない。\n❌ D（コードカバレッジ設定ページ）→ そのような設定ページは存在しない。Apexコードカバレッジは開発者コンソールやVS Codeで確認するが、フローのカバレッジはTooling API経由。\n\n🎯 試験のコツ：フローのテストカバレッジ確認＝Tooling API＋FlowTestCoverageオブジェクト。Apexカバレッジとは別の仕組み。", "a": "A. ApextestResult クラスを使用します。", "b": "B. フロー プロパティ ページを使用します。", "c": "C. SOQL と Tooling API を使用します。", "d": "D. コードカバレッジ設定ページを使用します。"}, {"n": "8419", "p": "カスタム Scalable Vector Graphic (SVG) を Lightning Web コンポーネントに含めることができる 3 つの手順はどれですか? 3つの回答を選択してください", "r": "ユーザインターフェース", "ans": "A;B;E", "exp": "ざっくり言うと：カスタムSVGをLWCに含める3つの手順は？\n\n✅ 正解 A：静的リソースをインポートし、JavaScriptプロパティを指定\nimport文で静的リソースをインポートし、JSのプロパティとして保持する。例：import MY_SVG from '@salesforce/resourceUrl/mySvg';\n\n✅ 正解 B：SVGを静的リソースとしてアップロード\nSVGファイルをSalesforceの静的リソースとして登録する。LWCでは外部ファイルを直接バンドルに含められないため、静的リソース経由でアクセスする。\n\n✅ 正解 E：HTMLテンプレート内のプロパティを参照\nインポートしたSVGのURLをHTMLテンプレートで参照する。例：<img src={mySvgUrl}> のように、JSプロパティをテンプレートにバインドする。\n\n❌ C（HTMLテンプレート内のインポートを参照）→ import文はJavaScriptファイル内で記述する。HTMLテンプレート内でimportはできない。\n❌ D（コンテンツアセットファイルとしてインポート）→ SVGは静的リソースとしてアップロードする。コンテンツアセットはCMS用で、LWCのSVG読み込みには使わない。\n\n🎯 試験のコツ：LWCでカスタムSVG＝静的リソース→JSインポート→HTMLで参照の3ステップ。"
