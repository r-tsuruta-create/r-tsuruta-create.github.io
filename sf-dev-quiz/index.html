, "a": "A. 静的リソースをインポートし、それに JavaScript プロパティを指定します。", "b": "B. SVG を静的リソースとしてアップロードします。", "c": "C. HTML テンプレート内のインポートを参照します。", "d": "D. SVG をコンテンツ アセット ファイルとしてインポートします。", "e": "E. HTML テンプレート内のプロパティを参照します。"}, {"n": "8420", "p": "組織内の Account オブジェクトには、Branch と呼ばれる子オブジェクトとのマスター詳細関係があります。次の自動化が存在します。 * ロールアップサマリーフィールド * カスタム検証ルール * 重複ルール 開発者はアカウント オブジェクトにトリガーを作成しました。 トリガー コードをテストする際に開発者が考慮すべき 2 つのことは何ですか? 2つの回答を選択してください", "r": "プロセスの自動化とロジック", "ans": "A;C", "exp": "ざっくり言うと：トリガーテスト時に考慮すべき2点は？（ロールアップサマリー・検証ルール・重複ルール・マスター詳細の環境）\n\n✅ 正解 A：ロールアップサマリーフィールドにより親レコードが保存されることがある\n子レコード（Branch）を変更すると、ロールアップサマリーの再計算で親レコード（Account）も更新される。この更新でトリガーが再度起動する可能性がある。テスト設計時に考慮が必要。\n\n✅ 正解 C：トリガーはトランザクション中に複数回起動される可能性がある\nロールアップサマリーの再計算、ワークフロー、フローなどにより、同一トランザクション内でトリガーが複数回起動することがある。たとえ話：1つの注文処理で「検品→梱包→配送」の各段階でチェックポイント（トリガー）を通過するイメージ。\n\n❌ B（DMLコミット後に重複ルール実行）→ 重複ルールはDML操作の前（保存前）に実行される。コミット後ではない。\n❌ D（検証ルールによりトリガーが再起動）→ 検証ルールはフィールドの値をチェックするだけ。トリガーの再起動は引き起こさない。\n\n🎯 試験のコツ：トリガーテストの注意点＝ロールアップで親更新→再起動＋1トランザクションで複数回起動。", "a": "A. ロールアップ サマリー フィールドにより、親レコードが保存されることがあります。", "b": "B. すべての DML 操作がデータベースにコミットされると、重複ルールが実行されます。", "c": "C. トリガーはトランザクション中に複数回起動される可能性があります。", "d": "D. 検証ルールによりトリガーが再度起動します。"}, {"n": "8421", "p": "Universal Containers (UC) の開発者は、バージョン管理を使用してコードの変更を共有していますが、コードを異なる環境にデプロイすると、エラーが発生することが多いことに気付きました。そこで、継続的インテグレーション (CI) を設定することにしました。 UC 開発チームは、CI プロセスの一環としてテストを自動的に実行するために何を使用すればよいでしょうか?", "r": "テスト、デバッグ、リリース", "ans": "A", "exp": "ざっくり言うと：CI（継続的インテグレーション）でテストを自動実行するのに使うツールは？\n\n✅ 正解 A：Salesforce CLI\nCIパイプライン（Jenkins、GitHub Actions、CircleCIなど）のスクリプト内で sf project deploy start --test-level RunLocalTests のようなコマンドを実行し、デプロイとテストを自動化できる。たとえ話：工場の自動品質検査ライン。コードがプッシュされるたびに、CLIが自動でテストを実行して品質を確認する。\n\n❌ B（Visual Studio Code）→ VS Codeは開発用IDEで、手動操作が前提。CIパイプラインのスクリプトから自動実行するツールではない。\n❌ C（Force.comツールキット）→ 旧世代のツールでサポート終了済み。\n❌ D（開発者コンソール）→ ブラウザ上のGUIツール。スクリプトからの自動実行には対応していない。\n\n🎯 試験のコツ：CI/CD＝Salesforce CLI。自動化・スクリプト実行にはCLI系ツール。GUI系（VS Code、開発者コンソール）は手動操作用。", "a": "A. Salesforce CLI", "b": "B. ビジュアルスタジオコード", "c": "C. Force.com ツールキット", "d": "D. 開発者コンソール"}, {"n": "8422", "p": "開発者は、レコードの重複を引き起こしているカスタム Apex トリガーの問題を警告されます。 問題のトラブルシューティングに最も適切なデバッグ方法は何ですか?", "r": "テスト、デバッグ、リリース", "ans": "B", "exp": "ざっくり言うと：トリガーがレコード重複を引き起こしている問題のデバッグ方法は？\n\n✅ 正解 B：System.debugステートメントを追加して実行フローを追跡\nトリガーコード内の重要なポイントにSystem.debug('変数名: ' + value);を追加し、デバッグログで実行の流れと変数の値を確認する。たとえ話：犯人（バグ）を見つけるために、家の各部屋に監視カメラ（debug文）を設置して動きを追跡するイメージ。\n\n❌ A（履歴イベントログ確認）→ イベントモニタリングのログは高レベルのイベント記録。トリガーの内部ロジックの詳細なステップバイステップ追跡には不十分。\n❌ C（Apexインタラクティブデバッガー）→ ブレークポイントを設定してステップ実行するツールだが、SalesforceのApex Replay DebuggerはIDEに依存し、リアルタイムのインタラクティブデバッグは限定的。最も「適切」なのはSystem.debug。\n❌ D（本番でトリガー無効化）→ 本番環境でトリガーを無効にするのはリスクが高すぎる。サンドボックスでデバッグすべき。\n\n🎯 試験のコツ：Apexデバッグの基本＝System.debug＋デバッグログ。本番トリガー無効化は絶対NG。", "a": "A. 履歴イベント ログを確認して、問題の原因を特定します。", "b": "B. 実行フローを追跡して問題を特定するために、コードに system.debug ステートメントを追加します。", "c": "C. Apex インタラクティブ デバッガーを使用してコードをステップ実行し、問題を特定します。", "d": "D. 本番環境でトリガーを無効にして、問題が引き続き発生するかどうかをテストします。"}, {"n": "8423", "p": "Apex テストクラスで @testSetup アノテーションを使用することに関して正しい 2 つの記述はどれですか。 2つの回答を選択してください", "r": "テスト、デバッグ、リリース", "ans": "B;D", "exp": "ざっくり言うと：@testSetupアノテーションについて正しい記述は？2つ選ぶ。\n\n【前提知識：@testSetupとは？】\nテストクラス内で1回だけ実行され、テストデータを作成するセットアップメソッド。たとえ話：料理教室で「全員分の材料を最初にまとめて準備する係」。各生徒（テストメソッド）がそれぞれ材料を用意する手間が省ける。\n\n✅ 正解 B：テストデータが1回挿入され、テストクラス内の全テストメソッドで使用可能\n@testSetupメソッドは最初に1回だけ実行され、作成されたデータは各テストメソッドの開始時にロールバック→復元される。全テストメソッドが同じベースラインデータにアクセスできる。\n\n✅ 正解 D：@isTest(SeeAllData=true)使用時は@testSetupはサポートされない\nSeeAllData=trueは本番データにアクセスする設定。テストデータの独立性を前提とする@testSetupとは相互排他。両方を同時に使うとコンパイルエラー。\n\n❌ A（レコードを個々のテストメソッドで更新できない）→ 各テストメソッドは@testSetupのデータのコピーを受け取るので、更新は可能。ただし変更は他のテストメソッドに影響しない（各メソッドで独立）。\n❌ C（各テストメソッドに対して1回実行されシステム制限にカウント）→ @testSetupはテストクラスごとに1回だけ実行される。各テストメソッドごとではない。\n\n🎯 試験のコツ：@testSetup＝1回実行＋全メソッドで共有＋SeeAllDataとは併用不可。", "a": "テストセットアップメソッドで作成されたレコードは、個々のテストメソッドでは更新できません。", "b": "テスト セットアップ メソッドでは、テスト データが 1 回挿入され、テスト クラス内のすべてのテスト メソッドで使用できるようになります。", "c": "@testSetup アノテーションで定義されたメソッドは、テスト クラス内の各テスト メソッドに対して 1 回実行され、システム制限にカウントされます。", "d": "@isTest(SeeAllData=True) アノテーションが使用されている場合、@testSetup アノテーションはサポートされません。"}, {"n": "8426", "p": "Cloud Kicks には、コールセンター エージェントが受信サービス デスク コールを処理するときに使用するマルチスクリーン フローがあります。 フローのステップの 1 つで、外部の注文管理システムからリアルタイムで取得され、画面に表示される注文番号と日付のリストがエージェントに提示される必要があります。 この要件を満たすために開発者は何を使用すべきでしょうか?1つの解答を選択してください。", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：画面フローのステップで外部の注文管理システムからリアルタイムでデータを取得するには？\n\n✅ 正解 B：Apex RESTクラス\n外部システムからリアルタイムでデータを取得するにはHTTPコールアウトが必要。フローのApexアクション内でHTTPコールアウトを実行し、外部の注文管理システムのREST APIからデータを取得してフローの画面に表示する。たとえ話：電話で「今の在庫状況教えて」とリアルタイムで問い合わせるイメージ。\n\n❌ A（送信メッセージ）→ 送信メッセージは「外部に通知を送る」一方向の仕組み。外部からデータを「受け取る」機能はない。\n❌ C（Apex Controller）→ VFページのコントローラ用語で、フローのアクションとしては不適切な表現。フローから呼ぶにはInvocableMethod。\n❌ D（InvocableMethod）→ フローからApexを呼ぶアノテーションだが、コールアウトを含むApexアクションの場合、@InvocableMethodの中でHTTPコールアウトを実装する必要がある。問題の「この要件を満たすために開発者は何を使用すべきか」にはApex RESTクラス（コールアウト処理を含むクラス）がより直接的な答え。\n\n🎯 試験のコツ：「フロー＋外部データ＋リアルタイム取得」→ Apexのコールアウト処理。送信メッセージは送信専用で受信不可。", "a": "送信メッセージ", "b": "Apex REST class", "c": "Apex Controller", "d": "InvocableMethod"}, {"n": "8429", "p": "Flow Builder は、Apex アクションを使用して、カスタム クラス ContactInfo に保存されている複数の連絡先に関する追加情報を提供します。 追加情報を取得する Apex メソッドの正しい定義はどれですか?", "r": "プロセスの自動化とロジック", "ans": "B", "exp": "ざっくり言うと：フローのApexアクションで複数の連絡先のContactInfo（カスタムクラス）を返すメソッドの正しい定義は？\n\n【前提知識：@InvocableMethodのシグネチャ】\n@InvocableMethodは入力も出力もList型が必須。たとえ話：フローは「バス（List）」で乗客（データ）を運ぶ。1人ずつ歩かせる（単一パラメータ）のはNG。\n\n✅ 正解 B：@InvocableMethod public static List<ContactInfo> getInfo(List<Id> contactIds)\nポイント：①static（必須）、②List入力＋List出力（@InvocableMethodのルール）、③publicアクセス修飾子。フローがバルクで複数レコードを渡す可能性があるため、List型で受け渡しする。\n\n❌ A（public＝非static＋単一パラメータ）→ @InvocableMethodはstaticが必須。また入力パラメータがId単一ではなくList<Id>である必要がある。\n❌ C（static＋単一パラメータ）→ staticはOKだが、入力がId単一（List型でない）で出力もContactInfo単一（List型でない）。バルク処理に対応していない。\n❌ D（非static＋List入出力）→ List型はOKだが、staticが付いていない。@InvocableMethodはstaticメソッド必須。\n\n🎯 試験のコツ：@InvocableMethod＝「static必須」「入力List・出力Listまたはvoid」。単一パラメータやインスタンスメソッドは×。", "a": "@InvocableMethod(label=&#39;Additional Info&#39;) \npublic ContactInfo getInfo(Id contactId) {\n /* implementation */ \n}", "b": "@InvocableMethod(label=&#39;Additional Info&#39;) \npublic static List getInfo(List contactIds) {\n /* implementation */ \n}", "c": "@InvocableMethod(label=&#39;Additional Info&#39;) \npublic static ContactInfo getInfo(Id contactId) {\n /* implementation */ \n}", "d": "@InvocableMethod(label=&#39;Additional Info&#39;) \npublic List getInfo(List contactIds) {\n /* implementation */ \n}"}, {"n": "8430", "p": "Job _Application__c カスタム オブジェクトには、Contact オブジェクトとのマスター詳細関係となるフィールドがあり、Contact オブジェクトがマスターになります。 機能実装の一環として、開発者は、関連する取引先業界が 「Technology」を検索し、同時に連絡先の Job_Application__c レコードも取得します。 オブジェクトの関係に基づいて、連絡先のリストを取得するための最も効率的なステートメントは何ですか?", "r": "デベロッパーの基本", "ans": "A", "exp": "ざっくり言うと：Contact（マスター）→Job_Application__c（詳細）の関係で、取引先業界がTechnologyの連絡先と関連するJob_Applicationを取得するSOQLは？\n\n【前提知識：サブクエリのリレーション名】\nSOQLのサブクエリでは、子オブジェクトのリレーション名（__r付き）を使う。たとえ話：「社員一覧を表示して、各社員の担当プロジェクト一覧も一緒に」という場合、プロジェクトの参照名（__r）でサブクエリを書く。\n\n✅ 正解 A：[SELECT Id, (SELECT Id FROM Job_Applications__r) FROM Contact WHERE Account.Industry = 'Technology']\nポイント：①サブクエリのリレーション名はJob_Applications__r（__r＝リレーション名）、②親のAccount.IndustryはAccount（単数形）でドット記法。\n\n❌ B（Job_Applications__c＋Accounts.Industry）→ 2つ間違い。サブクエリは__r（リレーション名）で、__c（API名）ではない。またAccounts（複数形）ではなくAccount（単数形）。\n❌ C（Job_Applications__r＋Accounts.Industry）→ サブクエリは正しいが、Accounts（複数形）が間違い。Account（単数形）が正しい。\n❌ D（Job_Applications__c＋Account.Industry）→ Account.Industryは正しいが、サブクエリのJob_Applications__cが間違い。__rを使う。\n\n🎯 試験のコツ：サブクエリ＝子オブジェクトの__r名。親の参照＝単数形.フィールド名。__cと__rの使い分けが定番引っかけ。", "a": "[SELECT Id, (SELECT Id FROM Job_Applications__r) FROM Contact WHERE Account.Industry = &#39;Technlogy&#39;];", "b": "[SELECT Id, (SELECT Id FROM Job_Applications__c) FROM Contact WHERE Accounts.Industry = &#39;Technlogy&#39;];", "c": "[SELECT Id, (SELECT Id FROM Job_Applications__r) FROM Contact WHERE Accounts.Industry = &#39;Technlogy&#39;];", "d": "[SELECT Id, (SELECT Id FROM Job_Applications__c) FROM Contact WHERE Account.Industry = &#39;Technlogy&#39;];"}, {"n": "8431", "p": "Lightning コンポーネント  フレームワークは、開発者がソリューションをより迅速に実装するのにどのように役立ちますか?", "r": "ユーザインターフェース", "ans": "A", "exp": "ざっくり言うと：Lightningコンポーネントフレームワークが開発を加速する理由は？\n\n✅ 正解 A：モバイルとデスクトップのデバイス認識を提供する\nLightningフレームワークはレスポンシブデザインをフレームワークレベルでサポートし、モバイルとデスクトップの画面サイズを自動検知して適切なレイアウトを提供する。たとえ話：1着の服（コンポーネント）がS/M/Lサイズに自動調整されるストレッチ素材のようなもの。開発者がモバイル版とPC版を別々に作る必要がない。\n\n❌ B（アジャイルプロセスのデフォルトステップ）→ Lightningフレームワークは開発ツールであり、プロジェクト管理手法（アジャイル）を提供するものではない。\n❌ C（変更履歴とバージョン管理）→ バージョン管理はGit等の外部ツールの役割。Lightningフレームワーク自体にはバージョン管理機能はない。\n❌ D（コードレビューの標準とプロセス）→ コードレビューは組織のプロセスであり、フレームワークが提供する機能ではない。\n\n🎯 試験のコツ：Lightningフレームワークの強み＝モバイル/デスクトップ対応＋クライアント側レンダリング。開発プロセス系の選択肢は×。", "a": "モバイルとデスクトップのデバイス認識を提供する", "b": "デフォルトのステップを備えたアジャイルプロセスを提供する", "c": "変更履歴とバージョン管理を提供する", "d": "コードレビューの標準とプロセスを提供する"}, {"n": "8435", "p": "Universal Containers の営業管理チームでは、リードが変換されるときに、リード  レコードのリード ソース フィールドに値が入力されることを要求しています。リードを変換する前に、ユーザーがリード ソース フィールドに値を入力するようにするには、どうすればよいですか。", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：リード変換前にリードソースフィールドの入力を必須にするには？\n\n✅ 正解 D：検証ルール\n検証ルールで「IsConverted = trueかつLeadSource = null」の場合にエラーを出す、またはもっとシンプルに「LeadSourceが空ならエラー」とする。たとえ話：空港のチェックインカウンターで「パスポート（リードソース）がなければ搭乗（変換）させない」ルール。コード不要で実装でき、変換時にも検証ルールは実行される。\n\n❌ A（after トリガー）→ afterトリガーはレコード保存後に実行される。保存を「防止」するにはbeforeが必要。また、検証ルールで済む要件にトリガーを書くのは過剰。\n❌ B（リード変換フィールドマッピング）→ フィールドマッピングはリード→取引先/連絡先/商談にフィールドを移行する設定。入力必須の制御はできない。\n❌ C（数式フィールド）→ 数式フィールドは計算値を表示するだけ。入力制御やエラー表示の機能はない。\n\n🎯 試験のコツ：「フィールド入力必須＋変換前チェック」→ 検証ルール。検証ルールはリード変換時にも実行される。", "a": "リードに対して after トリガーを作成します。", "b": "リード変換フィールド マッピングを使用します。", "c": "数式フィールドを使用します。", "d": "検証ルールを使用します。"}, {"n": "8436", "p": "Universal Containers は、ケースの発生元に基づいて、新しいケースを適切なサポート担当者に自動的に割り当てたいと考えています。サポート担当者の名前を保存するために、ケース オブジェクトにカスタム フィールドを作成しました。 ケースを適切なサポート担当者に割り当てるための最善の解決策は何ですか?", "r": "プロセスの自動化とロジック", "ans": "D", "exp": "ざっくり言うと：ケースの発生元に基づいてサポート担当者を自動割り当てするには？\n\n✅ 正解 D：割り当てフロー要素を使用\nレコードトリガーフロー内で、ケースの発生元（Origin）に基づいて条件分岐し、カスタムフィールドに適切なサポート担当者名を設定する。たとえ話：電話の着信（発生元）に応じて「内線1は田中さん、内線2は佐藤さん」と自動振り分けする交換機のイメージ。コード不要で、Flow Builderで実装可能。\n\n❌ A（トリガー）→ Apexトリガーで実装は可能だが、フロー（宣言型）で実現できる要件にコードを書くのはベストプラクティスに反する。\n❌ B（数式フィールド）→ 数式フィールドは計算結果を表示するだけで、レコードのフィールドを「更新」する機能はない。カスタムフィールドへの値設定はできない。\n❌ C（検証ルール）→ 検証ルールは入力チェック用で、値の自動設定はできない。「割り当て」の機能はない。\n\n🎯 試験のコツ：「自動割り当て＋条件分岐」→ フロー。「最善の解決策」は通常、宣言型（コード不要）が優先。", "a": "Case オブジェクトでトリガーを使用します。", "b": "Case オブジェクトで数式フィールドを使用します。", "c": "Case オブジェクトで検証ルールを使用します。", "d": "割り当てフロー要素を使用します。"}, {"n": "8439", "p": "アカウントに対してデフォルトで before トリガーが起動されるアクションはどれですか?", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：アカウントに対してデフォルトでbeforeトリガーが起動されるアクションは？\n\n✅ 正解 C：データローダーとバルクAPIを使用したデータのインポート\nデータローダーでレコードをインポート（insert/update）すると、通常のDML操作として処理されるため、beforeトリガーがデフォルトで起動される。たとえ話：正面玄関（通常のDML）から入れば、セキュリティチェック（トリガー）を通る。\n\n❌ A（選択リストの名前変更または置換）→ 選択リストのメタデータ変更はレコードのDML操作ではないため、トリガーは起動されない。\n❌ B（一括アドレス更新ツール）→ 一括アドレス更新は内部的にトリガーをバイパスする場合がある。デフォルトでは起動が保証されない。\n❌ D（リードを連絡先に変換）→ リード変換はリードのdeleteトリガーやContact/Account/Opportunityのinsertトリガーは起動するが、「アカウントのbeforeトリガー」がデフォルトで起動するかは変換の種類に依存する。\n\n🎯 試験のコツ：トリガーが確実に起動＝通常のDML操作（insert/update/delete）。メタデータ変更やシステムツールはトリガーをバイパスすることがある。", "a": "選択リストの名前変更または置換", "b": "一括アドレス更新ツールを使用してアドレスを更新する", "c": "データローダーとバルクAPIを使用したデータのインポート", "d": "リードを連絡先に変換する"}, {"n": "8440", "p": "アプリケーションを開発するメリットは何ですか", "r": "デベロッパーの基本", "ans": "D", "exp": "ざっくり言うと：Salesforceプラットフォーム上でアプリケーションを開発するメリットは？（1つ選択）\n\n✅ 正解 D：定義済みのコンピューティングリソースへのアクセス\nSalesforceはPaaS（Platform as a Service）として、サーバー、データベース、ネットワーク、セキュリティなどのインフラを提供済み。開発者はインフラの構築・運用を気にせず、ビジネスロジックの開発に集中できる。たとえ話：キッチン付きのレンタルスペース（Salesforce）を借りれば、自分でキッチンを建設する（インフラ構築）必要がない。\n\n❌ A（強制的なユニットテスト）→ これもSalesforceのメリットだが、この問題では正解がDのみ。\n❌ B（ビッグデータ用ストレージ）→ Salesforceにはストレージ上限があり、ビッグデータ用に最適化されていない。\n❌ C（無制限の処理能力とメモリ）→ ガバナ制限があり「無制限」ではない。マルチテナント環境を守るため意図的に制限されている。\n\n🎯 試験のコツ：プラットフォームのメリット＝インフラ提供＋テスト強制。「無制限」「ビッグデータ」は×。", "a": "強制的なユニットテストとコードカバレッジのベストプラクティス", "b": "ビッグデータ用に事前設定されたストレージ", "c": "無制限の処理能力とメモリ", "d": "定義済みのコンピューティング リソースへのアクセス"}, {"n": "8441", "p": "あるソフトウェア会社は、Salesforce を使用して、アカウント オブジェクトでソフトウェアを販売する企業を追跡しています。また、Salesforce を使用して、カスタム オブジェクト Bug__c でソフトウェアのバグを追跡しています。 プロセス改善イニシアチブの一環として、どの企業がどのバグを報告したかを報告できるようにしたいと考えています。各企業は複数のバグを報告でき、バグは複数の企業によって報告されることもあります。 このレポートを可能にするには何が必要ですか?", "r": "デベロッパーの基本", "ans": "D", "exp": "ざっくり言うと：AccountとBug__cの多対多の関係（1社が複数バグ、1バグが複数社）をレポート可能にするには？\n\n✅ 正解 D：Bug__cとAccount間のジャンクションオブジェクト\n多対多の関係を実現するには中間テーブル（ジャンクションオブジェクト）が必要。AccountとBug__cの両方にマスター詳細リレーションを持つジャンクションオブジェクトを作成する。たとえ話：「報告記録」テーブルが「どの会社が」「どのバグを」報告したかを記録する出席簿のようなもの。\n\n❌ A（ロールアップサマリーフィールド）→ ロールアップサマリーは親子関係での集計用。多対多の関係を作る機能ではない。\n❌ B（Bug__cからAccountへのマスター詳細）→ これだと1つのバグは1つの会社にしか紐付かない（多対1）。「バグは複数の企業によって報告される」を満たさない。\n❌ C（Bug__cからAccountへの参照フィールド）→ 同様に多対1の関係しか作れない。\n\n🎯 試験のコツ：「多対多」「各AがBに複数＋各BもAに複数」→ ジャンクションオブジェクト一択。", "a": "アカウントの Bug_c のロールアップ要約フィールド", "b": "Bug_c のアカウントへのマスター詳細フィールド", "c": "Bug_c の Account への参照フィールド", "d": "Bug__c と Account 間の関数オブジェクト"}, {"n": "8442", "p": "ある企業には、自社の Web サイトから注文を作成し、注文を処理する独自の注文管理システム (OMS) があります。OMS で注文が作成されると、統合によって Salesforce にも注文レコードが作成され、注文の電子メールで識別される連絡先に関連付けられます。注文が OMS でさまざまな段階を進むと、統合によって Salesforce でも注文が更新されます。 企業は、OMS からの更新ごとに Salesforce に新しい注文レコードが作成されることに気付きました。 Salesforce で重複した注文レコードが作成されないようにするには、どの 2 つのアクションを実行する必要がありますか? 2つの回答を選択してください", "r": "デベロッパーの基本", "ans": "A;B", "exp": "ざっくり言うと：OMS→Salesforceの注文連携で、更新のたびに重複レコードが作成される問題の対策は？2つ選ぶ。\n\n✅ 正解 A：OMSの注文番号を外部IDとして使用\n注文オブジェクトに外部IDフィールドを作り、OMSの注文番号を格納する。upsert操作でこの外部IDをキーにすれば、既存レコードはupdateされ、新規の場合のみinsertされる。重複を防ぐメカニズム。\n\n✅ 正解 B：OMS内の注文番号が一意であることを確認\n外部IDを「一意」に設定するだけでなく、そもそもOMS側で注文番号が重複しないことを保証する必要がある。OMS側で同じ注文番号が2つ生成されたら、Salesforce側でも2レコードになってしまう。\n\n❌ C（連絡先の電子メールを外部IDに）→ 問題は注文レコードの重複であり、連絡先のメールアドレスを外部IDにしても注文の重複は解決しない。対象が違う。\n❌ D（トリガーで重複削除）→ 事後的に重複を削除するのは非効率で、データの一時的な不整合も生じる。upsert＋外部IDで重複を防ぐのが正しいアプローチ。\n\n🎯 試験のコツ：外部連携の重複防止＝外部ID＋一意＋upsert。「重複を後から消す」のではなく「最初から防ぐ」。", "a": "OMS からの注文番号を外部 ID として使用します。", "b": "OMS 内の注文番号が一意であることを確認します。", "c": "O 連絡先レコードの電子メールを外部 ID として使用します。", "d": "O Order オブジェクトにトリガーを記述して重複を削除します。"}, {"n": "8443", "p": "コードではなく宣言型カスタマイズを使用する 2 つの利点は何ですか? 2つの回答を選択してください", "r": "デベロッパーの基本", "ans": "A;D", "exp": "ざっくり言うと：コードでなく宣言型カスタマイズを使う利点は？2つ選ぶ。\n\n✅ 正解 A：Salesforceリリースごとに自動的に更新される\n宣言型カスタマイズ（フロー、検証ルール、数式など）はSalesforceプラットフォームが管理するため、年3回のメジャーリリースで自動的にアップデートされる。たとえ話：マンションの共用設備（宣言型）は管理会社が自動でメンテナンスしてくれるが、自分で設置した設備（Apexコード）は自分でメンテナンスが必要。\n\n✅ 正解 D：一般的にメンテナンスが少なくて済む\nコードの保守（バグ修正、テスト更新、API変更対応）が不要。管理者でも変更可能で、開発者リソースに依存しない。\n\n❌ B（テストクラスが自動生成）→ 宣言型カスタマイズにテストクラスは不要だが、「自動生成される」わけではない。フローのテストカバレッジはApexテストで確保する必要がある。\n❌ C（実行時エラーが発生しない）→ フローでも実行時エラーは発生する（例：null参照、DML例外など）。エラーが完全になくなるわけではない。\n\n🎯 試験のコツ：宣言型の利点＝自動アップデート＋低メンテナンス。「エラーなし」「テスト自動生成」は×。", "a": "宣言的なカスタマイズは、Salesforce リリースごとに自動的に更新されます。", "b": "宣言的なカスタマイズにより、テスト クラスが自動的に生成されます。", "c": "宣言的なカスタマイズでは実行時エラーは発生しません", "d": "宣言的なカスタマイズは一般的にメンテナンスが少なくて済む"}, {"n": "8444", "p": "スクラッチ組織を作成するには何を使用すればよいですか?", "r": "デベロッパーの基本", "ans": "A", "exp": "ざっくり言うと：スクラッチ組織を作成するのに使うツールは？\n\n✅ 正解 A：Salesforce CLI\nsf org create scratch コマンドでスクラッチ組織を作成する。DevHub組織に接続した状態で、scratch-def.json（組織の定義ファイル）を指定して実行。たとえ話：自動販売機（CLI）のボタン（コマンド）を押すと、好みの飲み物（スクラッチ組織）が出てくるイメージ。\n\n❌ B（サンドボックスの更新）→ サンドボックスの更新は既存のサンドボックスを最新の本番構成にリフレッシュする操作。スクラッチ組織とは別物。\n❌ C（開発者コンソール）→ ブラウザ上のコード編集・デバッグツール。組織の作成機能はない。\n❌ D（ワークベンチ）→ REST APIを叩くWebツール。スクラッチ組織の作成コマンドはない。\n\n🎯 試験のコツ：スクラッチ組織＝Salesforce CLI＋DevHub。CLI以外でスクラッチ組織は作れない。", "a": "Salesforce CLI", "b": "サンドボックスの更新", "c": "開発者コンソール", "d": "ワークベンチ"}, {"n": "8447", "p": "開発者がバッチ メソッドまたは将来のメソッドのステータスに関する情報を見つけることができる 2 つの場所はどこですか? 2つの回答を選択してください", "r": "テスト、デバッグ、リリース", "ans": "A;B", "exp": "ざっくり言うと：バッチメソッドや@futureメソッドのステータスを確認できる場所は？2つ選ぶ。\n\n✅ 正解 A：開発者コンソール\n開発者コンソールのQuery Editorで SELECT Id, Status, JobType FROM AsyncApexJob のようなSOQLを実行して、非同期ジョブのステータスを確認できる。また、テスト実行のステータスもここで確認可能。\n\n✅ 正解 B：Apexジョブ\n設定→環境→ジョブ→Apexジョブで、全ての非同期Apexジョブ（バッチ、@future、Queueable、Schedulable）のステータス一覧を確認できる。GUIで直感的に確認可能。\n\n❌ C（一時停止されたフローインタビュー）→ 画面フローが一時停止した場合のインタビューを表示する機能。Apexの非同期ジョブとは無関係。\n❌ D（Apex Flexキュー）→ Flexキューはバッチジョブの待ち順序を管理する機能。@futureメソッドのステータスは表示されない。また問題は「バッチまたは@future」なので、両方をカバーするA/Bが適切。\n\n🎯 試験のコツ：非同期ジョブ確認＝Apexジョブページ＋開発者コンソール（SOQL）。Flexキュー＝バッチ専用。", "a": "開発者コンソール", "b": "Apexジョブ", "c": "一時停止されたフローインタビューコンポーネント", "d": "Apex Flex キュー"}, {"n": "8449", "p": "開発者チームは、さまざまな組織構成で独立して作業できるソース駆動型プロジェクトに取り組んでいます。 開発にはどのタイプの Salesforce 組織を使用すればよいでしょうか?", "r": "デベロッパーの基本", "ans": "D", "exp": "ざっくり言うと：ソース駆動型プロジェクトで独立した組織構成で作業するのに最適な組織は？\n\n【前提知識：ソース駆動型開発とは？】\nコードをバージョン管理システム（Git）を中心に管理し、使い捨ての開発環境で作業するスタイル。たとえ話：共有のキッチン（サンドボックス）で全員が料理するのではなく、各自が自分専用の移動キッチン（スクラッチ組織）を持って、完成した料理（コード）だけ共有冷蔵庫（Git）に入れるイメージ。\n\n✅ 正解 D：スクラッチ組織\nSalesforce DXのソース駆動型開発で使う一時的な開発環境。scratch-def.jsonで組織の構成を定義し、CLIで作成→開発→テスト→破棄のサイクルで使う。各開発者が独自の構成で独立した組織を持てる。\n\n❌ A（開発者サンドボックス）→ 本番のメタデータコピー。「さまざまな組織構成で独立して」という柔軟性はスクラッチ組織の方が高い。\n❌ B（フルコピーサンドボックス）→ 本番のデータ＋メタデータの完全コピー。重くて日常開発には不向き。\n❌ C（開発者組織）→ 無料の独立組織だが、ソース駆動型開発のワークフロー（CLI連携、定義ファイルベースの環境構築）には対応していない。\n\n🎯 試験のコツ：「ソース駆動型＋独立した組織構成」→ スクラッチ組織。キーワード「source-driven」が出たらスクラッチ組織。", "a": "開発者サンドボックス", "b": "フルコピーサンドボックス", "c": "開発者組織", "d": "スクラッチ組織"}, {"n": "8450", "p": "開発者には、取引先 レコードを保存するための Visualforce ページとカスタム  コントローラがあります。開発者は、検証ルール違反をユーザーに表示したいと考えています。 開発者は検証ルール違反が表示されるようにするにはどうすればよいでしょうか?", "r": "ユーザインターフェース", "ans": "C", "exp": "ざっくり言うと：VFカスタムコントローラで検証ルール違反をユーザーに表示するには？\n\n✅ 正解 C：VFページに<apex:pageMessages>を含める\n<apex:pageMessages/>タグをVFページに追加すると、DML操作時に発生したエラー（検証ルール違反、DmlExceptionなど）が自動的にページ上にエラーメッセージとして表示される。たとえ話：店の掲示板（<apex:pageMessages>）に「この商品は在庫切れです」というエラー通知が自動で貼り出されるイメージ。\n\n❌ A（カスタムコントローラ属性を追加）→ 属性を追加するだけではエラーメッセージは表示されない。<apex:pageMessages>がVFページ側に必要。\n❌ B（カスタム例外クラスでtry/catch）→ try/catchでエラーをキャッチすると、逆にVFのエラー表示が消えてしまうことがある。検証ルール違反はDML操作で自然にスローされるのをそのまま<apex:pageMessages>で拾う方が適切。\n❌ D（Database.upsert()メソッド）→ Database.upsert()はDML操作のメソッドだが、エラー表示の方法ではない。むしろDatabase.upsert(record, false)にするとエラーがスローされず、<apex:pageMessages>に表示されない可能性がある。\n\n🎯 試験のコツ：VFエラー表示＝<apex:pageMessages>。これ1つでDMLエラー、検証ルール違反、ApexPages.addMessageのメッセージが全部表示される。", "a": "メッセージを表示するためのカスタム コントローラー属性を追加します。", "b": "カスタム例外クラスで try/catch を使用します。", "c": "Visualforce ページに  を含めます。", "d": "database.unsert() メソッドを使用して DML を実行します。"}, {"n": "8451", "p": "開発者は、さまざまな種類の Salesforce ケースの個別の要件をテストできるように、Apex テスト スイート全体のデータ (アカウント、連絡先、製品、資産) のベースライン セットを作成する必要があります。 各ユニット テストに必要なデータを効率的に生成できるアプローチはどれですか?", "r": "テスト、デバッグ、リリース", "ans": "B", "exp": "ざっくり言うと：テストスイート全体で共通のベースラインテストデータを効率的に作る方法は？\n\n✅ 正解 B：voidメソッドで@TestSetupを使用\n@testSetupアノテーション付きのvoidメソッドで、テストクラス全体で使う共通データ（アカウント・連絡先・製品・資産）を1回だけ作成する。各テストメソッドの開始時にこのデータがリセット→復元されるので、テスト間の干渉がない。たとえ話：料理教室で「共通の材料セット」を最初に1回だけ準備し、各生徒（テストメソッド）がそのコピーを使う仕組み。\n\n❌ A（HttpCalloutMockでモック作成）→ これは外部HTTPコールアウトのテスト用。テストデータ（アカウント・連絡先等）の作成とは無関係。\n❌ C（@IsTest(seeAllData=true)）→ 本番データを使う方法。テストの独立性が損なわれるアンチパターン。\n❌ D（Test.startTest()の前にデータ作成）→ 動作はするが、各テストメソッドで重複してデータ作成コードを書く必要がある。@testSetupの方が効率的。\n\n🎯 試験のコツ：「ベースラインデータ＋効率的＋複数テストメソッド」→ @testSetup。1回作成→全メソッドで共有。", "a": "HttpcalloutMock インターフェースを使用してモックを作成します。", "b": "void メソッドで @TestSetup を使用します。", "c": "単体テスト クラスの先頭に @IsTest (seeAllData=true) を追加します。", "d": "ユニットテストの Test .startTest() の前にテストデータを作成します。"}, {"n": "8452", "p": "開発者は、外部システムから Salesforce にデータをインポートするプロジェクトに取り組んでいます。データには、Salesforce のすべてのユーザーに表示されるべきではない機密情報が含まれています。 データの安全性を確保するために開発者は何をすべきでしょうか?", "r": "プロセスの自動化とロジック", "ans": "C", "exp": "ざっくり言うと：機密データを含む外部データをSalesforceにインポートし、安全に管理するには？\n\n✅ 正解 C：データインポートウィザードでインポート＋フィールドレベルセキュリティ（FLS）で機密フィールドへのアクセスを制限\nデータインポート後、プロファイルや権限セットでフィールドレベルセキュリティを設定し、機密フィールドを特定ユーザーにのみ表示/編集可能にする。たとえ話：書類を金庫（Salesforce）に入れた後、金庫の鍵（FLS）を特定の人にだけ渡すイメージ。Salesforceの標準セキュリティ機能を活用する正しいアプローチ。\n\n❌ A（サードパーティツールで暗号化してからインポート）→ 暗号化したデータをSalesforceに入れても、フィールドで検索・ソート・レポートができなくなる。Salesforceの標準セキュリティ（FLS）で管理する方が実用的。\n❌ B（Apexデータローダー＋Apexコードでセキュリティ処理）→ アクセス制御をApexコードで実装するのは複雑で保守性が低い。標準のFLSを使う方がベストプラクティス。\n❌ D（Salesforce CLI＋ユーザー権限設定）→ CLI自体にはセキュリティ設定機能はない。またユーザー権限だけでなくFLSの設定が必要。\n\n🎯 試験のコツ：「機密データ＋アクセス制限」→ フィールドレベルセキュリティ（FLS）。Salesforceの標準セキュリティ機能が最優先。", "a": "機密データを Salesforce にインポートする前に、サードパーティのツールを使用して暗号化します。", "b": "Apex データローダーを使用して、をインポートし、セキュリティとアクセス制御を処理する Apex コードを記述します。", "c": "データ インポート ウィザードを使用してデータをインポートし、フィールド レベルのセキュリティを設定して機密フィールドへのアクセスを制限します。", "d": "Salesforce CLI を使用してデータをインポートし、機密データへのアクセスを制限するためのユーザー権限を設定します。"}, {"n": "8454", "p": "開発者は、取引先 レコード ページに挿入される statuscomponent という Lightning Web コンポーネントを作成しました。 このコンポーネントを利用できるようにするには、開発者はどの 2 つのことを行う必要がありますか? 2つの回答を選択してください", "r": "ユーザインターフェース", "ans": "B;C", "exp": "ざっくり言うと：LWCを取引先レコードページで利用可能にするための2つの設定は？\n\n✅ 正解 B：.js-meta.xmlファイルにlightning__RecordPageを追加\n<target>lightning__RecordPage</target>を指定することで、App Builderでレコードページにコンポーネントを配置できるようになる。対象ページ（レコードページ、ホームページ、アプリページ）をtargetで明示する。\n\n✅ 正解 C：.js-meta.xmlファイルでisExposedをtrueに設定\n<isExposed>true</isExposed>を設定することで、App BuilderのコンポーネントパレットにLWCが表示される。これがfalse（デフォルト）だと、App Builderで見つけられない。\n\n❌ A（.jsファイルにlightning_Recordpageを追加）→ JavaScriptファイルにはロジックを書く。公開設定はメタデータファイル（.js-meta.xml）で行う。\n❌ D（.js-meta.xmlファイルにAccount objectを追加）→ 特定のオブジェクトに限定する場合は<targetConfigs>内でobjectを指定するが、「利用可能にする」ための必須設定ではない。指定しなければ全オブジェクトのレコードページで使える。\n\n🎯 試験のコツ：LWCをApp Builderで使う＝isExposed:true＋target指定。両方.js-meta.xmlファイルで設定。", "a": "statuscomponent.js ファイルに lightning_Recordpage を追加します。", "b": "statusComp .js-meta.xml ファイルに lightning RecordPage を追加します。", "c": "statuscomponent.js-meta.xml ファイルで isExposes を true に設定します。", "d": "statusComponent.js-meta.xm1 ファイルに Account  を追加します。"}, {"n": "8456", "p": "次の Apex コードを参照してください。\n\nInteger x = 0;\ndo {\n    x = 1;\n    x++;\n} while (x ＜ 1);\nSystem.debug(x);\n\nデバッグ ログに書き込まれるときの x の値は何ですか?", "r": "テスト、デバッグ、リリース", "ans": "C", "exp": "ざっくり言うと：このApexコードの実行結果は？\n\n✅ 正解 C：2\n元解説と問題の文脈から、コードの実行結果は2。ループの反復回数やインクリメント操作のステップを追うと、最終的に変数の値が2に到達する。\n\n❌ A（0）→ 初期値のまま変わらないケースだが、コード内のループやインクリメントにより値は変化する。\n❌ B（1）→ 1回のインクリメントだけの場合だが、実際にはもう1回追加される。\n❌ D（4）→ ループが想定以上に回る場合の値だが、終了条件により2で止まる。\n\n🎯 試験のコツ：コードトレース問題は1ステップずつ変数を追跡する。ループの開始条件・終了条件・インクリメント/デクリメントを正確に読み取る。", "a": "0", "b": "1", "c": "2", "d": "4"}];
